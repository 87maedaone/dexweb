const ROUTE_NAMES={honsha:'本社配車',shiga:'滋賀配車',nagoya:'名古屋配車',kyushu:'九州便',hokuriku:'北陸便',kanto:'関東便',akada:'赤田便'};

function switchToRoute(route){
currentRoute=route;
// テーマカラー切替（body にクラス付与）
document.body.classList.remove('theme-shiga','theme-nagoya','theme-kyushu','theme-hokuriku','theme-kanto','theme-shiga-trunk','theme-nagoya-trunk');
if(route==='shiga')document.body.classList.add('theme-shiga');
else if(route==='nagoya')document.body.classList.add('theme-nagoya');
else if(route==='kyushu')document.body.classList.add('theme-kyushu');
else if(route==='hokuriku')document.body.classList.add('theme-hokuriku');
else if(route==='kanto')document.body.classList.add('theme-kanto');
else if(route==='shiga-trunk')document.body.classList.add('theme-shiga-trunk');
else if(route==='nagoya-trunk')document.body.classList.add('theme-nagoya-trunk');
if(route==='honsha'||route==='shiga'||route==='nagoya'){
// 本社・滋賀便・名古屋便は同じレイアウト（左:配車表、右:未処理サイドバー、上:エリアタブ）
// エリアタブとフィルタは currentRoute を見て areaMasters から動的に生成
activeArea='all';
// ドライバー・driverAreas を拠点別に再購読
subscribeBranchData();
// 定期案件も拠点別に再読み込み
reloadRegularsForRoute();
// areas（エリアマスタ）と sidebarPrefs（未処理タブ振り分け）も拠点別に再読み込み
reloadAreasForRoute();
reloadSbPrefsForRoute();
switchView('home');
// エリアタブを再描画（route 別の dispatchAreasMaster から）
renderAreaTabs();
render();
}else if(route==='akada'){
switchView('akada');
}else if(route==='shiga-trunk'||route==='nagoya-trunk'){
// 幹線ページ
activeArea='all';
reloadAreasForRoute();
switchView('trunk');
renderTrunk();
}else{
switchView('route-dispatch');
renderRouteDispatch();
}
}

// areas（拠点別）の再読み込み
function reloadAreasForRoute(){
  var k=_areasKey();
  var stored=localStorage.getItem(k);
  if(stored){
    try{areas=JSON.parse(stored);}catch(e){areas=[];}
  }else{
    // 本社のみデフォルトを入れる、他便は空でスタート
    areas=(currentRoute==='honsha')?JSON.parse(JSON.stringify(DEFAULT_AREAS)):[];
  }
  // Firebase からも最新値を取得（拠点別パス）
  var path=_firebaseAreasPath();
  db.ref(path).once('value').then(function(snap){
    var fb=snap.val();
    if(fb&&Array.isArray(fb)){areas=fb;localStorage.setItem(k,JSON.stringify(areas));}
    renderAreaTabs();
    if(document.getElementById('view-area')&&document.getElementById('view-area').classList.contains('active')){
      renderAreaMgmt();
    }
    render();
  }).catch(function(){
    renderAreaTabs();
    if(document.getElementById('view-area')&&document.getElementById('view-area').classList.contains('active')){
      renderAreaMgmt();
    }
    render();
  });
}

// sidebarPrefs（拠点別）の再読み込み
function reloadSbPrefsForRoute(){
  var k=_sbPrefsKey();
  var stored=localStorage.getItem(k);
  if(stored){
    try{sidebarPrefs=JSON.parse(stored);}catch(e){}
  }else{
    sidebarPrefs={
      delivery:(currentRoute==='honsha')?DEFAULT_MAIN_PREFS.slice():[],
      pickup:(currentRoute==='honsha')?DEFAULT_MAIN_PREFS.slice():[],
      other:(currentRoute==='honsha')?DEFAULT_OTHER_PREFS.slice():[]
    };
  }
  // 配列保証
  if(!Array.isArray(sidebarPrefs.delivery))sidebarPrefs.delivery=[];
  if(!Array.isArray(sidebarPrefs.pickup))sidebarPrefs.pickup=[];
  if(!Array.isArray(sidebarPrefs.other))sidebarPrefs.other=[];
}

function renderTrunk(){
  // 幹線モード以外では何もしない
  if(currentRoute!=='shiga-trunk'&&currentRoute!=='nagoya-trunk'){
    return;
  }
  var labels={
    'shiga-trunk':'滋賀幹線',
    'nagoya-trunk':'名古屋幹線'
  };
  var colors={'shiga-trunk':'#b45309','nagoya-trunk':'#1e40af'};

  var color=colors[currentRoute]||'#1e40af';

  var allOrders=Object.entries(orders||{}).filter(function(e){
    var o=e[1];
    if(!o||o.isCancelled)return false;
    if(o.checked!==true)return false;
    if(normDs(o.deliveryDate)!==currentDate)return false;
    return true;
  });

  var assigns=getTrunkAssigns();
  var checkedAll=getTrunkChecked();

  // 4つの特殊タブ：昼トンボ・滋賀・大阪・路線
  var specialTabs=[
    {name:'昼トンボ',key:'hiru'},
    {name:'滋賀',key:'shiga'},
    {name:'大阪',key:'osaka'},
    {name:'路線',key:'route'},
    {name:'キャンセル',key:'cancel'}
  ];
  specialTabs.forEach(function(tab){
    tab.orders=allOrders.filter(function(e){return assigns[e[0]]===tab.key;});
  });

  // エリアマスタの各エリア（特殊振り分け済みは除外）
  var areaTabs=areasArr.map(function(a){
    var dKeys=a.deliveryKeys||[];
    var matched=allOrders.filter(function(e){
      var asg=assigns[e[0]];
      if(asg==='hiru'||asg==='shiga'||asg==='osaka'||asg==='route'||asg==='cancel')return false;
      var addr=(e[1].deliveryAddress||'');
      return dKeys.some(function(k){return k&&addr.indexOf(k)>=0;});
    });
    return {name:a.name,orders:matched,key:'area:'+a.name};
  });

  var allTabs=specialTabs.concat(areaTabs);

  // 集計：
  // 昼トンボ = 昼トンボに移動した案件（チェック有無関係なし）
  // 夜トンボ = 昼トンボ・滋賀・大阪・路線・キャンセル以外（=エリア該当またはエリア未該当の通常案件すべて）
  var hiruAll=allOrders.filter(function(e){return assigns[e[0]]==='hiru';});
  var hiruCnt=hiruAll.length;
  var hiruWt=hiruAll.reduce(function(s,e){return s+parseW(e[1].weight);},0);
  var yoruAll=allOrders.filter(function(e){

function updateOrderWeight(oid,val){
  var w=parseFloat(val);
  if(isNaN(w)||w<0)w='';
  // ローカル
  if(orders[oid])orders[oid].weight=w?String(w):'';
  // Firebase
  try{db.ref('orders/'+oid).update({weight:w?String(w):''}).catch(function(){});}catch(e){}
  // 集計再描画（カウンタ反映）
  setTimeout(function(){renderTrunk();},10);
}

function trunkChip(oid,asg,label,fg,bg,curAsg){
  var active=curAsg===asg;
  if(active){
    return '<button onclick="event.stopPropagation();setTrunkAssign(\''+oid+'\',\'nagoya\')" title="クリックで戻す" style="padding:4px 10px;background:'+fg+';color:#fff;border:1px solid '+fg+';border-radius:6px;cursor:pointer;font-family:inherit;font-weight:700;font-size:11px;white-space:nowrap">'+label+'</button>';
  }
  return '<button onclick="event.stopPropagation();setTrunkAssign(\''+oid+'\',\''+asg+'\')" style="padding:4px 10px;background:'+bg+';color:'+fg+';border:1px solid '+bg+';border-radius:6px;cursor:pointer;font-family:inherit;font-weight:700;font-size:11px;white-space:nowrap">'+label+'</button>';
}

function fmtMD(s){
  if(!s)return '';
  var n=normDs(s);
  var m=n.match(/^\d{4}-(\d{2})-(\d{2})$/);
  return m?(parseInt(m[1])+'/'+parseInt(m[2])):s;
}

function saveRouteOrder(idx){
var key=currentRoute+'_'+currentDate;

}

(routeOrders[key]||[]).splice(idx,1);

});
}

function addRouteArea(){

routeAreas[currentRoute].push({name:name,keywords:keys});
saveRouteAreas();renderRouteDispatch();showToast(name+' 追加');
}

function saveEditArea(idx){
var name=document.getElementById('ea-name').value.trim();
if(!name){showToast('エリア名を入力');return;}
var isTrunkMode=(currentRoute==='shiga-trunk'||currentRoute==='nagoya-trunk');

var dk=splitKw(document.getElementById('ea-del').value).filter(function(s){return s.length>=2});
var dco=splitKw(document.getElementById('ea-del-co').value).filter(function(s){return s.length>=1});
// 幹線モードでは集荷フィールドが存在しない → 既存値を維持
var pk,pco;
if(isTrunkMode){
  pk=(idx>=0&&areas[idx])?(areas[idx].pickupKeys||[]):[];
  pco=(idx>=0&&areas[idx])?(areas[idx].pickupCoKeys||[]):[];
}else{
  pk=splitKw(document.getElementById('ea-pick').value).filter(function(s){return s.length>=2});
  pco=splitKw(document.getElementById('ea-pick-co').value).filter(function(s){return s.length>=1});
}
var obj={name:name,deliveryKeys:dk,pickupKeys:pk,deliveryCoKeys:dco,pickupCoKeys:pco};
if(idx>=0){areas[idx]=obj;}else{areas.push(obj);}
saveAreas();closeModal();renderAreaMgmt();renderAreaTabs();setTimeout(updateAreaBar,50);
showToast(name+(idx>=0?' を更新':' を作成'));
}

var dateKey='dex_generated_'+currentDate;
if(localStorage.getItem(dateKey))return;
// 既にこの日付の定期案件がDBにあれば生成不要
var hasExisting=Object.keys(orders).some(function(oid){
  return /^reg_[dp]_/.test(oid)&&(orders[oid].pickupDate===currentDate||orders[oid].deliveryDate===currentDate);
});
if(hasExisting){
  localStorage.setItem(dateKey,'1');
  return;
}
var updates={};
regulars.delivery.forEach(function(r,i){
var oid='reg_d_'+currentDate.replace(/-/g,'')+'_'+i;
updates['orders/'+oid]={
clientName:r.name,pickupDate:'',deliveryDate:currentDate,
pickupCompany:'',pickupAddress:'',deliveryCompany:r.name,deliveryPref:'',deliveryAddress:'',
weight:r.weight||'',shape:'',barcode:'',memo:'',
driverId:null,isRoute:false,isCancelled:false,isRegular:true,updatedAt:Date.now()
};
});
regulars.pickup.forEach(function(r,i){
var oid='reg_p_'+currentDate.replace(/-/g,'')+'_'+i;
updates['orders/'+oid]={
clientName:r.name,pickupDate:currentDate,deliveryDate:'',
pickupCompany:r.name,pickupAddress:'',deliveryCompany:'',deliveryPref:'',deliveryAddress:'',
weight:'',shape:'',barcode:'',memo:'',
driverId:null,isRoute:false,isCancelled:false,isRegular:true,updatedAt:Date.now()
};
});
if(Object.keys(updates).length>0){
db.ref().update(updates).then(function(){
localStorage.setItem(dateKey,'1');
}).catch(function(err){console.log('Firebase書込失敗:',err.message);});
}else{
// 定期案件設定が無い場合もフラグを立てる
localStorage.setItem(dateKey,'1');
}
}

function forceGenerate(){
localStorage.removeItem('dex_generated_'+currentDate);
generateDailyRegulars();
}
function generateAllWeek(){
var d=new Date();
for(var i=0;i<7;i++){
var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
var old=currentDate;currentDate=ds;generateDailyRegulars();currentDate=old;
d.setDate(d.getDate()+1);
}
showToast('1週間分の定期案件を生成');
}
// 指定日付で定期案件を生成
function generateForDate(ds){
if(!ds){showToast('日付を選択');return;}
var old=currentDate;
currentDate=ds;
localStorage.removeItem('dex_generated_'+ds);  // 強制再生成
generateDailyRegulars();
currentDate=old;
var d=new Date(ds);
showToast((d.getMonth()+1)+'/'+d.getDate()+' の定期案件を生成');
}
// 指定範囲で生成
function generateForRange(fromDs,toDs){
if(!fromDs||!toDs){showToast('範囲を指定');return;}
var from=new Date(fromDs),to=new Date(toDs);
if(from>to){var t=from;from=to;to=t;}
var days=Math.round((to-from)/86400000)+1;
if(days>62){showToast('最大62日まで');return;}
var count=0;
var d=new Date(from);
while(d<=to){
  var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  var old=currentDate;currentDate=ds;
  localStorage.removeItem('dex_generated_'+ds);
  generateDailyRegulars();
  currentDate=old;
  count++;
  d.setDate(d.getDate()+1);
}
showToast(count+'日分の定期案件を生成');
}

// 🎨 カスタム確認ダイアログ（confirm()の代替）
// dexConfirm('本文','タイトル','確認ボタン文字','danger|warning|info').then(ok=>{...})
function dexConfirm(message,opts){
  opts=opts||{};
  var title=opts.title||'確認';
  var okText=opts.okText||'OK';
  var cancelText=opts.cancelText||'キャンセル';
  var type=opts.type||'info'; // 'danger' | 'warning' | 'info' | 'success'
  var icons={danger:'🗑️',warning:'⚠️',info:'💡',success:'✅',question:'❓'};
  var colors={
    danger:{main:'#dc2626',bg:'#fef2f2',border:'#fecaca'},
    warning:{main:'#f59e0b',bg:'#fffbeb',border:'#fcd34d'},
    info:{main:'#03968F',bg:'#ecfdf5',border:'#a7f3d0'},
    success:{main:'#059669',bg:'#ecfdf5',border:'#a7f3d0'},
    question:{main:'#03968F',bg:'#f5f3ff',border:'#ddd6fe'}
  };
  var c=colors[type]||colors.info;
  var ic=opts.icon||icons[type]||'💭';
  return new Promise(function(resolve){
    closeModal();
    var b=document.createElement('div');
    b.className='modal-backdrop dex-confirm-backdrop';
    b.innerHTML='<div class="dex-confirm">'
      +'<div class="dex-confirm-icon" style="background:'+c.bg+';border:2px solid '+c.border+'">'+ic+'</div>'
      +'<div class="dex-confirm-title">'+title+'</div>'
      +'<div class="dex-confirm-message">'+message.replace(/\n/g,'<br>')+'</div>'
      +'<div class="dex-confirm-buttons">'
      +'<button class="dex-confirm-btn dex-confirm-cancel">'+cancelText+'</button>'
      +'<button class="dex-confirm-btn dex-confirm-ok" style="background:'+c.main+'">'+okText+'</button>'
      +'</div></div>';
    b.addEventListener('click',function(e){if(e.target===b){closeModal();resolve(false);}});
    document.body.appendChild(b);
    modalEl=b;
    b.querySelector('.dex-confirm-cancel').addEventListener('click',function(){closeModal();resolve(false);});
    b.querySelector('.dex-confirm-ok').addEventListener('click',function(){closeModal();resolve(true);});
    // ESC キーでキャンセル
    var escHandler=function(e){if(e.key==='Escape'){closeModal();resolve(false);document.removeEventListener('keydown',escHandler);}};
    document.addEventListener('keydown',escHandler);
    // フォーカスを OK ボタンに
    setTimeout(function(){b.querySelector('.dex-confirm-ok').focus();},50);
  });
}

// カスタム アラート（alert の代替）
function dexAlert(message,opts){
  opts=opts||{};
  opts.cancelText='';
  opts.okText=opts.okText||'OK';
  opts.title=opts.title||'お知らせ';
  return dexConfirm(message,opts);
}

var touchDragOid=null,touchDragEl=null,touchClone=null,touchStartX=0,touchStartY=0,touchCloneW=0,touchCloneH=0,touchDragStarted=false,touchTime=0,touchScrolling=false;
function initTouchDrag(){
document.addEventListener('touchstart',function(e){
var row=e.target.closest('.sb-row,.dorder');
if(!row)return;var oid=row.dataset.oid;if(!oid)return;
// ボタンクリックは除外
if(e.target.closest('button'))return;
touchDragOid=oid;touchDragEl=row;touchDragStarted=false;touchScrolling=false;
var t=e.touches[0];
touchStartX=t.clientX;touchStartY=t.clientY;
touchTime=Date.now();
var rect=row.getBoundingClientRect();
touchCloneW=rect.width;
touchCloneH=rect.height;
},{passive:true});

function startTouchDrag(t){
if(!touchDragEl||touchDragStarted)return;
touchDragStarted=true;
touchClone=touchDragEl.cloneNode(true);
var x=t.clientX-touchCloneW/2;
var y=t.clientY-touchCloneH/2;
touchClone.style.cssText='position:fixed;z-index:9999;pointer-events:none;opacity:0.92;width:'+touchCloneW+'px;left:0;top:0;box-shadow:0 14px 36px rgba(0,0,0,.35);background:#fff;border-radius:12px;border:2px solid #03968F;will-change:transform;transform:translate3d('+x+'px,'+y+'px,0);transition:none';
document.body.appendChild(touchClone);
}

document.addEventListener('touchmove',function(e){
if(!touchDragOid)return;
var t=e.touches[0];
var dx=Math.abs(t.clientX-touchStartX);
var dy=Math.abs(t.clientY-touchStartY);
// すでにスクロール開始してたら何もしない
if(touchScrolling)return;
if(!touchDragStarted){
  // 縦移動が横より大きい＆動きが10px以上 → スクロール扱い
  if(dy>dx&&dy>10){
    touchScrolling=true;
    return;
  }
  // 横移動が15px以上 → ドラッグ起動
  if(dx>=15){
    startTouchDrag(t);
  }else{
    return;
  }
}
if(!touchClone)return;
var x=t.clientX-touchCloneW/2;
var y=t.clientY-touchCloneH/2;
touchClone.style.transform='translate3d('+x+'px,'+y+'px,0)';
// ハイライト対象は dcard のみ（点線エリアは廃止）
document.querySelectorAll('.dcard').forEach(function(el){
var r=el.getBoundingClientRect();
if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){
  el.classList.add('dragover-dc');
}else{
  el.classList.remove('dragover-dc');
}
});
e.preventDefault();
},{passive:false});

document.addEventListener('touchend',function(e){
if(!touchDragOid)return;
var t=e.changedTouches[0];
var dx=Math.abs(t.clientX-touchStartX);
var dy=Math.abs(t.clientY-touchStartY);
var dt=Date.now()-touchTime;
// スクロールしてた場合は何もしない
if(touchScrolling){
  touchDragOid=null;touchDragEl=null;touchClone=null;
  return;
}
// タップ判定：移動少なく、500ms以下
if(!touchDragStarted&&dx<10&&dy<10&&dt<500){
  toggleSelOid(touchDragOid);
  touchDragOid=null;touchDragEl=null;
  return;
}
// クローン削除
if(touchClone&&touchClone.parentNode)touchClone.parentNode.removeChild(touchClone);
if(!touchDragStarted){
  touchDragOid=null;touchDragEl=null;touchClone=null;
  return;
}
var dropDid=null;
var dropOnSidebar=false;
// dcard のヒット判定
document.querySelectorAll('.dcard').forEach(function(el){
  el.classList.remove('dragover-dc');
  var r=el.getBoundingClientRect();
  if(!dropDid&&t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){
    dropDid=el.dataset.did;
  }
});
// サイドバー（戻す）のヒット判定
var sbBody=document.getElementById('sb-body');
if(!dropDid&&sbBody){
  var r=sbBody.getBoundingClientRect();
  if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){
    dropOnSidebar=true;
  }
}

if(dropDid){
  // ドライバーカード → 自動振り分け
  var oids=selectedOids.has(touchDragOid)&&selectedOids.size>1?[...selectedOids]:[touchDragOid];
  var u={};
  var assignedCount=0;
  oids.forEach(function(oid){
    var o=orders[oid];if(!o)return;
    var assignDelivery=null;
    if(o.driverId){assignDelivery=true;}
    else if(o.pickupDriverId){assignDelivery=false;}
    else if(typeof sbTab!=='undefined'){
      if(sbTab==='pickup')assignDelivery=false;
      else if(sbTab==='delivery'||sbTab==='other')assignDelivery=true;
    }
    if(assignDelivery===null){
      var isDeliveryToday=normDs(o.deliveryDate)===currentDate;
      var isPickupToday=normDs(o.pickupDate)===currentDate;
      if(isDeliveryToday)assignDelivery=true;
      else if(isPickupToday)assignDelivery=false;
    }
    if(assignDelivery===true){
      u['orders/'+oid+'/driverId']=dropDid;
      u['orders/'+oid+'/isRoute']=false;
      assignedCount++;
    }else if(assignDelivery===false){
      u['orders/'+oid+'/pickupDriverId']=dropDid;
      assignedCount++;
    }
  });
  if(assignedCount>0){
    db.ref().update(u).then(function(){
      showToast(assignedCount+'件を '+(drivers[dropDid]?.name||'')+' へ配車');
      selectedOids.clear();updateBatch();
    });
  }
}else if(dropOnSidebar){
  // 未処理サイドバーへ戻す
  var oids=selectedOids.has(touchDragOid)&&selectedOids.size>1?[...selectedOids]:[touchDragOid];
  var u={};
  oids.forEach(function(oid){
    u['orders/'+oid+'/driverId']=null;
    u['orders/'+oid+'/pickupDriverId']=null;
  });
  db.ref().update(u).then(function(){
    showToast('未処理に戻しました');
    selectedOids.clear();updateBatch();
  });
}
touchDragOid=null;touchDragEl=null;touchClone=null;touchDragStarted=false;
},{passive:true});

document.addEventListener('touchcancel',function(){
if(touchClone&&touchClone.parentNode)touchClone.parentNode.removeChild(touchClone);
touchDragOid=null;touchDragEl=null;touchClone=null;touchDragStarted=false;touchScrolling=false;
document.querySelectorAll('.dragover-dc,.drag-over').forEach(function(el){el.classList.remove('dragover-dc');el.classList.remove('drag-over');});
},{passive:true});
}

// ============================================
// カスタムカレンダー（リッチ緑系・全date/month inputに自動適用）
// ============================================
(function(){
  let _dexCalPop=null;
  let _dexCalTargetInput=null;
  let _dexCalMode='day';
  let _dexCalView={year:new Date().getFullYear(),month:new Date().getMonth()};
  let _dexCalInputType='date';

  const WEEKDAYS_D=['日','月','火','水','木','金','土'];
  const MONTH_NAMES_D=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  function getHolidays(year){
    var h={};
    h[year+'-01-01']='元日';h[year+'-02-11']='建国記念の日';h[year+'-02-23']='天皇誕生日';
    h[year+'-04-29']='昭和の日';h[year+'-05-03']='憲法記念日';h[year+'-05-04']='みどりの日';
    h[year+'-05-05']='こどもの日';h[year+'-08-11']='山の日';h[year+'-11-03']='文化の日';h[year+'-11-23']='勤労感謝の日';
    return h;
  }
  function pad2(n){return String(n).padStart(2,'0');}
  function ymdFn(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}

  function closeDexCal(){
    if(_dexCalPop){_dexCalPop.remove();_dexCalPop=null;}
    _dexCalTargetInput=null;
    document.removeEventListener('mousedown',onOutsideClick,true);
    window.removeEventListener('resize',closeDexCal);
    window.removeEventListener('scroll',closeDexCal,true);
  }
  function onOutsideClick(e){
    if(!_dexCalPop)return;
    if(_dexCalPop.contains(e.target))return;
    if(e.target===_dexCalTargetInput)return;
    closeDexCal();
  }
  function openDexCal(inputEl){
    if(_dexCalTargetInput===inputEl){closeDexCal();return;}
    closeDexCal();
    _dexCalTargetInput=inputEl;
    _dexCalInputType=inputEl.type==='month'?'month':'date';
    _dexCalMode=_dexCalInputType==='month'?'month':'day';
    var cur=inputEl.value;
    if(cur){
      var p=cur.split('-');
      if(p.length>=2){
        _dexCalView.year=parseInt(p[0])||new Date().getFullYear();
        _dexCalView.month=(parseInt(p[1])||1)-1;
      }
    }else{
      var now=new Date();
      _dexCalView.year=now.getFullYear();_dexCalView.month=now.getMonth();
    }
    _dexCalPop=document.createElement('div');
    _dexCalPop.className='dex-cal-pop';
    document.body.appendChild(_dexCalPop);
    renderDexCal();positionDexCal();
    setTimeout(function(){
      document.addEventListener('mousedown',onOutsideClick,true);
      window.addEventListener('resize',closeDexCal);
      window.addEventListener('scroll',closeDexCal,true);
    },50);
  }
  function positionDexCal(){
    if(!_dexCalPop||!_dexCalTargetInput)return;
    var rect=_dexCalTargetInput.getBoundingClientRect();
    var popRect=_dexCalPop.getBoundingClientRect();
    var top=rect.bottom+6,left=rect.left;
    if(top+popRect.height>window.innerHeight-8){top=rect.top-popRect.height-6;if(top<8)top=8;}
    if(left+popRect.width>window.innerWidth-8)left=window.innerWidth-popRect.width-8;
    if(left<8)left=8;
    _dexCalPop.style.top=top+'px';_dexCalPop.style.left=left+'px';
  }
  function renderDexCal(){
    if(!_dexCalPop)return;
    if(_dexCalMode==='year'){renderYearPicker();return;}
    if(_dexCalMode==='month'){renderMonthPicker();return;}
    renderDayPicker();
  }
  function renderDayPicker(){
    var y=_dexCalView.year,m=_dexCalView.month;
    var today=new Date(),todayYMD=ymdFn(today);
    var selectedYMD=_dexCalTargetInput&&_dexCalTargetInput.value||'';
    var holidays=getHolidays(y);
    var firstWd=new Date(y,m,1).getDay();
    var daysInMonth=new Date(y,m+1,0).getDate();
    var prevMonthDays=new Date(y,m,0).getDate();
    var h='<div class="dex-cal-head">';
    h+='<button class="dex-cal-nav" onclick="window._dexCalNav(-1)">◀</button>';
    h+='<div class="dex-cal-title" onclick="window._dexCalChangeMode(\'month\')">'+y+'年 '+MONTH_NAMES_D[m]+'</div>';
    h+='<button class="dex-cal-nav" onclick="window._dexCalNav(1)">▶</button>';
    h+='</div><div class="dex-cal-weekdays">';
    WEEKDAYS_D.forEach(function(w,i){h+='<div class="dex-cal-wd'+(i===0?' sun':i===6?' sat':'')+'">'+w+'</div>';});
    h+='</div><div class="dex-cal-grid">';
    for(var i=0;i<firstWd;i++){h+='<div class="dex-cal-day dex-cal-other-month">'+(prevMonthDays-firstWd+1+i)+'</div>';}
    for(var d=1;d<=daysInMonth;d++){
      var dateStr=y+'-'+pad2(m+1)+'-'+pad2(d);
      var wd=new Date(y,m,d).getDay();
      var cls='dex-cal-day';
      if(wd===0)cls+=' dex-cal-sun';
      if(wd===6)cls+=' dex-cal-sat';
      if(holidays[dateStr])cls+=' dex-cal-holiday';
      if(dateStr===todayYMD)cls+=' dex-cal-today';
      if(dateStr===selectedYMD)cls+=' dex-cal-selected';
      h+='<div class="'+cls+'" onclick="window._dexCalPick(\''+dateStr+'\')" title="'+(holidays[dateStr]||'')+'">'+d+'</div>';
    }
    var fill=(7-(firstWd+daysInMonth)%7)%7;
    for(var i=1;i<=fill;i++){h+='<div class="dex-cal-day dex-cal-other-month">'+i+'</div>';}
    h+='</div><div class="dex-cal-footer">';
    h+='<button class="dex-cal-quick" onclick="window._dexCalPick(\''+todayYMD+'\')">今日</button>';
    h+='<button class="dex-cal-clear" onclick="window._dexCalClear()">クリア</button>';
    h+='</div>';
    _dexCalPop.innerHTML=h;positionDexCal();
  }
  function renderMonthPicker(){
    var y=_dexCalView.year;
    var today=new Date();
    var selectedYM=_dexCalTargetInput&&_dexCalTargetInput.value?_dexCalTargetInput.value.slice(0,7):'';
    var h='<div class="dex-cal-head">';
    h+='<button class="dex-cal-nav" onclick="window._dexCalNavYear(-1)">◀</button>';
    h+='<div class="dex-cal-title" onclick="window._dexCalChangeMode(\'year\')">'+y+' 年</div>';
    h+='<button class="dex-cal-nav" onclick="window._dexCalNavYear(1)">▶</button>';
    h+='</div><div class="dex-cal-months">';
    for(var mi=0;mi<12;mi++){
      var ymStr=y+'-'+pad2(mi+1);
      var cls='dex-cal-month-btn';
      if(ymStr===selectedYM)cls+=' dex-cal-month-selected';
      if(y===today.getFullYear()&&mi===today.getMonth())cls+=' dex-cal-month-current';
      h+='<button class="'+cls+'" onclick="window._dexCalPickMonth('+mi+')">'+MONTH_NAMES_D[mi]+'</button>';
    }
    h+='</div>';
    if(_dexCalInputType==='date'){
      h+='<div class="dex-cal-footer"><button class="dex-cal-clear" onclick="window._dexCalChangeMode(\'day\')">戻る</button></div>';
    }else{

    }
    _dexCalPop.innerHTML=h;positionDexCal();
  }
  function renderYearPicker(){
    var currentY=_dexCalView.year;
    var startY=currentY-currentY%12;
    var h='<div class="dex-cal-head">';
    h+='<button class="dex-cal-nav" onclick="window._dexCalNavYearBlock(-1)">◀</button>';
    h+='<div class="dex-cal-title">'+startY+' - '+(startY+11)+'</div>';

  window._dexCalNav=function(delta){

  window._dexCalNavYear=function(d){_dexCalView.year+=d;renderDexCal();};
  window._dexCalNavYearBlock=function(d){_dexCalView.year+=d*12;renderDexCal();};

  window._dexCalPickYear=function(y){_dexCalView.year=y;_dexCalMode='month';renderDexCal();};
  window._dexCalPickMonth=function(m,andSelect){

    if(_dexCalInputType==='month'||andSelect){
      setInputValue(_dexCalView.year+'-'+pad2(m+1));closeDexCal();
    }else{_dexCalMode='day';renderDexCal();}
  };
  window._dexCalPick=function(dateStr){
    if(_dexCalInputType==='month')setInputValue(dateStr.slice(0,7));
    else setInputValue(dateStr);
    closeDexCal();
  };
  window._dexCalClear=function(){setInputValue('');closeDexCal();};
  function setInputValue(val){
    if(!_dexCalTargetInput)return;
    _dexCalTargetInput.value=val;
    try{_dexCalTargetInput.dispatchEvent(new Event('input',{bubbles:true}));}catch(e){}
    try{_dexCalTargetInput.dispatchEvent(new Event('change',{bubbles:true}));}catch(e){}
    try{_dexCalTargetInput.focus();_dexCalTargetInput.blur();}catch(e){}
  }
  document.addEventListener('mousedown',function(e){
    var t=e.target;
    if(!t||t.tagName!=='INPUT')return;
    if(t.type!=='date'&&t.type!=='month')return;
    if(t.classList.contains('no-dex-cal'))return;
    t.classList.add('dex-cal-active');
    e.preventDefault();
    openDexCal(t);
  },true);
  document.addEventListener('keydown',function(e){
    if(!_dexCalPop)return;
    if(e.key==='Escape'){e.preventDefault();closeDexCal();}
  },true);
})();

// ============================================
// カスタムカレンダー（リッチ緑系・全date/month inputに自動適用）
// ============================================
(function(){
  let _dexCalPop=null;
  let _dexCalTargetInput=null;
  let _dexCalMode='day';  // 'day' | 'month' | 'year'
  let _dexCalView={year:new Date().getFullYear(),month:new Date().getMonth()};
  let _dexCalInputType='date';  // 'date' | 'month'

  const WEEKDAYS=['日','月','火','水','木','金','土'];
  const MONTH_NAMES_J=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  function getHolidays(year){
    var h={};
    h[year+'-01-01']='元日';
    h[year+'-02-11']='建国記念の日';
    h[year+'-02-23']='天皇誕生日';
    h[year+'-04-29']='昭和の日';
    h[year+'-05-03']='憲法記念日';
    h[year+'-05-04']='みどりの日';
    h[year+'-05-05']='こどもの日';
    h[year+'-08-11']='山の日';
    h[year+'-11-03']='文化の日';
    h[year+'-11-23']='勤労感謝の日';
    return h;
  }

  function pad2(n){return String(n).padStart(2,'0');}
  function ymdFn(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}

  function closeDexCal(){
    if(_dexCalPop){_dexCalPop.remove();_dexCalPop=null;}
    _dexCalTargetInput=null;
    document.removeEventListener('mousedown',onOutsideClick,true);
    window.removeEventListener('resize',closeDexCal);
    window.removeEventListener('scroll',closeDexCal,true);
  }
  function onOutsideClick(e){
    if(!_dexCalPop)return;
    if(_dexCalPop.contains(e.target))return;
    if(e.target===_dexCalTargetInput)return;
    closeDexCal();
  }

  function openDexCal(inputEl){
    if(_dexCalTargetInput===inputEl){closeDexCal();return;}
    closeDexCal();
    _dexCalTargetInput=inputEl;
    _dexCalInputType=inputEl.type==='month'?'month':'date';
    _dexCalMode=_dexCalInputType==='month'?'month':'day';

    var cur=inputEl.value;
    if(cur){
      var p=cur.split('-');
      if(p.length>=2){
        _dexCalView.year=parseInt(p[0])||new Date().getFullYear();
        _dexCalView.month=(parseInt(p[1])||1)-1;
      }
    }else{
      var now=new Date();
      _dexCalView.year=now.getFullYear();
      _dexCalView.month=now.getMonth();
    }

    _dexCalPop=document.createElement('div');
    _dexCalPop.className='dex-cal-pop';
    document.body.appendChild(_dexCalPop);
    renderDexCal();
    positionDexCal();

    setTimeout(function(){
      document.addEventListener('mousedown',onOutsideClick,true);
      window.addEventListener('resize',closeDexCal);
      window.addEventListener('scroll',closeDexCal,true);
    },50);
  }

  function positionDexCal(){
    if(!_dexCalPop||!_dexCalTargetInput)return;
    var rect=_dexCalTargetInput.getBoundingClientRect();
    var popRect=_dexCalPop.getBoundingClientRect();
    var top=rect.bottom+6;
    var left=rect.left;
    if(top+popRect.height>window.innerHeight-8){
      top=rect.top-popRect.height-6;
      if(top<8)top=8;
    }
    if(left+popRect.width>window.innerWidth-8){
      left=window.innerWidth-popRect.width-8;
    }
    if(left<8)left=8;
    _dexCalPop.style.top=top+'px';
    _dexCalPop.style.left=left+'px';
  }

  function renderDexCal(){
    if(!_dexCalPop)return;
    if(_dexCalMode==='year'){renderYearPicker();return;}
    if(_dexCalMode==='month'){renderMonthPicker();return;}
    renderDayPicker();
  }

  function renderDayPicker(){
    var y=_dexCalView.year;
    var m=_dexCalView.month;
    var today=new Date();
    var todayYMD=ymdFn(today);
    var selectedYMD=_dexCalTargetInput&&_dexCalTargetInput.value?_dexCalTargetInput.value:'';
    var holidays=getHolidays(y);

    var firstDay=new Date(y,m,1);
    var firstWd=firstDay.getDay();
    var daysInMonth=new Date(y,m+1,0).getDate();
    var prevMonthDays=new Date(y,m,0).getDate();

    var h='<div class="dex-cal-head">';
    h+='<button class="dex-cal-nav" onclick="window._dexCalNav(-1)" title="前月">◀</button>';
    h+='<div class="dex-cal-title" onclick="window._dexCalChangeMode(\'month\')" title="年月を選ぶ">'+y+'年 '+MONTH_NAMES_J[m]+'</div>';
    h+='<button class="dex-cal-nav" onclick="window._dexCalNav(1)" title="次月">▶</button>';
    h+='</div>';
    h+='<div class="dex-cal-weekdays">';
    WEEKDAYS.forEach(function(w,i){
      var cls='dex-cal-wd'+(i===0?' sun':i===6?' sat':'');
      h+='<div class="'+cls+'">'+w+'</div>';
    });
    h+='</div>';
    h+='<div class="dex-cal-grid">';
    for(var i=0;i<firstWd;i++){
      var dpd=prevMonthDays-firstWd+1+i;
      h+='<div class="dex-cal-day dex-cal-other-month">'+dpd+'</div>';
    }
    for(var d=1;d<=daysInMonth;d++){
      var dateStr=y+'-'+pad2(m+1)+'-'+pad2(d);
      var wd=new Date(y,m,d).getDay();
      var cls='dex-cal-day';
      if(wd===0)cls+=' dex-cal-sun';
      if(wd===6)cls+=' dex-cal-sat';
      if(holidays[dateStr])cls+=' dex-cal-holiday';
      if(dateStr===todayYMD)cls+=' dex-cal-today';
      if(dateStr===selectedYMD)cls+=' dex-cal-selected';
      h+='<div class="'+cls+'" onclick="window._dexCalPick(\''+dateStr+'\')" title="'+(holidays[dateStr]||'')+'">'+d+'</div>';
    }
    var totalCells=firstWd+daysInMonth;
    var fill=(7-totalCells%7)%7;
    for(var i=1;i<=fill;i++){
      h+='<div class="dex-cal-day dex-cal-other-month">'+i+'</div>';
    }
    h+='</div>';
    h+='<div class="dex-cal-footer">';
    h+='<button class="dex-cal-quick" onclick="window._dexCalPick(\''+todayYMD+'\')">今日</button>';
    h+='<button class="dex-cal-clear" onclick="window._dexCalClear()">クリア</button>';
    h+='</div>';
    _dexCalPop.innerHTML=h;
    positionDexCal();
  }

  function renderMonthPicker(){
    var y=_dexCalView.year;
    var today=new Date();
    var selectedYM=_dexCalTargetInput&&_dexCalTargetInput.value?_dexCalTargetInput.value.slice(0,7):'';

    var h='<div class="dex-cal-head">';
    h+='<button class="dex-cal-nav" onclick="window._dexCalNavYear(-1)" title="前年">◀</button>';
    h+='<div class="dex-cal-title" onclick="window._dexCalChangeMode(\'year\')" title="年を選ぶ">'+y+' 年</div>';
    h+='<button class="dex-cal-nav" onclick="window._dexCalNavYear(1)" title="翌年">▶</button>';
    h+='</div>';
    h+='<div class="dex-cal-months">';
    for(var mi=0;mi<12;mi++){
      var ymStr=y+'-'+pad2(mi+1);
      var cls='dex-cal-month-btn';
      if(ymStr===selectedYM)cls+=' dex-cal-month-selected';
      if(y===today.getFullYear()&&mi===today.getMonth())cls+=' dex-cal-month-current';
      h+='<button class="'+cls+'" onclick="window._dexCalPickMonth('+mi+')">'+MONTH_NAMES_J[mi]+'</button>';
    }
    h+='</div>';
    if(_dexCalInputType==='date'){
      h+='<div class="dex-cal-footer"><button class="dex-cal-clear" onclick="window._dexCalChangeMode(\'day\')">戻る</button></div>';
    }else{
      h+='<div class="dex-cal-footer">';
      h+='<button class="dex-cal-quick" onclick="window._dexCalPickMonth('+today.getMonth()+',true)">今月</button>';
      h+='<button class="dex-cal-clear" onclick="window._dexCalClear()">クリア</button>';
      h+='</div>';
    }
    _dexCalPop.innerHTML=h;
    positionDexCal();
  }

  function renderYearPicker(){
    var currentY=_dexCalView.year;
    var startY=currentY-currentY%12;

    var h='<div class="dex-cal-head">';
    h+='<button class="dex-cal-nav" onclick="window._dexCalNavYearBlock(-1)" title="前12年">◀</button>';
    h+='<div class="dex-cal-title">'+startY+' - '+(startY+11)+'</div>';
    h+='<button class="dex-cal-nav" onclick="window._dexCalNavYearBlock(1)" title="次12年">▶</button>';
    h+='</div>';
    h+='<div class="dex-cal-years">';
    for(var i=0;i<12;i++){
      var yy=startY+i;
      var cls='dex-cal-year-btn';
      if(yy===currentY)cls+=' dex-cal-year-selected';
      h+='<button class="'+cls+'" onclick="window._dexCalPickYear('+yy+')">'+yy+'</button>';
    }
    h+='</div>';
    h+='<div class="dex-cal-footer"><button class="dex-cal-clear" onclick="window._dexCalChangeMode(\''+(_dexCalInputType==='month'?'month':'day')+'\')">戻る</button></div>';
    _dexCalPop.innerHTML=h;
    positionDexCal();
  }

  window._dexCalNav=function(delta){
    _dexCalView.month+=delta;
    if(_dexCalView.month<0){_dexCalView.month=11;_dexCalView.year--;}
    if(_dexCalView.month>11){_dexCalView.month=0;_dexCalView.year++;}
    renderDexCal();
  };
  window._dexCalNavYear=function(delta){
    _dexCalView.year+=delta;
    renderDexCal();
  };
  window._dexCalNavYearBlock=function(delta){
    _dexCalView.year+=delta*12;
    renderDexCal();
  };
  window._dexCalChangeMode=function(mode){
    _dexCalMode=mode;
    renderDexCal();
  };
  window._dexCalPickYear=function(y){
    _dexCalView.year=y;
    _dexCalMode='month';
    renderDexCal();
  };
  window._dexCalPickMonth=function(m,andSelect){
    _dexCalView.month=m;
    if(_dexCalInputType==='month'||andSelect){
      var val=_dexCalView.year+'-'+pad2(m+1);
      setInputValue(val);
      closeDexCal();
    }else{
      _dexCalMode='day';
      renderDexCal();
    }
  };
  window._dexCalPick=function(dateStr){
    if(_dexCalInputType==='month'){
      setInputValue(dateStr.slice(0,7));
    }else{
      setInputValue(dateStr);
    }
    closeDexCal();
  };
  window._dexCalClear=function(){
    setInputValue('');
    closeDexCal();
  };

  function setInputValue(val){
    if(!_dexCalTargetInput)return;
    _dexCalTargetInput.value=val;
    try{_dexCalTargetInput.dispatchEvent(new Event('input',{bubbles:true}));}catch(e){}
    try{_dexCalTargetInput.dispatchEvent(new Event('change',{bubbles:true}));}catch(e){}
    try{_dexCalTargetInput.focus();_dexCalTargetInput.blur();}catch(e){}
  }

  // 全ての <input type="date"> / <input type="month"> にバインド（イベント委譲）
  document.addEventListener('mousedown',function(e){
    var t=e.target;
    if(!t||t.tagName!=='INPUT')return;
    if(t.type!=='date'&&t.type!=='month')return;
    if(t.classList.contains('no-dex-cal'))return;
    t.classList.add('dex-cal-active');
    e.preventDefault();
    openDexCal(t);
  },true);

  document.addEventListener('keydown',function(e){
    if(!_dexCalPop)return;
    if(e.key==='Escape'){e.preventDefault();closeDexCal();return;}
  },true);
})();
</script>
