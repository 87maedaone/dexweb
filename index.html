<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:"Noto Sans JP",sans-serif;font-size:15px;background:#f9fafb;color:#1a1a1a}
#app{height:100%;display:flex}

/* LEFT NAV 98px - 新デザイン(白背景) */
.icon-nav{width:94px;background:#fff;display:flex;flex-direction:column;align-items:center;flex-shrink:0;z-index:10;border-right:1px solid #e5e7eb;padding:20px 0}
.nav-logo{margin-top:8px;margin-bottom:24px;width:56px;height:56px;flex-shrink:0;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:transform .15s}
.nav-logo:hover{transform:scale(1.06)}
.nav-logo img{width:56px;height:56px;object-fit:contain;display:block}
.nav-icons{margin-top:20px;display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;width:100%;padding:0 4px}
.nav-btn{width:76px;height:62px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:#9ca3af;border:none;background:transparent;padding:0;transition:all .15s;font-size:9px;font-weight:700;letter-spacing:.2px;font-family:inherit}
.nav-btn:hover{background:#f0fdf4;color:#03968F}
.nav-btn.active{background:#ecfdf5;color:#03968F}

/* ========== 滋賀便テーマ（深いマゼンタ/ワイン系） ========== */
body.theme-shiga{background:#FAF2F7}
body.theme-shiga .nav{background:#fff;border-right:1px solid #f3e8f0}
body.theme-shiga .nav-btn{color:#9b7791}
body.theme-shiga .nav-btn:hover{background:#FAF2F7;color:#7C2D5F}
body.theme-shiga .nav-btn.active{background:#FAF2F7;color:#7C2D5F}
body.theme-shiga .nav-btn#nav-logout:hover{background:#FAF2F7;color:#7C2D5F}
body.theme-shiga .brand-img{filter:brightness(0) saturate(100%) invert(15%) sepia(30%) saturate(2500%) hue-rotate(290deg) brightness(70%) contrast(95%)}
body.theme-shiga .topbar{background:transparent}
body.theme-shiga .date-box,body.theme-shiga .date-box input{background:#fff;border:1px solid #f3e8f0;color:#7C2D5F}
body.theme-shiga .btn-assign{background:linear-gradient(135deg,#7C2D5F 0%,#9d3877 100%);box-shadow:0 4px 12px rgba(124,45,95,.25)}
body.theme-shiga .btn-assign:hover{box-shadow:0 6px 16px rgba(124,45,95,.35)}
body.theme-shiga .area-tab{border-color:#f3d5e5;background:#fff;color:#7C2D5F}
body.theme-shiga .area-tab:hover{background:#FAF2F7;border-color:#e0a8c8}
body.theme-shiga .area-tab.active{color:#fff;border-color:#7C2D5F;background:#7C2D5F}
body.theme-shiga .sb-tab{color:#7C2D5F;background:#fff;border:1px solid transparent}
body.theme-shiga .sb-tab.active{color:#fff;background:#7C2D5F;border-color:#7C2D5F}
body.theme-shiga .sb-row{background:#fff;border-color:#f3e8f0}

/* ========== 名古屋便テーマ（ティール/エメラルド系） ========== */

/* 幹線ページの共通スタイル */
.trunk-area-block{background:#fff;border-radius:12px;border:1px solid #e5e7eb;margin-bottom:18px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.trunk-area-head{padding:12px 18px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.trunk-area-head-title{font-size:16px;font-weight:800;color:#2F2C2C}
.trunk-area-head-stats{font-size:12px;color:#6b7280;display:flex;gap:14px}
.trunk-area-head-stats b{color:#374151;font-weight:700}
.trunk-table{width:100%;border-collapse:collapse;font-size:12px}
.trunk-table thead{background:#f9fafb}
.trunk-table th{padding:8px 10px;font-weight:700;color:#6b7280;text-align:left;font-size:11px;border-bottom:1px solid #e5e7eb;white-space:nowrap}
.trunk-table td{padding:8px 10px;border-bottom:1px solid #f3f4f6;color:#2F2C2C}
.trunk-table tbody tr:hover{background:#fafafa}
.trunk-table tr.checked{background:#fef9c3}
.trunk-row-check{width:16px;height:16px;cursor:pointer}
.nav-btn#nav-logout:hover{background:#f0fdf4;color:#03968F}
.nav-btn svg{display:block;width:22px;height:22px;stroke-width:1.8}
.nav-label{font-size:9px;font-weight:700;line-height:1;margin-top:2px}

/* RIGHT PANEL */
.main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f9fafb}

/* TOPBAR */
.topbar{display:flex;align-items:center;padding:24px 32px 0;gap:12px;flex-shrink:0}
.brand-img{display:none}
.topbar-spacer{flex:1}
.date-box{height:44px;padding:0;border-radius:12px;background:#fff;border:1px solid #e5e7eb;display:flex;align-items:center;cursor:pointer;position:relative;box-shadow:0 1px 2px rgba(0,0,0,.03);overflow:hidden}
.date-box:hover{border-color:#a7f3d0;background:#f9fafb}
.date-box input{border:none;background:transparent;font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:700;color:#2F2C2C;cursor:pointer;width:160px;text-align:center;outline:none;padding:0 32px 0 14px;height:100%;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='%2303968F' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='4' width='18' height='18' rx='2' ry='2'></rect><line x1='16' y1='2' x2='16' y2='6'></line><line x1='8' y1='2' x2='8' y2='6'></line><line x1='3' y1='10' x2='21' y2='10'></line></svg>");background-repeat:no-repeat;background-position:right 10px center}
.date-box input::-webkit-calendar-picker-indicator{opacity:0;display:none}
.date-box input::-webkit-inner-spin-button,.date-box input::-webkit-clear-button{display:none}
.date-tri{color:#2F2C2C;font-size:12px;pointer-events:none}
.btn-assign{height:44px;padding:0 22px;border-radius:12px;background:linear-gradient(135deg,#03968F 0%,#0AB8AE 100%);color:#fff;border:none;font-family:"Noto Sans JP",sans-serif;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(3,150,143,.25);transition:all .15s}
.btn-assign:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(3,150,143,.35)}

/* AREA TABS */
.area-tabs-wrap{display:flex;align-items:center;gap:10px;margin:24px 47px 18px 47px;flex-shrink:0}
.area-tabs{display:flex;align-items:center;gap:8px;padding:0;flex:1;overflow-x:auto;overflow-y:hidden;scrollbar-width:none!important;-ms-overflow-style:none!important;height:38px}
.area-tabs::-webkit-scrollbar{display:none!important;width:0!important;height:0!important;background:transparent!important}
.area-tabs::-webkit-scrollbar-track{display:none!important;background:transparent!important}
.area-tabs::-webkit-scrollbar-thumb{display:none!important;background:transparent!important}
.area-tab{font-family:"Noto Sans JP",sans-serif;font-size:13px;font-weight:600;color:#6b7280;cursor:pointer;padding:8px 18px;white-space:nowrap;transition:all .15s;border-radius:999px;border:1px solid #e5e7eb;background:#fff;flex-shrink:0}
.area-tab:hover{color:#03968F;border-color:#a7f3d0;background:#f0fdf4}
.area-tab.active{color:#fff;border-color:#03968F;background:#03968F;font-weight:700}
.area-tabs-arrow{flex-shrink:0;display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;background:#fff;color:#9ca3af;cursor:pointer;border:1px solid #e5e7eb;transition:all .15s;box-shadow:0 1px 2px rgba(0,0,0,.04);padding:0}
.area-tabs-arrow:hover{background:#f9fafb;color:#374151;box-shadow:0 2px 4px rgba(0,0,0,.06)}
.area-tabs-arrow:active{transform:scale(.95)}

/* CONTENT */
.content{flex:1;display:flex;overflow:hidden;padding:0 28px 24px 28px;gap:18px}

/* BOARD - 白枠で囲む */
.board{flex:1;overflow-y:auto;padding:24px 28px;margin-top:0;background:#fff;border:1px solid #e5e7eb;border-radius:16px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.board-header{display:flex;align-items:center;margin-left:0;margin-top:0;margin-bottom:18px}
.board-title{color:#2F2C2C;font-family:"Noto Sans JP",sans-serif;font-size:22px;font-weight:800}
.bh-label{color:#2F2C2C;font-family:"Noto Sans JP",sans-serif;font-size:16px;font-weight:400;margin-left:38px}
.bh-num{color:#03968F;font-family:"Noto Sans JP",sans-serif;font-size:36px;font-weight:700;margin-left:8px;line-height:1}
.bh-divider{width:1px;height:24px;background:#000;margin-left:24px;margin-right:24px;flex-shrink:0}
.bh-label2{color:#000;font-family:"Noto Sans JP",sans-serif;font-size:16px;font-weight:400}
.bh-num2{color:#03968F;font-family:"Noto Sans JP",sans-serif;font-size:36px;font-weight:700;margin-left:8px;line-height:1}

.driver-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-content:start;margin-left:0;margin-right:0}

/* DRIVER CARD */
.dcard{background:transparent;border:none;border-radius:16px;overflow:visible;transition:all .15s}
.dcard.dragging-dc{opacity:.35}.dcard.dragover-dc{box-shadow:0 0 0 2px #03968F;border-color:#03968F}
.dcard-body{background:#ECF2F2;border:2px solid #B8C9C9;border-radius:16px;overflow:hidden}
.dcard-head{padding:8px 14px 6px;display:flex;align-items:center;gap:10px;cursor:grab;border-bottom:none;background:transparent;position:relative;z-index:1}
.dcard-head:active{cursor:grabbing}
.dcard-dot{width:14px;height:14px;border-radius:50%;background:#03968F;flex-shrink:0}
.dcard-name{font-family:"Noto Sans JP",sans-serif;font-weight:700;font-size:21px;flex:1;color:#2F2C2C}
.dcard-vehicle{font-family:"Noto Sans JP",sans-serif;font-size:15px;color:#6b7280;font-weight:700}
.dcard-stats{display:none}
.dcard-stats>div{flex:1;padding:4px 14px;display:flex;align-items:center;gap:4px}
.dcard-stats>div:first-child{border-right:none}
.ds-label{font-weight:700}.ds-cnt{font-weight:800;color:#2F2C2C;font-family:"Noto Sans JP",sans-serif}.ds-wt{color:#2F2C2C}
.dsection-label{font-family:"Noto Sans JP",sans-serif;font-size:19px;font-weight:500;padding:7px 14px;color:#2F2C2C;border-bottom:none;background:transparent;border-top:1px dashed #9E9D9D;margin-top:4px}
.dsection-label.del-label{color:#2F2C2C;background:transparent;border-top:none}
.dorder-list{padding:4px 10px;min-height:50px}
.dorder{background:#fff;border:none;border-radius:8px;padding:8px 12px;margin-bottom:6px;cursor:grab}
.dorder:hover{box-shadow:0 0 0 1px #03968F}.dorder.dragging{opacity:.35}
.dorder-top{display:flex;align-items:flex-start;gap:6px;margin-bottom:3px}
.dorder-loc{font-family:"Noto Sans JP",sans-serif;font-size:18px;font-weight:700;flex:1;color:#2F2C2C}
.dorder-wt{font-family:"Noto Sans JP",sans-serif;font-size:19px;font-weight:900;color:#2F2C2C;white-space:nowrap}
.dorder-info{font-family:"Noto Sans JP",sans-serif;font-size:15px;font-weight:500;color:#2F2C2C;margin-bottom:4px}
.dorder-btns{display:flex;gap:6px;justify-content:flex-end}
.dorder-btn{font-family:"Noto Sans JP",sans-serif;font-size:15px;padding:3px 10px;border-radius:2px;border:none;background:#D9D9D9;cursor:pointer;font-weight:500;color:#2F2C2C}
.dorder-btn:hover{background:#c5c5c5}
.empty-msg{padding:8px;text-align:center;color:#9E9D9D;font-size:12px}

/* SIDEBAR */
.sidebar{width:380px;background:#fff;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;padding:24px 22px;border:1px solid #e5e7eb;border-radius:16px;box-shadow:0 1px 2px rgba(0,0,0,.03);position:relative}
.sb-header{padding:0;font-family:"Noto Sans JP",sans-serif;font-size:20px;font-weight:800;color:#2F2C2C;flex-shrink:0;background:transparent;white-space:nowrap}
/* tabs: 配達 集荷 路線 */
.sb-tabs{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:auto;flex-wrap:wrap}
.sb-tab{font-family:"Noto Sans JP",sans-serif;font-size:13px;font-weight:600;color:#6b7280;cursor:pointer;padding:6px 14px;border-radius:8px;transition:all .12s;border:1px solid transparent;background:transparent;white-space:nowrap}
.sb-tab:hover{color:#03968F;background:#f0fdf4;border-color:#a7f3d0}
.sb-tab.active{color:#fff;background:#03968F;border-color:#03968F;border-radius:8px;font-weight:700}
/* search */
.sb-search{margin-top:16px;flex-shrink:0;width:100%}
.sb-search input{width:100%;height:37px;border-radius:5px;border:1px solid #C0BDBD;background:#F5F5F5;font-family:"Noto Sans JP",sans-serif;font-size:16px;font-weight:500;color:#726F6F;padding:0 12px}
.sb-search input::placeholder{color:#726F6F}
.sb-batch{height:0;overflow:hidden;padding:0;display:flex;align-items:center;gap:10px;flex-shrink:0;font-size:15px;transition:height .2s ease}
.sb-batch.active{height:48px;padding:6px 0}
.sb-batch strong{color:#03968F;font-family:"Noto Sans JP",sans-serif;font-weight:700}
.sb-batch button{font-size:14px;padding:5px 14px;border-radius:8px;cursor:pointer;font-weight:700;border:2px solid;font-family:inherit}
.sb-body{flex:1;overflow-y:auto;padding-top:12px}
.sb-body.drag-over{background:#fef3c7;border-radius:12px;outline:2px dashed #f59e0b}
/* row */
.sb-row{width:calc(100% - 10px);margin-left:5px;min-height:92px;border-radius:20px;background:#fff;margin-bottom:12px;filter:drop-shadow(2px 4px 4px rgba(2,43,41,0.19));cursor:pointer;transition:all .12s;user-select:none;display:flex;flex-direction:column;justify-content:center;padding:0 0 0 0;touch-action:pan-y}
.sb-row:hover{box-shadow:0 0 0 2px #03968F}
.sb-row.selected{box-shadow:0 0 0 2px #03968F;background:#f0fdf4}
.sb-row-top{display:flex;align-items:center;padding:0 14px 0 0}
.sb-row-check{width:29px;height:29px;border-radius:5px;border:1px solid #2F2C2C;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;margin-left:18px;align-self:center}
.sb-row-check.checked{background:#03968F;border-color:#03968F}
.sb-row-city{font-family:"Noto Sans JP",sans-serif;font-size:20px;font-weight:700;color:#2F2C2C;margin-left:0}
.sb-row-wt{font-family:"'Noto Sans JP'",sans-serif;font-size:20px;font-weight:900;color:#2F2C2C;margin-right:18px;margin-left:auto}
.sb-row-bottom{display:flex;align-items:center;padding:0 14px 0 0;margin-top:2px}
.sb-row-co{font-family:"Noto Sans JP",sans-serif;font-size:15px;font-weight:500;color:#2F2C2C;margin-left:16px;flex:1}
.sb-row-btns{display:flex;gap:8px;flex-shrink:0}
.sb-row-btn{font-family:"Noto Sans JP",sans-serif;font-size:15px;font-weight:500;color:#2F2C2C;display:flex;width:51px;height:30px;justify-content:center;align-items:center;gap:10px;border-radius:5px;background:#EBE9E9;border:none;cursor:pointer}
.sb-row-btn:hover{background:#ddd}

/* VIEWS */
.view{display:none;flex:1;overflow:hidden}.view.active{display:flex;flex-direction:column}
.view-full{flex:1;overflow-y:auto;padding:24px 40px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-header{font-size:19px;font-weight:700;text-align:center;padding:10px;color:#6b7280;background:#f9fafb;border-radius:6px}

/* MODAL */

/* 🎨 カスタム確認ダイアログ */
.dex-confirm-backdrop{background:rgba(15,23,42,.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);animation:dexConfirmFadeIn .2s ease}
.dex-confirm{background:#fff;border-radius:20px;padding:32px 28px 24px;width:90%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,.25);font-family:"Noto Sans JP",sans-serif;text-align:center;animation:dexConfirmPop .3s cubic-bezier(.34,1.56,.64,1)}

.dex-confirm-title{font-size:18px;font-weight:700;color:#2F2C2C;margin-bottom:8px}

.dex-confirm-buttons{display:flex;gap:10px;justify-content:center}
.dex-confirm-btn{flex:1;padding:12px 20px;border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:700;font-size:14px;transition:all .15s;max-width:160px}
.dex-confirm-cancel{background:#f3f4f6;color:#6b7280}
.dex-confirm-cancel:hover{background:#e5e7eb}
.dex-confirm-ok{color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.12)}
.dex-confirm-ok:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(0,0,0,.18)}
.dex-confirm-btn:empty{display:none}
@keyframes dexConfirmFadeIn{from{opacity:0}to{opacity:1}}
@keyframes dexConfirmPop{from{opacity:0;transform:scale(.85) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal{background:#fff;border-radius:18px;width:520px;max-width:96vw;box-shadow:0 24px 64px rgba(0,0,0,.3);overflow:hidden}

.akada-x{font-size:24px;color:#B80606;cursor:pointer;margin:0 8px;font-weight:700;text-decoration:none}
.akada-brand{font-family:"Noto Sans JP",sans-serif;font-size:24px;font-weight:900;color:#000;letter-spacing:3px}
.akada-date{margin-left:auto;width:170px;height:45px;border-radius:30px;background:#fff;display:flex;align-items:center;justify-content:center;border:2px solid #e5e7eb}
.akada-date input{border:none;background:transparent;font-family:"Noto Sans JP",sans-serif;font-size:18px;font-weight:700;color:#2F2C2C;cursor:pointer;width:130px;text-align:center}
.akada-date input::-webkit-calendar-picker-indicator{opacity:0;position:absolute;right:0;width:100%;height:100%;cursor:pointer}
.akada-date .date-tri{color:#B80606}
.akada-tabs{display:flex;padding:0 40px;margin-top:30px;align-items:flex-end;border-bottom:3px solid #CCC;position:relative;width:100%}
.akada-tab{font-family:"Noto Sans JP",sans-serif;font-size:16px;font-weight:500;color:#2F2C2C;cursor:pointer;padding:8px 24px;border-bottom:3px solid transparent;margin-bottom:-3px;position:relative;white-space:nowrap;flex:1;text-align:center}
.akada-tab:hover{color:#B80606}
.akada-tab.active{color:#B80606;font-weight:700;border-bottom-color:#B80606}
.akada-body{flex:1;overflow-y:auto;padding:20px 40px}
.akada-nav{width:98px;background:#B80606;display:flex;flex-direction:column;align-items:center;flex-shrink:0;z-index:10}

.akada-nav .nav-btn{color:rgba(255,255,255,.55)}
.akada-nav .nav-btn:hover,.akada-nav .nav-btn.active{background:rgba(255,255,255,.2);color:#fff}
.akada-nav .nav-icons{margin-top:150px;gap:20px}
.akada-order{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;font-family:"Noto Sans JP",sans-serif}
.akada-order .ao-client{font-weight:700;font-size:15px;color:#2F2C2C;width:120px}
.akada-order .ao-addr{font-size:14px;color:#6b7280;flex:1}
.akada-order .ao-weight{font-family:"Noto Sans JP",sans-serif;font-weight:700;font-size:15px;color:#2F2C2C;width:80px}
.akada-order .ao-shape{font-size:13px;color:#6b7280;width:100px}
.akada-order .ao-co{font-size:13px;color:#6b7280;width:80px}
.akada-empty{padding:40px;text-align:center;color:#9ca3af;font-size:16px;font-family:"Noto Sans JP",sans-serif}

.mgmt-menu{display:none;position:fixed;left:108px;bottom:30px;background:#fff;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.18);padding:8px;z-index:200;min-width:180px;font-family:"Noto Sans JP",sans-serif}
.mgmt-menu.show{display:block}
.mgmt-menu-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;font-size:15px;font-weight:700;color:#2F2C2C;white-space:nowrap}
.mgmt-menu-item:hover{background:#f0fdf4;color:#03968F}

.auth-wrap{position:fixed;inset:0;background:#F1F6EF;display:flex;align-items:center;justify-content:center;z-index:1000;font-family:"Noto Sans JP",sans-serif}
.auth-card{background:#fff;border-radius:20px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.08)}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-title{font-size:22px;font-weight:900;margin-bottom:6px;text-align:center;color:#2F2C2C}
.auth-sub{font-size:13px;color:#6b7280;text-align:center;margin-bottom:24px}
.auth-field{margin-bottom:14px}
.auth-field label{display:block;font-size:13px;font-weight:700;margin-bottom:5px;color:#2F2C2C}
.auth-field input{width:100%;font-size:16px;padding:12px 14px;border:2px solid #e5e7eb;border-radius:10px;font-family:inherit}
.auth-field input:focus{outline:none;border-color:#03968F}
.auth-btn{width:100%;padding:14px;font-size:17px;font-weight:700;background:#03968F;color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:inherit;margin-top:8px}
.auth-btn:hover{background:#027a74}
.auth-btn:disabled{opacity:.5}
.auth-err{color:#dc2626;font-size:13px;text-align:center;margin-top:12px;display:none}
.auth-link{text-align:center;margin-top:14px;font-size:13px;color:#6b7280}
.auth-link a{color:#03968F;font-weight:700;cursor:pointer;text-decoration:none}

/* ====================================
   カスタムカレンダー（リッチ緑系）
   ==================================== */
.dex-cal-pop{position:fixed;z-index:2000;background:#fff;border-radius:20px;box-shadow:0 20px 50px rgba(3,150,143,.25),0 4px 12px rgba(0,0,0,.08);padding:18px;font-family:"Noto Sans JP",sans-serif;user-select:none;animation:dex-cal-in .2s cubic-bezier(.34,1.56,.64,1);border:1px solid rgba(3,150,143,.15);min-width:300px;}
@keyframes dex-cal-in{from{opacity:0;transform:translateY(-8px) scale(.96);}to{opacity:1;transform:translateY(0) scale(1);}}
.dex-cal-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 4px 14px;margin-bottom:12px;border-bottom:2px solid #f0fdf4;}
.dex-cal-nav{width:32px;height:32px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,#03968F 0%,#0AB8AE 100%);color:#fff;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(3,150,143,.3);transition:transform .1s,box-shadow .15s;}
.dex-cal-nav:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(3,150,143,.4);}
.dex-cal-title{flex:1;text-align:center;font-weight:800;font-size:16px;color:#2F2C2C;cursor:pointer;padding:6px 10px;border-radius:10px;transition:background .15s;font-family:''Noto Sans JP'',sans-serif;}
.dex-cal-title:hover{background:#f0fdf4;color:#03968F;}
.dex-cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px;}
.dex-cal-wd{text-align:center;font-size:11px;font-weight:700;padding:4px 0;color:#6b7280;letter-spacing:.5px;}
.dex-cal-wd.sun{color:#ef4444;}
.dex-cal-wd.sat{color:#0891b2;}
.dex-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.dex-cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:#374151;transition:all .15s;position:relative;font-family:"Noto Sans JP",sans-serif;}
.dex-cal-day:hover:not(.dex-cal-empty):not(.dex-cal-selected){background:#f0fdf4;color:#03968F;transform:scale(1.08);}
.dex-cal-day.dex-cal-other-month{color:#d1d5db;}
.dex-cal-day.dex-cal-sun:not(.dex-cal-other-month){color:#ef4444;}
.dex-cal-day.dex-cal-sat:not(.dex-cal-other-month){color:#0891b2;}
.dex-cal-day.dex-cal-holiday:not(.dex-cal-other-month){color:#ef4444;}
.dex-cal-day.dex-cal-today{background:linear-gradient(135deg,#fef3c7 0%,#fde68a 100%);color:#92400e;font-weight:800;box-shadow:0 0 0 2px #f59e0b inset;}
.dex-cal-day.dex-cal-selected{background:linear-gradient(135deg,#03968F 0%,#0AB8AE 100%)!important;color:#fff!important;font-weight:800;box-shadow:0 2px 8px rgba(3,150,143,.4);transform:scale(1.05);}
.dex-cal-day.dex-cal-selected:hover{transform:scale(1.1);}
.dex-cal-footer{margin-top:12px;padding-top:12px;border-top:1px solid #f0fdf4;display:flex;gap:6px;justify-content:space-between;align-items:center;}
.dex-cal-quick{padding:6px 12px;border-radius:8px;border:1.5px solid #a7f3d0;background:#fff;color:#059669;cursor:pointer;font-weight:700;font-size:12px;font-family:inherit;transition:all .15s;}
.dex-cal-quick:hover{background:#f0fdf4;border-color:#03968F;color:#03968F;}
.dex-cal-clear{padding:6px 12px;border-radius:8px;border:1.5px solid #e5e7eb;background:#fff;color:#6b7280;cursor:pointer;font-weight:700;font-size:12px;font-family:inherit;transition:all .15s;}
.dex-cal-clear:hover{background:#fef2f2;border-color:#fca5a5;color:#dc2626;}
.dex-cal-months{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px 0;}
.dex-cal-month-btn{padding:14px 8px;border-radius:10px;border:1.5px solid transparent;background:#f9fafb;color:#374151;cursor:pointer;font-weight:700;font-size:13px;font-family:inherit;transition:all .15s;}
.dex-cal-month-btn:hover{background:#f0fdf4;color:#03968F;border-color:#a7f3d0;}
.dex-cal-month-btn.dex-cal-month-selected{background:linear-gradient(135deg,#03968F 0%,#0AB8AE 100%);color:#fff;border-color:#03968F;}
.dex-cal-month-btn.dex-cal-month-current{border-color:#f59e0b;}
.dex-cal-years{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px 0;}
.dex-cal-year-btn{padding:12px 8px;border-radius:10px;border:1.5px solid transparent;background:#f9fafb;color:#374151;cursor:pointer;font-weight:700;font-size:13px;font-family:"Noto Sans JP",sans-serif;transition:all .15s;}
.dex-cal-year-btn:hover{background:#f0fdf4;color:#03968F;border-color:#a7f3d0;}
.dex-cal-year-btn.dex-cal-year-selected{background:linear-gradient(135deg,#03968F 0%,#0AB8AE 100%);color:#fff;}
input[type="date"].dex-cal-active::-webkit-calendar-picker-indicator,input[type="month"].dex-cal-active::-webkit-calendar-picker-indicator{opacity:0;display:none;}
input[type="date"].dex-cal-active,input[type="month"].dex-cal-active{cursor:pointer;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='%2303968F' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='4' width='18' height='18' rx='2' ry='2'></rect><line x1='16' y1='2' x2='16' y2='6'></line><line x1='8' y1='2' x2='8' y2='6'></line><line x1='3' y1='10' x2='21' y2='10'></line></svg>");background-repeat:no-repeat;background-position:right 8px center;padding-right:32px!important;}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function parseW(w){if(!w)return 0;return parseFloat(String(w).replace(/[^0-9.]/g,''))||0;}

function shortCo(n){if(!n)return'—';return n.replace(/株式会社|有限会社/g,'').trim()||'—';}
function short6(n){if(!n)return'';return n.replace(/株式会社|有限会社/g,'').trim().slice(0,6);}
function stripCo(s){return s?s.replace(/株式会社|有限会社/g,'').trim():'';}
function cityOnly(addr){
  if(!addr)return'—';
  var s=addr.replace(/^(東京都|北海道|(?:京都|大阪)府|.{2,3}県)/,'');
  // 「○○市△△区」パターン
  var cw=s.match(/([一-龥ぁ-んァ-ヴ々]+市)([一-龥ぁ-んァ-ヴ々]+区)/);
  if(cw){
    // 大阪市だけ区のみ表示、それ以外は市+区
    if(cw[1]==='大阪市')return cw[2];
    return cw[1]+cw[2];
  }
  // 「○○市」単独
  var m=s.match(/([一-龥ぁ-んァ-ヴ々]+市)/);
  if(m)return m[1];
  // 「○○区」単独（市名省略されているケース）
  var r=s.match(/([一-龥ぁ-んァ-ヴ々]+区)/);
  if(r)return r[1];
  // 「○○町」「○○村」
  var m2=s.match(/([一-龥ぁ-んァ-ヴ々]+[町村])/);
  return m2?m2[1]:'—';
}

function cityMatch(addr,keyword){
if(!keyword||keyword.length<2)return false;
if(!addr)return false;
var a=addr;
var idx=a.indexOf(keyword);
if(idx<0)return false;
if(idx===0)return true;
var before=a.substring(0,idx);
if(before.match(/[府県都道]$/))return true;
if(before.match(/[市区町村郡]$/))return true;
if(before.match(/[\s,、　]$/))return true;
return false;
}

// 最長マッチエリア検索（最も具体的なエリアを返す）
function findBestMatchArea(addr,coName,type){
  if(!addr&&!coName)return null;
  var bestArea=null;
  var bestKeyLen=0;
  getEffectiveAreas().forEach(function(area){
    var keys=type==='delivery'?(area.deliveryKeys||[]):(area.pickupKeys||[]);
    var coKeys=type==='delivery'?(area.deliveryCoKeys||[]):(area.pickupCoKeys||[]);
    keys.forEach(function(k){
      if(!cityMatch(addr,k))return;
      // 会社名キーワードがある場合は AND 条件
      if(coKeys&&coKeys.length>0){
        var coMatched=coKeys.some(function(ck){return coName&&coName.indexOf(ck)>=0;});
        if(!coMatched)return;
      }
      // マッチ長 = 住所キーワード長 + 会社名キーワード長
      var totalLen=k.length+(coKeys&&coKeys.length?Math.max.apply(null,coKeys.map(function(ck){return ck.length;})):0);
      if(totalLen>bestKeyLen){
        bestKeyLen=totalLen;
        bestArea=area;
      }
    });
  });
  return bestArea;
}

function matchAreaDelivery(o,area){
if(!area||!area.deliveryKeys||!area.deliveryKeys.length)return false;
var addr=(o.deliveryAddress||'');
var coName=(o.deliveryCompany||'');
// 最長マッチエリアと比較（具体的なエリアが優先される）
var best=findBestMatchArea(addr,coName,'delivery');
if(best&&best!==area)return false;
// 住所マッチ
var addrMatch=area.deliveryKeys.some(function(k){return cityMatch(addr,k);});
if(!addrMatch)return false;
// 会社名キーワード設定がある場合は AND 条件
var coKeys=area.deliveryCoKeys||[];
if(coKeys.length>0){
  return coKeys.some(function(ck){return coName.indexOf(ck)>=0;});
}
return true;
}
function matchAreaPickup(o,area){
if(!area||!area.pickupKeys||!area.pickupKeys.length)return false;
var addr=(o.pickupAddress||'');
var coName=(o.pickupCompany||'');
var best=findBestMatchArea(addr,coName,'pickup');
if(best&&best!==area)return false;
var addrMatch=area.pickupKeys.some(function(k){return cityMatch(addr,k);});
if(!addrMatch)return false;
var coKeys=area.pickupCoKeys||[];
if(coKeys.length>0){
  return coKeys.some(function(ck){return coName.indexOf(ck)>=0;});
}
return true;
}

// 壊れた日付（"58" や "5/8" 等の YYYY-MM-DD でない値）を自動修復
function autoRepairBrokenDates(){
  if(!orders)return;
  var fixes={};
  var pad=function(n){return String(n).padStart(2,'0');};
  var repair=function(v){
    if(!v)return null;
    var s=String(v).trim();
    // YYYY-MM-DD 形式でも、年が異常（西暦100や0415等）なら修復対象に
    var ymd=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(ymd){
      var yr=parseInt(ymd[1]);
      if(yr>=1990&&yr<=2099)return null;
      var mm=parseInt(ymd[2]),dd=parseInt(ymd[3]);
      if(mm>=1&&mm<=12&&dd>=1&&dd<=31){
        return (new Date().getFullYear())+'-'+pad(mm)+'-'+pad(dd);
      }
      return null;
    }
    // M/D, MM/DD（'-' 区切りも）
    var slash=s.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
    if(slash){
      var mm=parseInt(slash[1]),dd=parseInt(slash[2]);
      if(mm>=1&&mm<=12&&dd>=1&&dd<=31){
        return (new Date().getFullYear())+'-'+pad(mm)+'-'+pad(dd);
      }
    }
    // 数字のみ（"58" → 5/8 と推定、"508" → 5/08、"0508" → 05/08）
    var d=s.replace(/[^0-9]/g,'');
    if(d.length===2){
      // "58" を "5/8" として解釈（最初1桁=月、残り1桁=日）
      var mm2=parseInt(d.substring(0,1)),dd2=parseInt(d.substring(1,2));
      if(mm2>=1&&mm2<=9&&dd2>=1&&dd2<=9){
        return (new Date().getFullYear())+'-'+pad(mm2)+'-'+pad(dd2);
      }
    }
    if(d.length===3)d='0'+d;
    if(d.length===4){
      var mm3=parseInt(d.substring(0,2)),dd3=parseInt(d.substring(2,4));
      if(mm3>=1&&mm3<=12&&dd3>=1&&dd3<=31){
        return (new Date().getFullYear())+'-'+pad(mm3)+'-'+pad(dd3);
      }
    }
    return null;
  };
  Object.keys(orders).forEach(function(oid){
    var o=orders[oid];
    if(!o)return;
    var fp=repair(o.pickupDate);
    var fd=repair(o.deliveryDate);
    if(fp){fixes['orders/'+oid+'/pickupDate']=fp;orders[oid].pickupDate=fp;}
    if(fd){fixes['orders/'+oid+'/deliveryDate']=fd;orders[oid].deliveryDate=fd;}
  });
  if(Object.keys(fixes).length){

// 日付文字列を正規化（空白除去、YYYY/MM/DD→YYYY-MM-DD、時刻部分切り捨て）
function normDs(s){
  if(!s)return '';
  s=String(s).trim();
  // 時刻部分除去（スペース区切り or T区切り）
  s=s.split(/[ T]/)[0];
  // YYYY/MM/DD → YYYY-MM-DD
  s=s.replace(/\//g,'-');
  return s;
}
function getDeliveryOrders(){return Object.entries(orders).filter(function(e){return normDs(e[1].deliveryDate)===currentDate&&e[1].checked===true;});}
function getPickupOrders(){return Object.entries(orders).filter(function(e){
  var o=e[1];
  if(normDs(o.pickupDate)!==currentDate)return false;
  if(o.checked!==true)return false;
  // 持込・朝積み案件は集荷不要のため除外
  if(isMochikomiOrder(o))return false;
  if(isAsazumiOrder(o))return false;
  return true;
});}

// 持込判定：フラグ or 引取先テキストに「持込」を含む
function isMochikomiOrder(o){

}

function isAsazumiOrder(o){return o.isAsazumi===true;}

// 拠点モードでの未処理表示判定
// 案件が現在の拠点モードで表示されるべきか
// ロジック：以下のいずれかを満たす案件のみ表示
//   A) o.branch === 自拠点（取込時に自動付与された拠点）
//   B) areaMasters[currentRoute] のキーワードに集荷or配達住所がマッチ（他拠点の案件でも自拠点エリアに該当する場合）
function matchAnyBranchArea(o,type){
  // 本社モード or 赤田便：従来通り（フィルタなし）
  if(!currentRoute||currentRoute==='honsha'||currentRoute==='akada'){
    if(currentRoute==='honsha'){
      var b=o.branch||'osaka';
      // A) 自拠点の案件
      if(b==='osaka'||b==='honsha'||!o.branch)return true;
      // B) 拠点振り分けマスタ（areaMasters[honsha]）に合致
      var sH=(areaMasters&&areaMasters['honsha'])||{};
      if(matchKeywordMap(sH,o,type))return true;
      // C) areas 配列（本社のエリアマスタ）に合致
      if(matchAreasArray(areas,o,type))return true;
      return false;
    }
    return true; // akada
  }
  // 拠点モード（shiga/nagoya等）
  // A) 自拠点で取り込んだ案件は無条件で表示
  if((o.branch||'')===currentRoute)return true;
  // B) 拠点振り分けマスタ（areaMasters[currentRoute]）にキーワードがあれば住所マッチ
  var src=(areaMasters&&areaMasters[currentRoute])||{};
  if(matchKeywordMap(src,o,type))return true;
  // C) areas 配列（拠点別のエリアマスタ）にキーワードがあれば住所マッチ
  if(matchAreasArray(areas,o,type))return true;
  return false;
}

// areas 配列形式（{name, deliveryKeys:[], pickupKeys:[]} の配列）にマッチするか判定
function matchAreasArray(arr,o,type){
  if(!Array.isArray(arr)||!arr.length)return false;
  var addr=type==='delivery'?(o.deliveryAddress||''):(o.pickupAddress||'');
  for(var i=0;i<arr.length;i++){
    var a=arr[i]||{};
    var keys=(type==='delivery'?(a.deliveryKeys||[]):(a.pickupKeys||[]));
    if(!Array.isArray(keys))continue;
    for(var j=0;j<keys.length;j++){
      if(keys[j]&&addr.indexOf(keys[j])>=0)return true;
    }
  }
  return false;
}

function matchKeywordMap(src,o,type){
  var areaList=Object.values(src);
  if(!areaList.length)return false;
  var addr=type==='delivery'?(o.deliveryAddress||''):(o.pickupAddress||'');
  for(var i=0;i<areaList.length;i++){
    var a=areaList[i]||{};
    var keywords=(type==='delivery'?(a.deliveryKeywords||''):(a.pickupKeywords||'')).split(/[,，、]/).map(function(s){return s.trim();}).filter(Boolean);
    for(var j=0;j<keywords.length;j++){
      if(keywords[j]&&addr.indexOf(keywords[j])>=0)return true;
    }
  }
  return false;
}

function updateStats(){
  var statsEl=document.getElementById('area-stats');
  if(!statsEl)return;
  var dO=getDeliveryOrders(),pO=getPickupOrders();
  // 朝積み・持込の集計（処理済 = checked:true で当日 pickupDate）
  var azCount=0,mcCount=0,azWeight=0,mcWeight=0;
  Object.values(orders||{}).forEach(function(o){
    if(!o||o.checked!==true||o.isCancelled||o.isRoute)return;
    if(normDs(o.pickupDate)!==currentDate)return;
    // 自拠点の振り分けキーワードに該当する案件のみ集計
    if(!matchAnyBranchArea(o,'pickup')&&!matchAnyBranchArea(o,'delivery'))return;
    if(isAsazumiOrder(o)){azCount++;azWeight+=parseW(o.weight);}
    else if(isMochikomiOrder(o)){mcCount++;mcWeight+=parseW(o.weight);}
  });
  var h='';
  if(activeArea==='all'){
    var dCount=0,dWeight=0,pCount=0,pWeight=0;
    dO.forEach(function(x){
      var o=x[1];
      if(o.isRoute||o.isCancelled)return;
      if(!matchAnyBranchArea(o,'delivery'))return;
      dCount++;dWeight+=parseW(o.weight);
    });
    pO.forEach(function(x){
      var o=x[1];
      if(o.isRoute||o.isCancelled)return;
      if(!matchAnyBranchArea(o,'pickup'))return;
      pCount++;pWeight+=parseW(o.weight);
    });
    h+=buildStatsBlock('合計',dCount,dWeight,pCount,pWeight,'#03968F',azCount,mcCount);
  }else{
    var area=getAreaByName(activeArea);
    var dCount=0,dWeight=0,pCount=0,pWeight=0;
    dO.forEach(function(x){
      var o=x[1];
      if(o.isRoute||o.isCancelled)return;
      if(!matchAnyBranchArea(o,'delivery'))return;
      if(!matchAreaDelivery(o,area))return;
      dCount++;dWeight+=parseW(o.weight);
    });
    pO.forEach(function(x){
      var o=x[1];
      if(o.isRoute||o.isCancelled)return;
      if(!matchAnyBranchArea(o,'pickup'))return;
      if(!matchAreaPickup(o,area))return;
      pCount++;pWeight+=parseW(o.weight);
    });
    h+=buildStatsBlock(activeArea,dCount,dWeight,pCount,pWeight,'#03968F',azCount,mcCount);
  }
  statsEl.innerHTML=h;
}

function prefMatches(addr,pref){
if(!addr||!pref)return false;
// 都道府県名そのものが住所に含まれるか
if(addr.includes(pref))return true;
// 都道府県内の市区を住所が含むか（ただし他県の同名市区との誤判定を避けるため、
// 別の都道府県名が住所に既にあれば false）
var prefList=['北海道','青森県','岩手県','宮城県','秋田県','山形県','福島県','茨城県','栃木県','群馬県','埼玉県','千葉県','東京都','神奈川県','新潟県','富山県','石川県','福井県','山梨県','長野県','岐阜県','静岡県','愛知県','三重県','滋賀県','京都府','大阪府','兵庫県','奈良県','和歌山県','鳥取県','島根県','岡山県','広島県','山口県','徳島県','香川県','愛媛県','高知県','福岡県','佐賀県','長崎県','熊本県','大分県','宮崎県','鹿児島県','沖縄県'];
for(var i=0;i<prefList.length;i++){
  if(prefList[i]!==pref&&addr.startsWith(prefList[i]))return false; // 別都道府県の住所
}
var cities=PREF_CITIES[pref]||[];
return cities.some(function(ct){return addr.includes(ct);});
}

// 案件が「指定日の配達タブ」に表示されるべきか（配達日=dsで、配達先が配達prefsにマッチ）
function isInDeliveryPrefs(o){
if(o.isRegular)return true;
// deliveryAddress を主に使い、prefは補助としてのみチェック
var addr=(o.deliveryAddress||'');
var prefs=sidebarPrefs.delivery||[];
if(!prefs.length)return true;
// まずaddrでチェック（addr内に他県名がある場合の誤判定を防ぐ）
if(prefs.some(function(p){return prefMatches(addr,p);}))return true;
// addrが空 or マッチしない場合は deliveryPref 補助
if(!addr&&o.deliveryPref){
  return prefs.some(function(p){return p===o.deliveryPref;});
}
return false;
}
// 案件が「指定日の集荷タブ」に表示されるべきか（集荷日=dsで、集荷先が集荷prefsにマッチ）
function isInPickupPrefs(o){
if(o.isRegular)return true;
var addr=(o.pickupAddress||'');
var prefs=sidebarPrefs.pickup||[];
if(!prefs.length)return true;
return prefs.some(function(p){return prefMatches(addr,p);});
}

// 「その他」タブ：指定日において、その面（集荷/配達）の地域が配達/集荷prefsで拾われず
// その他prefsで拾われるもの
// typeは'delivery'または'pickup'
function isOtherAreaForType(o,type){
var otherPrefs=sidebarPrefs.other||[];
if(!otherPrefs.length)return false;
if(type==='delivery'){
  var dAddr=(o.deliveryAddress||'');
  // 配達prefsで既に拾われるなら除外
  var deliveryPrefs=sidebarPrefs.delivery||[];
  if(deliveryPrefs.some(function(p){return prefMatches(dAddr,p);}))return false;
  // その他prefsで拾う
  return otherPrefs.some(function(p){return prefMatches(dAddr,p);});
}else{
  var pAddr=(o.pickupAddress||'');
  var pickupPrefs=sidebarPrefs.pickup||[];
  if(pickupPrefs.some(function(p){return prefMatches(pAddr,p);}))return false;
  return otherPrefs.some(function(p){return prefMatches(pAddr,p);});
}
}

// 旧関数との互換性（両面どちらかでその他に該当するか）
function isOtherArea(o){
return isOtherAreaForType(o,'delivery')||isOtherAreaForType(o,'pickup');
}

}

      else if(typeof sbTab!=='undefined'){
        if(sbTab==='pickup')assignDelivery=false;
        else if(sbTab==='delivery'||sbTab==='other')assignDelivery=true;
      }
      // ③ それでも決まらない時は日付で判定（フォールバック）
      if(assignDelivery===null){
        var isDeliveryToday=normDs(o.deliveryDate)===currentDate;
        var isPickupToday=normDs(o.pickupDate)===currentDate;
        if(isDeliveryToday)assignDelivery=true;
        else if(isPickupToday)assignDelivery=false;
      }
      if(assignDelivery===true){
        u['orders/'+oid+'/driverId']=did;
        u['orders/'+oid+'/isRoute']=false;
        // 既に集荷枠にもあった場合はそちらをクリアしない（同日に集荷もする運用ありうるので維持）
        assignedCount++;
      }else if(assignDelivery===false){
        u['orders/'+oid+'/pickupDriverId']=did;
        assignedCount++;
      }
    });
    if(assignedCount===0)return;
    db.ref().update(u).then(()=>{
      showToast(assignedCount+'件を '+(drivers[did]?.name||'')+' へ配車');
      selectedOids.clear();updateBatch();
    });
  });
});
}

function handlePdfScan(file){
var status=document.getElementById('scan-ocr-status');
status.style.display='block';
status.innerHTML='<div class="spinner" style="display:inline-block;margin-right:8px"></div>PDF読み込み中...';
document.getElementById('scan-area').style.display='block';
document.getElementById('scan-save-btn').style.display='';
var reader=new FileReader();
reader.onload=function(e){
var typedArray=new Uint8Array(e.target.result);
pdfjsLib.getDocument(typedArray).promise.then(function(pdf){
var allText='';
var pagesDone=0;
var totalPages=pdf.numPages;
var pagesDiv=document.getElementById('scan-pdf-pages');
pagesDiv.innerHTML='';
// Render all pages as thumbnails
for(var p=1;p<=totalPages;p++){
(function(pageNum){
pdf.getPage(pageNum).then(function(page){
var scale=1.5;
var viewport=page.getViewport({scale:scale});
var canvas=document.createElement('canvas');
canvas.width=viewport.width;canvas.height=viewport.height;
canvas.style.cssText='height:200px;width:auto;border:1px solid #e5e7eb;border-radius:8px;flex-shrink:0';
var ctx=canvas.getContext('2d');
page.render({canvasContext:ctx,viewport:viewport}).promise.then(function(){
pagesDiv.appendChild(canvas);
if(pageNum===1)window._scanDataUrl=canvas.toDataURL('image/jpeg',0.7);
});
// Extract text
page.getTextContent().then(function(tc){
var pageText=tc.items.map(function(i){return i.str}).join(' ');
allText+=pageText+'\n';
pagesDone++;
status.innerHTML='<div class="spinner" style="display:inline-block;margin-right:8px"></div>読み取り中... '+pagesDone+'/'+totalPages+'ページ';
if(pagesDone>=totalPages){
if(allText.trim().length>10){
status.style.display='none';
document.getElementById('scan-raw-toggle').style.display='block';
document.getElementById('scan-raw').textContent=allText;
parseOCRText(allText);
}else{
status.innerHTML='<div class="spinner" style="display:inline-block;margin-right:8px"></div>テキストなし。OCR実行中...';
if(window._scanDataUrl)runOCR(window._scanDataUrl);
}
}
});
});
})(p);
}
}).catch(function(err){
status.innerHTML='PDFエラー: '+err.message;
});
};
reader.readAsArrayBuffer(file);
}

function runOCR(dataUrl){
var status=document.getElementById('scan-ocr-status');
status.style.display='block';

if(!VISION_API_KEY){
status.innerHTML='Cloud Vision APIキーが未設定です。<br><button onclick="location.href=\'mgmt.html#ocr\'" style="margin-top:8px;padding:6px 16px;border:2px solid #03968F;color:#03968F;background:#fff;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:700">管理画面でAPIキーを設定</button>';
return;
}

status.innerHTML='<div class="spinner" style="display:inline-block;margin-right:8px"></div>Cloud Vision で読み取り中...';

var base64=dataUrl.split(',')[1];
var body={requests:[{image:{content:base64},features:[{type:'TEXT_DETECTION'}]}]};

fetch('https://vision.googleapis.com/v1/images:annotate?key='+VISION_API_KEY,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(body)
}).then(function(r){return r.json()}).then(function(data){
if(data.error){
status.innerHTML='APIエラー: '+data.error.message;
return;
}
var text=(data.responses&&data.responses[0]&&data.responses[0].fullTextAnnotation)?data.responses[0].fullTextAnnotation.text:'';
if(text){
status.style.display='none';
document.getElementById('scan-raw-toggle').style.display='block';
document.getElementById('scan-raw').textContent=text;
parseOCRText(text);
}else{
status.innerHTML='テキストを検出できませんでした';
}
}).catch(function(err){
status.innerHTML='通信エラー: '+err.message;
});
}

// 案件詳細モーダル：M/D形式テキスト入力を <input type="date"> に同期
function syncDateFromMD(dateInputId,mdInput){
  var v=String(mdInput.value||'').trim();
  if(!v)return;
  var slash=v.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
  var mm=null,dd=null;
  if(slash){mm=parseInt(slash[1]);dd=parseInt(slash[2]);}
  else{
    var d=v.replace(/[^0-9]/g,'');
    if(d.length===2){mm=parseInt(d.substring(0,1));dd=parseInt(d.substring(1,2));}
    else if(d.length===3){d='0'+d;}
    if(d.length===4){mm=parseInt(d.substring(0,2));dd=parseInt(d.substring(2,4));}
  }
  if(mm>=1&&mm<=12&&dd>=1&&dd<=31){
    var pad=function(n){return String(n).padStart(2,'0');};
    var year=new Date().getFullYear();
    var dateInp=document.getElementById(dateInputId);
    if(dateInp){
      dateInp.value=year+'-'+pad(mm)+'-'+pad(dd);
      mdInput.value=mm+'/'+dd;
      mdInput.style.background='#dcfce7';
      setTimeout(function(){mdInput.style.background='';},800);
    }
  }
}

// 案件詳細モーダル内で集荷モードを切替（朝積み / 持込 / 通常集荷）
function toggleOrderPickupMode(oid,mode){
  if(!oid)return;
  var updates={};
  if(mode==='asazumi'){
    updates.isAsazumi=true;
    updates.isMochikomi=false;
    // 朝積み・持込時は集荷情報を空にする（集荷不要のため）
    updates.pickupCompany='';
    updates.pickupAddress='';
  }else if(mode==='mochikomi'){
    updates.isAsazumi=false;
    updates.isMochikomi=true;
    updates.pickupCompany='';
    updates.pickupAddress='';
  }else{
    updates.isAsazumi=false;
    updates.isMochikomi=false;
  }
  updates.updatedAt=Date.now();
  db.ref('orders/'+oid).update(updates).then(function(){
    // ローカル反映
    if(orders[oid]){Object.keys(updates).forEach(function(k){orders[oid][k]=updates[k];});}
    // モーダル再描画（保存中のフォーム値を維持しつつ）
    openOrderModal(oid);
  }).catch(function(err){
    alert('変更に失敗しました: '+(err.message||err));
  });
}

// 月表示本体
function renderMonthView(){
var h='';
var weeks=['日','月','火','水','木','金','土'];
h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px">';
weeks.forEach(function(w,i){
  var color=i===0?'#dc2626':(i===6?'#2563eb':'#6b7280');
  h+='<div style="text-align:center;padding:8px 0;font-size:12px;font-weight:700;color:'+color+'">'+w+'</div>';
});
h+='</div>';

var first=new Date(calYear,calMonth,1);
var startDay=first.getDay();
var dim=new Date(calYear,calMonth+1,0).getDate();
var today=todayStr();
var pd=new Date(calYear,calMonth,0).getDate();

// チャータータブで全案件（同日含む）をバー表示する
var spanBars=[];
var dayLanes={}; // ds -> [chId1, chId2, ...]（そのセルに表示するチャーターID）
var laneMap={}; // chId -> lane番号
if(calType==='charter'){
  var seenChIds={};
  // まず全期間スキャン：前月末〜翌月初の期間も拾う（月またぎ対応）
  var scanFrom=new Date(calYear,calMonth-1,1); // 前月1日から
  var scanTo=new Date(calYear,calMonth+2,0); // 翌月末まで
  for(var sdt=new Date(scanFrom);sdt<=scanTo;sdt.setDate(sdt.getDate()+1)){
    var sds=sdt.getFullYear()+'-'+String(sdt.getMonth()+1).padStart(2,'0')+'-'+String(sdt.getDate()).padStart(2,'0');
    var sentries=calData[calType+'_'+sds]||[];
    sentries.forEach(function(e,eIdx){
      if(e.chId){
        // chId がある＝複数日またぎの集荷/配達phase
        // 集荷phase または phase未指定を代表として登録
        if(e.phase==='pickup'||!e.phase){
          if(seenChIds[e.chId])return;
          seenChIds[e.chId]=true;
          spanBars.push(e);
        }
      }else if(e.charterType){
        // chIdのない同日案件
        if(sds===calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(sdt.getDate()).padStart(2,'0')){
          // 当月の同日案件のみ
          var tmpId='same_'+sds+'_'+eIdx;
          spanBars.push(Object.assign({},e,{chId:tmpId,pickupDate:sds,deliveryDate:sds,_sameDay:true,_origDate:sds,_origIdx:eIdx}));
        }
      }
    });
  }
  // 配達phaseだけが存在して集荷phaseが見つからなかった chId を拾う（バグ対応）
  for(var sdt2=new Date(scanFrom);sdt2<=scanTo;sdt2.setDate(sdt2.getDate()+1)){
    var sds2=sdt2.getFullYear()+'-'+String(sdt2.getMonth()+1).padStart(2,'0')+'-'+String(sdt2.getDate()).padStart(2,'0');
    var sentries2=calData[calType+'_'+sds2]||[];
    sentries2.forEach(function(e){
      if(e.chId&&!seenChIds[e.chId]&&(e.phase==='delivery')){
        seenChIds[e.chId]=true;
        spanBars.push(e);
      }
    });
  }
  // lane割り当て（同時期の案件が重ならないように）
  spanBars.sort(function(a,b){return (a.pickupDate||'').localeCompare(b.pickupDate||'');});
  spanBars.forEach(function(e){
    var from=new Date(e.pickupDate),to=new Date(e.deliveryDate||e.pickupDate);
    var usedLanes={};
    var dates=[];
    for(var t=new Date(from);t<=to;t.setDate(t.getDate()+1)){
      var tds=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
      dates.push(tds);
      (dayLanes[tds]||[]).forEach(function(cid){usedLanes[laneMap[cid]]=true;});
    }
    var lane=0;while(usedLanes[lane])lane++;
    laneMap[e.chId]=lane;
    dates.forEach(function(tds){if(!dayLanes[tds])dayLanes[tds]=[];dayLanes[tds].push(e.chId);});
  });
}

h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">';
// 前月
for(var i=startDay-1;i>=0;i--){
  h+='<div style="min-height:110px;padding:6px;border:1px solid #f3f4f6;border-radius:8px;background:#fafafa;color:#d1d5db"><div style="font-size:13px;font-weight:700">'+(pd-i)+'</div></div>';
}
// 当月
for(var d=1;d<=dim;d++){
  var ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  var key=calType+'_'+ds;
  var entries=calData[key]||[];
  var dow=new Date(calYear,calMonth,d).getDay();
  var isToday=(ds===today);
  var isSelected=(ds===calSelDate);
  var dayColor=dow===0?'#dc2626':(dow===6?'#2563eb':'#2F2C2C');
  var bg='#fff',border='1px solid #f3f4f6';
  if(isSelected){border='2px solid #03968F';bg='#fff';}
  else if(isToday){bg='#f0fdf4';}
  h+='<div onclick="calSelDate=\''+ds+'\';renderCalendar()" style="min-height:110px;padding:6px;border:'+border+';border-radius:8px;background:'+bg+';cursor:pointer;transition:all .1s;overflow:hidden;position:relative" onmouseover="if(!this.style.border.includes(\'#03968F\'))this.style.background=\'#f9fafb\'" onmouseout="if(!this.style.border.includes(\'#03968F\'))this.style.background=\''+bg+'\'">';
  // 日付
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px;font-weight:'+(isToday?'800':'700')+';color:'+dayColor+'">'+d+'</span>';
  if(isToday)h+='<span style="background:#03968F;color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px">今日</span>';
  h+='</div>';

  // 複数日またぎバー（チャーターのみ、laneごとに描画）
  if(calType==='charter'&&(dayLanes[ds]||[]).length){
    // laneの最大値まで順番にループ（lane順で縦積みが揃う）
    var lanesOnDay=(dayLanes[ds]||[]).map(function(cid){return {chId:cid,lane:laneMap[cid]};}).sort(function(a,b){return a.lane-b.lane;});
    lanesOnDay.forEach(function(ln){
      var e=spanBars.find(function(b){return b.chId===ln.chId;});
      if(!e)return;
      var isPickupDay=ds===e.pickupDate;
      var isDeliveryDay=ds===e.deliveryDate;
      // 自社=ティール、委託=紫
      var barColor=e.charterType==='委託'?'#03968F':'#14b8a6';
      // 土日週ブレーク：土曜(6)または次月最終日まででバーを区切る
      var isSunday=dow===0; // 日曜：週の始まり
      var isSaturday=dow===6; // 土曜：週の終わり
      var roundLeft=isPickupDay||isSunday;
      var roundRight=isDeliveryDay||isSaturday;
      var radiusLeft=roundLeft?'6px':'0';
      var radiusRight=roundRight?'6px':'0';
      // gap=4pxを埋めて繋げる：右端丸めなければmargin-right:-4px、左端丸めなければmargin-left:-4px
      var marginLeft=roundLeft?'0':'-4px';
      var marginRight=roundRight?'0':'-4px';
      // ラベル：集荷日/配達日/中継日/同日で明確に表示
      var labelHtml='';
      var isSameDay=e.pickupDate===e.deliveryDate||!e.deliveryDate||e._sameDay;
      if(isSameDay){
        // 同日案件：1本のバー内に「集荷→配達」まとめて
        var fromTxt=e.fromPlace?esc(e.fromPlace):'';
        var toTxt=e.toPlace?esc(e.toPlace):'';
        var placePart='';
        if(fromTxt&&toTxt)placePart='<span style="opacity:.85;font-weight:500;margin-left:3px">@'+fromTxt+'→'+toTxt+'</span>';
        else if(fromTxt||toTxt)placePart='<span style="opacity:.85;font-weight:500;margin-left:3px">@'+(fromTxt||toTxt)+'</span>';
        labelHtml='<span style="background:rgba(255,255,255,.25);padding:1px 5px;border-radius:3px;font-weight:800;margin-right:4px;font-size:9px">当日</span>'+esc(e.client||'')+placePart;
      }else if(isPickupDay){
        // [集荷] 会社名 @集荷先
        var placeTxt=e.fromPlace?' @'+esc(e.fromPlace):'';
        labelHtml='<span style="background:rgba(255,255,255,.25);padding:1px 5px;border-radius:3px;font-weight:800;margin-right:4px;font-size:9px">集荷</span>'+esc(e.client||'')+'<span style="opacity:.8;font-weight:500;margin-left:3px">'+placeTxt+'</span>';
      }else if(isDeliveryDay){
        // [配達] 会社名 @配達先
        var placeTxt=e.toPlace?' @'+esc(e.toPlace):'';
        labelHtml='<span style="background:rgba(255,255,255,.25);padding:1px 5px;border-radius:3px;font-weight:800;margin-right:4px;font-size:9px">配達</span>'+esc(e.client||'')+'<span style="opacity:.8;font-weight:500;margin-left:3px">'+placeTxt+'</span>';
      }else{
        // 中継日：薄い輸送中表示
        labelHtml='<span style="opacity:.75;font-size:9px">・・・輸送中・・・</span>';
      }
      // 同日案件の編集はopenEditEntry、複数日案件はopenEditCharter
      var clickAction=e._sameDay?('openEditEntry(\''+e._origDate+'\','+e._origIdx+')'):('openEditCharter(\''+e.chId+'\')');
      h+='<div onclick="event.stopPropagation();'+clickAction+'" style="background:'+barColor+';color:#fff;padding:3px 6px;border-radius:'+radiusLeft+' '+radiusRight+' '+radiusRight+' '+radiusLeft+';font-size:10px;font-weight:600;margin-bottom:2px;margin-left:'+marginLeft+';margin-right:'+marginRight+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;position:relative;z-index:2" title="'+esc((e.client||'')+': '+(e.fromPlace||'')+' → '+(e.toPlace||'')+(isSameDay?' (当日配送)':' / 集荷'+e.pickupDate+' 〜 配達'+e.deliveryDate))+'">'+labelHtml+'</div>';
    });
  }

  // 通常イベント（チャータータブ以外）
  var nonSpanEntries=entries.filter(function(e){
    // チャータータブでは全case のチャーターを除外（全部バー表示に統一）
    if(calType==='charter'&&e.charterType)return false;
    return true;
  });
  var shown=nonSpanEntries.slice(0,3);
  shown.forEach(function(e){
    var ev=formatCalEvent(e);
    var entryIdx=entries.indexOf(e);
    h+='<div onclick="event.stopPropagation();openEditEntry(\''+ds+'\','+entryIdx+')" style="display:flex;align-items:center;gap:4px;margin-bottom:2px;font-size:10px;color:#374151;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;padding:2px 4px;border-radius:4px;transition:background .1s" onmouseover="this.style.background=\'#f3f4f6\'" onmouseout="this.style.background=\'\'" title="'+esc(ev.text+(ev.sub?' - '+ev.sub:''))+'"><span style="width:10px;height:10px;border-radius:50%;background:'+ev.color+';flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:7px">'+ev.icon+'</span><span style="overflow:hidden;text-overflow:ellipsis">'+esc(ev.text)+'</span></div>';
  });
  var spanCount=(dayLanes[ds]||[]).length;
  var totalShown=spanCount+shown.length;
  var totalEvents=spanCount+nonSpanEntries.length;
  if(totalEvents>totalShown){
    h+='<div style="font-size:10px;color:#9ca3af;font-weight:700;margin-top:2px">+'+(totalEvents-totalShown)+'件</div>';
  }
  h+='</div>';
}
// 次月余白
var tc=startDay+dim;var rem=tc%7?7-tc%7:0;
for(var i=1;i<=rem;i++){
  h+='<div style="min-height:110px;padding:6px;border:1px solid #f3f4f6;border-radius:8px;background:#fafafa;color:#d1d5db"><div style="font-size:13px;font-weight:700">'+i+'</div></div>';
}
h+='</div>';
return h;
}

// 週表示
function renderWeekView(){
var sel=new Date(calSelDate);
var dow=sel.getDay();
var weekStart=new Date(sel);weekStart.setDate(sel.getDate()-dow);
var today=todayStr();
var h='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px">';
var weekNames=['日','月','火','水','木','金','土'];
for(var i=0;i<7;i++){
  var d=new Date(weekStart);d.setDate(weekStart.getDate()+i);
  var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  var entries=calData[calType+'_'+ds]||[];
  var isToday=ds===today;
  var isSelected=ds===calSelDate;
  var dayColor=i===0?'#dc2626':(i===6?'#2563eb':'#2F2C2C');
  var bg='#fff',border='1px solid #f3f4f6';
  if(isSelected){border='2px solid #03968F';}
  else if(isToday){bg='#f0fdf4';}
  h+='<div onclick="calSelDate=\''+ds+'\';renderCalendar()" ondblclick="openCalModal(\''+ds+'\')" style="min-height:400px;padding:10px;border:'+border+';border-radius:10px;background:'+bg+';cursor:pointer">';
  h+='<div style="text-align:center;margin-bottom:10px"><div style="font-size:11px;font-weight:700;color:'+dayColor+'">'+weekNames[i]+'</div><div style="font-size:20px;font-weight:800;color:'+dayColor+';margin-top:2px">'+d.getDate()+'</div></div>';
  entries.forEach(function(e){
    var ev=formatCalEvent(e);
    h+='<div style="background:'+ev.lightBg+';color:'+ev.color+';padding:4px 7px;border-radius:6px;font-size:10px;font-weight:600;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(ev.text)+'">'+ev.icon+' '+esc(ev.text)+'</div>';
  });
  h+='</div>';
}
h+='</div>';
return h;
}

// 一覧表示
function renderListView(){
var h='<div style="max-height:600px;overflow-y:auto">';
var dim=new Date(calYear,calMonth+1,0).getDate();
var count=0;
for(var d=1;d<=dim;d++){
  var ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  var entries=calData[calType+'_'+ds]||[];
  if(!entries.length)continue;
  var dd=new Date(calYear,calMonth,d);
  var dowNames=['日','月','火','水','木','金','土'];
  var dow=dd.getDay();
  var dayColor=dow===0?'#dc2626':(dow===6?'#2563eb':'#6b7280');
  h+='<div style="padding:12px 16px;border-bottom:1px solid #f3f4f6;display:flex;gap:16px;align-items:flex-start;cursor:pointer" onclick="calSelDate=\''+ds+'\';renderCalendar()">';
  h+='<div style="min-width:60px"><div style="font-size:20px;font-weight:800;color:#2F2C2C">'+d+'</div><div style="font-size:11px;color:'+dayColor+';font-weight:700">('+dowNames[dow]+')</div></div>';
  h+='<div style="flex:1;display:flex;flex-direction:column;gap:4px">';
  entries.forEach(function(e){
    var ev=formatCalEvent(e);
    h+='<div style="display:flex;align-items:center;gap:8px"><span style="width:18px;height:18px;border-radius:50%;background:'+ev.color+';color:#fff;font-size:10px;display:inline-flex;align-items:center;justify-content:center">'+ev.icon+'</span><span style="font-size:13px;color:#374151">'+esc(ev.text)+'</span></div>';
  });
  h+='</div></div>';
  count++;
}
if(!count)h+='<div style="padding:60px;text-align:center;color:#9ca3af">この月の予定はありません</div>';
h+='</div>';
return h;
}

// 右サイドの選択日パネル
function renderDayPanel(ds){
var d=new Date(ds);
var entries=calData[calType+'_'+ds]||[];
var dowNames=['日','月','火','水','木','金','土'];
var h='';

// 休み系と案件系に振り分け
var leaveTypes=['休み','AM休み','PM休み','早退','遅刻'];
var leaves=[],jobs=[];
entries.forEach(function(e){
  if(e.type==='absence'||(e.slType&&leaveTypes.indexOf(e.slType)>=0)){
    leaves.push(e);
  }else{
    jobs.push(e);
  }
});

// ヘッダー
h+='<div style="margin-bottom:14px">';
h+='<div style="font-size:16px;font-weight:800;color:#2F2C2C">'+(d.getMonth()+1)+'月'+d.getDate()+'日('+dowNames[d.getDay()]+')の予定</div>';
h+='<div style="font-size:11px;color:#9ca3af;margin-top:2px">全'+entries.length+'件</div>';
h+='</div>';

// ========== チャータータブ専用：自社 / 委託 2カラム ==========
if(calType==='charter'){
  var jisha=jobs.filter(function(e){return e.charterType==='自社';});
  var itaku=jobs.filter(function(e){return e.charterType==='委託';});

  // 休み系エリア（小さめ）
  if(leaves.length){
    h+='<div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:10px;margin-bottom:10px">';
    h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="font-size:13px">🌴</span><span style="font-size:11px;font-weight:800;color:#9a3412">休み・勤怠</span><span style="margin-left:auto;background:#fff;color:#c2410c;font-size:10px;font-weight:700;padding:1px 7px;border-radius:8px">'+leaves.length+'</span></div>';
    leaves.forEach(function(e){
      var ev=formatCalEvent(e);
      h+='<div style="background:#fff;border-radius:6px;padding:5px 8px;margin-bottom:3px;font-size:11px;color:#2F2C2C"><span style="color:'+ev.color+';font-weight:700">'+ev.icon+'</span> '+esc(ev.text)+'</div>';
    });
    h+='</div>';
  }

  // 自社便 / 委託 2カラム
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">';

  // 🚚 自社便
  h+='<div style="background:#ecfdf5;border:1px solid #a7f3d0;border-radius:10px;padding:10px;min-height:140px;display:flex;flex-direction:column">';
  h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #a7f3d0">';
  h+='<span style="font-size:14px">🚚</span><span style="font-size:12px;font-weight:800;color:#047857">自社便</span>';
  h+='<span style="margin-left:auto;background:#fff;color:#059669;font-size:10px;font-weight:700;padding:1px 7px;border-radius:8px">'+jisha.length+'</span>';
  h+='</div>';
  h+='<div style="flex:1">';
  if(!jisha.length){
    h+='<div style="color:#d1d5db;font-size:11px;text-align:center;padding:14px 4px">なし</div>';
  }else{
    jisha.forEach(function(e){

// チャーターカードの描画
function renderCharterCard(e,mainColor,borderColor){
var ev=formatCalEvent(e);
var isSameDay=!e.deliveryDate||e.deliveryDate===e.pickupDate;
var phaseLabel='';
if(!isSameDay){
  if(e.phase==='pickup')phaseLabel='<span style="background:#14b8a6;color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:6px;margin-right:4px">集荷</span>';
  else if(e.phase==='delivery')phaseLabel='<span style="background:#ea580c;color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:6px;margin-right:4px">配達</span>';
}
// 編集用の識別：chIdがあれば chId、なければ 通常のidx
var clickAction=e.chId?'openEditCharter(\''+e.chId+'\')':'openEditEntry(\''+calSelDate+'\','+(calData[calType+'_'+calSelDate]||[]).indexOf(e)+')';
var h='<div onclick="'+clickAction+'" style="background:#fff;border-radius:8px;padding:8px;margin-bottom:6px;border:1px solid '+borderColor+';cursor:pointer;transition:all .1s" onmouseover="this.style.borderColor=\''+mainColor+'\';this.style.boxShadow=\'0 2px 6px rgba(0,0,0,.06)\'" onmouseout="this.style.borderColor=\''+borderColor+'\';this.style.boxShadow=\'\'">';
h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">';
h+=phaseLabel;
h+='<span style="font-size:12px;font-weight:700;color:#2F2C2C;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(e.client||'')+'</span>';
h+='</div>';
if(e.fromPlace&&e.toPlace){
  h+='<div style="font-size:10px;color:#6b7280;margin-top:2px">📍 '+esc(e.fromPlace)+' → '+esc(e.toPlace)+'</div>';
}
if(e.weight||e.vehicle){
  var parts=[];
  if(e.weight)parts.push(e.weight);
  if(e.vehicle)parts.push(e.vehicle);
  h+='<div style="font-size:10px;color:#9ca3af;margin-top:2px">'+esc(parts.join(' / '))+'</div>';
}
if(e.delegate){
  h+='<div style="font-size:10px;color:'+mainColor+';margin-top:2px;font-weight:600">🤝 '+esc(e.delegate)+'</div>';
}
if(!isSameDay&&e.pickupDate&&e.deliveryDate){
  var fromD=new Date(e.pickupDate),toD=new Date(e.deliveryDate);
  h+='<div style="font-size:9px;color:#9ca3af;margin-top:3px;padding-top:3px;border-top:1px dashed '+borderColor+'">📅 '+(fromD.getMonth()+1)+'/'+fromD.getDate()+' → '+(toD.getMonth()+1)+'/'+toD.getDate()+'</div>';
}
h+='</div>';
return h;
}

function saveEditLeave(ds,idx){
var name=document.getElementById('lv-name')?.value.trim();
if(!name){showToast('名前を入力');return;}
var typeSel=document.getElementById('lv-type').value;
var actualType=typeSel;
if(typeSel==='__custom__'){
  actualType=document.getElementById('lv-custom')?.value.trim();
  if(!actualType){showToast('内容を入力');return;}
}
var time=document.getElementById('lv-time')?.value.trim()||'';
var memo=document.getElementById('lv-memo')?.value.trim()||'';
var key=calType+'_'+ds;
if(!calData[key])return;
var newEntry;
if(calType==='schedule'){
  newEntry={type:'absence',name:name,label:name+' '+actualType,time:time,memo:memo,slType:actualType};
}else{
  newEntry={name:name,slType:actualType,time:time,memo:memo,label:name+' '+actualType};
}
calData[key][idx]=newEntry;
saveCalData();closeModal();showToast('更新しました');renderCalendar();
}

function saveEditJob(ds,idx){
var key=calType+'_'+ds;
if(!calData[key])return;
var newEntry;
if(calType==='schedule'){
  var cl=document.getElementById('jb-client')?.value.trim();
  if(!cl){showToast('お客様名を入力');return;}
  newEntry={type:'big',client:cl,fromPlace:document.getElementById('jb-from')?.value.trim()||'',toPlace:document.getElementById('jb-to')?.value.trim()||'',weight:document.getElementById('jb-weight')?.value.trim()||'',time:document.getElementById('jb-time')?.value.trim()||'',memo:document.getElementById('jb-memo')?.value.trim()||'',label:cl};
}else if(calType==='warehouse'){
  var cl=document.getElementById('jb-client')?.value.trim();
  if(!cl){showToast('お客様名を入力');return;}
  var whTypeSel=document.getElementById('jb-whtype').value;
  var actualWhType=whTypeSel;
  if(whTypeSel==='__custom__'){
    actualWhType=document.getElementById('jb-whtype-custom')?.value.trim();
    if(!actualWhType){showToast('作業内容を入力');return;}
  }
  newEntry={client:cl,whType:actualWhType,qty:document.getElementById('jb-qty')?.value.trim()||'',time:document.getElementById('jb-time')?.value.trim()||'',assignee:document.getElementById('jb-assignee')?.value.trim()||'',memo:document.getElementById('jb-memo')?.value.trim()||'',label:cl};
}else if(calType==='sales'){
  var nm=document.getElementById('jb-name')?.value.trim();
  if(!nm){showToast('名前を入力');return;}
  var typeSel=document.getElementById('jb-sltype').value;
  var actualType=typeSel;
  if(typeSel==='__custom__'){
    actualType=document.getElementById('jb-custom')?.value.trim();
    if(!actualType){showToast('内容を入力');return;}
  }
  newEntry={name:nm,slType:actualType,partner:document.getElementById('jb-partner')?.value.trim()||'',place:document.getElementById('jb-place')?.value.trim()||'',time:document.getElementById('jb-time')?.value.trim()||'',memo:document.getElementById('jb-memo')?.value.trim()||'',label:nm+' '+actualType};
}else if(calType==='charter'){
  // 同日チャーター編集
  var cl=document.getElementById('jb-client')?.value.trim();
  if(!cl){showToast('お客様名を入力');return;}
  var ctypeEl=document.querySelector('input[name="jb-ctype"]:checked');
  newEntry={charterType:ctypeEl?ctypeEl.value:'自社',client:cl,fromPlace:document.getElementById('jb-from')?.value.trim()||'',toPlace:document.getElementById('jb-to')?.value.trim()||'',pickupDate:document.getElementById('jb-pickup-date')?.value||ds,deliveryDate:document.getElementById('jb-delivery-date')?.value||ds,weight:document.getElementById('jb-weight')?.value.trim()||'',vehicle:document.getElementById('jb-vehicle')?.value.trim()||'',delegate:document.getElementById('jb-delegate')?.value.trim()||'',memo:document.getElementById('jb-memo')?.value.trim()||'',label:cl,chId:calData[key][idx].chId};
  // 配達日が変更され複数日になった場合は旧データを削除して再配置する必要がある
  if(newEntry.pickupDate!==ds||(newEntry.deliveryDate&&newEntry.deliveryDate!==ds)){
    // 一旦削除して、addJob風に再登録
    calData[key].splice(idx,1);
    if(!calData[key].length)delete calData[key];
    var chId=newEntry.chId||'ch_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
    newEntry.chId=chId;
    var pKey=calType+'_'+newEntry.pickupDate;
    if(!calData[pKey])calData[pKey]=[];
    calData[pKey].push(Object.assign({},newEntry,{phase:'pickup'}));
    if(newEntry.deliveryDate&&newEntry.deliveryDate!==newEntry.pickupDate){
      var dKey=calType+'_'+newEntry.deliveryDate;
      if(!calData[dKey])calData[dKey]=[];
      calData[dKey].push(Object.assign({},newEntry,{phase:'delivery'}));
    }
    saveCalData();closeModal();showToast('更新しました');renderCalendar();
    return;
  }
}
calData[key][idx]=newEntry;
saveCalData();closeModal();showToast('更新しました');renderCalendar();
}

// エントリ削除
function deleteEntry(ds,idx){
dexConfirm('この予定を削除しますか？',{title:'予定を削除',okText:'削除する',type:'danger'}).then(function(ok){
if(!ok)return;
var key=calType+'_'+ds;
var e=calData[key][idx];
// チャーターで複数日の場合は両方削除
if(e&&e.chId){
  Object.keys(calData).forEach(function(k){
    if(!k.startsWith(calType+'_'))return;
    calData[k]=calData[k].filter(function(x){return x.chId!==e.chId;});
    if(!calData[k].length)delete calData[k];
  });
}else{
  calData[key].splice(idx,1);
  if(!calData[key].length)delete calData[key];
}
saveCalData();closeModal();showToast('削除しました');renderCalendar();
});
}

}

function saveEditCharter(chId){
var cl=document.getElementById('jb-client')?.value.trim();
if(!cl){showToast('お客様名を入力');return;}
var pickupDate=document.getElementById('jb-pickup-date')?.value;
if(!pickupDate){showToast('集荷日を入力');return;}
var deliveryDate=document.getElementById('jb-delivery-date')?.value||'';
var ctypeEl=document.querySelector('input[name="jb-ctype"]:checked');
var ctype=ctypeEl?ctypeEl.value:'自社';
var baseData={charterType:ctype,client:cl,fromPlace:document.getElementById('jb-from')?.value.trim()||'',toPlace:document.getElementById('jb-to')?.value.trim()||'',pickupDate:pickupDate,deliveryDate:deliveryDate||pickupDate,weight:document.getElementById('jb-weight')?.value.trim()||'',vehicle:document.getElementById('jb-vehicle')?.value.trim()||'',delegate:document.getElementById('jb-delegate')?.value.trim()||'',memo:document.getElementById('jb-memo')?.value.trim()||'',chId:chId,label:cl};

// 既存のchIdレコードを全て削除
Object.keys(calData).forEach(function(k){
  if(!k.startsWith('charter_'))return;
  calData[k]=calData[k].filter(function(x){return x.chId!==chId;});
  if(!calData[k].length)delete calData[k];
});
// 集荷日に登録
var pKey='charter_'+pickupDate;
if(!calData[pKey])calData[pKey]=[];
calData[pKey].push(Object.assign({},baseData,{phase:'pickup'}));
// 配達日が異なる場合のみ
if(deliveryDate&&deliveryDate!==pickupDate){
  var dKey='charter_'+deliveryDate;
  if(!calData[dKey])calData[dKey]=[];
  calData[dKey].push(Object.assign({},baseData,{phase:'delivery'}));
}
saveCalData();closeModal();showToast('更新しました');renderCalendar();
}

function deleteCharter(chId){
dexConfirm('このチャーター案件を削除しますか？<br><span style="font-size:12px;color:#9ca3af">集荷日・配達日の両方から削除されます</span>',{title:'チャーター案件を削除',okText:'削除する',type:'danger'}).then(function(ok){

  if(!calData[k].length)delete calData[k];
});
saveCalData();closeModal();showToast('削除しました');renderCalendar();
});
}

function saveAddJob(ds){
var key=calType+'_'+ds;
if(!calData[key])calData[key]=[];
if(calType==='schedule'){
  var cl=document.getElementById('jb-client')?.value.trim();
  if(!cl){showToast('お客様名を入力');return;}
  calData[key].push({type:'big',client:cl,fromPlace:document.getElementById('jb-from')?.value.trim()||'',toPlace:document.getElementById('jb-to')?.value.trim()||'',weight:document.getElementById('jb-weight')?.value.trim()||'',time:document.getElementById('jb-time')?.value.trim()||'',memo:document.getElementById('jb-memo')?.value.trim()||'',label:cl});
}else if(calType==='warehouse'){
  var cl=document.getElementById('jb-client')?.value.trim();
  if(!cl){showToast('お客様名を入力');return;}
  var whTypeSel=document.getElementById('jb-whtype').value;
  var actualWhType=whTypeSel;
  if(whTypeSel==='__custom__'){
    actualWhType=document.getElementById('jb-whtype-custom')?.value.trim();
    if(!actualWhType){showToast('作業内容を入力');return;}
  }
  calData[key].push({client:cl,whType:actualWhType,qty:document.getElementById('jb-qty')?.value.trim()||'',time:document.getElementById('jb-time')?.value.trim()||'',assignee:document.getElementById('jb-assignee')?.value.trim()||'',memo:document.getElementById('jb-memo')?.value.trim()||'',label:cl});
}else if(calType==='sales'){
  var nm=document.getElementById('jb-name')?.value.trim();
  if(!nm){showToast('名前を入力');return;}
  var typeSel=document.getElementById('jb-sltype').value;
  var actualType=typeSel;
  if(typeSel==='__custom__'){
    actualType=document.getElementById('jb-custom')?.value.trim();
    if(!actualType){showToast('内容を入力');return;}
  }
  calData[key].push({name:nm,slType:actualType,partner:document.getElementById('jb-partner')?.value.trim()||'',place:document.getElementById('jb-place')?.value.trim()||'',time:document.getElementById('jb-time')?.value.trim()||'',memo:document.getElementById('jb-memo')?.value.trim()||'',label:nm+' '+actualType});
}else if(calType==='charter'){
  var cl=document.getElementById('jb-client')?.value.trim();
  if(!cl){showToast('お客様名を入力');return;}
  var pickupDate=document.getElementById('jb-pickup-date')?.value||ds;
  var deliveryDate=document.getElementById('jb-delivery-date')?.value||'';
  var ctypeEl=document.querySelector('input[name="jb-ctype"]:checked');
  var ctype=ctypeEl?ctypeEl.value:'自社';
  var delegate=document.getElementById('jb-delegate')?.value.trim()||'';
  var fromPlace=document.getElementById('jb-from')?.value.trim()||'';
  var toPlace=document.getElementById('jb-to')?.value.trim()||'';
  var weight=document.getElementById('jb-weight')?.value.trim()||'';
  var vehicle=document.getElementById('jb-vehicle')?.value.trim()||'';
  var memo=document.getElementById('jb-memo')?.value.trim()||'';
  // 集荷案件ID（集荷日と配達日を繋ぐ共通ID）
  var chId='ch_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
  var baseData={charterType:ctype,client:cl,fromPlace:fromPlace,toPlace:toPlace,pickupDate:pickupDate,deliveryDate:deliveryDate||pickupDate,weight:weight,vehicle:vehicle,delegate:delegate,memo:memo,chId:chId,label:cl};
  // 集荷日に登録
  var pKey=calType+'_'+pickupDate;
  if(!calData[pKey])calData[pKey]=[];
  calData[pKey].push(Object.assign({},baseData,{phase:'pickup'}));
  // 配達日が異なる場合、そちらにも登録
  if(deliveryDate&&deliveryDate!==pickupDate){
    var dKey=calType+'_'+deliveryDate;
    if(!calData[dKey])calData[dKey]=[];
    calData[dKey].push(Object.assign({},baseData,{phase:'delivery'}));
  }
}
saveCalData();closeModal();showToast('追加しました');renderCalendar();
}

// イベントの表示フォーマット
function formatCalEvent(e){
var result={icon:'●',color:'#03968F',lightBg:'#ecfdf5',text:e.label||'',sub:'',meta:'',chId:e.chId||null,phase:e.phase||null};
if(e.type==='absence'){
  result.icon='🌴';result.color='#ea580c';result.lightBg='#fff7ed';
  result.text=(e.name||'')+' '+(e.slType||e.label||'休み');
  result.sub=e.time||'終日';
  if(e.memo)result.meta=e.memo;
}else if(e.type==='big'){
  result.icon='';result.color='#2563eb';result.lightBg='#dbeafe';
  result.text=e.client||e.label||'';
  var subParts=[];
  if(e.fromPlace&&e.toPlace)subParts.push(e.fromPlace+' → '+e.toPlace);
  if(e.weight)subParts.push(e.weight);
  if(e.time)subParts.push(e.time);
  result.sub=subParts.join(' / ');
  if(e.memo)result.meta=e.memo;
}else if(e.whType){
  result.icon='🏭';result.color='#03968F';result.lightBg='#f3e8ff';
  result.text=e.client||'';
  var subParts=[];
  if(e.whType)subParts.push(e.whType);
  if(e.qty)subParts.push(e.qty);
  if(e.time)subParts.push(e.time);
  result.sub=subParts.join(' / ');
  var metaParts=[];
  if(e.assignee)metaParts.push('👤 '+e.assignee);
  if(e.memo)metaParts.push(e.memo);
  result.meta=metaParts.join(' / ');
}else if(e.slType){
  result.icon='👤';result.color='#0891b2';result.lightBg='#e0e7ff';
  result.text=(e.name||'')+' '+(e.slType||'');
  var subParts=[];
  if(e.partner)subParts.push(e.partner);
  if(e.time)subParts.push(e.time);
  result.sub=subParts.join(' / ');
  var metaParts=[];
  if(e.place)metaParts.push('📍 '+e.place);
  if(e.memo)metaParts.push(e.memo);
  result.meta=metaParts.join(' / ');
}else if(e.charterType){
  // 集荷/配達のphase区別
  var isPickup=e.phase==='pickup';
  var isDelivery=e.phase==='delivery';
  var isSameDay=!e.deliveryDate||e.deliveryDate===e.pickupDate;
  if(isDelivery&&!isSameDay){
    result.icon='🏁';result.color='#ea580c';result.lightBg='#fff7ed';
    result.text='配達: '+(e.client||'');
  }else if(isPickup&&!isSameDay){
    result.icon='🚛';result.color='#14b8a6';result.lightBg='#ccfbf1';
    result.text='集荷: '+(e.client||'');
  }else{
    result.icon='🚚';result.color='#14b8a6';result.lightBg='#ccfbf1';
    result.text=e.client||'';
  }
  var subParts=[];
  if(e.fromPlace&&e.toPlace)subParts.push(e.fromPlace+' → '+e.toPlace);
  if(e.weight)subParts.push(e.weight);
  if(e.vehicle)subParts.push(e.vehicle);
  result.sub=subParts.join(' / ');
  if(e.delegate)result.meta='🤝 '+e.delegate;
}
return result;
}

function brAreaSave(aid){
  var br=currentRoute;
  var mode=window._brAreaMode||'dispatch';
  var rootName=mode==='dispatch'?'areaMasters':'dispatchAreas';
  var name=document.getElementById('br-am-name').value.trim();
  if(!name){showToast('名称を入力してください');return;}
  var data={
    name:name,
    pickupKeywords:document.getElementById('br-am-pickup').value.trim(),
    deliveryKeywords:document.getElementById('br-am-delivery').value.trim(),
    order:parseInt(document.getElementById('br-am-order').value)||0,
    updatedAt:Date.now()
  };
  if(!aid)data.createdAt=Date.now();
  var ref=aid?db.ref(rootName+'/'+br+'/'+aid):db.ref(rootName+'/'+br).push();
  ref.set(data).then(function(){
    closeModal();
    showToast(aid?'更新しました':'登録しました');
    setTimeout(renderBranchAreaSettings,200);
  }).catch(function(err){showToast('エラー: '+(err.message||err));});
}

function brAreaDelete(aid){
  var br=currentRoute;
  var mode=window._brAreaMode||'dispatch';
  var rootName=mode==='dispatch'?'areaMasters':'dispatchAreas';
  var rootObj=mode==='dispatch'?areaMasters:(typeof dispatchAreasMaster!=='undefined'?dispatchAreasMaster:{});
  var a=rootObj[br]&&rootObj[br][aid];
  if(!a)return;
  if(!confirm('「'+(a.name||'')+'」を削除しますか？'))return;
  db.ref(rootName+'/'+br+'/'+aid).remove().then(function(){
    closeModal();
    showToast('削除しました');
    setTimeout(renderBranchAreaSettings,200);
  }).catch(function(err){showToast('エラー: '+(err.message||err));});
}

}

function editAkadaArea(idx){
var a=idx>=0?akadaAreas[idx]:{id:'area_'+Date.now(),name:'',prefs:[],cities:[]};
var h='<div class="modal-head"><div class="modal-title">'+(idx<0?'新規エリア':'エリア編集')+'</div><button class="modal-x" onclick="closeModal()">×</button></div>';
h+='<div class="modal-body">';

h+='<div class="field"><label>対象市（カンマ区切り）</label><textarea id="ak-area-cities" style="min-height:80px" placeholder="例：岡山市,倉敷市,総社市">'+esc((a.cities||[]).join(','))+'</textarea></div>';

h+='</div>';

if(idx>=0){h+='<button class="mfbtn del" style="margin-right:auto" onclick="deleteAkadaArea('+idx+')">削除</button>';}
h+='<button class="mfbtn cancel" onclick="closeModal()">キャンセル</button><button class="mfbtn save" onclick="saveAkadaArea('+idx+')">保存</button></div>';
showModal(h);
}

function saveAkadaArea(idx){
var name=(document.getElementById('ak-area-name').value||'').trim();
if(!name){showToast('エリア名を入力');return;}
var prefs=(document.getElementById('ak-area-prefs').value||'').split(/[,、]/).map(function(s){return s.trim();}).filter(Boolean);
var cities=(document.getElementById('ak-area-cities').value||'').split(/[,、]/).map(function(s){return s.trim();}).filter(Boolean);
var areaData={id:idx>=0?akadaAreas[idx].id:'area_'+Date.now(),name:name,prefs:prefs,cities:cities};
if(idx>=0){akadaAreas[idx]=areaData;}else{akadaAreas.push(areaData);}
saveAkadaAreas();
closeModal();
showToast('保存');
renderAkada();
}

function deleteAkadaArea(idx){
dexConfirm('このエリアを削除しますか？',{title:'エリアを削除',okText:'削除する',type:'danger'}).then(function(ok){
if(!ok)return;
var id=akadaAreas[idx].id;
akadaAreas.splice(idx,1);
saveAkadaAreas();
if(akadaTab===id)akadaTab=(akadaAreas[0]?akadaAreas[0].id:'area');
closeModal();
showToast('削除しました');
renderAkada();
});
}

try{localStorage.setItem('dex_akada_areas',JSON.stringify(akadaAreas));}catch(e){}
db.ref('akada_areas').set(akadaAreas).catch(function(){});
}
