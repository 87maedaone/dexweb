<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かもめ便 見積システム（CFS貨物専用）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#2487ff; --blue-d:#1771ea; --ink:#1d3557; --ink2:#4f6f92;
  --bg:#f5f9ff; --line:#d9ebff; --soft:#f7fbff; --muted:#6d8fb3;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);display:flex;min-height:100vh}
button{font-family:inherit}

/* ===== Sidebar ===== */
.sidebar{width:250px;min-width:250px;background:linear-gradient(180deg,#eaf5ff,#d9efff);
  padding:26px 18px;border-right:1px solid #d7e8f7;display:flex;flex-direction:column}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;padding-left:4px}
.logo .gico{width:48px;height:48px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(40,90,150,.12);overflow:hidden}
.logo .gico img{width:42px;height:42px;object-fit:contain}
.logo h1{font-size:30px;color:var(--blue);font-weight:900;letter-spacing:.5px}
.menu{display:flex;flex-direction:column;gap:10px}
.menu-item{background:#fff;padding:14px 16px;border-radius:15px;font-size:15.5px;color:#2d6cdf;cursor:pointer;
  transition:.18s;box-shadow:0 4px 10px rgba(0,0,0,.03);font-weight:500;border:1px solid transparent}
.menu-item:hover{transform:translateY(-2px);box-shadow:0 8px 16px rgba(40,90,150,.10)}
.menu-item.active{background:var(--blue);color:#fff;box-shadow:0 8px 18px rgba(36,135,255,.35)}

/* ===== Main ===== */
.main{flex:1;padding:28px 30px;min-width:0}
.topbar{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:26px;flex-wrap:wrap;gap:10px}
.topbar h2{font-size:32px;font-weight:900}
.topbar h2 span{color:var(--blue);font-size:22px;font-weight:700}
.user{color:var(--ink2);font-size:14px;background:#fff;padding:9px 16px;border-radius:999px;
  box-shadow:0 3px 10px rgba(40,90,150,.06)}

/* ===== Cards / grid ===== */
.grid{display:grid;grid-template-columns:1.15fr 1fr;gap:24px;align-items:start}
.card{background:#fff;border-radius:22px;padding:24px;box-shadow:0 10px 25px rgba(40,90,150,.06);margin-bottom:22px}
.card-title{font-size:22px;margin-bottom:18px;color:#1f4c8c;font-weight:700;display:flex;align-items:center;gap:8px}
.card-title .sub{font-size:13px;color:var(--muted);font-weight:500}

textarea{width:100%;height:300px;border:2px solid var(--line);border-radius:16px;padding:18px;resize:vertical;
  font-size:15px;outline:none;line-height:1.8;color:#355070;font-family:inherit}
textarea:focus{border-color:var(--blue)}
.submit-btn{margin-top:16px;width:100%;border:none;background:linear-gradient(90deg,#2f8cff,#1771ea);color:#fff;
  font-size:21px;padding:17px;border-radius:15px;cursor:pointer;font-weight:700;transition:.18s}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 10px 22px rgba(36,135,255,.32)}
.submit-btn:active{transform:translateY(0)}

/* parsed fields */
.parsed{margin-top:16px;border-top:1px dashed var(--line);padding-top:14px}
.parsed h5{font-size:13px;color:var(--muted);margin-bottom:10px;font-weight:700}
.pf{display:flex;gap:10px;padding:7px 0;font-size:14px;align-items:flex-start}
.pf .k{color:var(--muted);min-width:84px;font-weight:500}
.pf .v{color:var(--ink);font-weight:500;flex:1}
.tag{display:inline-block;font-size:12px;padding:3px 10px;border-radius:999px;font-weight:700;margin-right:6px}
.tag.imp{background:#e3f6e9;color:#1f9d55}
.tag.exp{background:#e3eeff;color:#2d6cdf}
.tag.mode{background:#fff3e0;color:#d98324}

/* ===== Result ===== */
.result-wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.result-box{background:var(--soft);border:2px solid var(--line);border-radius:18px;padding:24px 18px;text-align:center}
.result-box h4{color:#4b78a7;font-size:16px;margin-bottom:12px;font-weight:700}
.price{font-size:48px;color:var(--blue);font-weight:900;line-height:1.1;letter-spacing:-1px}
.date{font-size:30px;font-weight:900;color:var(--blue);line-height:1.3}
.date .lead{display:inline-block;font-size:14px;background:var(--blue);color:#fff;padding:3px 12px;border-radius:999px;margin-top:8px}
.note{margin-top:14px;color:var(--muted);font-size:13px;line-height:1.8}
.note b{color:var(--ink);font-weight:700}
.toolbar{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.tbtn{border:1px solid var(--line);background:#fff;color:#2d6cdf;padding:9px 16px;border-radius:12px;
  cursor:pointer;font-size:13px;font-weight:500}
.tbtn:hover{background:#f0f7ff}
.teach-banner{background:#fff8ec;border:2px solid #ffe3b0;border-radius:16px;padding:18px;color:#a9701f;line-height:1.8;font-size:14px}
.teach-banner b{color:#8a5a12}

/* ===== AI / sensei ===== */
.ai-box{background:var(--soft);border:2px solid var(--line);border-radius:20px;padding:20px;display:flex;gap:16px;align-items:flex-start}
.ai-box .gimg{width:104px;min-width:104px}
.ai-content{flex:1;min-width:0}
.ai-content h3{color:var(--blue);margin-bottom:8px;font-size:19px;font-weight:700;display:flex;align-items:center;gap:6px}
.ai-content .advice{color:#4f6f92;line-height:1.9;font-size:14px;white-space:pre-wrap}
.chips{margin-top:14px;display:flex;flex-wrap:wrap;gap:8px}
.chips button{border:1px solid #cfe5ff;background:#fff;color:#2d6cdf;padding:8px 14px;border-radius:999px;
  cursor:pointer;font-size:13px;transition:.15s}
.chips button:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.chatlog{margin-top:14px;display:flex;flex-direction:column;gap:10px;max-height:340px;overflow-y:auto;padding-right:4px}
.bub{padding:11px 15px;border-radius:14px;font-size:14px;line-height:1.7;max-width:88%;white-space:pre-wrap}
.bub.me{align-self:flex-end;background:var(--blue);color:#fff;border-bottom-right-radius:4px}
.bub.ai{align-self:flex-start;background:#fff;border:1px solid var(--line);color:var(--ink);border-bottom-left-radius:4px}
.askrow{margin-top:14px;display:flex;gap:10px}
.askrow input{flex:1;border:2px solid var(--line);border-radius:12px;padding:12px 14px;font-size:14px;outline:none;font-family:inherit}
.askrow input:focus{border-color:var(--blue)}
.askrow button{border:none;background:var(--blue);color:#fff;padding:0 20px;border-radius:12px;cursor:pointer;font-weight:700;font-size:14px}
.typing{display:inline-flex;gap:4px}.typing span{width:7px;height:7px;border-radius:50%;background:#bcd6f2;animation:tp 1s infinite}
.typing span:nth-child(2){animation-delay:.15s}.typing span:nth-child(3){animation-delay:.3s}
@keyframes tp{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}

/* ===== Tables (rates / history) ===== */
.subtabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.subtabs button{border:1px solid var(--line);background:#fff;color:#2d6cdf;padding:9px 15px;border-radius:12px;cursor:pointer;font-size:13.5px;font-weight:500}
.subtabs button.on{background:var(--blue);color:#fff;border-color:var(--blue)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border:1px solid #e6f0fb;padding:8px 10px;text-align:center}
th{background:#eef6ff;color:#1f4c8c;font-weight:700;position:sticky;top:0}
td[contenteditable]{cursor:text}
td[contenteditable]:focus{outline:2px solid var(--blue);background:#f0f7ff}
.tbl-scroll{max-height:62vh;overflow:auto;border:1px solid #e6f0fb;border-radius:12px}
.hint{font-size:12.5px;color:var(--muted);margin:6px 0 16px;line-height:1.7}
.hint b{color:var(--ink)}
.rowbtn{border:none;background:var(--blue);color:#fff;padding:9px 16px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:500;margin:4px 6px 0 0}
.rowbtn.ghost{background:#fff;color:#2d6cdf;border:1px solid var(--line)}
.rowbtn.danger{background:#fff;color:#d9534f;border:1px solid #f3cccc}

/* history / dest cards */
.list{display:flex;flex-direction:column;gap:12px}
.litem{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px 18px;display:flex;justify-content:space-between;align-items:center;gap:14px}
.litem .li-main{min-width:0}
.litem .li-route{font-weight:700;color:var(--ink);font-size:15px}
.litem .li-sub{color:var(--muted);font-size:13px;margin-top:3px}
.litem .li-price{font-size:22px;color:var(--blue);font-weight:900;white-space:nowrap}
.empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:15px;line-height:1.9}
.empty img{width:120px;opacity:.85;margin-bottom:8px}

/* facts */
.facts{display:flex;flex-direction:column;gap:10px}
.fact{background:var(--soft);border:1px solid var(--line);border-radius:14px;padding:13px 16px;display:flex;gap:12px;align-items:flex-start;font-size:14px;line-height:1.8;color:var(--ink2)}
.fact .x{margin-left:auto;color:#d9534f;cursor:pointer;font-weight:700;background:none;border:none;font-size:16px}

/* ===== Modal ===== */
.modal-bg{position:fixed;inset:0;background:rgba(20,50,90,.4);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:22px;padding:26px;max-width:560px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 30px 70px rgba(0,0,0,.25)}
.modal h3{font-size:21px;color:#1f4c8c;margin-bottom:6px;font-weight:700}
.modal .close{float:right;font-size:24px;color:var(--ink2);background:none;border:none;cursor:pointer;line-height:1}
.modal label{display:block;font-size:13px;color:var(--ink2);margin:12px 0 5px;font-weight:700}
.modal input,.modal select,.modal textarea{width:100%;border:2px solid var(--line);border-radius:11px;padding:11px 13px;font-size:14px;outline:none;font-family:inherit}
.modal textarea{height:90px;resize:vertical}
.modal .save{margin-top:18px;width:100%;border:none;background:var(--blue);color:#fff;padding:14px;border-radius:13px;cursor:pointer;font-weight:700;font-size:16px}
.mtabs{display:flex;gap:8px;margin:14px 0 4px}
.mtabs button{flex:1;border:1px solid var(--line);background:#fff;color:#2d6cdf;padding:10px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:500}
.mtabs button.on{background:var(--blue);color:#fff;border-color:var(--blue)}

/* toast */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(40px);background:#1f4c8c;color:#fff;
  padding:13px 26px;border-radius:999px;font-size:14px;opacity:0;transition:.3s;z-index:80;box-shadow:0 10px 30px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.foot{text-align:center;color:#9bb6c8;font-size:11px;margin-top:30px}

@media(max-width:1100px){
  body{flex-direction:column}
  .sidebar{width:100%;min-width:0;flex-direction:row;flex-wrap:wrap;align-items:center;padding:16px}
  .logo{margin-bottom:0;margin-right:auto}
  .menu{flex-direction:row;flex-wrap:wrap}
    .grid,.result-wrap{grid-template-columns:1fr}
}
.ic{width:1.05em;height:1.05em;vertical-align:-0.16em;flex:none}
.menu-item .ic{width:19px;height:19px;vertical-align:-4px;margin-right:4px}
.tbtn .ic,.card-title .ic,.litem .ic{stroke-width:1.9}
h3 .ic,h4 .ic,h5 .ic{vertical-align:-0.18em}
.senseimini{width:24px;height:24px;border-radius:50%;object-fit:cover;vertical-align:-7px;background:#eaf3ff}
.taxnote{color:var(--muted);font-size:12px}
button .ic,.tbtn .ic{margin-right:5px}
.askrow button .ic{margin-right:3px}

/* ===== Image3-style polish ===== */
.top-actions{display:flex;align-items:center;gap:12px}
.topbtn{border:1px solid var(--line);background:#fff;color:#2d6cdf;padding:9px 15px;border-radius:999px;cursor:pointer;font-size:13px;font-weight:600}
.topbtn:hover{background:#f0f7ff}
.user .ic{vertical-align:-4px;margin-right:4px}
.card-title .step{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;
  background:var(--blue);color:#fff;font-size:15px;font-weight:900;margin-right:4px}
.card-title .ic{color:var(--blue)}
.card-sub{color:var(--muted);font-size:13px;margin:-10px 0 14px 2px}
.pf .ck{color:#27ae60;display:inline-flex;flex:none;margin-top:2px}
.pf .ck .ic{width:16px;height:16px;stroke-width:2.4}
.bd{margin-top:14px;border-top:1px solid var(--line);padding-top:10px;display:flex;flex-direction:column;gap:6px;text-align:left}
.bd-row{display:flex;justify-content:space-between;gap:12px;font-size:13px;color:var(--ink2)}
.bd-row span:last-child{font-weight:700;color:var(--ink);white-space:nowrap}
.result-box h4 .ic{color:var(--blue);width:20px;height:20px}
.lead-big{font-size:30px;font-weight:900;background:none;color:var(--blue);padding:0;border-radius:0}
.date .lead-big+.lead{margin-top:10px}
.points{background:#eef6ff;border:1px solid #d6e8ff;border-radius:16px;padding:16px 18px;margin-top:16px}
.points .pt-head{display:flex;align-items:center;gap:7px;color:#1f4c8c;font-weight:700;font-size:14px;margin-bottom:8px}
.points .pt-head .ic{color:#f0a93b}
.points .pt{color:#4f6f92;font-size:13.5px;line-height:1.9}

/* sensei block: mascot on right + speech bubble */
.ai-box{align-items:stretch}
.ai-box .ai-content{order:1}
.ai-box .sensei-big{order:2;width:118px;min-width:118px;align-self:flex-end;margin-left:6px}
.ai-head{display:flex;align-items:center;gap:8px;color:var(--blue);font-weight:700;font-size:17px;margin-bottom:10px}
.bubble{position:relative;background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 15px;
  color:#4f6f92;line-height:1.9;font-size:14px;white-space:pre-wrap;box-shadow:0 3px 10px rgba(40,90,150,.05)}
.bubble:after{content:'';position:absolute;right:-9px;bottom:18px;border:8px solid transparent;border-left-color:#fff}
@media(max-width:520px){ .ai-box{flex-direction:column} .ai-box .sensei-big{align-self:center;order:0;margin:0 0 8px} .bubble:after{display:none} }
.lead-xl{font-size:46px;font-weight:900;color:var(--blue);line-height:1.15;margin:4px 0}
.mail-btn{font-size:17px;padding:14px}
.mail-btn .ic{width:20px;height:20px}
.teach-card{display:flex;flex-direction:column;gap:14px}
.chatfeed{background:#f5f9ff;border:1px solid var(--line);border-radius:14px;padding:14px;min-height:280px;max-height:55vh;overflow:auto;display:flex;flex-direction:column;gap:10px}
.cf-row{display:flex;align-items:flex-end;gap:8px}
.cf-row.me{justify-content:flex-end}
.cf-row.bot .senseimini{width:28px;height:28px;align-self:flex-start;margin-top:2px}
.cf-bubble{max-width:78%;padding:11px 14px;border-radius:14px;line-height:1.7;font-size:14.5px;box-shadow:0 2px 6px rgba(40,90,150,.06)}
.cf-bubble.me{background:var(--blue);color:#fff;border-bottom-right-radius:4px}
.cf-bubble.bot{background:#fff;color:#1f4c8c;border:1px solid var(--line);border-bottom-left-radius:4px}
.cf-text{white-space:pre-wrap;word-break:break-word}
.cf-time{font-size:11px;color:var(--muted);margin:0 4px 2px}
.cf-stored{margin-top:8px;color:#1aa05b;font-size:12.5px;display:flex;align-items:center;gap:5px}
.cf-stored .ic{color:#1aa05b;width:14px;height:14px}
.teach-input{display:flex;flex-direction:column;gap:10px}
.teach-input textarea{min-height:110px;resize:vertical;padding:12px 14px;border:1px solid var(--line);border-radius:12px;font-family:inherit;font-size:14.5px;line-height:1.7}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="logo">
    <div class="gico"><img id="logoGull" alt="かもめ"></div>
    <h1>かもめ便</h1>
  </div>
  <nav class="menu" id="menu">
    <div class="menu-item active" data-v="home"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg> ホーム</div>
    <div class="menu-item" data-v="history"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3h7l5 5v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M14 3v5h5M9 13h6M9 17h6"/></svg> 見積履歴</div>
    <div class="menu-item" data-v="dest"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 16V6a1 1 0 0 1 1-1h10v11M14 8h4l3 3v5h-7"/><circle cx="7.5" cy="17.5" r="1.8"/><circle cx="17.5" cy="17.5" r="1.8"/></svg> よく使う配送先</div>
    <div class="menu-item" data-v="rates"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5a2 2 0 0 1 2-2h12v18H6a2 2 0 0 1-2-2V5z"/><path d="M8 7h7M8 11h7"/></svg> 料金・ルール集</div>
    <div class="menu-item" data-v="sensei"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2.2"/><path d="M12 7.2V21M5 13a7 7 0 0 0 14 0M5 13H3m16 0h2"/></svg> かもめ先生に相談</div>
    <div class="menu-item" data-v="teach"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg> かもめ先生に教える</div>
    <div class="menu-item" data-v="settings"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.4 1a7 7 0 0 0-1.7-1L14.5 2h-5l-.3 2.5a7 7 0 0 0-1.7 1l-2.4-1-2 3.5L3.1 11a7 7 0 0 0 0 2l-2 1.5 2 3.5 2.4-1a7 7 0 0 0 1.7 1l.3 2.5h5l.3-2.5a7 7 0 0 0 1.7-1l2.4 1 2-3.5-2-1.5a7 7 0 0 0 .1-1z"/></svg> 設定</div>
  </nav>
</aside>

<main class="main">
  <div id="view"></div>
  <div class="foot">かもめ便 見積システム（社内用） / 料金は社内料金表に基づく概算です</div>
</main>

<div class="modal-bg" id="modalBg"><div class="modal" id="modalBox"></div></div>
<div class="toast" id="toast"></div>

// ============================================================
//  ストレージ層：window.storage（Claude/永続）→ localStorage（社内ホスト時）→ メモリ
// ============================================================
const Store = (() => {
  const mem = {};
  const has = typeof window !== 'undefined' && window.storage && window.storage.get;
  return {
    async get(k){
      try{
        if(has){ const r=await window.storage.get(k,false); return r?JSON.parse(r.value):null; }
        if(window.localStorage){ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }
      }catch(e){ return mem[k]!==undefined?mem[k]:null; }
      return mem[k]!==undefined?mem[k]:null;
    },
    async set(k,val){
      const s=JSON.stringify(val); mem[k]=val;
      try{
        if(has){ await window.storage.set(k,s,false); return; }
        if(window.localStorage){ localStorage.setItem(k,s); }
      }catch(e){}
    }
  };
})();

// ============================================================
let DB = JSON.parse(JSON.stringify(SEED));
let HISTORY = [];
let DESTS = [];
let lastQuote = null;
let CHAT = [];

async function boot(){
  const SCHEMA = 'kamome_v6_nagoya_clean';
  const saved = await Store.get('kamome_db');
  if(saved && saved.__schema===SCHEMA){
    DB = Object.assign(JSON.parse(JSON.stringify(SEED)), saved);
  } else {
    DB = JSON.parse(JSON.stringify(SEED));
  }
  DB.__schema = SCHEMA;
  HISTORY = (await Store.get('kamome_history')) || [];
  DESTS = (await Store.get('kamome_dests')) || [];
  render('home');
}
const saveDB   = () => Store.set('kamome_db', DB);
const saveHist = () => Store.set('kamome_history', HISTORY);
const saveDest = () => Store.set('kamome_dests', DESTS);

const PREFS = ["北海道","青森県","岩手県","宮城県","秋田県","山形県","福島県","茨城県","栃木県","群馬県","埼玉県","千葉県","東京都","神奈川県","新潟県","富山県","石川県","福井県","山梨県","長野県","岐阜県","静岡県","愛知県","三重県","滋賀県","京都府","大阪府","兵庫県","奈良県","和歌山県","鳥取県","島根県","岡山県","広島県","山口県","徳島県","香川県","愛媛県","高知県","福岡県","佐賀県","長崎県","熊本県","大分県","宮崎県","鹿児島県","沖縄県"];

function grab(text, keys){
  // キーは「引取」と「引き取り」のような送り仮名違いも自動で許容
  const flex = k => k.replace(/引取/g,'引き?取り?').replace(/届け/g,'届け?').replace(/集荷/g,'集荷?');
  for(const k0 of keys){
    const k = flex(k0);
    // ① 【label】 値 …
    const re1 = new RegExp('【\\s*'+k+'\\s*(?:CFS|CY)?\\s*】\\s*([\\s\\S]*?)(?=【|<|>|$)','');
    let m = text.match(re1);
    if(m && m[1].trim()) return m[1].trim().replace(/\n+/g,' ').trim();
    // ② <label> 値 …  /  <<label>> 値 …  /  [label] 値 …
    const re2 = new RegExp('[<\\[]+\\s*'+k+'\\s*(?:CFS|CY)?\\s*[>\\]]+\\s*([\\s\\S]*?)(?=[<\\[]|【|$)','');
    m = text.match(re2);
    if(m && m[1].trim()) return m[1].trim().replace(/\n+/g,' ').trim();
    // ③ ラベル：値（同一行）
    const re3 = new RegExp(k+'\\s*(?:CFS|CY|港|埠頭|ふ頭|ターミナル)?\\s*[:：]\\s*([^\\n]+)');
    m = text.match(re3);
    if(m) return m[1].trim();
    // ④ ラベルが単独行 → 次の非空行を値として採用（搬入先\n神戸港… 形式）
    const re4 = new RegExp('(?:^|\\n)[\\s　]*'+k+'(?:CFS|CY|港|埠頭|ふ頭|ターミナル)?[\\s　]*\\n+\\s*([^\\n]+)','');
    m = text.match(re4);
    if(m) return m[1].trim();
  }
  return '';
}
function detectPref(addr){ for(const p of PREFS){ if(addr && addr.includes(p)) return p; } return ''; }
function detectCity(addr){
  if(!addr) return '';
  let a=addr;
  for(const p of PREFS){ if(a.includes(p)){ a=a.slice(a.indexOf(p)+p.length); break; } }
  if(a.includes('23区')||addr.includes('23区')) return '都内23区';
  const m = a.match(/^([一-龥ヶ々ぁ-んァ-ヶー]+?[市区町村郡])/) || a.match(/([一-龥ヶ々ぁ-んァ-ヶー]+?[市区町村郡])/);
  return m?m[1]:'';
}
let _cityToPref=null;
function prefFromCity(city){
  if(!city) return '';
  if(!_cityToPref){
    _cityToPref={};
    const cz=(typeof DB!=='undefined'&&DB.cityZone)||{};
    for(const pref in cz){ for(const c in cz[pref]){
      if(_cityToPref[c]===undefined) _cityToPref[c]=pref;
      else if(_cityToPref[c]!==pref) _cityToPref[c]='__AMBIG__';
    }}
  }
  const r=_cityToPref[city];
  return (r && r!=='__AMBIG__') ? r : '';
}
function num(s){ if(!s) return 0; const m=String(s).replace(/[,，]/g,'').match(/([\d.]+)/); return m?parseFloat(m[1]):0; }

function stripBoiler(text){
  // 全角英数記号→半角、全角スペース→半角（数値・寸法・郵便番号の読み取り向上）
  let t = text.replace(/[！-～]/g, ch=>String.fromCharCode(ch.charCodeAt(0)-0xFEE0)).replace(/　/g,' ');
  // 矢印の表記ゆれを「→」に統一（→ ⇒ ⟶ -> => ⇨ 》 など）
  t = t.replace(/⇒|⟶|⇨|=>|->|‐>|―>/g,'→');
  // 冒頭・末尾の挨拶定型文を文単位で除去（解析・表示のノイズ削減）
  const pats=[
    /[^。\n]*いつも[^。\n]*お世話[^。\n]*。?/g,
    /[^。\n]*お世話になっております。?/g,
    /[^。\n]*下記[^。\n]*(見積|お見積)[^。\n]*。?/g,
    /[^。\n]*(宜し|よろし)く?お願い[^。\n]*。?/g,
    /[^。\n]*ご確認[^。\n]*(ほど|程)[^。\n]*。?/g,
    /^[\s]*(拝啓|敬具).*$/gm
  ];
  pats.forEach(p=>{ t=t.replace(p,''); });
  return t.replace(/^\s*\n/gm,'\n');
}
function parseMail(rawText){
  const text = stripBoiler(rawText);
  let pickup = grab(text,['引取先','集荷先','積地','集荷','引取','搬出先','発地']);
  let dest   = grab(text,['配送先','納品先','届け先','配達先','着地','搬入先','納入先','届先']);
  const cargo  = grab(text,['貨物','品名','内容','商品','貨物内容']);
  let wRaw   = grab(text,['重量','総重量','グロス','重さ']);
  let vRaw   = grab(text,['容積','才数','M3','立米','CBM','才','VOL','vol']);
  const due    = grab(text,['希望納期','納期','納品希望','着日','希望日','配達希望','着']);

  // --- 「A 〜 B まで」「A から B まで」形式の補完（B＝着地, A＝集荷地） ---
  if(!dest){
    let m = text.match(/[～〜~][\s　]*([^\n～〜~]+?)[\s　]*まで/);
    if(!m) m = text.match(/から[\s　]*([^\n]+?)[\s　]*まで/);
    if(m) dest = m[1].trim();
  }
  // A〜B の A 側（集荷地）を pickup が薄いときに補完
  if(!pickup || pickup.length<4){
    const m = text.match(/([^\n～〜~]+?)[\s　]*[～〜~][\s　]*[^\n]*?まで/);
    if(m && m[1].trim() && !/^(集荷先|引取先|発地|搬出先)$/.test(m[1].trim())) pickup = m[1].trim();
  }
  // pickup がラベル語だけ等で不十分なら、住所/郵便番号付きの行で上書き
  if(!pickup || pickup.length<4 || /^[\s　]*[～〜~]/.test(pickup)){
    const m = text.match(/(?:集荷先|引取先|発地|搬出先)[\s　]*[:：][\s　]*([^\n]+)/);
    if(m) pickup = m[1].trim();
  }
  // 着地が拾えていないが本文に港/CFSがあれば、それを着地候補にする
  const PORT = /港|cfs|cy|埠頭|ふ頭|ターミナル|バンプール|コンテナヤード|南港/i;
  // 「A〜B」「A→B」表記：港側を判定して振り分ける（例：あわら市→大阪港 / あわら市〜大阪港）
  if(!pickup || !dest){
    const tm = text.match(/([^\n、,~～〜→]+?)\s*[~～〜→]\s*([^\n、,~～〜→]+)/);
    if(tm){
      const L=tm[1].trim(), R=tm[2].trim();
      const Lport=PORT.test(L), Rport=PORT.test(R);
      if(Rport && !Lport){ pickup=pickup||L; dest=dest||R; }       // 内陸→港（輸出）
      else if(Lport && !Rport){ dest=dest||R; pickup=pickup||L; }   // 港→内陸（輸入）
      else { pickup=pickup||L; dest=dest||R; }
    }
  }
  if(!dest){
    const m = text.match(/([^\n、,]*?(?:港|CFS|CY|ターミナル)[^\n、,]*)/i);
    if(m) dest = m[1].trim();
  }
  // ラベルに CFS/CY/港/埠頭 等が付く側は「港」とみなす（例：「搬入先CFS:神戸」は神戸＝港）
  const destPortLabeled   = /(?:配送先|納品先|届け?先|配達先|着地|搬入先|納入先|届先)\s*(?:CFS|CY|港|埠頭|ふ頭|ターミナル)/i.test(text);
  const pickupPortLabeled = /(?:引取先|引き取り先|集荷先|積地|集荷|引取|引き取り|搬出先|発地)\s*(?:CFS|CY|港|埠頭|ふ頭|ターミナル)/i.test(text);

  // 「住所：…」「所在地：…」が別行にある場合、港でない側へ割り当てる
  const addrM = text.match(/(?:住所|所在地|アドレス)\s*[:：]\s*([^\n]+)/);
  if(addrM){
    const addr = addrM[1].trim();
    const pIsPort = PORT.test(pickup) || pickupPortLabeled;
    const dIsPort = PORT.test(dest)   || destPortLabeled;
    if((!pickup || pickup.length<6) && (dIsPort || !dest)) pickup = addr;
    else if((!dest || dest.length<6) && pIsPort) dest = addr;
    else if(!pickup) pickup = addr;
  }

  // --- 重量（インライン kg 対応）---
  let weight = num(wRaw);
  if(!weight){ const m=text.match(/([\d,]+(?:\.\d+)?)\s*(?:kg|ｋｇ|KG|キロ|㎏)/i); if(m){ weight=num(m[1]); wRaw=m[0]; } }
  // --- 容積（1.1 CBM / 1.1 M3 / 才 対応）---
  let vol = num(vRaw);
  if(!vol){ const m=text.match(/([\d.]+)\s*(?:CBM|M3|m3|㎥|立米|CMB)/i); if(m){ vol=parseFloat(m[1]); vRaw=m[0]; } }
  // --- 寸法（縦×横×高さ、ラベル混在可）から容積を算出 ---
  if(!vol){
    let seg = (text.match(/(?:寸法|サイズ|外寸|3辺|三辺)\s*[:：]?\s*([^\n]+)/)||[])[1];
    if(!seg){ const dm=text.match(/[\d.]+\s*[×xX*][\s\S]{0,6}?[\d.]+\s*[×xX*][\s\S]{0,6}?[\d.]+[^\n]*/); if(dm) seg=dm[0]; }
    if(seg && /[×xX*]/.test(seg)){
      // 寸法以降のコメント/重量を切り捨てる（例：「1.20 x 1.00 x 1.00 mtrs // 300 kg」）
      const segCore = seg.split(/\/\/|kg|ｋｇ|㎏/i)[0];
      const nums=(segCore.match(/\d+(?:\.\d+)?/g)||[]).slice(0,3).map(Number);
      if(nums.length>=3){
        let div=100; // 既定 cm
        if(/mm/i.test(segCore)) div=1000;
        else if(/cm/i.test(segCore)) div=100;
        else if(/(mtrs|meter|metre|\bm\b|ｍ)/i.test(segCore) && nums.every(n=>n<10)) div=1;
        const m3=(nums[0]/div)*(nums[1]/div)*(nums[2]/div);
        const qty=(text.match(/(\d+)\s*(?:枚|個|口|PLT|Pallet|pallet|ケース|箱)/i)||[])[1];
        vol=+(m3*(qty?parseInt(qty):1)).toFixed(3);
        vRaw=segCore.trim()+`（約${vol}m³）`;
      }
    }
  }

  const lc = (pickup+' '+dest+' '+cargo+' '+text).toLowerCase();
  // 輸入/輸出 判定（ルール：港発＝輸入、港着＝輸出）。CFS/港ラベルが付く側も港とみなす
  const pickupIsPort = PORT.test(pickup) || pickupPortLabeled;
  const destIsPort   = PORT.test(dest)   || destPortLabeled;
  let trade='輸入';
  if(pickupIsPort)      trade='輸入';   // 港発 → 輸入
  else if(destIsPort)   trade='輸出';   // 港着 → 輸出

  // チャーター/混載 判定
  let mode='混載';
  if(/コンテナ|container|\d+\s*ft|チャーター|貸切|車建て|10t車|大型/i.test(cargo) || /コンテナ|チャーター|貸切/i.test(lc)) mode='チャーター';
  if(weight>3000) mode='チャーター';

  // 車格
  let vehicle='';
  if(/10\s*t|10ｔ|10トン|10TON|40\s*ft|40ft/i.test(cargo)) vehicle='10TON';
  else if(/4\s*t|4ｔ|4トン|4TON|20\s*ft|20ft/i.test(cargo)) vehicle='4TON';
  else if(/2\s*t|2トン|2TON/i.test(cargo)) vehicle='2TON';

  // 料金算定の基準は「内陸側」：輸入＝着地、輸出＝集荷地
  const inland = (trade==='輸出') ? pickup : dest;
  let pref = detectPref(inland), city = detectCity(inland);
  // 都道府県が書かれていない場合は市区町村名から逆引き（例：あわら市→福井県）
  if(!pref && city) pref = prefFromCity(city);
  // 東京23区の正規化
  const TOKYO23=/^(千代田|中央|港|新宿|文京|台東|墨田|江東|品川|目黒|大田|世田谷|渋谷|中野|杉並|豊島|北|荒川|板橋|練馬|足立|葛飾|江戸川)区$/;
  if(pref==='東京都' && TOKYO23.test(city)) city='都内23区';

  // --- 発着港の確認（料金表は大阪港・神戸港＝阪神港のみ対応） ---
  const rawPort = (trade==='輸出') ? dest : pickup;
  const portLabeled = (trade==='輸出') ? destPortLabeled : pickupPortLabeled;
  const isPortRef = portLabeled || /港|CFS|CY|埠頭|ふ頭|ターミナル/i.test(rawPort);
  const HANSHIN_CITY = /大阪|神戸|阪神|南港/;
  const NAGOYA_CITY  = /名古屋|名港|金城/;
  const OTHER_CITY   = /東京|横浜|川崎|四日市|清水|博多|門司|北九州|下関|広島|水島|那覇|新潟|仙台|苫小牧|千葉|大分|敦賀|舞鶴|境港|徳山/;
  let portKind='unknown', portName='', portSide=rawPort;
  if(HANSHIN_CITY.test(rawPort)){
    portKind='hanshin';
    if(portLabeled && !/港|CFS|CY/i.test(rawPort)){
      portSide = /神戸/.test(rawPort)?'神戸港' : /大阪/.test(rawPort)?'大阪港' : rawPort.trim()+'港';
    }
  } else if(NAGOYA_CITY.test(rawPort)){
    portKind='nagoya';
    if(portLabeled && !/港|CFS|CY/i.test(rawPort)) portSide='名古屋港';
  } else if(isPortRef){
    const om = rawPort.match(OTHER_CITY);
    if(om){ portKind='other'; portName=om[0].replace(/港$/,'')+'港'; portSide=portName; }
    else if(portLabeled && !/港|CFS|CY/i.test(rawPort)){ portSide=rawPort.trim()+'（CFS）'; }
  }

  return {
    pickup, dest, cargo, weight, vol,
    weightText:wRaw, volText:vRaw, due,
    trade, mode, vehicle, inland,
    pref, city, portSide, portKind, portName
  };
}

function leadLabel(days){
  if(days<=0) return '翌日着';
  if(days===1) return '中1日';
  if(days===2) return '中2日';
  return '中'+days+'日';
}
function leadDate(days, dueText){
  // 受注日(今日)＋発送翌日着想定。days=中日数
  const base = new Date();
  base.setDate(base.getDate() + 1 + (days<=0?0:days));
  const w=['日','月','火','水','木','金','土'][base.getDay()];
  return `${base.getMonth()+1}月${base.getDate()}日（${w}）`;
}
function lclLookup(g, zi, weight, vol){
  const kg=g.kg, vcol=(g.vol||g.m3||[]);
  // 重量行
  let rw=0; for(let i=0;i<kg.length;i++){ rw=i; if(weight<=kg[i]) break; }
  // 容積換算行（m3 ≒ 面積/容積列）
  let rv=0; if(vol>0 && vcol.length){ for(let i=0;i<vcol.length;i++){ rv=i; if(vol<=vcol[i]) break; } }
  const row=Math.max(rw,rv);
  const over = weight>kg[kg.length-1];
  return { price: g.grid[row][zi], usedKg: kg[row], byVolume: rv>rw, over };
}

function matchLearnedRate(p){
  const arr = DB.learnedRates || [];
  for(const x of arr){
    if(x.trade && x.trade!==p.trade) continue;
    if(x.mode  && x.mode !==p.mode ) continue;
    if(x.pref  && x.pref !==p.pref ) continue;
    if(x.cityIncludes && !((p.city||'').includes(x.cityIncludes) || (p.dest||'').includes(x.cityIncludes))) continue;
    if(x.maxWeight && p.weight>x.maxWeight) continue;
    if(x.minWeight && p.weight<x.minWeight) continue;
    return x;
  }
  return null;
}

function portDataset(portKind){
  const ports = (DB.ports||{});
  const ds = ports[portKind];
  if(ds) return ds;
  // フォールバック（旧シード互換）：トップレベル参照
  return { lclGrids:DB.lclGrids, prefRegion:DB.prefRegion, cityZone:DB.cityZone, prefDefault:DB.prefDefault };
}

function matchAreaNotes(p, r){
  const notes = DB.areaNotes || [];
  const hay = `${p.dest||''} ${p.pickup||''} ${p.inland||''} ${p.city||''}`;
  const ds = portDataset(p.portKind);
  for(const n of notes){
    if(n.trade && n.trade!==p.trade) continue;
    if(n.region && ds.prefRegion[p.pref]!==n.region) continue;
    if(n.prefs && !n.prefs.includes(p.pref)) continue;
    if(n.cities && !n.cities.some(c=>hay.includes(c))) continue;
    if(n.keywords && !n.keywords.some(k=>hay.includes(k))) continue;
    if(n.islandsOnly && !r.islandX) continue;
    if(!r.notes.includes(n.note)) r.notes.push(n.note);
  }
}

function quote(p){
  const tax = DB.taxRate;
  const r = { ok:false, mode:p.mode, trade:p.trade, base:0, highway:0, other:0,
              breakdown:[], leadDays:1, zone:'', notes:[], needTeach:false, taxIncl:0 };

  // 納期（輸入/輸出 別。無ければ県別目安、無ければ翌日）
  const lt = (DB.leadByTrade && DB.leadByTrade[p.trade]) || {};
  let lead = (p.pref && lt[p.pref]!==undefined) ? lt[p.pref]
           : (p.pref && DB.leadTimeByPrefecture[p.pref]!==undefined) ? DB.leadTimeByPrefecture[p.pref]
           : 1;
  r.leadDays = lead;
  const ltText = (DB.leadTextByTrade && DB.leadTextByTrade[p.trade]) || {};
  r.leadText = (p.pref && ltText[p.pref]) ? ltText[p.pref] : '';

  // --- 学習済みレート（料金表に無いエリア/特例の実績ルート）を最優先で照合 ---
  const lr = matchLearnedRate(p);
  if(lr){
    r.base=lr.base||0; r.highway=lr.highway||0; r.other=lr.other||0; r.ok=true;
    r.zone = lr.zone||'';
    if(lr.lead!==undefined) r.leadDays = lr.lead;
    r.amPossible = !!lr.amPossible;
    r.breakdown.push(['基本運賃（'+(lr.note||'学習済みルート')+'）', r.base]);
    if(r.highway) r.breakdown.push(['高速道路代', r.highway]);
    if(r.other)   r.breakdown.push(['その他費用', r.other]);
    const sub0=r.base+r.highway+r.other; r.subtotal=sub0; r.taxIncl=Math.round(sub0*(1+tax));
    return r;
  }

  // --- 発着港の確認：料金表は大阪港・神戸港(阪神港)のみ ---
  if(p.portKind==='other'){
    r.needTeach=true; r.port=p.portName;
    r.notes.push(`${p.portName}発着のため自動算出していません。現在の料金表は大阪港・神戸港(阪神港)・名古屋港のみ対応です。`);
    r.subtotal=0; r.taxIncl=0;
    return r;
  }

  // --- チャーター / コンテナ ---
  if(p.mode==='チャーター'){
    // 関西圏ゾーンに該当するか
    const pref=p.pref, city=p.city;
    const cz = (DB.charterZoneMap[pref]||{})[city];
    if(cz && DB.charterZoneRate[cz]){
      r.zone=cz;
      const veh = p.vehicle || (p.weight>3000?'10TON':'4TON');
      const idx = veh==='2TON'?0:veh==='4TON'?1:2;
      let base = DB.charterZoneRate[cz][idx];
      if(base==null){ r.needTeach=true; r.notes.push(`ゾーン${cz}の${veh}は料金表に設定なし。かもめ先生に教えてください。`); }
      else{
        r.base=base; r.ok=true;
        r.breakdown.push(['基本運賃（チャーター ゾーン'+cz+' '+veh+'）',base]);
        if(/神戸/.test(p.dest)||/神戸/.test(p.pickup)){ r.other+=5000; r.breakdown.push(['神戸港 搬出入加算',5000]); }
      }
    } else {
      // 長距離学習ルートを照合
      const lh = (DB.longHaulCharter||[]).find(x=> p.pickup.includes(x.from.replace('港','')) && x.toPref===pref )
              || (DB.longHaulCharter||[]).find(x=> x.toPref===pref);
      if(lh){
        r.base=lh.base; r.highway=lh.highway||0; r.ok=true;
        r.leadDays = lh.lead!==undefined?lh.lead:lead;
        r.breakdown.push(['基本運賃（'+(lh.note||'チャーター長距離')+'）',lh.base]);
        if(lh.highway) r.breakdown.push(['高速道路代',lh.highway]);
      } else {
        r.needTeach=true;
        r.notes.push(`「${pref||p.dest}」へのチャーター/コンテナ料金は未登録です。`);
      }
    }
  }
  // --- 混載 ---
  else {
    const pref=p.pref, city=p.city;
    const ds = portDataset(p.portKind);
    const region = ds.prefRegion[pref];
    const portTitle = p.portKind==='nagoya' ? '名古屋港' : '阪神港';
    if(!region){
      r.needTeach=true;
      r.notes.push(`「${pref||p.dest}」は${portTitle}の対応エリア外です。かもめ先生に料金を教えてください。`);
    } else {
      const grids = (p.trade==='輸出')?ds.lclGrids.export:ds.lclGrids.import;
      const g = grids[region];
      if(!g){
        r.needTeach=true;
        r.notes.push(`${portTitle}${region}の${p.trade}混載料金表がありません。`);
      } else {
        let zone = (ds.cityZone[pref]||{})[city];
        let estimated=false;
        if(!zone){ zone = ds.prefDefault[pref]; estimated=true; }
        if(zone==='X'){
          r.needTeach=true; r.islandX=true;
          r.notes.push(`「${pref} ${city||''}」（離島等）は個別見積です。`);
        } else {
          const zi = g.zones.indexOf(zone);
          if(zi<0){
            r.needTeach=true;
            r.notes.push(`ゾーン${zone}は${portTitle}${region}(${p.trade})表にありません。`);
          } else {
            const lk = lclLookup(g, zi, p.weight, p.vol);
            r.base=lk.price; r.ok=true; r.zone=zone; r.region=region; r.portTitle=portTitle;
            r.breakdown.push([`基本運賃（${portTitle} 混載 ${p.trade}・${region} ゾーン${zone} / ${lk.usedKg}kg枠${lk.byVolume?'・容積換算':''}）`, lk.price]);
            if(estimated) r.notes.push(`「${city||pref}」は地図に個別記載がないため県代表ゾーン(${zone})で概算しています。要確認。`);
            if(lk.over) r.notes.push(`重量が混載上限(${g.kg[g.kg.length-1]}kg)を超過。チャーターの方が適切な可能性があります。`);
          }
        }
      }
    }
  }

  // エリア別の注意事項（淡路島・西牟婁郡・関空・四国・離島など）を付与
  matchAreaNotes(p, r);

  // 発着港が大阪/神戸と明記されていない場合の確認喚起（算出はする）
  if(r.ok && p.portKind==='unknown'){
    r.notes.push('発着港が大阪港・神戸港か、メール本文をご確認ください（料金表は阪神港のみ対応）。');
  }

  const sub = r.base + r.highway + r.other;
  r.subtotal = sub;
  r.taxIncl = Math.round(sub * (1+tax));
  return r;
}

function runQuote(){
  const ta=$('#mail');
  const raw=ta.value.trim();

  // 冒頭の挨拶定型文を入力欄からも除去（邪魔なので消す）
  const cleaned = stripBoiler(raw).replace(/^\s+/,'').replace(/\n{3,}/g,'\n\n').trim();
  if(cleaned && cleaned!==raw){ ta.value=cleaned; }
  const text=cleaned||raw;
  const p=parseMail(text);
  const r=quote(p);
  lastQuote={p,r,text};
  $('#parsed').innerHTML=parsedHTML(p);
  $('#result').innerHTML=resultHTML(p,r);

function autoSaveHistory(){
  if(!lastQuote || !lastQuote.r.ok) return;
  const{p,r}=lastQuote;
  const sig=`${p.pickup}|${p.dest}|${r.subtotal}|${p.weight}`;
  const top=HISTORY[0];
  if(top && `${top.pickup}|${top.dest}|${top.price}|${top.weight}`===sig) return; // 直近と同一なら重複保存しない

}

function submitTeach(){
  const ta=$('#teachInput'); const text=(ta.value||'').trim();
  if(!text){ toast('内容を入力してください'); return; }
  DB.teachLog = DB.teachLog || [];
  DB.teachLog.push({role:'user', text, when:Date.now()});
  ta.value=''; saveDB();
  // 自動判別：長文 or 「→」「:」「？/?」を含む → Q&A、それ以外はメモ
  const isQA = text.length>=40 || /→|⇒|:：\s*[^\s]|[?？]/.test(text);
  let storedText='';
  if(isQA){
    // 「Q→A」「Q：A」「？(改行)…」をなるべく分割。失敗時は丸ごとQ&A化
    let q='', a='';
    const m1 = text.match(/^([\s\S]*?[?？])\s*([\s\S]+)$/);
    const m2 = text.match(/^([\s\S]*?)[→⇒]\s*([\s\S]+)$/);
    const m3 = text.match(/^([\s\S]*?)[:：]\s*([\s\S]+)$/);
    const m = m2 || m1 || m3;
    if(m){ q=m[1].trim(); a=m[2].trim(); } else { q='(メモ)'; a=text; }
    const fact = `Q：${q}\nA：${a}`;
    DB.learnedFacts = DB.learnedFacts || [];
    DB.learnedFacts.unshift(fact);
    storedText = `「${a.length>40?a.slice(0,38)+'…':a}」を Q&A として記憶しました。今後の質問でこのルールを使います。`;
  } else {
    DB.learnedFacts = DB.learnedFacts || [];
    DB.learnedFacts.unshift(text);
    storedText = `「${text}」をメモとして記憶しました。`;
  }
  saveDB();
  DB.teachLog.push({role:'bot', kind: isQA?'qa':'memo', text:storedText, stored:true, when:Date.now()});
  saveDB();
  render('teach');
  setTimeout(()=>{ const f=$('#teachFeed'); if(f) f.scrollTop=f.scrollHeight; },50);
}
function clearTeachLog(){
  if(!confirm('教えた会話の履歴をクリアしますか？（記憶した内容自体は残ります）')) return;
  DB.teachLog=[]; saveDB(); render('teach');
}

function senseiKnowledge(){
  const d=DB;
  const facts=(d.learnedFacts||[]).map(f=>'・'+f).join('\n');
  const routes=(d.longHaulCharter||[]).map(x=>`・${x.from}→${x.toPref}：基本${x.base}円 高速${x.highway||0}円`).join('\n');
  const rates=(d.learnedRates||[]).map(x=>`・${x.trade}/${x.mode} ${x.pref||''}${x.cityIncludes||''}（〜${x.maxWeight||'∞'}kg）：基本${x.base}円 高速${x.highway||0}円`).join('\n');
  let ctx='';
  if(lastQuote){ const{p,r}=lastQuote;
    ctx=`\n【直近の見積もり】\n引取:${p.pickup} / 配送:${p.dest} / 区分:${p.trade}・${p.mode} / 重量:${p.weight}kg\n結果:${r.ok?('税別'+r.subtotal+'円・納期'+(r.leadText||leadLabel(r.leadDays))):'自動算出不可'}`;
  }
  return `あなたは運送会社「かもめ便」のベテラン配車担当AI「かもめ先生」です。船長帽をかぶった親しみやすいカモメのキャラクターです。絵文字は使わず、簡潔で丁寧な敬語で答えます。CFS貨物（港〜内陸の国内輸送）の専門家です。
【料金表（公式）】混載は阪神港(大阪港/神戸港 共通) 24DK01(輸入)/24EX01(輸出)。輸入は全国7地域(関西/中部北陸/関東/中四国/九州/東北/北海道)、輸出は5地域(関西/中部北陸/関東/中四国/九州)に対応。重量と容積(m³)の重い方の枠で算定。混載は大阪港・神戸港で同一料金のため神戸港加算は無し（神戸港+¥5,000はチャーター・横持ちのみ）。輸入＝着地のエリア、輸出＝集荷地のエリアでゾーン判定。料金表は阪神港(大阪港・神戸港)発着のみ。東京港・横浜港・名古屋港など他港の発着は料金未提供のため自動算出せず、必ずその旨を伝える。
【覚えているルール】\n${facts}
【長距離チャーター料金】\n${routes}
【学習済みエリア運賃】\n${rates}
【消費税】${Math.round((d.taxRate||0.1)*100)}%${ctx}
分からない料金は推測せず「料金表に無いので教えてほしい」と正直に伝えてください。回答は3〜5文程度で。`;
}

async function ask(q){
  q=(q||'').trim(); if(!q) return;
  const inp=$('#askInput'); if(inp) inp.value='';
  pushBub('me',q);
  const log=$('#chatlog');
  const wait=document.createElement('div'); wait.className='bub ai';
  wait.innerHTML='<span class="typing"><span></span><span></span><span></span></span>';
  log.appendChild(wait); log.scrollTop=log.scrollHeight;
  CHAT.push({role:'user',content:q});
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:senseiKnowledge(),
        messages:CHAT.slice(-10)
      })
    });
    const data=await res.json();
    const txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim()
      || 'うまく答えられませんでした。もう一度お願いします。';
    wait.remove(); pushBub('ai',txt); CHAT.push({role:'assistant',content:txt});
  }catch(e){
    wait.remove();
    pushBub('ai','（通信エラー）チャット機能はClaude上で動作します。社内サーバーで使う場合はAPIの接続設定が必要です。');
  }
}
function pushBub(who,txt){
  const log=$('#chatlog'); if(!log) return;
  const b=document.createElement('div'); b.className='bub '+who; b.textContent=txt;
  log.appendChild(b); log.scrollTop=log.scrollHeight;
}

  const{p,r}=lastQuote;
  HISTORY.unshift({ when:new Date().toISOString(), pickup:p.pickup,dest:p.dest,
    trade:p.trade,mode:p.mode,weight:p.weight,price:r.subtotal,lead:(r.leadText||leadLabel(r.leadDays)) });
  saveHist(); toast('履歴に保存しました');
}
function renderHistory(){
  const rows=HISTORY.map((h,i)=>`<div class="litem">
    <div class="li-main">
      <div class="li-route">${esc(h.pickup||'?')} → ${esc(h.dest||'?')}</div>
      <div class="li-sub">${esc(h.trade)}・${esc(h.mode)} / ${h.weight||0}kg / 納期 ${esc(h.lead)} / ${new Date(h.when).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
    </div>
    <div class="li-price">${yen(h.price)}</div>
  </div>`).join('');
  return `<div class="topbar"><h2>見積履歴</h2><div class="user">${HISTORY.length}件</div></div>
  <div class="card">
    ${HISTORY.length?`<div class="list">${rows}</div><div class="toolbar"><button class="rowbtn danger" onclick="clearHistory()">履歴をすべて削除</button></div>`
      :`<div class="empty"><img class="gimg" alt=""><br>まだ履歴がありません。<br>見積もり結果の「履歴に保存」から追加できます。</div>`}
  </div>`;
}
function clearHistory(){ if(confirm('履歴をすべて削除しますか？')){ HISTORY=[]; saveHist(); render('history'); toast('削除しました'); } }

// ============================================================
//  よく使う配送先
// ============================================================
function saveDestFromQuote(){
  if(!lastQuote){ toast('先に見積もりを出してください'); return; }
  const{p}=lastQuote;
  DESTS.unshift({ name:p.dest, pref:p.pref, city:p.city, trade:p.trade, mode:p.mode });
  saveDest(); toast('配送先を登録しました');
}
function renderDest(){
  const rows=DESTS.map((d,i)=>`<div class="litem">
    <div class="li-main">
      <div class="li-route">${esc(d.name||'?')}</div>
      <div class="li-sub">${esc(d.pref||'')} ${esc(d.city||'')} / ${esc(d.trade||'')}・${esc(d.mode||'')}</div>
    </div>
    <button class="rowbtn ghost" onclick="useDest(${i})">この宛先で見積もり</button>
  </div>`).join('');
  return `<div class="topbar"><h2>${IC.truck} よく使う配送先</h2><div class="user">${DESTS.length}件</div></div>
  <div class="card">
    ${DESTS.length?`<div class="list">${rows}</div>`
      :`<div class="empty"><img class="gimg" alt=""><br>登録された配送先はまだありません。<br>見積もり結果の「配送先を登録」から追加できます。</div>`}
  </div>`;
}
function useDest(i){ const d=DESTS[i]; render('home'); setTimeout(()=>{ const ta=$('#mail');
  if(ta){ ta.value=`【引取先】\n（港・CFS名を入力）\n\n【配送先】\n${d.name}\n\n【貨物内容】\n\n重量：kg\n\n【希望納期】\n`; ta.focus(); } },80); }

// ============================================================
//  料金・ルール集（編集＝記憶）
// ============================================================
function renderRatesShell(){
  return `<div class="topbar"><h2>料金・ルール集</h2><div class="user">セルを直接編集すると保存されます</div></div>
  <div class="card">
    <div class="subtabs" id="ratesubs">
      <button data-s="charter" onclick="rateSub('charter')">チャーター料金</button>
      <button data-s="lcl_imp" onclick="rateSub('lcl_imp')">混載（輸入）</button>
      <button data-s="lcl_exp" onclick="rateSub('lcl_exp')">混載（輸出）</button>
      <button data-s="yoko" onclick="rateSub('yoko')">横持ち</button>
      <button data-s="zone" onclick="rateSub('zone')">エリア→ゾーン</button>
      <button data-s="lead" onclick="rateSub('lead')">納期</button>
      <button data-s="rate" onclick="rateSub('rate')">学習済みエリア運賃</button>
      <button data-s="facts" onclick="rateSub('facts')">ルール集</button>
    </div>
    <div id="ratebody"></div>
  </div>`;
}
function rateSub(s){
  $$('#ratesubs button').forEach(b=>b.classList.toggle('on',b.dataset.s===s));
  const el=$('#ratebody');
  if(s==='charter') el.innerHTML=tblCharter();
  else if(s==='lcl_imp') el.innerHTML=tblLcl('imp');
  else if(s==='lcl_exp') el.innerHTML=tblLcl('exp');
  else if(s==='yoko') el.innerHTML=tblYoko();
  else if(s==='zone') el.innerHTML=tblZone();
  else if(s==='lead') el.innerHTML=tblLead();
  else if(s==='rate') el.innerHTML=tblRate();
  else if(s==='facts') el.innerHTML=tblFacts();
}
function ed(val,attr){ return `<td contenteditable ${attr}>${val==null?'':val}</td>`; }

function tblCharter(){
  const z=DB.charterZoneRate; const veh=['2t','4t','10t'];
  let rows=Object.keys(z).map(k=>`<tr><th>${k}</th>${z[k].map((v,i)=>`<td contenteditable data-z="${k}" data-i="${i}" oninput="editCharter(this)">${v==null?'':v}</td>`).join('')}</tr>`).join('');
  return `<div class="hint"><b>チャーター料金（ゾーン×車格）</b>。${esc(DB.charterNote||'')}</div>
  <div class="tbl-scroll"><table><tr><th>ゾーン</th>${veh.map(v=>`<th>${v}</th>`).join('')}</tr>${rows}</table></div>`;
}
let lclRegionCur={imp:'関西',exp:'関西'};
function tblLcl(kind){
  const trade = kind==='imp'?'import':'export';
  const regions = Object.keys(DB.lclGrids[trade]);
  if(!regions.includes(lclRegionCur[kind])) lclRegionCur[kind]=regions[0];
  const reg = lclRegionCur[kind];
  const g = DB.lclGrids[trade][reg];
  const picker = regions.map(rn=>`<button class="${rn===reg?'on':''}" onclick="setLclRegion('${kind}','${rn}')">${rn}</button>`).join('');
  let rows=g.grid.map((row,ri)=>`<tr><th>${g.kg[ri]}kg</th><td>${g.sai?g.sai[ri]:''}</td><td>${g.vol[ri]}</td>${row.map((c,zi)=>`<td contenteditable data-k="${kind}" data-reg="${reg}" data-r="${ri}" data-z="${zi}" oninput="editLcl(this)">${c==null?'':c}</td>`).join('')}</tr>`).join('');
  return `<div class="hint">混載 <b>${kind==='imp'?'輸入':'輸出'}</b>（公式エクセル 24DK01/24EX01）。重量行と容積(m³)換算の重い方を採用。<br>地域を選択：</div>
  <div class="subtabs">${picker}</div>
  <div class="tbl-scroll"><table><tr><th>重量</th><th>才</th><th>容積</th>${g.zones.map(z=>`<th>${z}</th>`).join('')}</tr>${rows}</table></div>`;
}
function setLclRegion(kind,reg){ lclRegionCur[kind]=reg; rateSub(kind==='imp'?'lcl_imp':'lcl_exp'); }
function tblYoko(){
  const y=DB.yokomochi||[];
  let rows=y.map((o,i)=>`<tr><th>${esc(o.route)}</th>
      <td contenteditable data-i="${i}" data-a="v4" data-j="0" oninput="editYoko(this)">${o.v4?o.v4[0]:''}</td>
      <td contenteditable data-i="${i}" data-a="v4" data-j="1" oninput="editYoko(this)">${o.v4?o.v4[1]:''}</td>
      <td contenteditable data-i="${i}" data-a="v10" data-j="0" oninput="editYoko(this)">${o.v10?o.v10[0]:''}</td>
      <td contenteditable data-i="${i}" data-a="v10" data-j="1" oninput="editYoko(this)">${o.v10?o.v10[1]:''}</td></tr>`).join('');
  return `<div class="hint"><b>横持ち運賃</b>（区分①/②）。${esc(DB.yokomochiNote||'')}</div>
  <div class="tbl-scroll"><table><tr><th>区間</th><th>4t①</th><th>4t②</th><th>10t①</th><th>10t②</th></tr>${rows}</table></div>`;
}
function tblZone(){
  let rows='';
  Object.keys(DB.cityZone).forEach(pref=>{
    const m=DB.cityZone[pref]; const reg=DB.prefRegion[pref]||'';
    Object.keys(m).forEach(city=>{
      rows+=`<tr><th>${pref}</th><td>${reg}</td><td>${city}</td><td contenteditable data-p="${pref}" data-c="${city}" oninput="editZone(this)">${m[city]}</td></tr>`;
    });
  });
  return `<div class="hint"><b>エリア→ゾーン対応</b>（料金表の都市別地図 P4-10 より）。X＝離島等の個別見積。<button class="rowbtn" onclick="openTeach('zone')">＋ ゾーンを追加</button></div>
  <div class="tbl-scroll"><table><tr><th>都道府県</th><th>地域</th><th>市区町村</th><th>ゾーン</th></tr>${rows}</table></div>`;
}
function tblLead(){
  const L=DB.leadTimeByPrefecture;
  let rows=Object.keys(L).map(p=>`<tr><th>${p}</th><td contenteditable data-p="${p}" oninput="editLead(this)">${L[p]}</td><td>${leadLabel(L[p])}</td></tr>`).join('');
  return `<div class="hint"><b>納期目安</b>（0=翌日着 / 1=中1日 / 2=中2日 …）</div>
  <div class="tbl-scroll"><table><tr><th>都道府県</th><th>中日数</th><th>表示</th></tr>${rows}</table></div>`;
}
function tblRate(){
  const arr=DB.learnedRates||[];
  let rows=arr.map((x,i)=>`<tr>
    <td>${esc(x.trade||'')}</td><td>${esc(x.mode||'')}</td><td>${esc(x.pref||'')}${esc(x.cityIncludes||'')}</td>
    <td>〜${x.maxWeight||'∞'}kg</td><td>${yen(x.base)}</td><td>${yen(x.highway||0)}</td>
    <td><button class="fact"><span class="x" onclick="delRate(${i})">×</span></button></td></tr>`).join('');
  return `<div class="hint"><b>学習済みエリア運賃</b>（料金表に無いエリア/特例の実績ルート）。<button class="rowbtn" onclick="openTeach('rate')">＋ 運賃を教える</button></div>
  ${arr.length?`<div class="tbl-scroll"><table><tr><th>区分</th><th>便種</th><th>エリア</th><th>上限重量</th><th>基本</th><th>高速</th><th></th></tr>${rows}</table></div>`:'<div class="empty">まだ登録がありません。</div>'}`;
}
function tblFacts(){
  const f=DB.learnedFacts||[];
  return `<div class="hint"><b>かもめ先生が覚えているルール・知識</b><button class="rowbtn" onclick="openTeach('fact')">＋ ルールを教える</button></div>
  <div class="facts">${f.map((x,i)=>`<div class="fact">${esc(x)}<button class="x" onclick="delFact(${i})">×</button></div>`).join('')}</div>`;
}

// ---- 編集ハンドラ（即保存） ----
function editCharter(td){ const z=td.dataset.z,i=+td.dataset.i; const n=parseInt(td.textContent.replace(/[^\d]/g,''))||null; DB.charterZoneRate[z][i]=n; saveDB(); }
function editLcl(td){ const trade=td.dataset.k==='imp'?'import':'export'; const reg=td.dataset.reg,r=+td.dataset.r,z=+td.dataset.z; DB.lclGrids[trade][reg].grid[r][z]=parseInt(td.textContent.replace(/[^\d]/g,''))||null; saveDB(); }
function editYoko(td){ const i=+td.dataset.i,a=td.dataset.a,j=+td.dataset.j; DB.yokomochi[i][a][j]=parseInt(td.textContent.replace(/[^\d]/g,''))||0; saveDB(); }
function editZone(td){ (DB.cityZone[td.dataset.p]=DB.cityZone[td.dataset.p]||{})[td.dataset.c]=td.textContent.trim().toUpperCase(); saveDB(); }
function editLead(td){ DB.leadTimeByPrefecture[td.dataset.p]=parseInt(td.textContent.replace(/[^\d-]/g,''))||0; saveDB(); }
function delFact(i){ DB.learnedFacts.splice(i,1); saveDB(); rateSub('facts'); toast('削除しました'); }
function delRate(i){ DB.learnedRates.splice(i,1); saveDB(); rateSub('rate'); toast('削除しました'); }

// ============================================================
//  かもめ先生に教える（モーダル）
// ============================================================
let teachTabCur='fact';
function openTeach(tab){ teachTabCur=tab||'fact'; openModal(teachHTML()); }
function teachTab(t){ teachTabCur=t; $('#modalBox').innerHTML=teachHTML(); }
function teachHTML(){
  const t=teachTabCur;
  const tabs=`<div class="mtabs">
    <button class="${t==='fact'?'on':''}" onclick="teachTab('fact')">ルール</button>
    <button class="${t==='zone'?'on':''}" onclick="teachTab('zone')">ゾーン</button>
    <button class="${t==='route'?'on':''}" onclick="teachTab('route')">長距離</button>
    <button class="${t==='rate'?'on':''}" onclick="teachTab('rate')">エリア運賃</button>
  </div>`;
  let body='';
  if(t==='fact'){ body=`<label>覚えてほしいルール・知識</label>
    <textarea id="t_fact" placeholder="例）東京港のCFSは午前持ち込みなら当日中に積込可能。"></textarea>
    <button class="save" onclick="teachFact()">記憶させる</button>`; }
  else if(t==='zone'){ body=`<label>都道府県</label><input id="t_pref" placeholder="例）愛知県">
    <label>市区町村</label><input id="t_city" placeholder="例）名古屋市">
    <label>ゾーン（A〜I）</label><input id="t_zone" placeholder="例）A">
    <button class="save" onclick="teachZone()">記憶させる</button>`; }
  else if(t==='route'){ body=`<label>引取港</label><input id="r_from" placeholder="例）大阪港">
    <label>配送先 都道府県</label><input id="r_pref" placeholder="例）東京都">
    <label>基本運賃（円）</label><input id="r_base" type="number" placeholder="128000">
    <label>高速代（円・通常は不要なら0）</label><input id="r_hw" type="number" placeholder="0">
    <label>納期（中日数 0=翌日）</label><input id="r_lead" type="number" placeholder="0">
    <label>メモ</label><input id="r_note" placeholder="20FTドライ・8.5t級 など">
    <button class="save" onclick="teachRoute()">記憶させる</button>`; }
  else { body=`<label>区分</label><select id="ra_trade"><option>輸入</option><option>輸出</option></select>
    <label>便種</label><select id="ra_mode"><option>混載</option><option>チャーター</option></select>
    <label>都道府県</label><input id="ra_pref" placeholder="例）愛知県">
    <label>市区町村に含む語（任意）</label><input id="ra_city" placeholder="例）名古屋">
    <label>上限重量kg（任意）</label><input id="ra_max" type="number" placeholder="1500">
    <label>基本運賃（円）</label><input id="ra_base" type="number" placeholder="26000">
    <label>高速代（円・通常は不要なら0）</label><input id="ra_hw" type="number" placeholder="0">
    <label>メモ</label><input id="ra_note" placeholder="名古屋市エリア 混載 など">
    <button class="save" onclick="teachRate()">記憶させる</button>`; }
  return `<button class="close" onclick="closeModal()">×</button>
    <h3><img class="senseimini" alt=""> かもめ先生に教える</h3>${tabs}${body}`;
}
function teachFact(){ const v=$('#t_fact').value.trim(); if(!v)return; (DB.learnedFacts=DB.learnedFacts||[]).unshift(v); saveDB(); closeModal(); toast('かもめ先生が覚えました'); }
function teachZone(){ const p=$('#t_pref').value.trim(),c=$('#t_city').value.trim(),z=$('#t_zone').value.trim().toUpperCase();
  if(!p||!c||!z)return; (DB.cityZone[p]=DB.cityZone[p]||{})[c]=z; saveDB(); closeModal(); toast('ゾーンを記憶しました'); }
function teachRoute(){ const o={from:$('#r_from').value.trim(),toPref:$('#r_pref').value.trim(),
  base:+$('#r_base').value||0,highway:+$('#r_hw').value||0,lead:+$('#r_lead').value||0,note:$('#r_note').value.trim()};
  if(!o.from||!o.toPref)return; (DB.longHaulCharter=DB.longHaulCharter||[]).unshift(o); saveDB(); closeModal(); toast('長距離ルートを記憶しました'); }
function teachRate(){ const o={trade:$('#ra_trade').value,mode:$('#ra_mode').value,pref:$('#ra_pref').value.trim(),
  cityIncludes:$('#ra_city').value.trim()||undefined,maxWeight:+$('#ra_max').value||undefined,
  base:+$('#ra_base').value||0,highway:+$('#ra_hw').value||0,note:$('#ra_note').value.trim()};
  if(!o.pref&&!o.cityIncludes)return; (DB.learnedRates=DB.learnedRates||[]).unshift(o); saveDB(); closeModal(); toast('エリア運賃を記憶しました'); }

// ============================================================
//  設定（バックアップ / 復元 / 初期化）
// ============================================================
function renderSettings(){
  return `<div class="topbar"><h2>設定</h2><div class="user">山田 花子 さん</div></div>
  <div class="card">
    <div class="card-title">${IC.save} データのバックアップ・引き継ぎ</div>
    <div class="hint">教えた料金・ルール・履歴をJSONファイルに書き出し／読み込みできます。社内サーバーへ移すときや、他のPCへ引き継ぐときに使ってください。</div>
    <button class="rowbtn" onclick="exportData()">書き出し（JSON）</button>
    <button class="rowbtn ghost" onclick="$('#importFile').click()">読み込み（JSON）</button>
    <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)">
  </div>
  <div class="card">
    <div class="card-title">${IC.trash} 初期化</div>
    <div class="hint">覚えた内容をすべて消し、初期の料金表に戻します。<b>元に戻せません。</b></div>
    <button class="rowbtn danger" onclick="resetAll()">すべて初期化する</button>
  </div>
  <div class="card">
    <div class="card-title">ℹ このシステムについて</div>
    <div class="hint">
      ・メールを貼り付けると、引取/配送/貨物/重量/納期を自動で読み取り、運賃と納期を算出します。<br>
      ・<b>港発＝輸入、港着＝輸出</b>で自動判定します。<br>
      ・料金表に無いエリアは「かもめ先生に教える」で登録すると、次回から自動算出されます（記憶は保存されます）。<br>
      ・かもめ先生チャットはClaude上で動作します。社内サーバーで使う場合はAPI接続の設定が必要です。
    </div>
  </div>`;
}
function exportData(){
  const blob=new Blob([JSON.stringify({db:DB,history:HISTORY,dests:DESTS},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='kamome-data-'+new Date().toISOString().slice(0,10)+'.json'; a.click(); toast('書き出しました');
}
function importData(ev){
  const f=ev.target.files[0]; if(!f)return; const fr=new FileReader();
  fr.onload=()=>{ try{ const o=JSON.parse(fr.result);
    if(o.db) DB=Object.assign(JSON.parse(JSON.stringify(SEED)),o.db);
    if(o.history) HISTORY=o.history; if(o.dests) DESTS=o.dests;
    saveDB();saveHist();saveDest(); render('settings'); toast('読み込みました');
  }catch(e){ toast('読み込みに失敗しました'); } }; fr.readAsText(f);
}
function resetAll(){ if(confirm('すべて初期化しますか？元に戻せません。')){
  DB=JSON.parse(JSON.stringify(SEED)); HISTORY=[]; DESTS=[]; CHAT=[];
  saveDB();saveHist();saveDest(); render('settings'); toast('初期化しました'); } }

// ============================================================
//  モーダル
// ============================================================
function openModal(html){ $('#modalBox').innerHTML=html; $('#modalBg').classList.add('show'); }
function closeModal(){ $('#modalBg').classList.remove('show'); }

// ============================================================
//  ナビ / 起動
// ============================================================
document.addEventListener('click',e=>{
  const mi=e.target.closest('#menu .menu-item'); if(mi) render(mi.dataset.v);
  if(e.target.id==='modalBg') closeModal();
});

window.runQuote=runQuote; window.ask=ask; window.render=render;
window.rateSub=rateSub; window.setLclRegion=setLclRegion; window.openTeach=openTeach; window.teachTab=teachTab;
window.teachFact=teachFact; window.teachZone=teachZone; window.teachRoute=teachRoute; window.teachRate=teachRate;
window.editCharter=editCharter; window.editLcl=editLcl; window.editYoko=editYoko; window.editZone=editZone; window.editLead=editLead;
window.delFact=delFact; window.delRate=delRate;
window.saveQuoteToHistory=saveQuoteToHistory; window.clearHistory=clearHistory;
window.saveDestFromQuote=saveDestFromQuote; window.useDest=useDest;
window.copyQuote=copyQuote; window.copyMail=copyMail; window.submitTeach=submitTeach; window.clearTeachLog=clearTeachLog; window.closeModal=closeModal;
window.exportData=exportData; window.importData=importData; window.resetAll=resetAll;

function copyMail(){
  if(!lastQuote || !lastQuote.r.ok){ toast('先に見積もりを出してください'); return; }
  const{p,r}=lastQuote;
  const txt=`新規案件のお問い合わせありがとうございます。\n\n${p.mode}便：${yen(r.subtotal)}-\n納期：${r.leadText||leadLabel(r.leadDays)}\n\n運賃・納期は上記になります。`;
  navigator.clipboard?.writeText(txt); toast('コピーしました');
}
function copyQuote(){ if(!lastQuote||!lastQuote.r.ok){toast('見積もりがありません');return;}
  const{p,r}=lastQuote;
  const txt=`【かもめ便 御見積】\n引取：${p.pickup}\n配送：${p.dest}\n区分：${p.trade}・${p.mode}\n運賃（税別）：${yen(r.subtotal)}\n納期：${leadLabel(r.leadDays)}（平日カウント・目安／正式な納期は別途ご連絡）`;
  navigator.clipboard?.writeText(txt); toast('コピーしました'); }

boot();

</script>
