<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:"Noto Sans JP",sans-serif;font-size:15px;background:#f9fafb;color:#1a1a1a}
#app{height:100%;display:flex}

/* SIDEBAR (mgmt.htmlと完全統一) */
.sidebar{width:240px;background:#fff;color:#374151;display:flex;flex-direction:column;flex-shrink:0;padding:24px 0;border-right:1px solid #e5e7eb;overflow-y:auto}
.sb-logo{padding:0 20px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #f3f4f6;margin-bottom:16px}
.sb-logo-mark{width:48px;height:48px;flex-shrink:0;border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;transition:transform .15s}
.sb-logo-mark:hover{transform:scale(1.06)}
.sb-logo-mark img{width:48px;height:48px;object-fit:contain;display:block}
.sb-logo-text{display:flex;flex-direction:column;line-height:1.2;cursor:pointer}
.sb-logo-main{font-family:"Noto Sans JP",sans-serif;font-weight:800;font-size:16px;color:#2F2C2C;letter-spacing:.2px}
.sb-logo-sub-text{font-size:10px;color:#9ca3af;font-weight:700;letter-spacing:1px;margin-top:2px}
.sb-section{padding:14px 20px 6px;font-size:10px;font-weight:700;letter-spacing:1.5px;color:#9ca3af;text-transform:uppercase}
.sb-back-dispatch{display:flex;align-items:center;gap:8px;margin:8px 12px 4px;padding:8px 14px;background:linear-gradient(135deg,#03968F 0%,#0AB8AE 100%);color:#fff;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;transition:all .15s;box-shadow:0 2px 6px rgba(3,150,143,.2)}
.sb-back-dispatch:hover{transform:translateX(-2px);box-shadow:0 4px 10px rgba(3,150,143,.3)}
.sb-branch{display:flex;align-items:center;gap:8px;margin:8px 12px 0;padding:10px 14px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:12px;cursor:pointer;position:relative;transition:all .15s}
.sb-branch:hover{background:#fff;border-color:#a7f3d0}
.sb-branch-icon{color:#6b7280;display:flex;align-items:center}
.sb-branch-label{font-size:12px;color:#6b7280;font-weight:600}
.sb-branch-select{flex:1;border:none;background:transparent;font-size:13px;font-weight:700;color:#2F2C2C;outline:none;font-family:inherit;cursor:pointer;appearance:none;-webkit-appearance:none;padding-right:18px}
.sb-branch-arrow{color:#9ca3af;position:absolute;right:14px;pointer-events:none}
.sb-logout{margin:auto 12px 14px;padding:12px 14px;background:transparent;border:1px solid transparent;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:12px;font-size:14px;font-weight:600;color:#6b7280;transition:all .15s}
.sb-logout:hover{background:#fef2f2;color:#dc2626;border-color:#fecaca}
.sb-item{display:flex;align-items:center;gap:12px;padding:11px 20px;cursor:pointer;font-size:14px;font-weight:600;color:#4b5563;transition:all .15s;position:relative;margin:2px 10px;border-radius:10px}
.sb-item:hover{background:#f0fdf4;color:#03968F}
.sb-item.active{background:#ecfdf5;color:#03968F;font-weight:700}
.sb-item.active::before{content:"";position:absolute;left:-10px;top:50%;transform:translateY(-50%);width:3px;height:60%;background:#03968F;border-radius:0 3px 3px 0}
.sb-item .sb-icon{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:currentColor}
.sb-item .sb-icon svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.sb-item .sb-badge{margin-left:auto;background:#f59e0b;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.sb-item .sb-badge.red{background:#ef4444}
.sb-footer{padding:8px 20px;font-size:10px;color:#9ca3af;text-align:center}

/* MAIN */
.main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f9fafb}
.topbar{display:flex;align-items:center;padding:24px 32px 20px;gap:12px;flex-shrink:0;background:#f9fafb}
.topbar-title{font-size:26px;font-weight:800;color:#2F2C2C;flex:1;letter-spacing:-.3px}
.branch-selector{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:8px 14px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.branch-selector label{font-size:12px;color:#6b7280;font-weight:700}
.branch-selector select{border:none;background:transparent;font-size:14px;font-weight:700;color:#03968F;outline:none;font-family:inherit;cursor:pointer}
.user-chip{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;color:#374151;box-shadow:0 1px 2px rgba(0,0,0,.03)}

.content-area{flex:1;overflow-y:auto;padding:20px 32px 60px}

/* VIEWS */
.view{display:none}
.view.active{display:block}

/* COMMON BUTTONS */
.btn-primary{padding:10px 20px;background:linear-gradient(135deg,#03968F 0%,#0AB8AE 100%);color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:700;font-size:14px;box-shadow:0 2px 6px rgba(3,150,143,.25);transition:all .15s}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(3,150,143,.35)}
.btn-secondary{padding:9px 18px;background:#fff;color:#374151;border:1px solid #e5e7eb;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:600;font-size:14px;transition:all .15s}
.btn-secondary:hover{background:#f9fafb;border-color:#d1d5db}
.btn-danger{padding:9px 18px;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:600;font-size:14px;transition:all .15s}
.btn-danger:hover{background:#fee2e2}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:20px;box-shadow:0 1px 2px rgba(0,0,0,.03);transition:all .15s;cursor:pointer}
.stat-card:hover{border-color:#a7f3d0;transform:translateY(-2px);box-shadow:0 4px 12px rgba(3,150,143,.1)}
.stat-card-label{font-size:13px;color:#6b7280;font-weight:600;margin-bottom:6px}
.stat-card-value{font-size:32px;font-weight:800;color:#2F2C2C;line-height:1}
.stat-card-value.teal{color:#03968F}
.stat-card-value.orange{color:#f59e0b}
.stat-card-value.red{color:#ef4444}
.stat-card-sub{font-size:12px;color:#9ca3af;margin-top:6px}

/* ALERT BOX */
.alert-box{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:20px;margin-bottom:16px}
.alert-title{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;color:#2F2C2C;margin-bottom:14px}
.alert-dot{width:10px;height:10px;border-radius:50%;background:#ef4444}
.alert-dot.orange{background:#f59e0b}
.alert-dot.teal{background:#03968F}
.alert-list{list-style:none}
.alert-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:#fafafa;margin-bottom:6px;cursor:pointer;transition:all .12s}
.alert-item:hover{background:#f0fdf4}
.alert-item-num{font-weight:800;font-family:"Noto Sans JP",sans-serif;color:#2F2C2C;min-width:140px}
.alert-item-type{font-size:12px;padding:2px 8px;border-radius:8px;font-weight:700}
.alert-item-type.kensha{background:#fef3c7;color:#92400e}
.alert-item-type.hoken{background:#dbeafe;color:#1e40af}
.alert-item-type.tenken{background:#f3e8ff;color:#6b21a8}
.alert-item-type.lease{background:#fee2e2;color:#991b1b}
.alert-item-date{color:#6b7280;font-size:13px}
.alert-item-days{margin-left:auto;font-weight:700;font-size:13px}
.alert-item-days.red{color:#ef4444}
.alert-item-days.orange{color:#f59e0b}
.alert-item-days.gray{color:#9ca3af}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.toolbar input,.toolbar select{padding:9px 12px;border:1px solid #e5e7eb;border-radius:10px;font-family:inherit;font-size:14px;background:#fff;outline:none;transition:border-color .15s}
.toolbar input:focus,.toolbar select:focus{border-color:#03968F;box-shadow:0 0 0 3px rgba(3,150,143,.1)}
.toolbar input{width:260px}
.toolbar .sp{flex:1}

/* TABLE */
.table-wrap{background:#fff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.table-wrap-inner{overflow-x:auto}
table.data-table{width:100%;border-collapse:collapse;font-size:14px;min-width:900px}
table.data-table th{text-align:left;padding:12px 14px;background:#f9fafb;font-weight:700;color:#374151;border-bottom:1px solid #e5e7eb;font-size:12px;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap}
table.data-table td{padding:12px 14px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
table.data-table tr{transition:background .12s;cursor:pointer}
table.data-table tr:hover td{background:#f0fdf4}
table.data-table tr:last-child td{border-bottom:none}
.t-plate{font-weight:700;color:#2F2C2C;font-size:15px}
.t-branch{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700}
.t-branch.osaka{background:#ecfdf5;color:#03968F}
.t-branch.shiga{background:#fef3c7;color:#92400e}
.t-branch.nagoya{background:#ede9fe;color:#6b21a8}
.t-status{display:inline-block;padding:3px 10px;border-radius:8px;font-size:12px;font-weight:700}
.t-status.active{background:#d1fae5;color:#065f46}
.t-status.maintenance{background:#fef3c7;color:#92400e}
.t-status.retired{background:#f3f4f6;color:#6b7280}
.t-holding{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700}
.t-holding.lease{background:#dbeafe;color:#1e40af}
.t-holding.release{background:#e0e7ff;color:#3730a3}
.t-holding.owned{background:#ecfdf5;color:#03968F}
.t-holding.retired{background:#f3f4f6;color:#6b7280}
.t-alert{color:#ef4444;font-weight:700}
.t-alert.orange{color:#f59e0b}
.t-alert.gray{color:#9ca3af}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.active{display:flex}
.modal{background:#fff;border-radius:16px;max-width:980px;width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-header{padding:20px 28px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:12px;flex-shrink:0}
.modal-title{font-size:20px;font-weight:800;color:#2F2C2C;flex:1}
.modal-close{width:36px;height:36px;border-radius:10px;border:none;background:#f9fafb;color:#6b7280;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-close:hover{background:#fee2e2;color:#dc2626}
.modal-body{flex:1;overflow-y:auto;padding:24px 28px}
.modal-footer{padding:16px 28px;border-top:1px solid #e5e7eb;display:flex;gap:10px;justify-content:flex-end;flex-shrink:0}

/* FORM */
.form-block{background:#fafafa;border:1px solid #f3f4f6;border-radius:12px;padding:16px 20px;margin-bottom:14px}
.form-block-title{font-weight:700;color:#03968F;font-size:14px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.form-row{display:flex;flex-direction:column;gap:4px}
.form-row.full{grid-column:1/-1}
.form-row label{font-size:12px;font-weight:600;color:#6b7280}
.form-row label .req{color:#ef4444;margin-left:2px}
.form-row input,.form-row select,.form-row textarea{padding:9px 12px;border:1px solid #e5e7eb;border-radius:8px;font-family:inherit;font-size:14px;background:#fff;outline:none;transition:border-color .15s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:#03968F;box-shadow:0 0 0 3px rgba(3,150,143,.1)}
.form-row textarea{resize:vertical;min-height:70px}
.form-row .plate-group{display:grid;grid-template-columns:1fr 70px 60px 1fr;gap:6px}

/* TABS (detail) */
.detail-tabs{display:flex;gap:4px;border-bottom:2px solid #e5e7eb;margin-bottom:20px;overflow-x:auto}
.detail-tab{padding:10px 18px;cursor:pointer;font-weight:600;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;font-size:14px;transition:all .15s}
.detail-tab:hover{color:#03968F}
.detail-tab.active{color:#03968F;border-bottom-color:#03968F;font-weight:700}

/* DETAIL CARD */
.detail-card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:20px;margin-bottom:16px}
.detail-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #f3f4f6}
.detail-card-title{font-size:16px;font-weight:700;color:#2F2C2C}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px 20px}
.info-cell-label{font-size:11px;color:#9ca3af;font-weight:700;margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px}
.info-cell-value{font-size:14px;color:#2F2C2C;font-weight:600}

/* TIMELINE */
.timeline{position:relative;padding-left:30px}
.timeline::before{content:"";position:absolute;left:8px;top:6px;bottom:6px;width:2px;background:#e5e7eb}
.tl-item{position:relative;padding:14px 18px;background:#fafafa;border:1px solid #f3f4f6;border-radius:12px;margin-bottom:12px;cursor:pointer;transition:all .15s}
.tl-item:hover{background:#f0fdf4;border-color:#a7f3d0}
.tl-item::before{content:"";position:absolute;left:-27px;top:20px;width:16px;height:16px;border-radius:50%;background:#03968F;border:3px solid #fff;box-shadow:0 0 0 2px #03968F}
.tl-item.current::before{background:#fff;border-color:#03968F;box-shadow:0 0 0 3px rgba(3,150,143,.4)}
.tl-item.ended::before{background:#9ca3af;box-shadow:0 0 0 2px #9ca3af}
.tl-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.tl-type{font-size:12px;padding:2px 10px;border-radius:8px;font-weight:700}
.tl-type.lease{background:#dbeafe;color:#1e40af}
.tl-type.release{background:#e0e7ff;color:#3730a3}
.tl-type.buy{background:#fef3c7;color:#92400e}
.tl-type.purchase{background:#ecfdf5;color:#03968F}
.tl-company{font-weight:700;color:#2F2C2C}
.tl-period{color:#6b7280;font-size:13px;margin-top:2px}
.tl-status{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;margin-left:auto}
.tl-status.current{background:#d1fae5;color:#065f46}
.tl-status.ended{background:#f3f4f6;color:#6b7280}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:#9ca3af}
.empty-state .ei{font-size:48px;margin-bottom:12px;opacity:.4}
.empty-state .et{font-size:16px;font-weight:700;color:#6b7280;margin-bottom:4px}
.empty-state .es{font-size:13px}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:#f9fafb;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
@keyframes dxspin{to{transform:rotate(360deg)}}
.spinner{width:40px;height:40px;border:4px solid #e5e7eb;border-top-color:#03968F;border-radius:50%;animation:dxspin .8s linear infinite}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#111;color:#fff;padding:14px 20px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.3);z-index:1000;opacity:0;transform:translateY(20px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* OVERLAY MENU (ロゴクリック) */
.top-overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:600;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.top-overlay.active{display:flex}
.top-overlay-content{background:#f9fafb;border-radius:24px;width:90%;max-width:860px;max-height:85vh;overflow-y:auto;padding:40px;box-shadow:0 24px 64px rgba(0,0,0,.2);border:1px solid #e5e7eb;position:relative}
.top-section{margin-bottom:32px;width:100%;max-width:800px}
.top-section-title{font-family:"Noto Sans JP",sans-serif;font-size:20px;font-weight:700;color:#2F2C2C;margin-bottom:12px;padding-left:4px}
.top-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.top-card{background:#fff;border:2px solid #e5e7eb;border-radius:16px;padding:20px 16px;text-align:center;cursor:pointer;transition:all .15s;font-family:"Noto Sans JP",sans-serif}
.top-card:hover{border-color:#03968F;box-shadow:0 4px 12px rgba(3,150,143,.15)}
.top-card.active{border-color:#03968F;background:#f0fdf4}
.top-card .tc-name{font-size:18px;font-weight:700;color:#2F2C2C;margin-bottom:4px}
@media(max-width:768px){.top-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.top-grid{grid-template-columns:1fr}}
.overlay-title{font-size:22px;font-weight:800;color:#2F2C2C;margin-bottom:20px;text-align:center}
.overlay-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.overlay-card{padding:24px 16px;background:#f9fafb;border:2px solid #e5e7eb;border-radius:14px;cursor:pointer;text-align:center;transition:all .15s}
.overlay-card:hover{border-color:#03968F;background:#f0fdf4;transform:translateY(-2px)}
.overlay-card-icon{font-size:32px;margin-bottom:8px}
.overlay-card-label{font-weight:700;color:#2F2C2C;font-size:14px}

/* AUTH */
.auth-bg{position:fixed;inset:0;background:linear-gradient(135deg,#03968F 0%,#0AB8AE 100%);display:flex;align-items:center;justify-content:center;z-index:9998;padding:20px}
.auth-card{background:#fff;border-radius:20px;padding:40px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.auth-title{font-size:22px;font-weight:800;color:#2F2C2C;text-align:center;margin-bottom:6px}
.auth-sub{font-size:13px;color:#6b7280;text-align:center;margin-bottom:24px}
.auth-card input{width:100%;padding:12px 14px;border:1px solid #e5e7eb;border-radius:10px;font-family:inherit;font-size:15px;margin-bottom:12px;outline:none}
.auth-card input:focus{outline:none;border-color:#03968F;box-shadow:0 0 0 3px rgba(3,150,143,.1)}

/* FILE UPLOAD */
.file-drop{border:2px dashed #e5e7eb;border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .15s;color:#9ca3af}
.file-drop:hover{border-color:#03968F;color:#03968F;background:#f0fdf4}
.file-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.file-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f9fafb;border-radius:8px;font-size:13px}
.file-item a{color:#03968F;text-decoration:none;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item a:hover{text-decoration:underline}
.file-item .file-remove{background:none;border:none;color:#ef4444;cursor:pointer;font-size:16px}

/* === iPad 11インチ対応 === */
@media(min-width:1025px) and (max-width:1300px){
.sidebar{width:200px}
.content-area{padding:24px 24px 14px}
}
@media(min-width:768px) and (max-width:1024px){
.sidebar{width:180px}
.content-area{padding:20px 20px 12px}
button{min-height:36px}
input,select,textarea{min-height:36px;font-size:14px}
}
</style>
</head>

      <span>ログアウト</span>
    </div>

  <!-- MAIN -->
  <div class="main-wrap">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">ダッシュボード</div>
      <div class="user-chip" id="user-chip"></div>
    </div>
    <div class="content-area">
      <div id="view-dashboard" class="view active"></div>
      <div id="view-vehicles" class="view"></div>
      <div id="view-kensha" class="view"></div>

  <div class="top-overlay-content" id="top-body"></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onmousedown="window._mdOnOverlay=(event.target===this)" onmouseup="if(window._mdOnOverlay&&event.target===this)closeModal();window._mdOnOverlay=false">

    <div class="modal-footer" id="modal-footer"></div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-auth-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-database-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-storage-compat.min.js"></script>

<script>
// ========== 初期化 ==========
firebase.initializeApp(FIREBASE_CONFIG);
const auth=firebase.auth(), db=firebase.database(), storage=firebase.storage();
document.getElementById('sb-logo-img').src=DEX_LOGO;
document.getElementById('auth-logo').src=DEX_LOGO;

let currentUser=null;
let currentBranch=localStorage.getItem('shako_branch')||'all';
let currentView='dashboard';

// データ
let vehicles=[], contracts=[], insurances=[], inspections=[], maintenances=[];
let M_COMPANIES=[], M_MAKERS=[], M_CLASSES=[], M_TYPES=[], M_BRANCHES=[], M_INSURERS=[], M_MAINTVENDORS=[];

// 選択肢
const HOLD_TYPES={lease:'リース中',release:'再リース中',owned:'自社所有',retired:'引退済'};
const STATUSES={active:'稼働中',maintenance:'整備中',retired:'引退'};
const RETIRE_REASONS={expire:'満了返却',buyout:'買取処分',accident:'事故廃車',other:'その他'};
const CONTRACT_TYPES={new_lease:'新規リース',re_lease:'再リース',buyout:'買取',new_purchase:'新車購入',used_purchase:'中古購入'};
const CONTRACT_STATUSES={active:'継続中',expired:'満了返却',to_release:'再リースへ移行',to_buyout:'買取へ移行',cancel:'中途解約',scrap:'事故廃車'};
const INSURANCE_TYPES={jibaiseki:'自賠責保険',nini:'任意保険'};
const INSURANCE_STATUSES={active:'有効',expired:'満期切れ',canceled:'解約',renewed:'更新済み'};
const INSPECTION_TYPES={shaken:'車検',month12:'12ヶ月点検',month3:'3ヶ月点検',shaken_month12:'車検+12ヶ月点検'};
const MAINTENANCE_CATEGORIES={repair:'修理',parts:'部品交換',oil:'オイル交換',tire:'タイヤ交換',paint:'板金・塗装',kasou:'架装・改造',other:'その他'};
const FUEL_TYPES={diesel:'軽油',gasoline:'ガソリン',cng:'CNG',lpg:'LPG',ev:'電気',hv:'ハイブリッド'};
const AUTO_TYPES={normal:'普通',small:'小型',large_special:'大型特殊',small_special:'小型特殊',bike:'二輪'};

// マスタ初期値
const DEFAULT_COMPANIES=[
  {id:'c_awa',name:'阿波銀リース',alias:'阿波銀',kind:'lease'},
  {id:'c_isuzu',name:'いすゞリース',alias:'いすゞ',kind:'lease'},
  {id:'c_yamato',name:'ヤマトリース',alias:'ヤマト',kind:'lease'},
  {id:'c_jtora',name:'Jトラ',alias:'Jトラ',kind:'sale'},
  {id:'c_sm',name:'SMオート',alias:'SMオート',kind:'sale'},
  {id:'c_takeda',name:'武田オート',alias:'武田オート',kind:'sale'}
];
const DEFAULT_MAKERS=[{id:'m_isuzu',name:'いすゞ'},{id:'m_hino',name:'日野'},{id:'m_fuso',name:'三菱ふそう'},{id:'m_toyota',name:'トヨタ'},{id:'m_other',name:'その他'}];
const DEFAULT_CLASSES=[{id:'cl_1t',name:'1t'},{id:'cl_2t',name:'2t'},{id:'cl_3t',name:'3t'},{id:'cl_4t',name:'4t'},{id:'cl_6t',name:'6t'},{id:'cl_8t',name:'8t'},{id:'cl_10t',name:'10t'},{id:'cl_25t',name:'25t超'}];
const DEFAULT_TYPES=[{id:'ty_flat',name:'平'},{id:'ty_wing',name:'W'},{id:'ty_other',name:'その他'}];
const DEFAULT_BRANCHES=[{id:'osaka',name:'大阪本社',code:'なにわ'},{id:'shiga',name:'滋賀支店',code:'滋賀'},{id:'nagoya',name:'名古屋支店',code:'名古屋'}];
const DEFAULT_INSURERS=[{id:'i_tokio',name:'東京海上日動'},{id:'i_mitsui',name:'三井住友海上'},{id:'i_sj',name:'損保ジャパン'},{id:'i_aio',name:'あいおいニッセイ同和'},{id:'i_aig',name:'AIG損保'},{id:'i_other',name:'その他'}];
const DEFAULT_MAINTVENDORS=[{id:'mv_self',name:'自社工場'},{id:'mv_isuzu',name:'いすゞ自動車整備'},{id:'mv_hino',name:'日野自動車整備'},{id:'mv_fuso',name:'三菱ふそう整備'},{id:'mv_toyota',name:'トヨタ自動車整備'},{id:'mv_other',name:'その他'}];

// ========== ユーティリティ ==========
function toast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=type==='error'?'#dc2626':type==='success'?'#03968F':'#111';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function genId(p){return p+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function ymd(d){if(!d)return'';if(typeof d==='string')return d.slice(0,10);const z=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate())}
function daysBetween(a,b){if(!a||!b)return null;const d1=new Date(a),d2=new Date(b);return Math.floor((d2-d1)/(1000*60*60*24))}
function fromToday(dateStr){if(!dateStr)return null;return daysBetween(ymd(new Date()),dateStr)}
function formatPlate(v){if(!v)return'';return [v.plateArea,v.plateClass,v.plateKana,v.plateNum].filter(x=>x!==undefined&&x!=='').join(' ')}
function holdBadge(h){const c=h||'owned';return '<span class="t-holding '+c+'">'+(HOLD_TYPES[c]||c)+'</span>'}
function statusBadge(s){const c=s||'active';return '<span class="t-status '+c+'">'+(STATUSES[c]||c)+'</span>'}
function branchBadge(b){const m={osaka:'大阪',shiga:'滋賀',nagoya:'名古屋'};return '<span class="t-branch '+b+'">'+(m[b]||b)+'</span>'}
function companyName(id){const c=M_COMPANIES.find(x=>x.id===id);return c?c.name:(id||'')}
function insurerName(id){const c=M_INSURERS.find(x=>x.id===id);return c?c.name:(id||'')}
function makerName(id){const c=M_MAKERS.find(x=>x.id===id);return c?c.name:(id||'')}
function mvName(id){const c=M_MAINTVENDORS.find(x=>x.id===id);return c?c.name:(id||'')}
function numDays(days){
  if(days===null||days===undefined)return '<span class="t-alert gray">-</span>';
  if(days<0)return '<span class="t-alert">期限切れ '+Math.abs(days)+'日</span>';
  if(days<=30)return '<span class="t-alert">あと '+days+'日</span>';
  if(days<=60)return '<span class="t-alert orange">あと '+days+'日</span>';
  return '<span class="t-alert gray">あと '+days+'日</span>';
}

// ========== 認証 ==========
function doAuthLogin(){
  const em=document.getElementById('auth-email').value.trim();
  const pw=document.getElementById('auth-pass').value;
  if(!em||!pw){document.getElementById('auth-err').textContent='入力してください';return}
  auth.signInWithEmailAndPassword(em,pw).catch(e=>{document.getElementById('auth-err').textContent='ログイン失敗: '+e.message});
}
function doLogout(){auth.signOut().then(()=>location.reload())}

auth.onAuthStateChanged(async u=>{
  try {
    if(!u){
      document.getElementById('loading-screen').style.display='none';
      document.getElementById('auth-bg').style.display='flex';
      document.getElementById('app').style.display='none';
      return;
    }
    currentUser=u;
    document.getElementById('auth-bg').style.display='none';
    document.getElementById('user-chip').innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'+esc(u.email);
    await loadAll();
    document.getElementById('branch-select').value=currentBranch;
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    render();
  } catch(e) {
    console.error('[shako] 起動エラー:', e);
    document.getElementById('loading-screen').innerHTML = '<div style="max-width:500px;padding:30px;background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.1)"><div style="font-size:20px;font-weight:800;color:#dc2626;margin-bottom:12px">起動エラー</div><div style="color:#374151;font-size:14px;line-height:1.6;margin-bottom:16px">アプリの起動中にエラーが発生しました。<br>Firebaseデータベースへのアクセス権限を確認してください。</div><div style="background:#f9fafb;padding:12px;border-radius:8px;font-size:12px;color:#6b7280;font-family:monospace;word-break:break-all">'+esc(e.message||String(e))+'</div><div style="margin-top:16px;display:flex;gap:10px"><button onclick="location.reload()" style="padding:10px 20px;background:#03968F;color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:700;font-family:inherit">再読み込み</button><button onclick="auth.signOut().then(()=>location.reload())" style="padding:10px 20px;background:#f9fafb;color:#374151;border:1px solid #e5e7eb;border-radius:10px;cursor:pointer;font-weight:600;font-family:inherit">ログアウト</button></div></div>';
  }
});

// ========== データ読み込み ==========
async function loadAll(){
  // マスタ初期化（初回のみ）- 権限エラーでも継続
  for(const [path,def] of [
    ['shako/masters/companies',DEFAULT_COMPANIES],
    ['shako/masters/makers',DEFAULT_MAKERS],
    ['shako/masters/classes',DEFAULT_CLASSES],
    ['shako/masters/types',DEFAULT_TYPES],
    ['shako/masters/branches',DEFAULT_BRANCHES],
    ['shako/masters/insurers',DEFAULT_INSURERS],
    ['shako/masters/maintvendors',DEFAULT_MAINTVENDORS]
  ]){
    try {
      const s=await db.ref(path).once('value');
      if(!s.exists()){
        const obj={};
        def.forEach(x=>obj[x.id]=x);
        await db.ref(path).set(obj);
      }
    } catch(e) {
      console.warn('[shako] マスタ初期化スキップ '+path+':', e.message);
    }
  }
  const snap=await db.ref('shako').once('value');
  const v=snap.val()||{};
  vehicles=Object.values(v.vehicles||{});
  contracts=Object.values(v.contracts||{});
  insurances=Object.values(v.insurances||{});
  inspections=Object.values(v.inspections||{});
  maintenances=Object.values(v.maintenances||{});
  M_COMPANIES=Object.values((v.masters&&v.masters.companies)||{});
  M_MAKERS=Object.values((v.masters&&v.masters.makers)||{});
  M_CLASSES=Object.values((v.masters&&v.masters.classes)||{});
  M_TYPES=Object.values((v.masters&&v.masters.types)||{});
  M_BRANCHES=Object.values((v.masters&&v.masters.branches)||{});
  M_INSURERS=Object.values((v.masters&&v.masters.insurers)||{});
  M_MAINTVENDORS=Object.values((v.masters&&v.masters.maintvendors)||{});
}

// ========== 拠点フィルタ ==========
function filterByBranch(arr){
  if(currentBranch==='all')return arr;
  return arr.filter(v=>v.branch===currentBranch);
}
function filteredVehicles(){return filterByBranch(vehicles)}

function changeBranch(v){
  currentBranch=v;
  localStorage.setItem('shako_branch',v);
  render();
}

// ========== ビュー切替 ==========
function switchView(v){
  currentView=v;
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.toggle('active',el.dataset.view===v));
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  const target=document.getElementById('view-'+v);
  if(target)target.classList.add('active');
  const titles={dashboard:'ダッシュボード',vehicles:'車両一覧',kensha:'点検・車検',contracts:'リース・契約',insurance:'保険',maintenance:'整備履歴',masters:'マスタ管理',import:'データ取込'};
  document.getElementById('topbar-title').textContent=titles[v]||'';
  render();
}

// ========== メインレンダリング ==========
function render(){
  updateBadges();
  if(currentView==='dashboard')renderDashboard();
  else if(currentView==='vehicles')renderVehicles();
  else if(currentView==='kensha')renderKensha();
  else if(currentView==='contracts')renderContracts();
  else if(currentView==='insurance')renderInsurance();
  else if(currentView==='maintenance')renderMaintenance();
  else if(currentView==='masters')renderMasters();
  else if(currentView==='import')renderImport();
}

function updateBadges(){
  const activeVehicles=filteredVehicles().filter(v=>v.status!=='retired');
  const today=ymd(new Date());
  // 車検期限30日以内
  const kenshaWarn=inspections.filter(i=>{
    if(i.type!=='shaken'&&i.type!=='shaken_month12')return false;
    const veh=vehicles.find(v=>v.id===i.vehicleId);
    if(!veh||veh.status==='retired')return false;
    if(currentBranch!=='all'&&veh.branch!==currentBranch)return false;
    const d=fromToday(i.expiryDate);
    return d!==null&&d<=30;
  }).length;
  const b1=document.getElementById('sb-badge-vehicles');
  b1.style.display=activeVehicles.length?'inline-block':'none';
  b1.textContent=activeVehicles.length;
  const b2=document.getElementById('sb-badge-kensha');
  b2.style.display=kenshaWarn?'inline-block':'none';
  b2.textContent=kenshaWarn;
  // リース期限60日以内
  const leaseWarn=contracts.filter(c=>{
    if(c.status!=='active')return false;
    const veh=vehicles.find(v=>v.id===c.vehicleId);
    if(!veh||veh.status==='retired')return false;
    if(currentBranch!=='all'&&veh.branch!==currentBranch)return false;
    const d=fromToday(c.endDate);
    return d!==null&&d<=60;
  }).length;
  const b3=document.getElementById('sb-badge-contracts');
  b3.style.display=leaseWarn?'inline-block':'none';
  b3.textContent=leaseWarn;
  // 保険60日以内
  const hokenWarn=insurances.filter(ins=>{
    if(ins.status!=='active')return false;
    const veh=vehicles.find(v=>v.id===ins.vehicleId);
    if(!veh||veh.status==='retired')return false;
    if(currentBranch!=='all'&&veh.branch!==currentBranch)return false;
    const d=fromToday(ins.endDate);
    return d!==null&&d<=60;
  }).length;
  const b4=document.getElementById('sb-badge-insurance');
  b4.style.display=hokenWarn?'inline-block':'none';
  b4.textContent=hokenWarn;
}

// ========== ダッシュボード ==========
function renderDashboard(){
  const el=document.getElementById('view-dashboard');
  const act=filteredVehicles().filter(v=>v.status!=='retired');
  const lease=act.filter(v=>v.holdType==='lease').length;
  const release=act.filter(v=>v.holdType==='release').length;
  const owned=act.filter(v=>v.holdType==='owned').length;
  const retired=filteredVehicles().filter(v=>v.status==='retired').length;

  // アラート集計
  const today=ymd(new Date());
  const alerts=[];
  inspections.forEach(i=>{
    const veh=vehicles.find(v=>v.id===i.vehicleId);
    if(!veh||veh.status==='retired')return;
    if(currentBranch!=='all'&&veh.branch!==currentBranch)return;
    if(i.type==='shaken'||i.type==='shaken_month12'){
      const d=fromToday(i.expiryDate);
      if(d!==null&&d<=60)alerts.push({kind:'車検',cls:'kensha',veh,date:i.expiryDate,days:d,id:i.id});
    }
    const sd=fromToday(i.scheduledDate);
    if(sd!==null&&sd<=60&&!i.doneDate){
      const tn={month3:'3ヶ月点検',month12:'12ヶ月点検',shaken:'車検',shaken_month12:'車検+12ヶ月点検'}[i.type];
      if(tn)alerts.push({kind:tn,cls:'tenken',veh,date:i.scheduledDate,days:sd,id:i.id});
    }
  });
  insurances.forEach(ins=>{
    if(ins.status!=='active')return;
    const veh=vehicles.find(v=>v.id===ins.vehicleId);
    if(!veh||veh.status==='retired')return;
    if(currentBranch!=='all'&&veh.branch!==currentBranch)return;
    const d=fromToday(ins.endDate);
    if(d!==null&&d<=60)alerts.push({kind:INSURANCE_TYPES[ins.kind]||'保険',cls:'hoken',veh,date:ins.endDate,days:d,id:ins.id});
  });
  contracts.forEach(c=>{
    if(c.status!=='active')return;
    const veh=vehicles.find(v=>v.id===c.vehicleId);
    if(!veh||veh.status==='retired')return;
    if(currentBranch!=='all'&&veh.branch!==currentBranch)return;
    if(!c.endDate)return;
    const d=fromToday(c.endDate);
    if(d!==null&&d<=90)alerts.push({kind:'リース満期',cls:'lease',veh,date:c.endDate,days:d,id:c.id});
  });
  alerts.sort((a,b)=>a.days-b.days);

  let h='';
  // 統計カード
  h+='<div class="stat-grid">';
  h+='<div class="stat-card" onclick="switchView(\'vehicles\')"><div class="stat-card-label">稼働中の車両</div><div class="stat-card-value teal">'+act.length+'</div><div class="stat-card-sub">引退済み '+retired+'台</div></div>';
  h+='<div class="stat-card"><div class="stat-card-label">リース中</div><div class="stat-card-value">'+lease+'</div><div class="stat-card-sub">再リース '+release+'台</div></div>';
  h+='<div class="stat-card"><div class="stat-card-label">自社所有</div><div class="stat-card-value">'+owned+'</div><div class="stat-card-sub">買取・購入車両</div></div>';
  h+='<div class="stat-card" onclick="switchView(\'kensha\')"><div class="stat-card-label">要注意アラート</div><div class="stat-card-value red">'+alerts.filter(a=>a.days<=30).length+'</div><div class="stat-card-sub">30日以内の期限</div></div>';
  h+='</div>';

  // アラート一覧
  h+='<div class="alert-box">';
  h+='<div class="alert-title"><span class="alert-dot"></span>期限アラート <span style="color:#9ca3af;font-size:13px;font-weight:500;margin-left:8px">'+alerts.length+'件</span></div>';
  if(alerts.length===0){
    h+='<div class="empty-state" style="padding:20px"><div class="es">現在、期限が近い項目はありません</div></div>';
  }else{
    h+='<ul class="alert-list">';
    alerts.slice(0,20).forEach(a=>{
      let cls='gray';if(a.days<=30)cls='red';else if(a.days<=60)cls='orange';
      h+='<li class="alert-item" onclick="openVehicleDetail(\''+a.veh.id+'\')">';
      h+='<span class="alert-item-num">'+esc(formatPlate(a.veh))+'</span>';
      h+='<span class="alert-item-type '+a.cls+'">'+a.kind+'</span>';
      h+='<span class="alert-item-date">'+a.date+'</span>';
      h+='<span class="alert-item-days '+cls+'">'+(a.days<0?'期限切れ '+Math.abs(a.days)+'日':'あと '+a.days+'日')+'</span>';
      h+='</li>';
    });
    h+='</ul>';
    if(alerts.length>20)h+='<div style="text-align:center;margin-top:10px"><span style="color:#9ca3af;font-size:13px">他 '+(alerts.length-20)+'件</span></div>';
  }
  h+='</div>';

  // 拠点別サマリ
  if(currentBranch==='all'){
    h+='<div class="alert-box">';
    h+='<div class="alert-title"><span class="alert-dot teal"></span>拠点別サマリ</div>';
    h+='<div class="stat-grid" style="margin-bottom:0">';
    ['osaka','shiga','nagoya'].forEach(b=>{
      const bn={osaka:'大阪本社',shiga:'滋賀支店',nagoya:'名古屋支店'}[b];
      const c=vehicles.filter(v=>v.branch===b&&v.status!=='retired').length;

function renderVehicleTable(){
  let list=filteredVehicles().slice();
  if(vListFilter.status)list=list.filter(v=>v.status===vListFilter.status);
  if(vListFilter.hold)list=list.filter(v=>v.holdType===vListFilter.hold);
  if(vListFilter.q){
    const q=vListFilter.q.toLowerCase();
    list=list.filter(v=>(formatPlate(v)+' '+(v.chassisNumber||'')+' '+(v.notes||'')+' '+(v.modelCode||'')).toLowerCase().indexOf(q)>=0);
  }
  // 拠点→車番順
  list.sort((a,b)=>{
    const bc=(a.branch||'').localeCompare(b.branch||'');
    if(bc)return bc;
    return (a.plateNum||0)-(b.plateNum||0);
  });

  let h='<div class="table-wrap"><div class="table-wrap-inner">';
  h+='<table class="data-table"><thead><tr>';
  h+='<th>車番</th><th>拠点</th><th>車格</th><th>車種</th><th>メーカー</th><th>初度登録</th><th>保有形態</th><th>ステータス</th><th>車検満了</th><th>アクション</th>';
  h+='</tr></thead><tbody>';
  if(list.length===0){
    h+='<tr><td colspan="10" style="text-align:center;padding:40px;color:#9ca3af">該当する車両がありません</td></tr>';
  }else{
    list.forEach(v=>{
      // 最新の車検満了日
      const kensha=inspections.filter(i=>i.vehicleId===v.id&&(i.type==='shaken'||i.type==='shaken_month12')&&i.expiryDate).sort((a,b)=>b.expiryDate.localeCompare(a.expiryDate))[0];
      const kenshaDays=kensha?fromToday(kensha.expiryDate):null;
      h+='<tr onclick="openVehicleDetail(\''+v.id+'\')">';
      h+='<td><div class="t-plate">'+esc(formatPlate(v))+'</div></td>';
      h+='<td>'+branchBadge(v.branch||'')+'</td>';
      h+='<td>'+esc(v.vClass||'')+'</td>';
      h+='<td>'+esc(v.vType||'')+'</td>';
      h+='<td>'+esc(makerName(v.maker))+'</td>';
      h+='<td style="color:#6b7280;font-size:13px">'+esc(v.firstRegistration||'')+'</td>';
      h+='<td>'+holdBadge(v.holdType)+'</td>';
      h+='<td>'+statusBadge(v.status)+'</td>';
      h+='<td>'+(kensha?('<div style="font-size:12px;color:#6b7280">'+kensha.expiryDate+'</div>'+numDays(kenshaDays)):'<span style="color:#9ca3af">未登録</span>')+'</td>';
      h+='<td onclick="event.stopPropagation()"><button class="btn-secondary btn-sm" onclick="openVehicleForm(\''+v.id+'\')">編集</button></td>';
      h+='</tr>';
    });
  }
  h+='</tbody></table></div></div>';
  h+='<div style="margin-top:10px;color:#9ca3af;font-size:13px">'+list.length+'台表示</div>';
  document.getElementById('v-table-area').innerHTML=h;
}

let modalTempAttachments=[];
function renderFileList(list,vid){
  if(!list||!list.length)return '';
  return list.map((f,i)=>'<div class="file-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg><a href="'+esc(f.url)+'" target="_blank">'+esc(f.name)+'</a><button class="file-remove" onclick="removeFile('+i+')">×</button></div>').join('');
}
async function handleFiles(ev,vid){
  const files=ev.target.files;
  if(!files||!files.length)return;
  toast('アップロード中...');
  for(const f of files){
    const r=storage.ref('shako/vehicles/'+vid+'/'+Date.now()+'_'+f.name);
    const s=await r.put(f);
    const url=await s.ref.getDownloadURL();
    modalTempAttachments.push({name:f.name,url,size:f.size,uploadedAt:new Date().toISOString()});
  }
  document.getElementById('file-list').innerHTML=renderFileList(modalTempAttachments,vid);
  toast('アップロード完了','success');
}
function removeFile(i){modalTempAttachments.splice(i,1);document.getElementById('file-list').innerHTML=renderFileList(modalTempAttachments,'')}

async function saveVehicle(id,isNew){
  const g=s=>document.getElementById('f-'+s)?document.getElementById('f-'+s).value:undefined;
  const v={id,
    plateArea:g('plateArea'),plateClass:g('plateClass'),plateKana:g('plateKana'),plateNum:g('plateNum'),
    branch:g('branch'),status:g('status'),holdType:g('holdType'),
    maker:g('maker'),modelCode:g('modelCode'),engineCode:g('engineCode'),chassisNumber:g('chassisNumber'),
    bodyShape:g('bodyShape'),autoType:g('autoType'),vClass:g('vClass'),vType:g('vType'),spec:g('spec'),
    capacity:g('capacity'),maxLoad:g('maxLoad'),vehicleWeight:g('vehicleWeight'),grossWeight:g('grossWeight'),
    length:g('length'),width:g('width'),height:g('height'),
    axleFF:g('axleFF'),axleFR:g('axleFR'),axleRF:g('axleRF'),axleRR:g('axleRR'),
    displacement:g('displacement'),displacementUnit:g('displacementUnit'),fuelType:g('fuelType'),tankCapacity:g('tankCapacity'),
    firstRegistration:g('firstRegistration'),registrationDate:g('registrationDate'),
    modelDesignationNo:g('modelDesignationNo'),categoryClassNo:g('categoryClassNo'),vehicleInspectionId:g('vehicleInspectionId'),
    etcCard:g('etcCard'),etcDevice:g('etcDevice'),
    currentMileage:g('currentMileage'),mileageUpdatedAt:g('mileageUpdatedAt'),
    acquiredDate:g('acquiredDate'),retiredDate:g('retiredDate'),retiredReason:g('retiredReason'),
    notes:g('notes'),
    attachments:modalTempAttachments,
    updatedAt:new Date().toISOString(),
    updatedBy:currentUser.email
  };
  if(isNew){v.createdAt=new Date().toISOString();v.createdBy=currentUser.email}
  else{const old=vehicles.find(x=>x.id===id);if(old){v.createdAt=old.createdAt;v.createdBy=old.createdBy}}
  if(!v.plateArea||!v.plateNum){toast('車番は必須です','error');return}
  await db.ref('shako/vehicles/'+id).set(v);
  const idx=vehicles.findIndex(x=>x.id===id);
  if(idx>=0)vehicles[idx]=v;else vehicles.push(v);
  toast('保存しました','success');
  closeModal();
  render();
}

async function saveContract(id,vId,isNew){
  const g=s=>document.getElementById('cf-'+s).value;
  const c={id,vehicleId:vId,kind:g('kind'),company:g('company'),contractNumber:g('contractNumber'),status:g('status'),startDate:g('startDate'),endDate:g('endDate'),actualEndDate:g('actualEndDate'),notes:g('notes'),updatedAt:new Date().toISOString(),updatedBy:currentUser.email};
  if(isNew){c.createdAt=new Date().toISOString();c.createdBy=currentUser.email}
  else{const old=contracts.find(x=>x.id===id);if(old){c.createdAt=old.createdAt;c.createdBy=old.createdBy}}
  if(!c.kind||!c.company||!c.startDate||!c.status){toast('必須項目を入力してください','error');return}
  await db.ref('shako/contracts/'+id).set(c);
  const idx=contracts.findIndex(x=>x.id===id);
  if(idx>=0)contracts[idx]=c;else contracts.push(c);
  toast('保存しました','success');
  closeModal();
  const v=vehicles.find(x=>x.id===vId);
  if(v)openVehicleDetail(vId);
  else render();
}
async function deleteContract(id){
  if(!confirm('削除しますか？'))return;
  await db.ref('shako/contracts/'+id).remove();
  const c=contracts.find(x=>x.id===id);
  const vId=c?c.vehicleId:null;
  contracts=contracts.filter(x=>x.id!==id);
  toast('削除しました','success');
  closeModal();
  if(vId)openVehicleDetail(vId);else render();
}

async function saveInspection(id,vId,isNew){
  const g=s=>document.getElementById('tf-'+s).value;
  const ins={id,vehicleId:vId,type:g('type'),scheduledDate:g('scheduledDate'),doneDate:g('doneDate'),expiryDate:g('expiryDate'),mileage:g('mileage'),notes:g('notes'),updatedAt:new Date().toISOString(),updatedBy:currentUser.email};
  if(isNew){ins.createdAt=new Date().toISOString();ins.createdBy=currentUser.email}
  else{const old=inspections.find(x=>x.id===id);if(old){ins.createdAt=old.createdAt;ins.createdBy=old.createdBy}}
  if(!ins.type||!ins.scheduledDate){toast('必須項目を入力してください','error');return}
  // 走行距離を車両マスタに反映
  if(ins.mileage&&ins.doneDate){
    const v=vehicles.find(x=>x.id===vId);
    if(v&&(!v.mileageUpdatedAt||v.mileageUpdatedAt<=ins.doneDate)){
      v.currentMileage=ins.mileage;
      v.mileageUpdatedAt=ins.doneDate;
      v.updatedAt=new Date().toISOString();
      await db.ref('shako/vehicles/'+vId).set(v);
    }
  }
  await db.ref('shako/inspections/'+id).set(ins);
  const idx=inspections.findIndex(x=>x.id===id);
  if(idx>=0)inspections[idx]=ins;else inspections.push(ins);
  toast('保存しました','success');
  closeModal();
  openVehicleDetail(vId);
}
async function deleteInspection(id){
  if(!confirm('削除しますか？'))return;
  await db.ref('shako/inspections/'+id).remove();
  const ins=inspections.find(x=>x.id===id);
  const vId=ins?ins.vehicleId:null;
  inspections=inspections.filter(x=>x.id!==id);
  toast('削除しました','success');
  closeModal();
  if(vId)openVehicleDetail(vId);else render();
}

function renderKensha(){
  const el=document.getElementById('view-kensha');
  const activeVs=filteredVehicles().filter(v=>v.status!=='retired');
  // 車両ごとに最新の車検満了日をまとめる
  const rows=activeVs.map(v=>{
    const kensha=inspections.filter(i=>i.vehicleId===v.id&&(i.type==='shaken'||i.type==='shaken_month12')&&i.expiryDate).sort((a,b)=>b.expiryDate.localeCompare(a.expiryDate))[0];
    const m12=inspections.filter(i=>i.vehicleId===v.id&&(i.type==='month12'||i.type==='shaken_month12')).sort((a,b)=>(b.scheduledDate||'').localeCompare(a.scheduledDate||''))[0];
    const m3=inspections.filter(i=>i.vehicleId===v.id&&i.type==='month3').sort((a,b)=>(b.scheduledDate||'').localeCompare(a.scheduledDate||''))[0];
    return {v,kensha,m12,m3};
  });
  // 車検期限が近い順
  rows.sort((a,b)=>{
    const da=a.kensha?a.kensha.expiryDate:'9999-12-31';
    const db2=b.kensha?b.kensha.expiryDate:'9999-12-31';
    return da.localeCompare(db2);
  });
  let h='';
  h+='<div class="toolbar"><div class="sp"></div><button class="btn-primary" onclick="openInspectionForm(null,null)">＋ 点検を登録</button></div>';
  h+='<div class="table-wrap"><div class="table-wrap-inner">';

  rows.forEach(({v,kensha,m12,m3})=>{
    h+='<tr onclick="openVehicleDetail(\''+v.id+'\')">';
    h+='<td><div class="t-plate">'+esc(formatPlate(v))+'</div></td>';
    h+='<td>'+branchBadge(v.branch||'')+'</td>';
    h+='<td>'+(kensha?'<div>'+esc(kensha.expiryDate)+'</div>'+numDays(fromToday(kensha.expiryDate)):'<span style="color:#9ca3af">未登録</span>')+'</td>';
    h+='<td>'+(kensha?numDays(fromToday(kensha.expiryDate)):'-')+'</td>';
    h+='<td>'+(m12&&m12.scheduledDate?'<div style="font-size:12px">'+esc(m12.scheduledDate)+'</div>'+numDays(fromToday(m12.scheduledDate)):'<span style="color:#9ca3af">-</span>')+'</td>';
    h+='<td>'+(m3&&m3.scheduledDate?'<div style="font-size:12px">'+esc(m3.scheduledDate)+'</div>'+numDays(fromToday(m3.scheduledDate)):'<span style="color:#9ca3af">-</span>')+'</td>';
    h+='</tr>';
  });
  h+='</tbody></table></div></div>';
  el.innerHTML=h;
}

async function runEmbeddedImport(){
  const result = document.getElementById('import-result');
  if(!IMPORT_DATA){result.innerHTML='<div style="color:#dc2626">データが組み込まれていません</div>';return}
  
  const v = IMPORT_DATA;
  const counts = {vehicles:v.vehicles.length, contracts:v.contracts.length, insurances:v.insurances.length, inspections:v.inspections.length};
  const existing = vehicles.length + contracts.length + insurances.length + inspections.length;
  
  let msg = 'エクセル由来のデータを取り込みます。\n\n車両: '+counts.vehicles+'台\n契約: '+counts.contracts+'件\n保険: '+counts.insurances+'件\n点検(車検): '+counts.inspections+'件\n\n';
  if(existing>0) msg += '⚠️ 既に '+existing+' 件のデータが存在します。IDが重複した場合は上書きされますが、既存の固有データは保持されます。\n\n';
  msg += '実行しますか？';
  if(!confirm(msg)) return;
  
  result.innerHTML = '<div style="padding:16px;background:#f0fdf4;border:1px solid #a7f3d0;border-radius:10px"><div class="spinner" style="display:inline-block;width:20px;height:20px;border-width:3px;vertical-align:middle;margin-right:8px"></div><span id="imp-progress">取込開始...</span></div>';
  
  const total = counts.vehicles + counts.contracts + counts.insurances + counts.inspections;
  let done = 0;
  function progress(txt){
    done++;
    document.getElementById('imp-progress').textContent = txt + ' ('+done+'/'+total+')';
  }
  
  try {
    // 車両
    const vUpdates = {};
    v.vehicles.forEach(x=>{vUpdates[x.id]=x});
    await db.ref('shako/vehicles').update(vUpdates);
    v.vehicles.forEach(()=>progress('車両取込中...'));
    
    // 契約
    const cUpdates = {};
    v.contracts.forEach(x=>{cUpdates[x.id]=x});
    await db.ref('shako/contracts').update(cUpdates);
    v.contracts.forEach(()=>progress('契約取込中...'));
    
    // 保険
    const iUpdates = {};
    v.insurances.forEach(x=>{iUpdates[x.id]=x});
    await db.ref('shako/insurances').update(iUpdates);
    v.insurances.forEach(()=>progress('保険取込中...'));
    
    // 点検
    const nUpdates = {};
    v.inspections.forEach(x=>{nUpdates[x.id]=x});
    await db.ref('shako/inspections').update(nUpdates);
    v.inspections.forEach(()=>progress('点検取込中...'));
    
    // 再読み込み
    await loadAll();
    render();
    
    result.innerHTML = '<div style="padding:20px;background:#f0fdf4;border:1px solid #03968F;border-radius:10px"><div style="font-weight:700;color:#03968F;font-size:16px;margin-bottom:8px">✓ 取込完了</div><div style="color:#374151">'+counts.vehicles+'台の車両、'+counts.contracts+'件の契約、'+counts.insurances+'件の保険、'+counts.inspections+'件の点検を取り込みました。</div></div>';
    toast('取込完了','success');
  } catch(e){
    result.innerHTML = '<div style="padding:16px;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;color:#dc2626"><b>エラー:</b> '+e.message+'</div>';
    console.error(e);
  }
}

async function clearAllImportData(){
  if(!confirm('⚠️ 警告: shako/* の全データ（車両・契約・保険・点検・整備）を削除します。\n\nマスタは残ります。\n\n本当に削除しますか？')) return;
  if(!confirm('本当に本当に削除しますか？この操作は取り消せません。')) return;
  try {
    await db.ref('shako/vehicles').remove();
    await db.ref('shako/contracts').remove();
    await db.ref('shako/insurances').remove();
    await db.ref('shako/inspections').remove();
    await db.ref('shako/maintenances').remove();
    await loadAll();
    render();
    toast('全データを削除しました','success');
  } catch(e){
    toast('削除失敗: '+e.message,'error');
  }
}
