// CSV取込：得意先IDをキーに customers/{得意先ID} へ一括書込
function importCustomersFromCsv(inputEl){
  var file=inputEl.files&&inputEl.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var buf=ev.target.result;
    var bytes=new Uint8Array(buf);
    var isUtf8=(bytes[0]===0xEF&&bytes[1]===0xBB&&bytes[2]===0xBF)||detectUtf8(bytes);
    var text;
    try{
      var dec=new TextDecoder(isUtf8?'utf-8':'shift_jis',{fatal:false});
      text=dec.decode(buf);
    }catch(e){
      try{text=new TextDecoder('shift_jis',{fatal:false}).decode(buf);}
      catch(e2){showToast('CSVの文字コードを判定できませんでした');return;}
    }
    parseAndImportCustomerCsv(text);
  };
  reader.readAsArrayBuffer(file);
  inputEl.value='';
}

function detectUtf8(bytes){
  var i=0,n=Math.min(bytes.length,1024),valid=0,total=0;
  while(i<n){
    var b=bytes[i];
    if(b<0x80){i++;continue;}
    total++;
    if((b&0xE0)===0xC0&&i+1<n&&(bytes[i+1]&0xC0)===0x80){valid++;i+=2;}
    else if((b&0xF0)===0xE0&&i+2<n&&(bytes[i+1]&0xC0)===0x80&&(bytes[i+2]&0xC0)===0x80){valid++;i+=3;}
    else if((b&0xF8)===0xF0&&i+3<n&&(bytes[i+1]&0xC0)===0x80&&(bytes[i+2]&0xC0)===0x80&&(bytes[i+3]&0xC0)===0x80){valid++;i+=4;}
    else{i++;}
  }
  return total>0&&valid/total>0.9;
}

function parseAndImportCustomerCsv(text){
  text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  var lines=text.split('\n').filter(function(l){return l.length>0;});
  if(lines.length<2){showToast('CSVが空です');return;}
  var parseLine=function(line){
    var out=[],cur='',inQ=false;
    for(var i=0;i<line.length;i++){
      var c=line[i];
      if(inQ){
        if(c==='"'&&line[i+1]==='"'){cur+='"';i++;}
        else if(c==='"'){inQ=false;}
        else cur+=c;
      }else{
        if(c==='"'){inQ=true;}
        else if(c===','){out.push(cur);cur='';}
        else cur+=c;
      }
    }
    out.push(cur);
    return out;
  };
  var header=parseLine(lines[0]);
  var col={};
  header.forEach(function(h,i){
    h=h.trim();
    if(h==='得意先ID'||h==='ID')col.id=i;
    else if(h==='親子区分名')col.parentChildType=i;
    else if(h==='得意先名１'||h==='得意先名1'||h==='得意先名'||h==='会社名')col.name1=i;
    else if(h==='得意先名２'||h==='得意先名2')col.name2=i;
    else if(h==='得意先名３'||h==='得意先名3')col.name3=i;
    else if(h==='略称名'||h==='略称')col.shortName=i;
    else if(h==='かな読み'||h==='フリガナ'||h==='かな')col.kana=i;
    else if(h==='郵便番号')col.zip=i;
    else if(h==='住所１'||h==='住所1'||h==='住所')col.addr1=i;
    else if(h==='住所２'||h==='住所2')col.addr2=i;
    else if(h==='住所３'||h==='住所3')col.addr3=i;
    else if(h==='電話番号'||h==='TEL'||h==='Tel')col.tel=i;
    else if(h==='ＦＡＸ'||h==='FAX'||h==='Fax')col.fax=i;
    else if(h==='営業所ID')col.officeId=i;
    else if(h==='営業担当者ID')col.staffId=i;
    else if(h==='きっかけ区分')col.kikkakeId=i;
    else if(h==='摘要必須')col.requireRemark=i;
    else if(h==='Ｔ集金日'||h==='T集金日')col.collectDay=i;
    else if(h==='親ID')col.parentId=i;
    else if(h==='荷送主名１'||h==='荷送主名1')col.shipperName1=i;
    else if(h==='荷送主名２'||h==='荷送主名2')col.shipperName2=i;
    else if(h==='荷送主名３'||h==='荷送主名3')col.shipperName3=i;
    else if(h==='荷送主郵便番号')col.shipperZip=i;
    else if(h==='荷送主住所１'||h==='荷送主住所1')col.shipperAddr1=i;
    else if(h==='荷送主住所２'||h==='荷送主住所2')col.shipperAddr2=i;
    else if(h==='荷送主住所３'||h==='荷送主住所3')col.shipperAddr3=i;
    else if(h==='荷送主電話番号')col.shipperTel=i;
    else if(h==='摘要内容')col.remark=i;
  });
  if(col.id===undefined||col.name1===undefined){
    showToast('CSV列「得意先ID」「得意先名１」が見つかりません');
    return;
  }
  var total=lines.length-1;
  var statusEl=document.createElement('div');
  statusEl.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:24px 32px;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.2);font-family:inherit;z-index:10000;min-width:300px;text-align:center';
  statusEl.innerHTML='<div style="font-size:16px;font-weight:600;color:#03968F;margin-bottom:12px">お客様CSV取込中...</div><div id="csv-progress" style="font-size:13px;color:#374151;white-space:pre-line;line-height:1.6">準備中...</div>';
  document.body.appendChild(statusEl);
  var batch={};
  var counts={ok:0,skip:0,osaka:0,shiga:0,nagoya:0,allBranch:0};
  var idx=1;
  var getField=function(fields,colKey){return col[colKey]!==undefined?(fields[col[colKey]]||'').trim():'';};
  var joinNames=function(fields,k1,k2,k3){
    var n1=getField(fields,k1),n2=getField(fields,k2),n3=getField(fields,k3);
    var arr=[n1,n2,n3].filter(function(s){return s;});
    return arr.join(' ');
  };
  var joinAddr=function(fields,k1,k2,k3){
    var a1=getField(fields,k1),a2=getField(fields,k2),a3=getField(fields,k3);
    return (a1+a2+a3).trim();
  };
  function processNext(){
    var endIdx=Math.min(idx+500,lines.length);
    for(;idx<endIdx;idx++){
      var fields=parseLine(lines[idx]);
      var id=getField(fields,'id');
      var n1=getField(fields,'name1');
      if(!id||!n1){counts.skip++;continue;}
      if(/【使用禁止】/.test(n1)){counts.skip++;continue;}
      var existing=customers[id];
      if(existing&&existing.importSource!=='csvImport'){counts.skip++;continue;}
      var officeId=getField(fields,'officeId');
      var branch=BRANCH_BY_OFFICE_ID[officeId]||'all';
      if(branch==='osaka')counts.osaka++;
      else if(branch==='shiga')counts.shiga++;
      else if(branch==='nagoya')counts.nagoya++;
      else counts.allBranch++;
      var staffId=getField(fields,'staffId');
      var staffName=STAFF_ID_MASTER[staffId]||'';
      var kikkakeId=getField(fields,'kikkakeId');
      var kikkakeName=KIKKAKE_MASTER[kikkakeId]||'';
      var requireRemark=getField(fields,'requireRemark');
      var parentChildType=getField(fields,'parentChildType');
      var parentId=getField(fields,'parentId');
      var shipperName=joinNames(fields,'shipperName1','shipperName2','shipperName3');
      var shipperAddr=joinAddr(fields,'shipperAddr1','shipperAddr2','shipperAddr3');
      var shipperZip=getField(fields,'shipperZip');
      var shipperTel=getField(fields,'shipperTel');
      var name=joinNames(fields,'name1','name2','name3');
      var addr=joinAddr(fields,'addr1','addr2','addr3');
      batch['customers/'+id]={
        companyName:name,
        shortName:getField(fields,'shortName'),
        kana:getField(fields,'kana'),
        zipcode:getField(fields,'zip'),
        pickupAddress:addr,
        tel:getField(fields,'tel'),
        fax:getField(fields,'fax'),
        shipperName:shipperName,
        shipperAddress:shipperAddr,
        shipperZipcode:shipperZip,
        shipperTel:shipperTel,
        branch:branch,
        officeId:officeId,
        staffId:staffId,
        staffName:staffName,
        kikkakeId:kikkakeId,
        kikkakeName:kikkakeName,
        requireRemark:requireRemark==='1',
        remark:getField(fields,'remark'),
        collectDay:getField(fields,'collectDay'),
        parentChildType:parentChildType,
        parentId:parentId,
        approved:true,
        importSource:'csvImport',
        updatedAt:Date.now()
      };
      counts.ok++;
    }
    document.getElementById('csv-progress').textContent=
      (idx-1)+' / '+total+' 件処理\n'+
      '登録 '+counts.ok+'  スキップ '+counts.skip+'\n'+
      '大阪 '+counts.osaka+' / 滋賀 '+counts.shiga+' / 名古屋 '+counts.nagoya+' / 共通 '+counts.allBranch;
    if(idx<lines.length){
      if(Object.keys(batch).length>=1000){
        db.ref().update(batch).then(function(){
          batch={};
          setTimeout(processNext,30);
        }).catch(function(err){
          showToast('Firebase書込エラー: '+(err.message||''));
          if(statusEl.parentNode)statusEl.parentNode.removeChild(statusEl);
        });
      }else{
        setTimeout(processNext,0);
      }
    }else{
      if(Object.keys(batch).length){
        db.ref().update(batch).then(function(){
          if(statusEl.parentNode)statusEl.parentNode.removeChild(statusEl);
          showToast('CSV取込完了: '+counts.ok+'件 (大阪'+counts.osaka+' 滋賀'+counts.shiga+' 名古屋'+counts.nagoya+' 共通'+counts.allBranch+')');
        });
      }else{
        if(statusEl.parentNode)statusEl.parentNode.removeChild(statusEl);
        showToast('CSV取込完了: '+counts.ok+'件');
      }
    }
  }
  processNext();
}

function attachPickerKeyHandler(){
  if(window._custPickerKey)document.removeEventListener('keydown',window._custPickerKey,true);
  window._custPickerKey=function(e){
    if(!document.getElementById('cust-picker-overlay'))return;
    if(e.key==='Escape'){e.preventDefault();e.stopPropagation();closeCustomerPicker();return;}
    if(e.key==='F1'){e.preventDefault();e.stopPropagation();closeCustomerPicker();return;}
    if(_custPickerComposing)return; // IME中はキー操作無視
    if(e.key==='ArrowDown'){
      e.preventDefault();e.stopPropagation();
      if(!_custPickerVisibleEntries.length)return;
      _custPickerSelectedIdx=Math.min(_custPickerVisibleEntries.length-1,_custPickerSelectedIdx+1);
      updatePickerHighlight();
    }else if(e.key==='ArrowUp'){
      e.preventDefault();e.stopPropagation();
      if(!_custPickerVisibleEntries.length)return;
      _custPickerSelectedIdx=Math.max(0,_custPickerSelectedIdx-1);
      updatePickerHighlight();
    }else if(e.key==='Enter'){
      e.preventDefault();e.stopPropagation();
      if(!_custPickerVisibleEntries.length)return;
      var sel=_custPickerVisibleEntries[_custPickerSelectedIdx];
      if(!sel)return;
      if(_custPickerMode==='customer'){
        selectCustomerForPicker(sel.id);
      }else{
        selectHistoryForPicker(sel);
      }
    }
  };
  document.addEventListener('keydown',window._custPickerKey,true);
}

function custPickerOnInput(){
  if(_custPickerComposing)return;
  if(_custPickerSearchDebounce)clearTimeout(_custPickerSearchDebounce);
  _custPickerSearchDebounce=setTimeout(function(){
    _custPickerSelectedIdx=0;
    if(_custPickerMode==='customer')renderCustPickerList();
    else renderHistoryPickerList();
  },150);
}
function custPickerCompStart(){_custPickerComposing=true;}
function custPickerCompEnd(){
  _custPickerComposing=false;
  custPickerOnInput();
}

function updatePickerHighlight(){
  var list=document.getElementById('cust-picker-list');
  if(!list)return;
  var rows=list.querySelectorAll('[data-pickeridx]');
  rows.forEach(function(r){
    var idx=parseInt(r.dataset.pickeridx);
    if(idx===_custPickerSelectedIdx){
      r.style.background='#dcfce7';
      r.style.borderLeft='3px solid #03968F';
      // スクロール追従
      try{r.scrollIntoView({block:'nearest'});}catch(e){}
    }else{
      r.style.background='#fff';
      r.style.borderLeft='3px solid transparent';
    }
  });
}

function closeCustomerPicker(){
  var ov=document.getElementById('cust-picker-overlay');
  if(ov)ov.remove();
  if(window._custPickerKey){document.removeEventListener('keydown',window._custPickerKey,true);window._custPickerKey=null;}
  _custPickerVisibleEntries=[];
  _custPickerSelectedIdx=0;
  _custPickerComposing=false;
}

function renderCustPickerList(){
  var inp=document.getElementById('cust-picker-search');
  var list=document.getElementById('cust-picker-list');
  if(!list)return;
  var qRaw=(inp?inp.value:'').trim();
  var q=normalizeKanaForSearch(qRaw);
  var entries=Object.entries(customers||{}).filter(function(x){
    if(!x[1]||!x[1].companyName)return false;
    if(x[1].approved===false)return false;
    if(x[1].status==='pending')return false;
    if(currentBranch&&currentBranch!=='all'){
      var cb=x[1].branch||'';
      if(cb!=='all'&&cb!==currentBranch)return false;
    }
    return true;
  });
  if(q){
    entries=entries.filter(function(x){
      var c=x[1];
      var hay=normalizeKanaForSearch([x[0],c.companyName,c.shortName,c.kana,c.tel,c.pickupAddress].join(' '));
      return hay.includes(q);
    });
  }
  entries.sort(function(a,b){
    var ai=parseInt(a[0])||0,bi=parseInt(b[0])||0;
    if(ai&&bi)return ai-bi;
    return a[0].localeCompare(b[0]);
  });
  if(!entries.length){
    list.innerHTML='<div style="padding:30px;text-align:center;color:#9ca3af">該当するお客様がありません</div>';
    _custPickerVisibleEntries=[];
    return;
  }
  var truncated=entries.length>300;
  if(truncated)entries=entries.slice(0,300);
  // 表示用エントリを保存
  _custPickerVisibleEntries=entries.map(function(x){return {id:x[0],c:x[1]};});
  if(_custPickerSelectedIdx>=_custPickerVisibleEntries.length)_custPickerSelectedIdx=0;
  var h='';
  entries.forEach(function(x,idx){
    var cid=x[0],c=x[1];
    var branchLabel=({osaka:'大阪',shiga:'滋賀',nagoya:'名古屋',all:'共通'}[c.branch]||'');
    var branchColor=({osaka:'#03968F',shiga:'#f59e0b',nagoya:'#0891b2',all:'#9ca3af'}[c.branch]||'#9ca3af');
    var sel=idx===_custPickerSelectedIdx;
    h+='<div data-pickeridx="'+idx+'" onclick="_custPickerSelectedIdx='+idx+';selectCustomerForPicker(\''+esc(cid).replace(/\\'/g,"\\\\\\'")+'\')" style="padding:10px 14px;border-bottom:1px solid #f3f4f6;cursor:pointer;transition:background .08s;background:'+(sel?'#dcfce7':'#fff')+';border-left:3px solid '+(sel?'#03968F':'transparent')+'" onmouseover="this.style.background=\'#f0fdf4\'" onmouseout="this.style.background=\''+(sel?'#dcfce7':'#fff')+'\'">';
    h+='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
    h+='<span style="font-size:11px;font-weight:600;color:#03968F;background:#ecfdf5;padding:2px 8px;border-radius:6px;flex-shrink:0">ID:'+esc(cid)+'</span>';
    if(branchLabel)h+='<span style="font-size:10px;font-weight:600;color:#fff;background:'+branchColor+';padding:2px 6px;border-radius:5px;flex-shrink:0">'+branchLabel+'</span>';
    if(c.parentChildType==='親')h+='<span style="font-size:10px;font-weight:600;color:#fff;background:#7c3aed;padding:2px 6px;border-radius:5px;flex-shrink:0">親</span>';
    else if(c.parentChildType==='子')h+='<span style="font-size:10px;font-weight:600;color:#7c3aed;background:#ede9fe;padding:2px 6px;border-radius:5px;flex-shrink:0">子</span>';
    h+='<span style="font-size:14px;font-weight:600;color:#2F2C2C">'+esc(c.companyName||'')+'</span>';
    h+='</div>';
    if(c.pickupAddress)h+='<div style="font-size:12px;color:#6b7280;margin-top:3px;padding-left:48px">'+esc(c.pickupAddress)+'</div>';
    var subInfo=[];
    if(c.tel)subInfo.push('TEL: '+c.tel);
    if(c.staffName)subInfo.push('担当: '+c.staffName);
    if(subInfo.length)h+='<div style="font-size:11px;color:#9ca3af;margin-top:2px;padding-left:48px">'+esc(subInfo.join(' / '))+'</div>';
    h+='</div>';
  });
  if(truncated)h+='<div style="padding:10px;text-align:center;color:#9ca3af;font-size:12px">他に '+(Object.keys(customers).length-300)+' 件あります。検索で絞り込んでください</div>';
  list.innerHTML=h;
}

// 過去案件から引取先 or 配達先のユニーク履歴を集計してリスト表示
function renderHistoryPickerList(){
  var inp=document.getElementById('cust-picker-search');
  var list=document.getElementById('cust-picker-list');
  if(!list)return;
  var qRaw=(inp?inp.value:'').trim();
  var q=normalizeKanaForSearch(qRaw);
  var isPickup=_custPickerMode==='history-pickup';
  // ordersから「会社名+住所」でユニーク化、件数カウント
  var seen={};
  Object.values(orders||{}).forEach(function(o){
    if(!o||o.isRegular)return;
    var co=isPickup?(o.pickupCompany||''):(o.deliveryCompany||'');
    var ad=isPickup?(o.pickupAddress||''):(o.deliveryAddress||'');
    co=co.trim();ad=ad.trim();
    if(!co&&!ad)return;
    var key=co+'|'+ad;
    if(!seen[key]){
      seen[key]={company:co,address:ad,count:0,latestDate:''};
    }
    seen[key].count++;
    var pd=o.pickupDate||'';
    if(pd>seen[key].latestDate)seen[key].latestDate=pd;
  });
  var entries=Object.values(seen);
  if(q){
    entries=entries.filter(function(x){
      return normalizeKanaForSearch(x.company+' '+x.address).includes(q);
    });
  }
  // 使用回数の多い順、同数なら最新利用日順
  entries.sort(function(a,b){
    if(b.count!==a.count)return b.count-a.count;
    return (b.latestDate||'').localeCompare(a.latestDate||'');
  });
  if(!entries.length){
    list.innerHTML='<div style="padding:30px;text-align:center;color:#9ca3af">該当する履歴がありません</div>';
    _custPickerVisibleEntries=[];
    return;
  }
  var truncated=entries.length>200;
  if(truncated)entries=entries.slice(0,200);
  _custPickerVisibleEntries=entries.map(function(x){return {company:x.company,address:x.address,count:x.count};});
  if(_custPickerSelectedIdx>=_custPickerVisibleEntries.length)_custPickerSelectedIdx=0;
  var h='';
  entries.forEach(function(x,idx){
    var sel=idx===_custPickerSelectedIdx;
    h+='<div data-pickeridx="'+idx+'" onclick="_custPickerSelectedIdx='+idx+';selectHistoryForPicker(_custPickerVisibleEntries['+idx+'])" style="padding:10px 14px;border-bottom:1px solid #f3f4f6;cursor:pointer;transition:background .08s;background:'+(sel?'#dcfce7':'#fff')+';border-left:3px solid '+(sel?'#03968F':'transparent')+'" onmouseover="this.style.background=\'#f0fdf4\'" onmouseout="this.style.background=\''+(sel?'#dcfce7':'#fff')+'\'">';
    h+='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
    h+='<span style="font-size:11px;font-weight:600;color:#0891b2;background:#cffafe;padding:2px 8px;border-radius:6px;flex-shrink:0">'+x.count+'回</span>';
    h+='<span style="font-size:14px;font-weight:600;color:#2F2C2C">'+esc(x.company||'(会社名なし)')+'</span>';
    h+='</div>';
    if(x.address)h+='<div style="font-size:12px;color:#6b7280;margin-top:3px;padding-left:42px">'+esc(x.address)+'</div>';
    h+='</div>';
  });
  if(truncated)h+='<div style="padding:10px;text-align:center;color:#9ca3af;font-size:12px">他に '+(Object.keys(seen).length-200)+' 件あります。検索で絞り込んでください</div>';
  list.innerHTML=h;
}

function selectCustomerForPicker(cid){
  var ov=document.getElementById('cust-picker-overlay');
  if(!ov)return;
  var target=ov.dataset.target;
  var c=customers[cid];
  if(!c){closeCustomerPicker();return;}
  var focusTarget=null;
  if(target==='client'){
    var cnInp=document.getElementById('oepdf-clientName');
    var idInp=document.getElementById('oepdf-clientCustomerId');
    if(cnInp){cnInp.value=c.companyName||'';cnInp.style.background='#dcfce7';setTimeout(function(){cnInp.style.background='';},600);focusTarget=cnInp;}
    if(idInp)idInp.value=cid;
    // 引取先が空なら自動反映（既入力は尊重）
    var pcInp=document.getElementById('oepdf-pickupCompany');
    var paInp=document.getElementById('oepdf-pickupAddress');
    var pickupEmpty=(!pcInp||!pcInp.value.trim())&&(!paInp||!paInp.value.trim());
    if(pickupEmpty){
      if(pcInp){pcInp.value=c.companyName||'';pcInp.style.background='#dcfce7';setTimeout(function(){pcInp.style.background='';},800);}
      if(paInp){paInp.value=stripPostalCode(c.pickupAddress||'');paInp.style.background='#dcfce7';setTimeout(function(){paInp.style.background='';},800);}
    }
  }else if(target==='pickup'){
    var pcInp2=document.getElementById('oepdf-pickupCompany');
    var paInp2=document.getElementById('oepdf-pickupAddress');
    if(pcInp2){pcInp2.value=c.companyName||'';pcInp2.style.background='#dcfce7';setTimeout(function(){pcInp2.style.background='';},600);focusTarget=pcInp2;}
    if(paInp2){paInp2.value=stripPostalCode(c.pickupAddress||'');paInp2.style.background='#dcfce7';setTimeout(function(){paInp2.style.background='';},600);}
  }
  closeCustomerPicker();
  // ピッカーが閉じた後、対象フィールドにフォーカス＋カーソル末尾（Tabで次の項目に進めるように）
  if(focusTarget){
    setTimeout(function(){
      try{focusTarget.focus();var len=focusTarget.value.length;focusTarget.setSelectionRange(len,len);}catch(e){}
    },80);
  }
  showToast('お客様 '+(c.companyName||'')+' を反映しました');
}

// 履歴ピッカーで選択された項目を反映
function selectHistoryForPicker(item){

}

// 2段階目：実行確認（「DELETE」入力）
function bulkDelExecConfirm(scope){
  closeBulkDelOverlay();
  // 対象を集計
  var targets=[];
  Object.entries(customers||{}).forEach(function(e){
    var cid=e[0],c=e[1];
    if(!c)return;
    if(scope==='all'){targets.push(cid);}
    else if(scope==='csvImport'){if(c.importSource==='csvImport')targets.push(cid);}
    else if(scope==='all-branch'){if(c.branch==='all'||!c.branch)targets.push(cid);}
    else{if(c.branch===scope)targets.push(cid);}
  });
  if(!targets.length){
    showToast('対象のお客様がありません');
    return;
  }
  var scopeLabel={
    'all':'全件',
    'csvImport':'CSV取込分',
    'osaka':'大阪本社',
    'shiga':'滋賀支店',
    'nagoya':'名古屋支店',
    'all-branch':'全拠点共通'
  }[scope]||scope;
  var ov=document.createElement('div');
  ov.id='bulk-del-overlay';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10001;display:flex;align-items:center;justify-content:center;font-family:inherit';
  ov.innerHTML=

function bulkDelOnInput(){
  var inp=document.getElementById('bulk-del-confirm');
  var btn=document.getElementById('bulk-del-go');
  if(!inp||!btn)return;
  if(inp.value.trim().toUpperCase()==='DELETE'){
    btn.disabled=false;
    btn.style.cursor='pointer';
    btn.style.opacity='1';
  }else{
    btn.disabled=true;
    btn.style.cursor='not-allowed';
    btn.style.opacity='.4';
  }
}

function bulkDelExecute(scope){
  // 対象を再集計（直前変更にも追従）
  var targets=[];
  Object.entries(customers||{}).forEach(function(e){
    var cid=e[0],c=e[1];
    if(!c)return;
    if(scope==='all'){targets.push(cid);}
    else if(scope==='csvImport'){if(c.importSource==='csvImport')targets.push(cid);}
    else if(scope==='all-branch'){if(c.branch==='all'||!c.branch)targets.push(cid);}
    else{if(c.branch===scope)targets.push(cid);}
  });
  if(!targets.length){closeBulkDelOverlay();showToast('対象がありません');return;}
  // 進捗ダイアログに置き換え
  var ov=document.getElementById('bulk-del-overlay');
  if(ov)ov.remove();
  var statusEl=document.createElement('div');
  statusEl.id='bulk-del-overlay';
  statusEl.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10001;display:flex;align-items:center;justify-content:center;font-family:inherit';
  statusEl.innerHTML='<div style="background:#fff;border-radius:14px;padding:24px 32px;min-width:300px;text-align:center;box-shadow:0 12px 48px rgba(0,0,0,.3)"><div style="font-size:16px;font-weight:600;color:#dc2626;margin-bottom:12px">削除中...</div><div id="bulk-del-progress" style="font-size:14px;color:#374151">0 / '+targets.length+' 件</div></div>';
  document.body.appendChild(statusEl);
  // 1500件ずつバッチで削除（Firebaseのupdate()でnullを送ると削除になる）
  var idx=0,deleted=0;
  function processNext(){
    var endIdx=Math.min(idx+1500,targets.length);
    var batch={};
    for(;idx<endIdx;idx++){
      batch['customers/'+targets[idx]]=null;
    }
    db.ref().update(batch).then(function(){
      deleted=idx;
      var prog=document.getElementById('bulk-del-progress');
      if(prog)prog.textContent=deleted+' / '+targets.length+' 件削除';
      if(idx<targets.length){
        setTimeout(processNext,30);
      }else{
        var st=document.getElementById('bulk-del-overlay');
        if(st)st.remove();
        showToast(deleted+'件のお客様を削除しました');
      }
    }).catch(function(err){
      var st=document.getElementById('bulk-del-overlay');
      if(st)st.remove();
      showToast('削除エラー: '+(err.message||''));
    });
  }
  processNext();
}

function _savePreSlip(cid,recordId){
  var dateStr=document.getElementById('preslip-date').value;
  var author=document.getElementById('preslip-author').value.trim();
  var fudaCount=parseInt(document.getElementById('preslip-fuda').value,10)||0;
  var slipCount=parseInt(document.getElementById('preslip-slip').value,10)||0;
  var fromVal=document.getElementById('preslip-from').value.trim().replace(/[^\d]/g,'');
  var toVal=document.getElementById('preslip-to').value.trim().replace(/[^\d]/g,'');
  if(!dateStr){showToast('作成日付を入力してください');return;}
  if(!author){showToast('作成者名を入力してください');return;}
  if(fudaCount<=0&&slipCount<=0){showToast('荷札または伝票の枚数を入力してください');return;}
  if(slipCount>0&&(!fromVal||!toVal)){showToast('伝票番号範囲を入力してください');return;}
  if(fromVal&&fromVal.length!==10){showToast('伝票番号は10桁で入力してください');return;}
  if(toVal&&toVal.length!==10){showToast('伝票番号は10桁で入力してください');return;}
  if(fromVal&&toVal&&parseInt(fromVal,10)>parseInt(toVal,10)){showToast('伝票番号の開始が終了より大きいです');return;}

  // 作成日付を Date オブジェクトに変換（タイムスタンプ）
  var createdAt=new Date(dateStr+'T00:00:00').getTime();

  var data={
    createdAt:createdAt,
    createdBy:author,
    fudaCount:fudaCount,
    slipCount:slipCount,
    slipNoFrom:fromVal,
    slipNoTo:toVal
  };

  try{
    var ref;
    if(recordId){
      ref=db.ref('customers/'+cid+'/preSlips/'+recordId);
      data.updatedAt=Date.now();
      ref.update(data).then(function(){
        document.getElementById('preslip-modal').remove();
        showToast('事前発行伝票を更新しました');
        // ローカルキャッシュを即更新
        if(!customers[cid].preSlips)customers[cid].preSlips={};
        customers[cid].preSlips[recordId]=Object.assign(customers[cid].preSlips[recordId]||{},data);
        var el=document.getElementById('cust-preslip-table');
        if(el)el.innerHTML=_custPreSlipTable(cid);
      }).catch(function(err){showToast('保存エラー: '+(err.message||err));});
    }else{
      ref=db.ref('customers/'+cid+'/preSlips').push();
      ref.set(data).then(function(){
        document.getElementById('preslip-modal').remove();
        showToast('事前発行伝票を登録しました');
        if(!customers[cid].preSlips)customers[cid].preSlips={};
        customers[cid].preSlips[ref.key]=data;
        var el=document.getElementById('cust-preslip-table');
        if(el)el.innerHTML=_custPreSlipTable(cid);
      }).catch(function(err){showToast('保存エラー: '+(err.message||err));});
    }
  }catch(e){
    showToast('保存に失敗しました: '+e.message);
  }
}

  dexConfirm('この事前発行伝票を削除しますか？',{

// お客様詳細：売上推移チャート（前期 vs 今期、月次12ヶ月）
function _custDetailChart(){
  var W=680,H=280;
  var pad={l:55,r:30,t:24,b:36};
  var iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  var metric=_custDetailMetric||'sales';
  var periodN=(typeof _custDetailChartPeriod!=='undefined'&&_custDetailChartPeriod)?_custDetailChartPeriod:12;
  // 期間に応じてデータ点数とラベル
  var labels=[], dataPoints, labelStep;
  if(periodN===1){
    // 1ヶ月：日次30点
    dataPoints=30;
    for(var i=1;i<=30;i++)labels.push(i+'日');
    labelStep=5;
  }else if(periodN===3){
    // 3ヶ月：週ごと12点
    dataPoints=12;
    var nowD=new Date();
    for(var i=0;i<12;i++){
      var d=new Date(nowD);d.setDate(d.getDate()-(11-i)*7);
      labels.push((d.getMonth()+1)+'/'+d.getDate());
    }
    labelStep=2;
  }else{
    // 6/12/24ヶ月：月ごと
    dataPoints=periodN;
    var nowM=new Date();
    for(var i=0;i<dataPoints;i++){
      var d=new Date(nowM);d.setMonth(d.getMonth()-(dataPoints-1-i));
      labels.push((d.getMonth()+1)+'月');
    }
    labelStep=periodN>=18?3:(periodN>=12?2:1);
  }
  // メトリックごとのスケールと単位
  var scaleMap={sales:5800,customers:50,orders:520};
  var baseScale=scaleMap[metric]||5800;
  var unitLabel={sales:'（万円）',customers:'（件）',orders:'（件）'}[metric]||'';
  // ダミーデータ生成（漸増 + ジッター）
  var thisYear=[];
  for(var d=0;d<dataPoints;d++){
    var prog=(d+1)/dataPoints;
    var base=prog*baseScale*(0.7+0.4*prog);
    var jitter=Math.sin(d*1.7)*(baseScale*0.05)+Math.cos(d*0.9)*(baseScale*0.03);
    thisYear.push(Math.max(metric==='customers'?1:5,Math.round(base+jitter)));
  }
  var maxData=Math.max.apply(null,thisYear);
  var roundUnit=metric==='sales'?1000:(metric==='orders'?100:10);
  var yMax=Math.max(roundUnit,Math.ceil(maxData*1.15/roundUnit)*roundUnit);
  var n=labels.length;
  var sx=function(i){return pad.l+(n>1?i/(n-1)*iW:0);};
  var sy=function(v){return pad.t+iH-(v/yMax)*iH;};
  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block" preserveAspectRatio="xMidYMid meet">';
  // Y軸
  for(var s=0;s<=5;s++){
    var val=yMax/5*s;var y=sy(val);
    svg+='<line x1="'+pad.l+'" y1="'+y+'" x2="'+(W-pad.r)+'" y2="'+y+'" stroke="#f1f3f5" stroke-width="1"/>';
    svg+='<text x="'+(pad.l-10)+'" y="'+(y+4)+'" font-size="11" fill="#9ca3af" text-anchor="end">'+Math.round(val).toLocaleString()+'</text>';
  }
  svg+='<text x="'+pad.l+'" y="'+(pad.t-10)+'" font-size="10" fill="#9ca3af">'+unitLabel+'</text>';
  // X軸
  labels.forEach(function(m,i){
    if(i===0||(i+1)%labelStep===0||i===n-1){
      svg+='<text x="'+sx(i)+'" y="'+(H-pad.b+20)+'" font-size="11" fill="#9ca3af" text-anchor="middle">'+m+'</text>';
    }
  });
  // ライン
  var tp='';thisYear.forEach(function(v,i){tp+=(i===0?'M':'L')+sx(i)+' '+sy(v)+' ';});
  svg+='<path d="'+tp+'" fill="none" stroke="#079C95" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>';
  thisYear.forEach(function(v,i){
    if(dataPoints<=15||i%2===0||i===dataPoints-1)svg+='<circle cx="'+sx(i)+'" cy="'+sy(v)+'" r="4.5" fill="#079C95" stroke="#fff" stroke-width="2"/>';
  });
  svg+='</svg>';
  return svg;
}

function _custHistoryHandleKeydown(e,input,nextId){
  if(e.key==='Tab'||e.key==='Enter'){

    _custHistoryNormalizeDate(input);
    if(nextId){
      e.preventDefault();
      var nextEl=document.getElementById(nextId);
      if(nextEl){nextEl.focus();nextEl.select();}
    }else{

      }
    }
  }

// 日付入力の正規化：0401→2026/4/1、20260401→2026/4/1
function _custHistoryNormalizeDate(input){
  var v=input.value.trim().replace(/[^\d]/g,'');
  if(!v){input.value='';return;}
  var year,month,day;
  if(v.length===4){
    // MMDD形式
    year=new Date().getFullYear();
    month=parseInt(v.substring(0,2),10);
    day=parseInt(v.substring(2,4),10);
  }else if(v.length===8){
    // YYYYMMDD形式
    year=parseInt(v.substring(0,4),10);
    month=parseInt(v.substring(4,6),10);
    day=parseInt(v.substring(6,8),10);
  }else if(v.length===6){
    // YYMMDD形式（任意対応）
    year=2000+parseInt(v.substring(0,2),10);
    month=parseInt(v.substring(2,4),10);
    day=parseInt(v.substring(4,6),10);
  }else{
    showToast('日付は MMDD（例: 0401）または YYYYMMDD（例: 20260401）で入力してください');
    input.value='';return;
  }
  if(month<1||month>12||day<1||day>31){
    showToast('正しい日付を入力してください');
    input.value='';return;
  }
  // 表示は YYYY/MM/DD
  input.value=year+'/'+String(month).padStart(2,'0')+'/'+String(day).padStart(2,'0');
}

function _custHistoryApplyDateFilter(){

}

function _custHistoryExportCsv(){

  var customerOrders=Object.entries(orders||{}).filter(function(x){

  });
  // 日付フィルタ適用
  if(_custHistoryFromDate||_custHistoryToDate){

  }
  // CSVヘッダ
  var headers=['伝票番号','発送日','集荷先名','集荷先住所','配送先名','配送先住所','重量(kg)','サイズ','運賃(円)'];
  var rows=[headers.join(',')];
  customerOrders.forEach(function(x){
    var o=x[1]||{};
    var row=[
      o.barcode||x[0],
      o.pickupDate||'',
      (o.pickupCompany||o.pickupName||'').replace(/,/g,'，'),
      (o.pickupAddress||'').replace(/,/g,'，'),
      (o.deliveryCompany||'').replace(/,/g,'，'),
      (o.deliveryAddress||'').replace(/,/g,'，'),
      String(o.weight||'').replace(/[^\d.]/g,''),
      String(o.size||o.saisuu||'').replace(/,/g,'，'),
      String(o.fare||'')
    ];
    rows.push(row.join(','));
  });
  if(rows.length===1){showToast('対象のデータがありません');return;}
  // BOM付きCSV（Excel対応）
  var bom=new Uint8Array([0xEF,0xBB,0xBF]);
  var blob=new Blob([bom,rows.join('\r\n')],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download=(cu.companyName||'customer')+'_履歴_'+new Date().toISOString().substring(0,10)+'.csv';
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},100);
  showToast('CSVを出力しました（'+(rows.length-1)+'件）');
}

function filterCustomerOrders(q){
  if(!currentCustomerId)return;
  var cu=customers[currentCustomerId];if(!cu)return;
  var custName=cu.companyName||'';
  var all=Object.entries(orders).filter(function(x){return(x[1].clientName||'')===custName;});
  all.sort(function(a,b){return(b[1].pickupDate||'').localeCompare(a[1].pickupDate||'');});
  var ql=q.trim().toLowerCase();
  if(ql){
    all=all.filter(function(x){
      var o=x[1];
      return [o.pickupDate,o.deliveryDate,o.pickupCompany,o.deliveryCompany,o.deliveryAddress,o.shape,o.barcode].join(' ').toLowerCase().includes(ql);
    });
  }
  document.getElementById('custord-table-wrap').innerHTML=renderCustomerOrdersTable(all);
}

function saveCustomerForm(cid){
  var v=function(id){var el=document.getElementById(id);return el?el.value.trim():'';};
  var vRaw=function(id){var el=document.getElementById(id);return el?el.value:'';};
  var companyName=v('cu-company');
  if(!companyName){showToast('会社名を入力してください');return;}
  // 請求締日：5は不可
  var cutoffDay=v('cu-cutoffDay');
  if(cutoffDay==='5'){showToast('請求締日に「5」は設定できません');return;}

  // 住所結合（pickupAddress として保存：表示用）
  var addr1=v('cu-addr1'),addr2=v('cu-addr2'),addr3=v('cu-addr3');
  var fullAddr=(addr1+addr2+addr3).trim();
  var shipperAddr=(v('cu-shipperAddr1')+v('cu-shipperAddr2')+v('cu-shipperAddr3')).trim();
  var shipperName=[v('cu-shipperName1'),v('cu-shipperName2')].filter(Boolean).join(' ');
  var pickupAddrFull=(v('cu-pickupAddr1')+v('cu-pickupAddr2')+v('cu-pickupAddr3')).trim();
  var pickupNameFull=[v('cu-pickupName1'),v('cu-pickupName2')].filter(Boolean).join(' ');

  var staffId=v('cu-staffId');
  var kikkakeId=v('cu-kikkakeId');
  var serviceId=v('cu-serviceId');
  var industryId=v('cu-industryId');

  var data={
    // 請求先（=従来の会社情報）
    companyName:companyName,
    companyName2:v('cu-companyName2'),
    kana:v('cu-kana'),
    zipcode:v('cu-zipcode'),
    addr1:addr1,addr2:addr2,addr3:addr3,
    pickupAddress:fullAddr, // 互換のため住所をここにも入れる
    tel:v('cu-tel'),
    fax:v('cu-fax'),
    // 荷送主
    shipperName1:v('cu-shipperName1'),
    shipperName2:v('cu-shipperName2'),
    shipperName:shipperName,
    shipperZipcode:v('cu-shipperZipcode'),
    shipperAddr1:v('cu-shipperAddr1'),
    shipperAddr2:v('cu-shipperAddr2'),
    shipperAddr3:v('cu-shipperAddr3'),
    shipperAddress:shipperAddr,
    shipperTel:v('cu-shipperTel'),
    // 基本集荷先（新規）
    pickupName1:v('cu-pickupName1'),
    pickupName2:v('cu-pickupName2'),
    pickupName:pickupNameFull,
    pickupZipcode:v('cu-pickupZipcode'),
    pickupAddr1:v('cu-pickupAddr1'),
    pickupAddr2:v('cu-pickupAddr2'),
    pickupAddr3:v('cu-pickupAddr3'),
    pickupAddressFull:pickupAddrFull,
    pickupTel:v('cu-pickupTel'),
    // 事業者情報
    industryId:industryId,
    industryName:industryId&&INDUSTRY_MASTER[industryId]||'',
    autoCalc:v('cu-autoCalc')==='1',
    daieiTariffMode:v('cu-daieiTariffMode'),
    daieiTariffId:v('cu-daieiTariffId'),
    areaTariffMode:v('cu-areaTariffMode'),
    areaTariffId:v('cu-areaTariffId'),
    staffId:staffId,
    staffName:staffId&&STAFF_ID_MASTER[staffId]||'',
    kikkakeId:kikkakeId,
    kikkakeName:kikkakeId&&KIKKAKE_MASTER[kikkakeId]||'',
    serviceId:serviceId,
    serviceName:serviceId&&SERVICE_MASTER[serviceId]||'',
    memo:vRaw('cu-memo'),
    // 登録者情報
    registrantName:v('cu-registrantName'),
    registrantEmail:v('cu-registrantEmail'),
    registrantTel:v('cu-registrantTel'),
    registeredAt:(function(){var d=v('cu-registeredAt');if(!d)return null;var t=new Date(d);return isNaN(t.getTime())?null:t.getTime();})(),
    // 経理
    cutoffDay:cutoffDay,
    collectMonths:v('cu-collectMonths'),
    collectDay:v('cu-collectDay'),
    taxType:v('cu-taxType'),
    // メタ情報
    updatedAt:Date.now()
  };

  if(!cid){
    data.status='approved';
    data.createdAt=Date.now();
    if(!data.branch)data.branch=currentBranch!=='all'?currentBranch:'osaka';
  }else{
    var existing=customers[cid]||{};
    if(existing.status)data.status=existing.status;
    if(existing.createdAt)data.createdAt=existing.createdAt;
    if(existing.importSource)data.importSource=existing.importSource;
    if(existing.approved!==undefined)data.approved=existing.approved;
    // 担当営業所などの既存項目を引き継ぐ
    if(existing.branch)data.branch=existing.branch;
  }
  var ref=cid?db.ref('customers/'+cid):db.ref('customers').push();
  ref.set(data).then(function(){
    closeModal();showToast(cid?'更新しました':'登録しました');
    if(cid&&currentCustomerId===cid)renderCustomerDetail(cid);
    else renderCustomersView();
  }).catch(function(err){showToast('エラー: '+(err.message||err));});
}

  inner+='<button onclick="document.getElementById(\'approve-edit-modal\').remove()" style="padding:10px 18px;background:#fff;color:#374151;border:1.5px solid #eef0f2;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:600;font-size:13px">キャンセル</button>';
  inner+='<button onclick="_saveAndApprove(\''+cid+'\')" style="padding:10px 22px;background:#16a34a;color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:600;font-size:13px">追記して承認</button>';
  inner+='</div>';
  inner+='</div>';

  inner+='</div>';
  wrap.innerHTML=inner;
  document.body.appendChild(wrap);
}

function _rejectFromApproveModal(cid){
  dexConfirm('このお客様を却下しますか？',{
    title:'お客様の却下',okText:'却下',cancelText:'キャンセル',type:'danger'
  }).then(function(ok){
    if(!ok)return;
    document.getElementById('approve-edit-modal').remove();
    // 直接Firebase更新（rejectCustomer内のconfirmを避ける）
    try{
      db.ref('customers/'+cid+'/status').set('rejected').then(function(){
        showToast('却下しました');
        if(customers[cid])customers[cid].status='rejected';
      }).catch(function(err){showToast('却下エラー: '+(err.message||err));});
    }catch(e){showToast('却下エラー: '+e.message);}
  });
}

function _saveAndApprove(cid){
  var service=document.getElementById('approve-service').value;
  var staffId=document.getElementById('approve-staff').value;
  var autoCalc=document.getElementById('approve-autocalc').value;
  var tariff=document.getElementById('approve-tariff').value.trim();
  var tariffId=document.getElementById('approve-tariff-id').value.trim();
  var area=document.getElementById('approve-area').value.trim();
  var areaId=document.getElementById('approve-area-id').value.trim();
  var branch=document.getElementById('approve-branch').value;

  if(!service){showToast('サービス区分を選択してください');return;}
  if(!staffId){showToast('営業担当を選択してください');return;}
  if(!branch){showToast('担当営業所を選択してください');return;}

  // 追記内容を customers に保存（社員管理から名前を取得）
  var staffList=_getAllStaffList();
  var staffName='';
  for(var si=0;si<staffList.length;si++){if(staffList[si].id===staffId){staffName=staffList[si].name;break;}}
  var updates={
    serviceCode:service,
    staffId:staffId,
    staffName:staffName,
    autoCalcType:autoCalc,
    tariffName:tariff,
    tariffId:tariffId,
    areaMaster:area,
    areaId:areaId,
    branch:branch,
    status:'approved',
    approvedAt:Date.now(),
    approvedBy:(currentStaffData&&currentStaffData.name)||(currentStaffUser&&currentStaffUser.email&&currentStaffUser.email.split('@')[0])||''
  };
  try{
    db.ref('customers/'+cid).update(updates).then(function(){
      // ローカルキャッシュにも反映
      Object.assign(customers[cid],updates);
      document.getElementById('approve-edit-modal').remove();
      showToast('お客様を承認しました');
      // 承認待ちモーダルを再表示（残りがあれば）
      setTimeout(function(){
        var stillPending=Object.entries(customers||{}).filter(function(x){return x[1]&&x[1].status==='pending';});
        if(stillPending.length>0&&typeof openPendingModal==='function')openPendingModal();
        // お客様管理画面を再描画
        if(typeof renderCustomersView==='function')renderCustomersView();
      },300);
    }).catch(function(err){
      showToast('保存エラー: '+(err.message||err));
    });
  }catch(e){
    showToast('保存に失敗しました: '+e.message);
  }
}

function confirmApproveCustomer(cid,branch){
  var updates={status:'approved',branch:branch,approvedAt:Date.now()};
  // お客様が既に登録した案件（orders_public/webOrder）の branch も一括更新
  db.ref('customers/'+cid).update(updates).then(function(){
    // この顧客の webオーダー案件も branch を継承させる
    db.ref('orders').once('value').then(function(snap){
      var ords=snap.val()||{};
      var batch={};
      Object.keys(ords).forEach(function(oid){
        if(ords[oid].customerId===cid&&!ords[oid].branch){
          batch['orders/'+oid+'/branch']=branch;
        }
      });
      if(Object.keys(batch).length){db.ref().update(batch).catch(function(){});}
    });
    closeModal();
    showToast(({osaka:'大阪本社',shiga:'滋賀支店',nagoya:'名古屋支店'}[branch])+'で承認しました');
  }).catch(function(err){
    showToast('エラー: '+(err.message||''));
  });
}
function rejectCustomer(cid){
  if(!confirm('この申請を却下しますか？'))return;
  db.ref('customers/'+cid+'/status').set('rejected').then(function(){
    showToast('却下しました');
  });
}
function deleteCustomer(cid){
  var cu=customers[cid];

  }).catch(function(err){showToast('エラー: '+(err.message||err));});
}

// 拠点切替は changeBranch 本体で各ビュー再描画を実施

// ============================================
// 伝票入力 (Phase 3)
// ============================================
let slipsTab='pending';  // 'pending' | 'confirmed'
let slipsDate=todayStr();
let slipsSearchQ='';

function renderSlipsView(){
  // ドライバー一覧（リストから選ぶため）
  var driverList=Object.entries(drivers||{}).sort(function(a,b){return(a[1].order||0)-(b[1].order||0);});
  // 対象案件を抽出：集荷日ベース（実際に集荷した日）
  var items=Object.entries(orders).filter(function(x){
    var o=x[1];
    if(o.pickupDate!==slipsDate)return false;
    // 拠点フィルタ（顧客の拠点で絞り込み）
    if(currentBranch&&currentBranch!=='all'){
      var cu=Object.values(customers).find(function(c){return(c.companyName||'')===(o.clientName||'');});
      if(cu&&(cu.branch||'')!==currentBranch)return false;
      if(!cu)return false;  // お客様未登録なら全拠点表示したい場合はここを外す
    }
    return true;
  });
  // タブでフィルタ
  if(slipsTab==='pending')items=items.filter(function(x){return!x[1].slipConfirmed;});
  else items=items.filter(function(x){return!!x[1].slipConfirmed;});
  // 検索
  var q=slipsSearchQ.trim().toLowerCase();
  if(q){
    items=items.filter(function(x){
      var o=x[1];
      return [o.clientName,o.pickupCompany,o.deliveryCompany,o.deliveryAddress,o.barcode].join(' ').toLowerCase().includes(q);
    });
  }
  // ドライバー順→お客様順
  items.sort(function(a,b){
    var ao=drivers[a[1].pickupDriverId||a[1].driverId]?.order||9999;
    var bo=drivers[b[1].pickupDriverId||b[1].driverId]?.order||9999;
    if(ao!==bo)return ao-bo;
    return(a[1].clientName||'').localeCompare(b[1].clientName||'');
  });

  // 全未確定件数・全確定件数
  var allDate=Object.entries(orders).filter(function(x){return x[1].pickupDate===slipsDate;});
  var pendingCount=allDate.filter(function(x){return!x[1].slipConfirmed;}).length;
  var confirmedCount=allDate.filter(function(x){return!!x[1].slipConfirmed;}).length;
  // 合計運賃
  var totalFare=items.reduce(function(s,x){return s+(parseFloat(x[1].fare||0)||0);},0);

  var h='<div style="padding:6px 0 0">';
  // ヘッダ：タイトル + 日付ナビ
  h+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">';
  h+='<div style="font-size:28px;font-weight:600;color:#2F2C2C;letter-spacing:-.5px">伝票入力</div>';
  h+='<div style="display:flex;align-items:center;gap:4px;margin-left:auto">';
  h+='<button onclick="changeSlipsDate(-1)" style="background:#03968F;color:#fff;border:none;padding:6px 10px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600">◀</button>';
  h+='<input type="date" value="'+slipsDate+'" onchange="slipsDate=this.value;renderSlipsView()" style="padding:6px 10px;border:2px solid #e5e7eb;border-radius:8px;font-size:14px;font-weight:600">';
  h+='<button onclick="changeSlipsDate(1)" style="background:#03968F;color:#fff;border:none;padding:6px 10px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600">▶</button>';
  h+='<button onclick="slipsDate=todayStr();renderSlipsView()" style="background:#fff;color:#03968F;border:2px solid #03968F;padding:4px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;margin-left:4px">今日</button>';
  h+='</div></div>';

  // タブ
  h+='<div style="display:flex;gap:8px;margin-bottom:16px;border-bottom:2px solid #e5e7eb">';
  h+='<button onclick="slipsTab=\'pending\';renderSlipsView()" style="padding:10px 20px;border:none;background:'+(slipsTab==='pending'?'#03968F':'#fff')+';color:'+(slipsTab==='pending'?'#fff':'#374151')+';cursor:pointer;font-family:inherit;font-weight:600;font-size:14px;border-radius:10px 10px 0 0;border-bottom:3px solid '+(slipsTab==='pending'?'#03968F':'transparent')+'">未確定 '+pendingCount+'</button>';
  h+='<button onclick="slipsTab=\'confirmed\';renderSlipsView()" style="padding:10px 20px;border:none;background:'+(slipsTab==='confirmed'?'#16a34a':'#fff')+';color:'+(slipsTab==='confirmed'?'#fff':'#374151')+';cursor:pointer;font-family:inherit;font-weight:600;font-size:14px;border-radius:10px 10px 0 0;border-bottom:3px solid '+(slipsTab==='confirmed'?'#16a34a':'transparent')+'">✓ 確定済み '+confirmedCount+'</button>';
  h+='<div style="margin-left:auto;padding:8px 16px;background:#f0fdf4;border-radius:8px;color:#065f46;font-weight:600;font-size:14px">💴 表示中合計: ¥'+totalFare.toLocaleString()+'</div>';
  h+='</div>';

  // 検索
  h+='<div style="margin-bottom:12px">';
  h+='<input placeholder="お客様・配達先・バーコードで検索" value="'+esc(q)+'" oninput="slipsSearchQ=this.value;renderSlipsView()" style="width:100%;max-width:400px;padding:9px 14px;border:2px solid #e5e7eb;border-radius:10px;font-family:inherit;font-size:14px;box-sizing:border-box">';
  h+='</div>';

  // テーブル
  if(!items.length){
    h+='<div style="background:#fff;border:2px dashed #e5e7eb;border-radius:12px;padding:40px;text-align:center;color:#9ca3af">'+(slipsTab==='pending'?'未確定の伝票なし':'確定済みの伝票なし')+'</div>';
  }else{
    h+='<div style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05)"><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">';
    h+='<thead><tr style="background:#03968F;color:#fff;white-space:nowrap">';
    ['お客様','集荷先','配達先','重量','品名','集荷ドライバー','運賃(円)',''].forEach(function(c){
      h+='<th style="padding:10px 12px;text-align:left;font-weight:600;font-size:12px">'+c+'</th>';
    });
    h+='</tr></thead><tbody>';
    items.forEach(function(x,i){
      var oid=x[0],o=x[1];
      var bg=i%2===0?'#fff':'#f9fafb';
      var confirmed=!!o.slipConfirmed;
      h+='<tr data-slip-oid="'+oid+'" style="background:'+bg+';border-top:1px solid #f0f0f0'+(confirmed?';opacity:.85':'')+'">';
      h+='<td style="padding:8px 12px;max-width:180px"><div style="font-weight:600;color:#2F2C2C;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(o.clientName||'—')+'</div></td>';
      h+='<td style="padding:8px 12px;max-width:140px;font-size:12px;color:#6b7280;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(o.pickupCompany||'—')+'</td>';
      h+='<td style="padding:8px 12px;max-width:200px;font-size:12px"><div style="font-weight:600;color:#2F2C2C;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(o.deliveryCompany||'—')+'</div><div style="color:#9ca3af;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(o.deliveryAddress||'')+'</div></td>';
      h+='<td style="padding:8px 12px;white-space:nowrap;">'+esc(o.weight||'—')+'</td>';
      h+='<td style="padding:8px 12px;max-width:100px;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(o.shape||'—')+'</td>';
      // 集荷ドライバー
      h+='<td style="padding:6px 12px">';
      if(confirmed){
        h+='<div style="padding:6px 10px;font-weight:600;color:#2F2C2C">'+esc(drivers[o.pickupDriverId]?.name||drivers[o.driverId]?.name||'—')+'</div>';
      }else{
        h+='<select onchange="updateSlipField(\''+oid+'\',\'pickupDriverId\',this.value)" style="padding:7px 10px;border:2px solid #e5e7eb;border-radius:8px;font-family:inherit;font-size:13px;background:#fff;min-width:140px"><option value="">— 選択 —</option>';
        var selDid=o.pickupDriverId||o.driverId||'';
        driverList.forEach(function(d){
          h+='<option value="'+d[0]+'"'+(selDid===d[0]?' selected':'')+'>'+esc(d[1].name||'')+'</option>';
        });
        h+='</select>';
      }
      h+='</td>';
      // 運賃
      h+='<td style="padding:6px 12px">';
      if(confirmed){
        h+='<div style="padding:6px 10px;font-weight:600;color:#065f46;text-align:right">¥'+(parseFloat(o.fare||0)||0).toLocaleString()+'</div>';
      }else{
        h+='<input type="number" inputmode="numeric" placeholder="0" value="'+(o.fare||'')+'" onblur="updateSlipField(\''+oid+'\',\'fare\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()" style="padding:7px 10px;border:2px solid #e5e7eb;border-radius:8px;font-size:14px;text-align:right;width:110px;font-weight:600">';
      }
      h+='</td>';
      // アクション
      h+='<td style="padding:6px 12px;white-space:nowrap">';
      if(confirmed){
        h+='<button onclick="unconfirmSlip(\''+oid+'\')" style="padding:6px 12px;background:#fff;color:#dc2626;border:1px solid #fca5a5;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;font-size:12px">取消</button>';
      }else{
        h+='<button onclick="confirmSlip(\''+oid+'\')" style="padding:7px 16px;background:#16a34a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;font-size:13px;box-shadow:0 1px 3px rgba(22,163,74,.3)">✓ 確定</button>';
      }
      h+='</td>';
      h+='</tr>';
    });
    h+='</tbody></table></div></div>';
  }

  // 一括確定（未確定タブかつ運賃・ドライバー入力済みのものが複数あれば）
  if(slipsTab==='pending'){
    var batchReady=items.filter(function(x){var o=x[1];return(o.pickupDriverId||o.driverId)&&(parseFloat(o.fare||0)>0);});
    if(batchReady.length>=2){
      h+='<div style="margin-top:16px;text-align:right">';
      h+='<button onclick="confirmAllReadySlips()" style="padding:11px 24px;background:#16a34a;color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:600;font-size:14px;box-shadow:0 2px 6px rgba(22,163,74,.3)">✓ 入力済み '+batchReady.length+'件を一括確定</button>';
      h+='</div>';
    }
  }

  h+='</div>';
  document.getElementById('slips-view-body').innerHTML=h;
}

function changeSlipsDate(delta){
  var d=new Date(slipsDate);
  d.setDate(d.getDate()+delta);
  slipsDate=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  renderSlipsView();
}

function updateSlipField(oid,field,value){
  var u={};
  if(field==='fare'){
    var n=parseFloat(String(value).replace(/[^0-9.]/g,''))||0;
    u[field]=n;
  }else{
    u[field]=value||null;
  }
  u.updatedAt=Date.now();
  db.ref('orders/'+oid).update(u).then(function(){
    if(orders[oid]){Object.assign(orders[oid],u);}
  }).catch(function(err){showToast('エラー: '+(err.message||err));});
}

function confirmSlip(oid){
  var o=orders[oid];if(!o){showToast('見つかりません');return;}
  var did=o.pickupDriverId||o.driverId;
  if(!did){showToast('集荷ドライバーを選択してください');return;}
  var fare=parseFloat(o.fare||0)||0;
  if(fare<=0){
    if(!confirm('運賃が0円ですが確定しますか？'))return;
  }
  db.ref('orders/'+oid).update({
    slipConfirmed:true,
    slipConfirmedAt:Date.now(),
    slipConfirmedBy:(currentStaffData&&currentStaffData.name)||'',
    pickupDriverId:did,
    fare:fare,
    updatedAt:Date.now()
  }).then(function(){
    if(orders[oid]){orders[oid].slipConfirmed=true;orders[oid].slipConfirmedAt=Date.now();orders[oid].pickupDriverId=did;orders[oid].fare=fare;}
    showToast('確定しました');
    // 自動再描画される（orders listenerにより）
  }).catch(function(err){showToast('エラー: '+(err.message||err));});
}

function unconfirmSlip(oid){
  if(!confirm('確定を取り消しますか？'))return;
  db.ref('orders/'+oid).update({
    slipConfirmed:false,
    slipConfirmedAt:null,
    slipConfirmedBy:null,
    updatedAt:Date.now()
  }).then(function(){
    if(orders[oid]){orders[oid].slipConfirmed=false;}
    showToast('取り消しました');
  }).catch(function(err){showToast('エラー: '+(err.message||err));});
}

function confirmAllReadySlips(){
  var items=Object.entries(orders).filter(function(x){
    var o=x[1];
    if(o.pickupDate!==slipsDate)return false;
    if(o.slipConfirmed)return false;
    var did=o.pickupDriverId||o.driverId;
    if(!did)return false;
    if(!(parseFloat(o.fare||0)>0))return false;
    if(currentBranch&&currentBranch!=='all'){
      var cu=Object.values(customers).find(function(c){return(c.companyName||'')===(o.clientName||'');});
      if(cu&&(cu.branch||'')!==currentBranch)return false;
      if(!cu)return false;
    }
    return true;
  });
  if(!items.length){showToast('対象なし');return;}
  if(!confirm(items.length+'件の伝票を一括確定しますか？'))return;
  var updates={};
  var now=Date.now();
  var byName=(currentStaffData&&currentStaffData.name)||'';
  items.forEach(function(x){
    var oid=x[0],o=x[1];
    var did=o.pickupDriverId||o.driverId;
    updates['orders/'+oid+'/slipConfirmed']=true;
    updates['orders/'+oid+'/slipConfirmedAt']=now;
    updates['orders/'+oid+'/slipConfirmedBy']=byName;
    updates['orders/'+oid+'/pickupDriverId']=did;
    updates['orders/'+oid+'/updatedAt']=now;
  });
  db.ref().update(updates).then(function(){
    showToast(items.length+'件確定しました');
  }).catch(function(err){showToast('エラー: '+(err.message||err));});
}

let invoiceYearMonth=(function(){
  // デフォルト: 先月（月初以降なら先月分を発行する想定）
  var d=new Date();
  d.setDate(1);d.setMonth(d.getMonth()-1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
})();
let invoices={};  // {yyyymm: {cid: {total, orderCount, issuedAt, pdfUrl, ...}}}

db.ref('invoices').on('value',function(snap){
  invoices=snap.val()||{};
  var v=document.getElementById('view-invoice');
  if(v&&v.classList.contains('active')&&typeof renderInvoiceView==='function')renderInvoiceView();
});

const TAX_RATE=0.10;  // 消費税10%

function getMonthOrders(cid,yyyymm){
  // このお客様の、指定年月に集荷された、確定済みの案件
  var cu=customers[cid];if(!cu)return[];
  var custName=cu.companyName||'';
  return Object.entries(orders).filter(function(x){
    var o=x[1];
    if(!o.slipConfirmed)return false;
    if((o.clientName||'')!==custName)return false;
    if(!o.pickupDate||!o.pickupDate.startsWith(yyyymm))return false;
    return true;
  });
}

function calcInvoice(cid,yyyymm){
  var items=getMonthOrders(cid,yyyymm);
  var subtotal=items.reduce(function(s,x){return s+(parseFloat(x[1].fare||0)||0);},0);
  var tax=Math.floor(subtotal*TAX_RATE);
  var total=subtotal+tax;
  return{items:items,subtotal:subtotal,tax:tax,total:total,count:items.length};
}

function renderInvoiceView(){
  var [y,m]=invoiceYearMonth.split('-');

    var cu=x[1];
    // 拠点フィルタ
    if(currentBranch&&currentBranch!=='all'&&(cu.branch||'')!==currentBranch)return false;
    // その月に案件があるか
    var calc=calcInvoice(x[0],invoiceYearMonth);

function changeInvoiceMonth(delta){
  var [y,m]=invoiceYearMonth.split('-').map(Number);

  invoiceYearMonth=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  renderInvoiceView();
}

async function issueInvoice(cid){
  var cu=customers[cid];if(!cu){showToast('お客様不明');return;}
  var calc=calcInvoice(cid,invoiceYearMonth);
  if(!calc.count){showToast('対象案件なし');return;}
  if(!confirm(cu.companyName+' ('+invoiceYearMonth+'分, '+calc.count+'件, ¥'+calc.total.toLocaleString()+') を発行しますか？'))return;
  showToast('PDF生成中...');
  try{
    var pdfUrl=await generateAndUploadPdf(cid,invoiceYearMonth);
    // DBにメタデータ保存
    var meta={
      total:calc.total,
      subtotal:calc.subtotal,
      tax:calc.tax,
      orderCount:calc.count,
      issuedAt:Date.now(),
      issuedBy:(currentStaffData&&currentStaffData.name)||'',
      pdfUrl:pdfUrl,
      yearMonth:invoiceYearMonth,
      customerName:cu.companyName||'',
      customerBranch:cu.branch||''
    };
    await db.ref('invoices/'+invoiceYearMonth+'/'+cid).set(meta);
    showToast('✓ 発行完了');
  }catch(err){
    console.error(err);
    showToast('エラー: '+(err.message||err));
  }
}

async function generateAndUploadPdf(cid,yyyymm){
  // ライブラリ確認
  if(typeof html2canvas==='undefined'||typeof jspdf==='undefined'){
    throw new Error('PDFライブラリ読込中。少し待ってリトライしてください');
  }
  var renderArea=document.getElementById('invoice-render-area');
  if(!renderArea){
    // ビューが切り替わっているなら一時的に作る
    renderArea=document.createElement('div');
    renderArea.id='invoice-render-area-tmp';
    renderArea.style.cssText='position:fixed;left:-9999px;top:0;width:794px;background:#fff';
    document.body.appendChild(renderArea);
  }
  var html=generateInvoiceHtml(cid,yyyymm);
  renderArea.innerHTML=html;
  // フォント読み込み待ち
  await new Promise(function(r){setTimeout(r,300);});
  var target=renderArea.firstElementChild;
  var canvas=await html2canvas(target,{scale:2,useCORS:true,backgroundColor:'#fff',width:794,windowWidth:794});
  var imgData=canvas.toDataURL('image/jpeg',0.92);
  var {jsPDF}=jspdf;
  var pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  var pdfW=210,pdfH=297;
  var imgW=pdfW,imgH=canvas.height*pdfW/canvas.width;
  if(imgH<=pdfH){
    pdf.addImage(imgData,'JPEG',0,0,imgW,imgH);
  }else{
    // 複数ページ対応
    var y=0;
    while(y<imgH){
      if(y>0)pdf.addPage();
      pdf.addImage(imgData,'JPEG',0,-y,imgW,imgH);
      y+=pdfH;
    }
  }
  // Blobに変換してアップロード
  var blob=pdf.output('blob');
  var path='invoices/'+yyyymm+'/'+cid+'.pdf';
  var ref=storage.ref(path);
  await ref.put(blob,{contentType:'application/pdf'});
  var url=await ref.getDownloadURL();
  // render area 片付け
  if(renderArea.id==='invoice-render-area-tmp'){renderArea.remove();}
  else{renderArea.innerHTML='';}
  return url;
}

async function unissueInvoice(cid){
  if(!confirm('請求書発行を取り消しますか？\nPDFファイルも削除されます'))return;
  try{
    // PDFを削除
    try{await storage.ref('invoices/'+invoiceYearMonth+'/'+cid+'.pdf').delete();}catch(e){console.log('PDF delete skipped:',e.message);}
    // メタデータ削除
    await db.ref('invoices/'+invoiceYearMonth+'/'+cid).remove();
    showToast('取り消しました');
  }catch(err){showToast('エラー: '+(err.message||err));}
}

async function bulkIssueInvoices(){
  var targets=Object.entries(customers).filter(function(x){
    if(currentBranch&&currentBranch!=='all'&&(x[1].branch||'')!==currentBranch)return false;
    if(invoices[invoiceYearMonth]&&invoices[invoiceYearMonth][x[0]])return false;  // 既発行
    return calcInvoice(x[0],invoiceYearMonth).count>0;
  });
  if(!targets.length){showToast('対象なし');return;}
  if(!confirm(targets.length+'社の請求書を一括発行します。\n処理に時間がかかります（1社数秒）\nよろしいですか？'))return;
  var done=0,failed=0;
  for(var i=0;i<targets.length;i++){
    var cid=targets[i][0];
    var cu=targets[i][1];
    try{
      showToast('('+(i+1)+'/'+targets.length+') '+cu.companyName+' 生成中...');
      var calc=calcInvoice(cid,invoiceYearMonth);
      var pdfUrl=await generateAndUploadPdf(cid,invoiceYearMonth);
      var meta={
        total:calc.total,subtotal:calc.subtotal,tax:calc.tax,orderCount:calc.count,
        issuedAt:Date.now(),issuedBy:(currentStaffData&&currentStaffData.name)||'',
        pdfUrl:pdfUrl,yearMonth:invoiceYearMonth,
        customerName:cu.companyName||'',customerBranch:cu.branch||''
      };
      await db.ref('invoices/'+invoiceYearMonth+'/'+cid).set(meta);
      done++;
    }catch(err){
      console.error('Failed for '+cid,err);
      failed++;
    }
  }
  showToast('✓ '+done+'社 発行完了'+(failed?' / '+failed+'件失敗':''));
}

function mailInvoice(cid){
  var cu=customers[cid];if(!cu){return;}
  var inv=invoices[invoiceYearMonth]&&invoices[invoiceYearMonth][cid];
  var to=cu.email||'';
  var [y,m]=invoiceYearMonth.split('-').map(Number);
  var subject=y+'年'+m+'月分 請求書のお知らせ - DAIEI EXPRESS';
  var body='';
  body+=(cu.companyName||'')+'\n';
  body+=(cu.person?cu.person+' 様\n':'')+'\n';
  body+='いつもお世話になっております。\nDAIEI EXPRESSです。\n\n';
  body+=y+'年'+m+'月分の請求書を発行いたしました。\n\n';
  if(inv){
    body+='■ご請求金額: ¥'+(inv.total||0).toLocaleString()+' (税込)\n';
    body+='■案件数: '+(inv.orderCount||0)+'件\n';
    if(inv.pdfUrl)body+='■PDFダウンロード: '+inv.pdfUrl+'\n';
    body+='\n';
  }
  body+='お客様専用ポータルからもご確認いただけます。\n\n';
  body+='ご不明点がございましたらお問い合わせください。\n\n';
  body+='------------------\nDAIEI EXPRESS\nダイエイ運輸株式会社\nTEL: XX-XXXX-XXXX';
  var url='mailto:'+encodeURIComponent(to)+'?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body);
  window.location.href=url;
}

// 住所に都道府県を補完する
// 例: "明石市大久保町" → "兵庫県明石市大久保町"
// 既に都道府県が先頭にあれば何もしない
// 郵便番号（〒 や 123-4567 形式）と電話番号（TEL/FAX）を住所から除去
function stripPostalCode(s){
  if(!s)return s;
  return String(s)
    // 電話番号（TEL/T​EL/Tel/tel/FAX/Fax/fax 表記）と数字 → 末尾に付くケースが多い
    .replace(/[\s,，、]*(?:TEL|Tel|tel|TEL|ＴＥＬ|電話)[\s.:：]*[\d\-－()()\s]+/g,'')
    .replace(/[\s,，、]*(?:FAX|Fax|fax|ＦＡＸ)[\s.:：]*[\d\-－()()\s]+/g,'')
    // 単独で末尾に出る電話番号（10〜11桁、ハイフン含むもの）
    .replace(/[\s,，、]+0\d{1,4}[-－(\s]?\d{1,4}[-－)\s]?\d{3,4}\s*$/,'')
    // 郵便番号
    .replace(/〒\s*\d{3}-?\d{4}\s*/g,'')   // 〒付き
    .replace(/^\s*\d{3}-?\d{4}\s*/,'')      // 先頭の郵便番号（〒なし）
    .replace(/^[\s,，、]+/,'')                // 残った先頭の区切り文字
    .replace(/[\s,，、]+$/,'')                // 残った末尾の区切り文字
    .trim();
}

function autoCompletePrefecture(addr){
  if(!addr||typeof addr!=='string')return addr;
  // まず郵便番号を除去
  var s=stripPostalCode(addr).trim();
  if(!s)return s;
  // 既に都道府県が含まれていれば処理しない
  if(ALL_PREF_REGEX.test(s))return s;
  // 市・区・町・村の最初の出現を探してマッチング
  // 「明石市」「千代田区」「札幌市北区」などに対応
  // まず市区のマッチを試す
  var match=s.match(/^([一-龥ぁ-んァ-ヴー]+?[市区町村])/);
  if(!match)return s;
  var key=match[1];
  var pref=CITY_TO_PREF[key];
  if(pref)return pref+s;
  return s;
}

// 日付ユーティリティ: YYYY-MM-DD → "MMDD"
function fmtDateShort4(ymd){
  if(!ymd)return'';
  var p=String(ymd).split('-');
  if(p.length!==3)return ymd;
  var m=String(parseInt(p[1])||'').padStart(2,'0');
  var d=String(parseInt(p[2])||'').padStart(2,'0');
  return m+d;
}
// "0405" や "4/5" → YYYY-MM-DD（今年の日付として解釈、過去すぎる月は翌年扱い）
function parseDateShort4(s){
  s=String(s||'').replace(/[^0-9\/\-]/g,'');
  if(!s)return'';
  var y=new Date().getFullYear(),m,d;
  // "MMDD" または "M/D" / "MM/DD" / "YYYY-MM-DD"
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  var slash=s.split(/[\/\-]/);
  if(slash.length===2){
    m=parseInt(slash[0]);d=parseInt(slash[1]);
  }else if(slash.length===3){
    if(slash[0].length===4){y=parseInt(slash[0]);m=parseInt(slash[1]);d=parseInt(slash[2]);}
    else{m=parseInt(slash[0]);d=parseInt(slash[1]);}
  }else{
    // "MMDD" または "MDD" or "MDDD"
    if(s.length===3){m=parseInt(s.slice(0,1));d=parseInt(s.slice(1));}
    else if(s.length===4){m=parseInt(s.slice(0,2));d=parseInt(s.slice(2));}
    else return'';
  }
  if(!m||!d||m<1||m>12||d<1||d>31)return'';
  return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
}

    document.querySelectorAll('tr[data-sid]').forEach(function(tr){

      if(sid)shippingChecked[sid]=true;
    });
  }else{
    shippingChecked={};
  }
  renderShippingView();
}

function renderShippingView(){
  currentShippingId=null;
  // 全体へのドラッグ&ドロップ受け入れ（モーダルが開いていない時にPDFを落としたらOCRモーダルを開く）
  setTimeout(function(){
    var bv=document.getElementById('view-shipping');
    if(bv&&!bv._shipDndAttached){
      bv._shipDndAttached=true;
      bv.addEventListener('dragover',function(e){
        // 既にモーダルが開いている時はモーダル側のDnDに任せる
        if(document.querySelector('.modal-backdrop'))return;
        if(!e.dataTransfer.types.includes('Files'))return;
        e.preventDefault();
        var hint=document.getElementById('ship-global-drop-hint');
        if(hint)hint.style.display='flex';
      });
      bv.addEventListener('dragleave',function(e){
        if(e.relatedTarget&&bv.contains(e.relatedTarget))return;
        var hint=document.getElementById('ship-global-drop-hint');
        if(hint)hint.style.display='none';
      });
      bv.addEventListener('drop',function(e){
        if(document.querySelector('.modal-backdrop'))return;

// インライン保存
function saveShippingFieldInline(el){
  var sid=el.dataset.sid;
  var field=el.dataset.field;
  var val=el.value.trim();
  var s=shippingSlips[sid];if(!s)return;
  // 日付短縮入力フィールドの処理
  if(el.classList.contains('sh-date-short')&&(field==='pickupDate'||field==='deliveryDate')){
    var parsed=parseDateShort4(val);
    val=parsed;
    // 表示は4桁に戻す
    el.value=fmtDateShort4(parsed);
  }
  // 住所フィールドの都道府県自動補完（customerAddress, senderAddress, receiverAddress）
  if(field==='customerAddress'||field==='senderAddress'||field==='receiverAddress'){
    var orig=val;
    var completed=autoCompletePrefecture(val);
    if(completed!==orig){
      val=completed;
      el.value=completed;
      showToast('都道府県を追加: '+completed);
    }
  }
  if((s[field]||'')===val)return;
  var u={};u[field]=val;u.updatedAt=Date.now();
  // 請求先（依頼主）の会社/TEL/住所/郵便番号を変更したとき、
  // useAltSenderがfalseなら印字用も自動的に同じ値に追従
  if(!s.useAltSender){
    var autoSync={customerCompany:'senderCompany',customerTel:'senderTel',customerAddress:'senderAddress',customerZip:'senderZip'};
    if(autoSync[field]){
      u[autoSync[field]]=val;
    }
  }
  db.ref('shipping_slips/'+sid).update(u).catch(function(err){showToast('保存エラー:'+(err.message||err));});
  Object.assign(s,u);
}

// Tab / Enter / 矢印キーで次のセルへ
function handleShippingFieldKey(e,el){
  if(e.key==='Enter'){e.preventDefault();el.blur();return;}
  if(e.key==='Tab'){
    e.preventDefault();
    saveShippingFieldInline(el);
    var tr=el.closest('tr');if(!tr)return;
    var inputs=Array.from(document.querySelectorAll('.sh-inp'));
    var idx=inputs.indexOf(el);
    if(idx<0)return;
    var next=e.shiftKey?inputs[idx-1]:inputs[idx+1];
    if(next){next.focus();next.select&&next.select();}
  }
}

// バーコード自動採番（日付+ランダム）
function generateShippingBarcode(){
  var d=new Date();
  var y=String(d.getFullYear()).slice(-1);
  var m=String(d.getMonth()+1).padStart(2,'0');
  var dd=String(d.getDate()).padStart(2,'0');
  var rnd=Math.floor(Math.random()*10000).toString().padStart(4,'0');
  var code=y+m+dd+'-'+rnd.slice(0,3)+'-'+rnd.slice(3)+Math.floor(Math.random()*10);
  // 添付と同じ形式：3桁-3桁-4桁
  var prefix=String(d.getFullYear()).slice(-1)+m;  // 3桁
  var mid=dd+String(Math.floor(Math.random()*10));  // 3桁
  var last=String(Math.floor(Math.random()*10000)).padStart(4,'0');
  var bc=prefix+'-'+mid+'-'+last;
  var el=document.getElementById('sh-barcode');if(el)el.value=bc;
}

// モーダル内「印字用を別に指定する」チェックボックス切替
function toggleAltSectionModal(checked){
  var fields=document.getElementById('sh-alt-fields');
  var section=document.getElementById('sh-alt-section');
  if(fields)fields.style.display=checked?'block':'none';
  if(section){
    section.style.background=checked?'#fef3c7':'#fff';
    section.style.borderColor=checked?'#fbbf24':'#e5e7eb';
    var title=section.querySelector('div > div');
    if(title)title.style.color=checked?'#92400e':'#6b7280';
  }
  // 初回ONで空なら依頼主情報をコピー
  if(checked){
    var cp={
      'sh-sender-co':'sh-cust-co',
      'sh-sender-zip':'sh-cust-zip',
      'sh-sender-addr':'sh-cust-addr',
      'sh-sender-tel':'sh-cust-tel'
    };
    Object.keys(cp).forEach(function(targetId){
      var tgt=document.getElementById(targetId);
      var src=document.getElementById(cp[targetId]);
      if(tgt&&src&&!tgt.value)tgt.value=src.value;
    });
  }
}

async function saveShippingForm(sid,printAfter){
  var gv=function(id){return(document.getElementById(id)?.value||'').trim();};
  var useAlt=!!document.getElementById('sh-use-alt')?.checked;
  // 依頼主（請求先）
  var customerCo=gv('sh-cust-co');
  var customerZip=gv('sh-cust-zip');
  var customerAddress=gv('sh-cust-addr');
  var customerTel=gv('sh-cust-tel');
  // 印字用：useAlt=trueなら別フィールド、falseなら依頼主と同じ
  var senderCo=useAlt?gv('sh-sender-co'):customerCo;
  var senderZip=useAlt?gv('sh-sender-zip'):customerZip;
  var senderAddress=useAlt?gv('sh-sender-addr'):customerAddress;
  var senderTel=useAlt?gv('sh-sender-tel'):customerTel;

  var data={
    barcode:gv('sh-barcode'),
    customerCompany:customerCo,
    customerZip:customerZip,
    customerAddress:customerAddress,
    customerTel:customerTel,
    senderCompany:senderCo,
    senderZip:senderZip,
    senderAddress:senderAddress,
    senderTel:senderTel,
    useAltSender:useAlt,
    receiverCompany:gv('sh-rcv-co'),
    receiverZip:gv('sh-rcv-zip'),
    receiverAddress:gv('sh-rcv-addr'),
    receiverTel:gv('sh-rcv-tel'),
    productName:gv('sh-product'),
    count:gv('sh-count')||'1',
    weight:gv('sh-weight'),
    volume:gv('sh-volume'),
    pickupDate:gv('sh-pickup-date'),
    deliveryDate:gv('sh-delivery-date'),
    memo:gv('sh-memo'),
    branch:currentBranch!=='all'?currentBranch:(currentStaffData?.branch||'osaka'),
    updatedAt:Date.now()
  };
  if(!data.customerCompany&&!data.receiverCompany){showToast('依頼主か配達先のいずれかは必須');return;}
  if(!data.barcode){
    // 自動採番
    var d=new Date();
    var m=String(d.getMonth()+1).padStart(2,'0');
    var dd=String(d.getDate()).padStart(2,'0');
    data.barcode=String(d.getFullYear()).slice(-1)+m+'-'+dd+String(Math.floor(Math.random()*10))+'-'+String(Math.floor(Math.random()*10000)).padStart(4,'0');
  }
  try{
    if(!sid){
      data.createdAt=Date.now();
      data.printed=false;
      data.createdBy=(currentStaffData&&currentStaffData.name)||'';
      var ref=db.ref('shipping_slips').push();
      await ref.set(data);
      sid=ref.key;
    }else{
      // 既存値のprinted/createdAt保持
      var existing=shippingSlips[sid]||{};
      data.printed=!!existing.printed;
      if(existing.printedAt)data.printedAt=existing.printedAt;
      if(existing.createdAt)data.createdAt=existing.createdAt;
      if(existing.createdBy)data.createdBy=existing.createdBy;
      await db.ref('shipping_slips/'+sid).set(data);
    }
    closeModal();
    showToast('保存しました');
    if(printAfter){setTimeout(function(){printShippingSlip(sid);},300);}
  }catch(err){showToast('エラー: '+(err.message||err));}
}

async function deleteShippingSlip(sid){
  var s=shippingSlips[sid];if(!s)return;
  if(!confirm('削除しますか？\nNo. '+(s.barcode||'')+'\n'+(s.senderCompany||'')+' → '+(s.receiverCompany||'')))return;
  try{
    await db.ref('shipping_slips/'+sid).remove();
    showToast('削除しました');
  }catch(err){showToast('エラー: '+(err.message||err));}
}

// ドラッグ&ドロップハンドラ
function shipDragOver(e){
  e.preventDefault();e.stopPropagation();
  var dz=document.getElementById('ship-dropzone');
  if(dz){dz.style.background='#dcfce7';dz.style.borderColor='#16a34a';dz.style.transform='scale(1.02)';}
}
function shipDragLeave(e){
  e.preventDefault();e.stopPropagation();
  // 子要素への移動は無視
  if(e.relatedTarget&&e.currentTarget.contains(e.relatedTarget))return;
  var dz=document.getElementById('ship-dropzone');
  if(dz){dz.style.background='#f0fdf4';dz.style.borderColor='#03968F';dz.style.transform='scale(1)';}
}
function shipDrop(e){
  e.preventDefault();e.stopPropagation();
  var dz=document.getElementById('ship-dropzone');
  if(dz){dz.style.background='#f0fdf4';dz.style.borderColor='#03968F';dz.style.transform='scale(1)';}
  var files=e.dataTransfer&&e.dataTransfer.files;
  if(!files||!files.length){showToast('ファイルが取得できません');return;}
  // 受け入れ可能な形式をフィルタ
  var valid=Array.from(files).filter(function(f){
    return f.type==='application/pdf'||f.type.startsWith('image/')||f.name.toLowerCase().match(/\.(pdf|jpg|jpeg|png|webp)$/);
  });
  if(!valid.length){showToast('PDF/画像ファイルのみ対応');return;}
  handleShippingOcr(valid);
}

async function handleShippingOcr(filesOrInput){
  var files;
  if(filesOrInput&&filesOrInput.files)files=Array.from(filesOrInput.files);
  else if(filesOrInput&&filesOrInput.length)files=Array.from(filesOrInput);
  else return;
  if(!files.length)return;
  var file=files[0];  // 1件のみ処理（複数対応は将来）
  var status=document.getElementById('ship-ocr-status');
  status.style.display='block';
  status.style.background='#fff';status.style.borderColor='#03968F';status.style.color='#065f46';
  status.textContent='📂 '+file.name+' を読込中...';

  if(!CLAUDE_API_KEY){
    status.style.background='#fef2f2';status.style.borderColor='#fca5a5';status.style.color='#dc2626';
    status.textContent='Claude APIキーが未設定です（OCR設定から登録してください）';
    return;
  }

  try{
    var dataUrl=await new Promise(function(resolve,reject){
      var r=new FileReader();r.onload=function(e){resolve(e.target.result);};r.onerror=reject;r.readAsDataURL(file);
    });

    // PDF 1ページ目を画像化
    var imageData=dataUrl;
    if(file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf')){
      if(typeof pdfjsLib==='undefined'){
        status.textContent='PDF.js読込中...';
        var waitCount=0;
        while(typeof pdfjsLib==='undefined'&&waitCount<20){await new Promise(r=>setTimeout(r,200));waitCount++;}
        if(typeof pdfjsLib==='undefined')throw new Error('PDF.jsが読み込めません');
      }
      status.textContent='📄 PDFを画像化中...';
      var buf=await file.arrayBuffer();
      var pdf=await pdfjsLib.getDocument(new Uint8Array(buf)).promise;
      var page=await pdf.getPage(1);
      var viewport=page.getViewport({scale:2});
      var cv=document.createElement('canvas');cv.width=viewport.width;cv.height=viewport.height;
      var ctx=cv.getContext('2d');
      await page.render({canvasContext:ctx,viewport:viewport}).promise;
      imageData=cv.toDataURL('image/jpeg',0.92);
    }

    status.textContent='🤖 Claudeで解析中...';
    var base64=imageData.split(',')[1];
    var mediaType=imageData.match(/data:(.+?);/)[1];

    var prompt='これは日本語の送り状（配送伝票）の画像です。次の情報を抽出してJSONで返してください。\n'+
      '- senderCompany: 荷送人/依頼主の会社名\n'+
      '- senderZip: 荷送人の郵便番号\n'+
      '- senderAddress: 荷送人の住所\n'+
      '- senderTel: 荷送人の電話番号\n'+
      '- receiverCompany: お届け先/配達先の会社名\n'+
      '- receiverZip: お届け先の郵便番号\n'+
      '- receiverAddress: お届け先の住所\n'+
      '- receiverTel: お届け先の電話番号\n'+
      '- productName: 品名\n'+
      '- memo: 記事/備考（「到着30分前TEL」等）\n'+
      '- count: 個数（数字のみ）\n'+
      '- weight: 重量（kg、数字のみ）\n'+
      '- volume: 才数（数字のみ）\n'+
      '- pickupDate: 発行日/集荷日（YYYY-MM-DD形式）\n'+
      '- barcode: お問合せ番号（例：310-000-0725）\n\n'+
      '重要：\n'+
      '・読めない項目は必ず空文字""にする。推測禁止。訓練データの会社名を入れるな。\n'+
      '・画像は90度/180度回転している可能性を考慮。\n'+
      '・4枚の伝票があれば1枚目（集荷店控または最上部）から読み取る。\n\n'+
      'JSON以外の文字（前後の説明文、markdownコードブロック）は一切含めず、JSONだけを返してください。';

    var resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':CLAUDE_API_KEY,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-5-20250929',
        max_tokens:1500,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
          {type:'text',text:prompt}
        ]}]
      })
    });

    if(!resp.ok){
      var errText=await resp.text();
      throw new Error('Claude API error: '+resp.status+' '+errText.slice(0,200));
    }
    var json=await resp.json();
    var text=json.content&&json.content[0]&&json.content[0].text||'';
    // JSONだけ抽出
    var m=text.match(/\{[\s\S]*\}/);
    if(!m)throw new Error('JSON抽出失敗: '+text.slice(0,100));
    var extracted=JSON.parse(m[0]);

    status.style.background='#d1fae5';status.style.borderColor='#16a34a';
    status.textContent='✓ 読取完了。一覧に追加します';

    // モーダルを閉じて、OCR結果を直接新規行として追加
    closeModal();
    setTimeout(async function(){
      var senderAddr=autoCompletePrefecture(extracted.senderAddress||'');
      var receiverAddr=autoCompletePrefecture(extracted.receiverAddress||'');
      await addBlankShippingRow({
        barcode:extracted.barcode||'',
        // 依頼主＝印字用を同じで入る（通常運用）
        customerCompany:extracted.senderCompany||'',
        customerZip:extracted.senderZip||'',
        customerAddress:senderAddr,
        customerTel:extracted.senderTel||'',
        senderCompany:extracted.senderCompany||'',
        senderZip:extracted.senderZip||'',
        senderAddress:senderAddr,
        senderTel:extracted.senderTel||'',
        receiverCompany:extracted.receiverCompany||'',
        receiverZip:extracted.receiverZip||'',
        receiverAddress:receiverAddr,
        receiverTel:extracted.receiverTel||'',
        productName:extracted.productName||'',
        count:extracted.count||'1',
        weight:extracted.weight||'',
        volume:extracted.volume||'',
        pickupDate:extracted.pickupDate||todayStr(),
        memo:extracted.memo||''
      });
      showToast('✓ OCR完了。一覧に追加しました。内容を確認してください');
    },200);

  }catch(err){
    console.error(err);
    status.style.background='#fef2f2';status.style.borderColor='#fca5a5';status.style.color='#dc2626';
    status.textContent='エラー: '+(err.message||err).slice(0,200);
  }
}

// ログインフォーム送信
function doAuthLogin(){
  var email=(document.getElementById('auth-email')?.value||'').trim();
  var pwd=document.getElementById('auth-password')?.value||'';
  var errEl=document.getElementById('auth-error');
  if(!email||!pwd){
    if(errEl){errEl.textContent='メールアドレスとパスワードを入力してください';errEl.style.display='block';}
    return;
  }
  if(errEl)errEl.style.display='none';
  firebase.auth().signInWithEmailAndPassword(email,pwd).then(function(){
    // 成功：onAuthStateChangedが自動でapp表示に切り替える
  }).catch(function(e){
    if(errEl){
      var msg='ログインに失敗しました';
      if(e.code==='auth/invalid-email')msg='メールアドレスの形式が正しくありません';
      else if(e.code==='auth/user-not-found'||e.code==='auth/wrong-password'||e.code==='auth/invalid-credential')msg='メールアドレスまたはパスワードが違います';
      else if(e.code==='auth/too-many-requests')msg='試行回数が多すぎます。しばらくしてからお試しください';
      errEl.textContent=msg;errEl.style.display='block';
    }
  });
}

auth.onAuthStateChanged(function(user){
  // セーフティタイマーをキャンセル（認証状態が判定されたので不要）
  if(window._dexAuthLoadingTimer1)clearTimeout(window._dexAuthLoadingTimer1);
  if(window._dexAuthLoadingTimer2)clearTimeout(window._dexAuthLoadingTimer2);
  // まずローディング画面を隠す
  var loader=document.getElementById('auth-loading');
  if(loader)loader.style.display='none';
  if(user){
    currentStaffUser=user;
    // 社員レコードを読んで branch / name を得る
    db.ref('staff/'+user.uid).once('value').then(function(snap){
      if(!snap.val()){
        // 社員登録されていない → 拒否してログアウト
        auth.signOut();
        alert('このアカウントは社員登録されていません。管理者にお問い合わせください。');
        return;
      }
      currentStaffData=snap.val();
      // 無効化されたアカウントは拒否
      if(currentStaffData.isActive===false){
        auth.signOut();
        alert('このアカウントは現在無効化されています。管理者にお問い合わせください。');
        return;
      }
      var displayName=currentStaffData.name||user.email.split('@')[0];
      var nameEl=document.getElementById('user-name');
      if(nameEl)nameEl.textContent=displayName;
      // サイドバー管理者パネルに情報を流し込み
      var adminNameEl=document.getElementById('sb-admin-name');
      var adminEmailEl=document.getElementById('sb-admin-email');
      if(adminNameEl)adminNameEl.textContent=displayName;
      if(adminEmailEl)adminEmailEl.textContent=user.email||'';
      // サイドバー下部のログイン中ユーザー表示
      var sbName=document.getElementById('sb-user-name');
      var sbRole=document.getElementById('sb-user-role');
      var sbAvatar=document.getElementById('sb-user-avatar');
      if(sbName)sbName.textContent=displayName;
      if(sbRole){
        var roleLabel={admin:'管理者',staff:'社員',viewer:'閲覧者'}[currentStaffData.role]||'社員';
        var branchLabel=({osaka:'大阪本社',shiga:'滋賀支店',nagoya:'名古屋支店'}[currentStaffData.branch]||'');
        sbRole.textContent=[branchLabel,roleLabel].filter(Boolean).join(' / ');
      }
      if(sbAvatar){
        var initial=(displayName||'?').charAt(0);
        sbAvatar.textContent=initial;
      }
      var logoEl=document.getElementById('sb-logo-img');
      if(logoEl)logoEl.src=DEX_LOGO;
      // 拠点セレクタを社員の拠点に合わせる（初回のみ。以後はユーザーの選択を優先）
      if(!localStorage.getItem('dex_mgmt_branch')&&currentStaffData.branch){
        currentBranch=currentStaffData.branch;
        localStorage.setItem('dex_mgmt_branch',currentBranch);
      }
      var sel=document.getElementById('branch-select');
      if(sel)sel.value=currentBranch;
      // 拠点色とサイドバー表示を適用
      applyBranchTheme(currentBranch);
      if(typeof updateSidebarBranchDisplay==='function')updateSidebarBranchDisplay();
      // アプリ表示
      document.getElementById('auth-view').style.display='none';
      document.getElementById('app').style.display='flex';
      // URLハッシュ復元。ハッシュがなくてもデフォルトの案件一覧を必ず描画

});
