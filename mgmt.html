*{box-sizing:border-box;margin:0;padding:0}

/* ========== LEFT SIDEBAR (ダークティールテーマ) ========== */

.sb-logo{padding:4px 20px 20px;display:flex;flex-direction:row;align-items:center;gap:12px;border-bottom:none;margin-bottom:10px;text-align:left;flex-shrink:0}
.sb-logo-mark{width:42px;height:42px;flex-shrink:0;border-radius:11px;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;transition:transform .15s;background:rgba(255,255,255,.12)}

.sb-branch.open .sb-branch-dropdown{display:block}
@keyframes sbDropIn{from{opacity:0;transform:translateY(-4px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.sb-branch-option{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;transition:all .1s;font-size:13px;font-weight:500;color:#4b5563;position:relative}
.sb-branch-option:hover{background:#f9fafb;color:#079C95}
.sb-branch-option.selected{background:#ecfdf5;color:#079C95;font-weight:600}
.sb-branch-option.selected .sb-branch-check{opacity:1}
.sb-branch-option.selected .sb-branch-dot{background:#079C95;border-color:#079C95}
.sb-branch-dot{width:6px;height:6px;border-radius:50%;background:transparent;border:1.5px solid #d1d5db;flex-shrink:0;transition:all .15s}
.sb-branch-option:hover .sb-branch-dot{border-color:#079C95}
.sb-branch-name{flex:1}
.sb-branch-check{opacity:0;color:#079C95;font-weight:600;font-size:13px;transition:opacity .1s}
.sb-branch-divider{height:1px;background:#f3f4f6;margin:4px 0}
/* ログアウト（左下固定） */
.sb-user{margin:0 14px 4px;padding:14px 4px 14px 4px;border-top:1px solid rgba(255,255,255,.18);display:flex;align-items:center;gap:10px;flex-shrink:0;background:transparent}
.sb-user-meta{flex:1;min-width:0;display:flex;flex-direction:column;line-height:1.3}
.sb-user-name-row{display:flex;align-items:center;gap:6px}
.sb-user-name{font-size:15px;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.5px}
.sb-user-arrow{color:#fff;flex-shrink:0;opacity:.9}
.sb-user-role{font-size:11.5px;color:rgba(255,255,255,.75);font-weight:500;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-user-settings{background:transparent;border:none;color:#fff;cursor:pointer;padding:6px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.sb-user-settings:hover{background:rgba(255,255,255,.12)}
.sb-user-settings svg{width:20px;height:20px}

.sb-logout{margin:0 14px 16px;padding:13px 4px;background:transparent;border:none;border-top:1px solid rgba(255,255,255,.18);border-radius:0;cursor:pointer;display:flex;align-items:center;justify-content:flex-start;gap:14px;font-size:14px;font-weight:600;color:#fff;transition:all .15s;flex-shrink:0}
.sb-logout:hover{color:#fff}
.sb-logout .sb-icon{width:22px;height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sb-logout .sb-icon svg{width:22px;height:22px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.sb-item{display:flex;align-items:center;gap:14px;padding:13px 18px;cursor:pointer;font-size:14.5px;font-weight:600;color:rgba(255,255,255,.85);transition:all .15s;position:relative;margin:3px 14px;border-radius:14px}
.sb-item:hover{background:rgba(255,255,255,.12);color:#fff}
.sb-item.active{background:#fff;color:#079C95;font-weight:600;box-shadow:0 4px 14px rgba(0,0,0,.14)}
.sb-item .sb-icon{width:22px;height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:currentColor}
.sb-item .sb-icon svg{width:22px;height:22px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.sb-item .sb-badge{margin-left:auto;background:#fff;color:#079C95;font-size:11px;font-weight:600;min-width:20px;height:20px;display:flex;align-items:center;justify-content:center;padding:0 6px;border-radius:10px}
.sb-item.active .sb-badge{background:#079C95;color:#fff}
.sb-support{margin:16px 12px 8px;padding:14px 16px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:12px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:10px}
.sb-support:hover{background:#f0fdf4;border-color:#a7f3d0}
.sb-support-icon{width:28px;height:28px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#03968F;border:1px solid #a7f3d0}
.sb-support-txt{flex:1;min-width:0}
.sb-support-title{font-size:13px;font-weight:600;color:#374151;margin-bottom:2px}
.sb-support-sub{font-size:10px;color:#9ca3af}
.sb-admin{margin:auto 12px 0;padding:12px 14px;background:#fff;border-top:1px solid #f3f4f6;display:flex;align-items:center;gap:10px}
.sb-admin-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#e5e7eb 0%,#d1d5db 100%);display:flex;align-items:center;justify-content:center;color:#6b7280;flex-shrink:0}
.sb-admin-name{font-size:12px;font-weight:600;color:#374151;line-height:1.3}
.sb-admin-email{font-size:10px;color:#9ca3af;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-footer{padding:8px 20px;font-size:10px;color:#9ca3af;text-align:center}

/* ========== MAIN CONTENT ========== */
.main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f9fafb;min-height:0;padding-left:14px}
.topbar{display:flex;align-items:center;padding:24px 32px 20px;gap:12px;flex-shrink:0;background:#f9fafb}
.topbar-title{font-size:28px;font-weight:600;color:#2F2C2C;flex:1;letter-spacing:-.5px}
.branch-selector{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:8px 14px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.branch-selector label{font-size:12px;color:#6b7280;font-weight:600}
.branch-selector select{border:none;background:transparent;font-size:14px;font-weight:600;color:#03968F;outline:none;font-family:inherit;cursor:pointer}
.user-chip{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;color:#374151;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.user-chip .logout-x{color:#dc2626;cursor:pointer;margin-left:8px;font-weight:600;font-size:16px}

.content-area{flex:1;overflow:hidden;padding:28px 32px 16px}
.view{display:none}
.view.active{display:block;height:100%}

/* ========== VIEWS ========== */

.placeholder-card{background:#fff;border:2px dashed #cbd5e1;border-radius:16px;padding:60px 30px;text-align:center;color:#64748b}
.placeholder-card .pc-icon{font-size:48px;margin-bottom:16px;opacity:.5}
.placeholder-card .pc-title{font-size:20px;font-weight:600;margin-bottom:8px;color:#334155}
.placeholder-card .pc-desc{font-size:14px;line-height:1.6}
.placeholder-card .pc-phase{display:inline-block;margin-top:16px;padding:4px 12px;background:#e0e7ff;color:#4338ca;border-radius:12px;font-size:12px;font-weight:600}

/* ========== LOGIN OVERLAY ========== */
.auth-view{display:flex;height:100%;align-items:center;justify-content:center;background:#f9fafb;color:#1a1a1a}
.auth-card{background:#fff;color:#1a1a1a;padding:40px;border-radius:20px;max-width:420px;width:90%;box-shadow:0 10px 40px rgba(0,0,0,.08);border:1px solid #e5e7eb}
.auth-card h2{font-size:22px;margin-bottom:6px;color:#2F2C2C;text-align:center;font-weight:600}
.auth-card p{font-size:13px;color:#6b7280;margin-bottom:24px;line-height:1.6;text-align:center}
.auth-card input:focus{outline:none;border-color:#03968F;box-shadow:0 0 0 3px rgba(3,150,143,.1)}

/* ========== TOAST ========== */
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#2F2C2C;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;display:none;box-shadow:0 4px 20px rgba(0,0,0,.3)}

/* === カスタム確認ダイアログ === */
.dex-confirm-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:12000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);animation:dexFadeIn .2s ease;padding:20px}
@keyframes dexFadeIn{from{opacity:0}to{opacity:1}}
@keyframes dexSlideIn{from{opacity:0;transform:translateY(-12px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.dex-confirm{background:#fff;border-radius:20px;padding:32px 28px 24px;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,.25);text-align:center;animation:dexSlideIn .25s cubic-bezier(.34,1.56,.64,1);font-family:"Noto Sans JP",sans-serif}
.dex-confirm-icon{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:30px}
.dex-confirm-title{font-size:18px;font-weight:600;color:#2F2C2C;margin-bottom:8px;letter-spacing:.3px}
.dex-confirm-message{font-size:14px;color:#6b7280;line-height:1.6;margin-bottom:24px;font-weight:500}
.dex-confirm-buttons{display:flex;gap:10px;justify-content:center}
.dex-confirm-btn{padding:11px 24px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;border:none;min-width:100px}
.dex-confirm-cancel{background:#f3f4f6;color:#6b7280;border:1.5px solid #e5e7eb}
.dex-confirm-cancel:hover{background:#e5e7eb;color:#374151}
.dex-confirm-ok{color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.dex-confirm-ok:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(0,0,0,.2)}
.dex-confirm-ok:active{transform:translateY(0)}

/* ========== MODAL ========== */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;max-width:640px;width:90%;max-height:90vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;padding:20px 24px;border-bottom:1px solid #e5e7eb}
.modal-title{font-size:18px;font-weight:600;flex:1}
.modal-x{border:none;background:none;font-size:24px;cursor:pointer;color:#6b7280}
.modal-body{padding:24px}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:16px 24px;border-top:1px solid #e5e7eb}
.mfbtn{padding:10px 24px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-weight:600;font-size:14px}
.mfbtn.cancel{background:#f3f4f6;color:#374151}
.mfbtn.save{background:#03968F;color:#fff}

/* ========== TOP OVERLAY (メニュー) ========== */
.top-overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:400;display:none;align-items:center;justify-content:center;opacity:1;transition:opacity .3s ease;backdrop-filter:blur(4px)}
.top-overlay.open{display:flex}
.top-overlay.hidden{opacity:0;pointer-events:none}
.top-overlay-content{background:#fff;border-radius:24px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;padding:28px 28px 36px;box-shadow:0 24px 64px rgba(0,0,0,.2);animation:topSlideIn .3s ease;position:relative}
@keyframes topSlideIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.top-page{display:flex;flex-direction:column;width:100%;position:relative}
.top-title{font-family:"Noto Sans JP",sans-serif;font-weight:900;font-size:32px;letter-spacing:2px;color:#2F2C2C;margin:8px 0 28px}
.top-branch{display:flex;gap:12px;margin-bottom:24px;justify-content:center;flex-wrap:wrap}
.top-branch-btn{font-family:"Noto Sans JP",sans-serif;padding:10px 28px;border-radius:30px;border:2px solid #e5e7eb;background:#fff;font-size:16px;font-weight:600;cursor:pointer;color:#2F2C2C;transition:all .15s}
.top-branch-btn.active{background:#03968F;border-color:#03968F;color:#fff}
.top-branch-btn.disabled{opacity:.4;cursor:default}
.top-section{margin-bottom:32px;width:100%;max-width:800px}
.top-section-title{font-family:"Noto Sans JP",sans-serif;font-size:20px;font-weight:600;color:#2F2C2C;margin-bottom:12px;padding-left:4px}
.top-section{margin-bottom:32px;width:100%;max-width:800px}
.top-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.top-card{background:#fff;border:2px solid #e5e7eb;border-radius:16px;padding:20px 16px;text-align:center;cursor:pointer;transition:all .15s;font-family:"Noto Sans JP",sans-serif}
.top-card:hover{border-color:#03968F;box-shadow:0 4px 12px rgba(3,150,143,.15)}
.top-card.active{border-color:#03968F;background:#f0fdf4}
.top-card.disabled{opacity:.4;cursor:default;pointer-events:none}
.top-card .tc-name{font-size:18px;font-weight:600;color:#2F2C2C;margin-bottom:4px}
.top-card .tc-desc{font-size:13px;color:#6b7280}
.top-card .tc-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;margin-top:6px}
@media(max-width:768px){.top-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.top-grid{grid-template-columns:1fr}}

/* === iPad 11インチ対応 === */
/* 横向き 1024〜1300px */
@media(min-width:1025px) and (max-width:1300px){
.sidebar{width:200px}
.sb-logo{padding:0 16px 18px}
.sb-logo-mark{width:48px;height:48px}
.sb-logo-mark img{width:48px;height:48px}
.sb-logo-main{font-size:14px}
.sb-logo-sub-text{font-size:8px}
.content-area{padding:24px 24px 14px}
}
/* 縦向き 768〜1024px */
@media(min-width:768px) and (max-width:1024px){
.sidebar{width:180px}
.sb-logo{padding:0 12px 14px}
.sb-logo-mark{width:42px;height:42px}
.sb-logo-mark img{width:42px;height:42px}
.sb-logo-main{font-size:13px;letter-spacing:.2px}
.sb-logo-sub-text{font-size:8px;letter-spacing:1px}
.sb-branch{margin:0 10px 4px;padding:8px 10px}
.sb-branch-current{font-size:12px}
.sb-section{padding:12px 14px 4px;font-size:9px}
.content-area{padding:20px 20px 12px}
.top-grid{grid-template-columns:repeat(2,1fr)}
.top-card{padding:16px 12px}
.top-card .tc-name{font-size:16px}
/* タッチ操作向けボタンサイズ */
button{min-height:36px}
input,select,textarea{min-height:36px;font-size:14px}
.tbl-input{min-height:32px}
}

/* === ノートPC：画面高さが低い場合は縦を圧縮 === */
@media(max-height:850px){
.cust-dashboard .cust-kpi-grid{gap:12px;margin-bottom:12px}
.cust-dashboard .cust-kpi-card{padding:16px 18px}
.cust-dashboard .cust-chart-card{padding:18px 22px}
}
@media(max-height:750px){
.cust-dashboard .cust-kpi-grid{gap:10px;margin-bottom:10px}
.cust-dashboard .cust-kpi-card{padding:13px 16px}
.cust-dashboard .cust-chart-card{padding:14px 20px}
.content-area{padding:16px 28px 12px}
}

/* ====================================
   📱 レスポンシブ：iPad Pro / iPad mini / iPhone
   ==================================== */

/* === iPad Pro (横 1366px / 縦 1024px) === */
@media(max-width:1366px) and (min-width:1025px){
  .cust-kpi-grid,
  div[style*="grid-template-columns:repeat(4,1fr)"]{
    grid-template-columns:repeat(2,1fr)!important;
  }
}

/* === タブレット〜スマホ共通（〜1024px） === */
@media(max-width:1024px){
  /* ハンバーガー表示 */
  #hamburger-btn{display:inline-flex!important}
  /* サイドバー：オフキャンバスでスライドイン */
  #app{padding:0;height:100vh}
  .sidebar{
    position:fixed;left:0;top:0;bottom:0;
    width:280px;max-width:85vw;
    height:100%;
    border-radius:0;
    z-index:9000;
    transform:translateX(-100%);
    transition:transform .25s ease;
    box-shadow:0 0 32px rgba(0,0,0,.2);
    padding-top:64px; /* ハンバーガー分のスペース（サイドバー内ロゴが被らないように） */
  }
  body.sidebar-open .sidebar{transform:translateX(0)}
  body.sidebar-open #sidebar-overlay{display:block!important}
  .main-wrap{padding:0;width:100%;min-width:0;display:flex;flex-direction:column}
  .content-area{padding:72px 16px 16px!important;width:100%;box-sizing:border-box}
  /* メインタイトル：ハンバーガーぶんの余白 */
  .content-area>h2:first-child,
  .content-area>div:first-child h2{padding-left:0}
  /* ダッシュボードKPI：2カラム */
  .cust-kpi-grid,
  div[style*="grid-template-columns:repeat(4,1fr)"]{
    grid-template-columns:repeat(2,1fr)!important;
  }
  /* 売上推移+お客様情報 1.4fr+1fr → 縦並び */
  div[style*="grid-template-columns:minmax(0,1.4fr) minmax(0,1fr)"],
  div[style*="grid-template-columns:minmax(0,1.5fr) minmax(0,1fr)"],
  div[style*="grid-template-columns:minmax(0,1.85fr) minmax(0,1fr)"],
  div[style*="grid-template-columns:minmax(0,1fr) minmax(0,1fr)"]{
    grid-template-columns:1fr!important;
  }
  /* 一般的な2カラムグリッドを縦並びに（モーダル内では維持） */
  /* モーダル外のみ縦並び */
  .content-area div[style*="grid-template-columns:1fr 1fr"]{
    grid-template-columns:1fr!important;
  }
  /* テーブル系：横スクロール許容 */
  .table-wrap, .orders-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
}

/* === iPad mini (768px〜1024px) === */
@media(min-width:769px) and (max-width:1024px){
  .content-area{padding:72px 20px 20px!important}
  /* チャートカードのpadding */
  .cust-chart-card{padding:18px 20px!important}
  /* H2 タイトル */
  .content-area h2{font-size:22px!important}
}

/* === スマホ（〜768px） === */
@media(max-width:768px){
  /* テキストサイズ縮小 */
  .content-area h2{font-size:20px!important}
  /* H2 周辺のヘッダー部 wrap */
  .content-area>div[style*="display:flex"][style*="justify-content:space-between"]{
    flex-direction:column;
    align-items:flex-start!important;
  }
  /* ダッシュボードKPI：1カラム */
  .cust-kpi-grid,
  div[style*="grid-template-columns:repeat(4,1fr)"],
  div[style*="grid-template-columns:repeat(3,1fr)"]{
    grid-template-columns:1fr!important;
  }
  /* 売上推移カードの padding */
  .cust-chart-card{padding:16px 14px!important}
  /* ボタン touch サイズ */
  button{min-height:40px}
  input,select,textarea{min-height:40px;font-size:15px}
  /* 過去履歴テーブル：min-width を緩める */
  .cust-history-mobile-scroll{min-width:auto!important}
  /* モーダル：full screen 寄りに */
  div[style*="max-width:520px"],
  div[style*="max-width:560px"],
  div[style*="max-width:640px"],
  div[style*="max-width:680px"],
  div[style*="max-width:720px"],
  div[style*="max-width:820px"]{
    max-width:100%!important;
  }
  /* テーブル系：余白詰める */
  .content-area .table-wrap, .content-area .orders-table-wrap{padding:0}
}

/* === iPhone 縦（〜480px） === */
@media(max-width:480px){
  .content-area{padding:68px 12px 12px!important}
  .content-area h2{font-size:18px!important}
  /* KPI値サイズ調整 */
  .cust-kpi-card span[style*="font-size:24px"]{font-size:20px!important}
  /* グリッド余白を狭く */
  div[style*="gap:16px"][style*="grid"]{gap:10px!important}
  /* ボタンサイズ */
  button[style*="padding:12px"]{padding:10px 14px!important}
}

/* デスクトップ時はオーバーレイを必ず非表示 */
@media(min-width:1025px){
  #hamburger-btn{display:none!important}
  #sidebar-overlay{display:none!important}
  body.sidebar-open .sidebar{transform:none}
}

/* ====================================
   カスタムカレンダー（リッチ緑系）
   ==================================== */
.dex-cal-pop{
  position:fixed;z-index:11000;background:#fff;
  border-radius:20px;
  box-shadow:0 20px 50px rgba(3,150,143,.25),0 4px 12px rgba(0,0,0,.08);
  padding:18px;
  font-family:"Noto Sans JP",sans-serif;
  user-select:none;
  animation:dex-cal-in .2s cubic-bezier(.34,1.56,.64,1);
  border:1px solid rgba(3,150,143,.15);
  min-width:300px;
}
@keyframes dex-cal-in{from{opacity:0;transform:translateY(-8px) scale(.96);}to{opacity:1;transform:translateY(0) scale(1);}}
.dex-cal-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 4px 14px;margin-bottom:12px;border-bottom:2px solid #f0fdf4;}
.dex-cal-nav{width:32px;height:32px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,#03968F 0%,#0AB8AE 100%);color:#fff;font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(3,150,143,.3);transition:transform .1s,box-shadow .15s;}
.dex-cal-nav:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(3,150,143,.4);}
.dex-cal-nav:active{transform:translateY(0);}
.dex-cal-title{flex:1;text-align:center;font-weight:600;font-size:16px;color:#2F2C2C;cursor:pointer;padding:6px 10px;border-radius:10px;transition:background .15s;font-family:"Noto Sans JP",sans-serif;}
.dex-cal-title:hover{background:#f0fdf4;color:#03968F;}
.dex-cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px;}
.dex-cal-wd{text-align:center;font-size:11px;font-weight:600;padding:4px 0;color:#6b7280;letter-spacing:.5px;}
.dex-cal-wd.sun{color:#ef4444;}
.dex-cal-wd.sat{color:#0891b2;}
.dex-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.dex-cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:#374151;transition:all .15s;position:relative;font-family:"Noto Sans JP",sans-serif;}
.dex-cal-day:hover:not(.dex-cal-empty):not(.dex-cal-selected){background:#f0fdf4;color:#03968F;transform:scale(1.08);}
.dex-cal-day.dex-cal-empty{cursor:default;}
.dex-cal-day.dex-cal-other-month{color:#d1d5db;}
.dex-cal-day.dex-cal-sun:not(.dex-cal-other-month){color:#ef4444;}
.dex-cal-day.dex-cal-sat:not(.dex-cal-other-month){color:#0891b2;}
.dex-cal-day.dex-cal-holiday:not(.dex-cal-other-month){color:#ef4444;}
.dex-cal-day.dex-cal-today{background:linear-gradient(135deg,#fef3c7 0%,#fde68a 100%);color:#92400e;font-weight:600;box-shadow:0 0 0 2px #f59e0b inset;}
.dex-cal-day.dex-cal-selected{background:linear-gradient(135deg,#03968F 0%,#0AB8AE 100%)!important;color:#fff!important;font-weight:600;box-shadow:0 2px 8px rgba(3,150,143,.4);transform:scale(1.05);}
.dex-cal-day.dex-cal-selected:hover{transform:scale(1.1);}
.dex-cal-footer{margin-top:12px;padding-top:12px;border-top:1px solid #f0fdf4;display:flex;gap:6px;justify-content:space-between;align-items:center;}
.dex-cal-quick{padding:6px 12px;border-radius:8px;border:1.5px solid #a7f3d0;background:#fff;color:#059669;cursor:pointer;font-weight:600;font-size:12px;font-family:inherit;transition:all .15s;}
.dex-cal-quick:hover{background:#f0fdf4;border-color:#03968F;color:#03968F;}
.dex-cal-clear{padding:6px 12px;border-radius:8px;border:1.5px solid #e5e7eb;background:#fff;color:#6b7280;cursor:pointer;font-weight:600;font-size:12px;font-family:inherit;transition:all .15s;}
.dex-cal-clear:hover{background:#fef2f2;border-color:#fca5a5;color:#dc2626;}
.dex-cal-months{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px 0;}
.dex-cal-month-btn{padding:14px 8px;border-radius:10px;border:1.5px solid transparent;background:#f9fafb;color:#374151;cursor:pointer;font-weight:600;font-size:13px;font-family:inherit;transition:all .15s;}
.dex-cal-month-btn:hover{background:#f0fdf4;color:#03968F;border-color:#a7f3d0;}
.dex-cal-month-btn.dex-cal-month-selected{background:linear-gradient(135deg,#03968F 0%,#0AB8AE 100%);color:#fff;border-color:#03968F;box-shadow:0 2px 8px rgba(3,150,143,.3);}
.dex-cal-month-btn.dex-cal-month-current{border-color:#f59e0b;}
.dex-cal-years{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px 0;}
.dex-cal-year-btn{padding:12px 8px;border-radius:10px;border:1.5px solid transparent;background:#f9fafb;color:#374151;cursor:pointer;font-weight:600;font-size:13px;font-family:"Noto Sans JP",sans-serif;transition:all .15s;}
.dex-cal-year-btn:hover{background:#f0fdf4;color:#03968F;border-color:#a7f3d0;}
.dex-cal-year-btn.dex-cal-year-selected{background:linear-gradient(135deg,#03968F 0%,#0AB8AE 100%);color:#fff;}

if(typeof firebase==='undefined'){

  throw new Error('Firebase SDK not loaded');
}

// ========== Firebase 初期化 ==========
firebase.initializeApp(FIREBASE_CONFIG);
const db=firebase.database();
const auth=firebase.auth();
let storage=null;try{storage=firebase.storage();}catch(e){}

let currentStaffUser=null;

// ========== Toast / Modal 共通 ==========
function showToast(msg,duration,onClick){
  var t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  if(onClick){
    t.style.cursor='pointer';
    t.onclick=function(){t.style.display='none';t.onclick=null;t.style.cursor='';onClick();};
  }else{
    t.style.cursor='';t.onclick=null;
  }
  setTimeout(function(){t.style.display='none';t.onclick=null;t.style.cursor='';},duration||2500);
}
function showModal(html){
  var o=document.getElementById('modal-overlay');
  o.innerHTML='<div class="modal">'+html+'</div>';
  o.classList.add('open');
}
function closeModal(){
  var o=document.getElementById('modal-overlay');
  o.classList.remove('open');o.innerHTML='';
}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// 🎨 カスタム確認ダイアログ
function dexConfirm(message,opts){
  opts=opts||{};
  var title=opts.title||'確認';
  var okText=opts.okText||'OK';
  var cancelText=opts.cancelText||'キャンセル';
  var type=opts.type||'info';
  var icons={danger:'🗑️',warning:'⚠️',info:'💡',success:'✅',question:'❓'};
  var colors={
    danger:{main:'#dc2626',bg:'#fef2f2',border:'#fecaca'},
    warning:{main:'#f59e0b',bg:'#fffbeb',border:'#fcd34d'},
    info:{main:'#03968F',bg:'#ecfdf5',border:'#a7f3d0'},
    success:{main:'#059669',bg:'#ecfdf5',border:'#a7f3d0'},
    question:{main:'#03968F',bg:'#f5f3ff',border:'#ddd6fe'}
  };
  var c=colors[type]||colors.info;
  var ic=opts.icon||icons[type]||'💭';
  return new Promise(function(resolve){
    var wrap=document.createElement('div');
    wrap.className='dex-confirm-backdrop';
    wrap.innerHTML='<div class="dex-confirm">'
      +'<div class="dex-confirm-icon" style="background:'+c.bg+';border:2px solid '+c.border+'">'+ic+'</div>'
      +'<div class="dex-confirm-title">'+title+'</div>'
      +'<div class="dex-confirm-message">'+message.replace(/\n/g,'<br>')+'</div>'
      +'<div class="dex-confirm-buttons">'
      +'<button class="dex-confirm-btn dex-confirm-cancel">'+cancelText+'</button>'
      +'<button class="dex-confirm-btn dex-confirm-ok" style="background:'+c.main+'">'+okText+'</button>'
      +'</div></div>';
    wrap.addEventListener('click',function(e){if(e.target===wrap){wrap.remove();resolve(false);}});
    document.body.appendChild(wrap);
    wrap.querySelector('.dex-confirm-cancel').addEventListener('click',function(){wrap.remove();resolve(false);});
    wrap.querySelector('.dex-confirm-ok').addEventListener('click',function(){wrap.remove();resolve(true);});
    var escHandler=function(e){if(e.key==='Escape'){wrap.remove();resolve(false);document.removeEventListener('keydown',escHandler);}};
    document.addEventListener('keydown',escHandler);
    setTimeout(function(){wrap.querySelector('.dex-confirm-ok').focus();},50);
  });
}
function dexAlert(message,opts){opts=opts||{};opts.cancelText='';opts.okText=opts.okText||'OK';opts.title=opts.title||'お知らせ';return dexConfirm(message,opts);}

// ===== ナビゲーション履歴（戻るボタン用） =====
var _navHistory=[]; // {view:'customers', detail:null} or {view:'customers', detail:cid}
function _pushNavHistory(entry){
  // 同じエントリの連続はpushしない
  var last=_navHistory[_navHistory.length-1];
  if(last&&last.view===entry.view&&last.detail===entry.detail)return;
  _navHistory.push(entry);
  // 履歴上限
  if(_navHistory.length>30)_navHistory.shift();
  _updateBackButtons();
}
function _updateBackButtons(){
  var canGoBack=_navHistory.length>=2;
  document.querySelectorAll('.global-back-btn').forEach(function(btn){
    btn.style.visibility=canGoBack?'visible':'hidden';
  });
}
function navigateBack(){
  if(_navHistory.length<2)return;
  _navHistory.pop(); // 現在を捨てる
  var prev=_navHistory[_navHistory.length-1];
  if(!prev)return;
  // 履歴を一旦pop（_pushNavHistoryで再追加される）
  _navHistory.pop();
  if(prev.detail){
    switchMView(prev.view);
    // 詳細画面復元（お客様詳細など）
    if(prev.view==='customers')renderCustomerDetail(prev.detail);
  }else{
    switchMView(prev.view);
  }
}

function switchMView(v){
  _closeSidebarOnMobile();
  document.querySelectorAll('.sb-item').forEach(function(el){
    el.classList.toggle('active', el.dataset.view===v);
  });
  document.querySelectorAll('.view').forEach(function(el){
    el.classList.remove('active');
  });
  var target=document.getElementById('view-'+v);
  if(target)target.classList.add('active');
  // タイトル更新（topbar削除後のためガード）
  var titles={dashboard:'ダッシュボード',chat:'チャット',orders:'案件一覧',customers:'お客様管理',slips:'伝票入力',shipping:'送り状発行',invoice:'請求書発行',partners:'協力会社一覧',staff:'社員管理',areamasters:'エリアマスタ',ocr:'OCR設定'};
  var tEl=document.getElementById('topbar-title');
  if(tEl)tEl.textContent=titles[v]||'管理画面';
  // URL ハッシュに反映（リロード時の復元用）
  history.replaceState(null,'','#'+v);
  // 履歴に追加
  _pushNavHistory({view:v,detail:null});
  // ビュー別の描画
  if(v==='dashboard')renderDashboardView();
  if(v==='chat')renderChatView();
  if(v==='ocr')renderOcrView();
  if(v==='staff')renderStaffView();
  if(v==='areamasters')renderAreaMastersView();
  if(v==='orders'){
    // 🛡️ 案件一覧に入る前に必ず最新の共有日付を再読込（配車表から戻ってきた時のため）
    var saved=localStorage.getItem('dex_current_date');
    if(saved)currentDate=saved;
    renderOrdersList();
  }
  if(v==='customers')renderCustomersView();
  if(v==='slips')renderSlipsView();
  if(v==='shipping')renderShippingView();
  if(v==='invoice')renderInvoiceView();
  if(v==='partners')renderPartnersView();
  // 他ビューはPhase 5以降で追加
}

function _staffStatCard(label,num,color,bg,sub,icon){
  var iconSvg='';
  if(icon==='users')iconSvg='<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>';

  else if(icon==='userX')iconSvg='<path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="17" y1="8" x2="22" y2="13"/><line x1="22" y1="8" x2="17" y2="13"/>';

function _fmtStaffDate(ts){
  var d=new Date(ts);
  var Y=d.getFullYear(),M=('0'+(d.getMonth()+1)).slice(-2),D=('0'+d.getDate()).slice(-2);
  var h=('0'+d.getHours()).slice(-2),m=('0'+d.getMinutes()).slice(-2);
  return Y+'/'+M+'/'+D+' '+h+':'+m;
}

function _staffOnSearchInput(v){
  _staffSearchVal=v||'';
  _renderStaffViewBody();
  // フォーカス維持
  setTimeout(function(){
    var el=document.getElementById('staff-search');
    if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}
  },0);
}
function _staffSetRoleFilter(v){_staffRoleFilter=v||'';_renderStaffViewBody();}

function _staffResetFilters(){_staffSearchVal='';_staffRoleFilter='';_staffBranchFilter='';_renderStaffViewBody();}

function addStaffMember(){
  var name=(document.getElementById('new-staff-name').value||'').trim();
  var email=(document.getElementById('new-staff-email').value||'').trim();
  var pw=(document.getElementById('new-staff-pw').value||'').trim();
  var msgEl=document.getElementById('add-staff-msg');
  var submitBtn=document.getElementById('add-staff-submit');
  var setMsg=function(text,type){
    if(!msgEl)return;
    msgEl.textContent=text;msgEl.style.display='block';
    if(type==='error'){msgEl.style.background='#fef2f2';msgEl.style.color='#dc2626';msgEl.style.border='1px solid #fecaca';}
    else if(type==='success'){msgEl.style.background='#f0fdf4';msgEl.style.color='#059669';msgEl.style.border='1px solid #a7f3d0';}
    else{msgEl.style.background='#f9fafb';msgEl.style.color='#6b7280';msgEl.style.border='1px solid #e5e7eb';}
  };
  if(!name||!email||!pw){setMsg('全て入力してください','error');return;}
  if(pw.length<6){setMsg('パスワードは6文字以上にしてください','error');return;}
  // セカンダリFirebaseアプリで作成（現在のログインを保持）
  var secondary=firebase.apps.find(function(a){return a.name==='secondary';});
  if(!secondary){secondary=firebase.initializeApp(firebase.app().options,'secondary');}
  var secAuth=secondary.auth();

  setMsg('作成中...','info');
  if(submitBtn){submitBtn.disabled=true;submitBtn.style.opacity='.6';}

  var branch=(document.getElementById('new-staff-branch').value||'osaka');
  var role=(document.getElementById('new-staff-role').value||'staff');
  secAuth.createUserWithEmailAndPassword(email,pw).then(function(cred){
    var uid=cred.user.uid;
    return db.ref('staff/'+uid).set({email:email,name:name,branch:branch,role:role,isActive:true,createdAt:Date.now()}).then(function(){
      return secAuth.signOut();
    });
  }).then(function(){
    setMsg('社員を追加しました','success');
    setTimeout(function(){
      var m=document.getElementById('add-staff-modal');if(m)m.remove();
      renderStaffView();
      showToast('社員を追加しました');
    },600);
  }).catch(function(err){
    if(submitBtn){submitBtn.disabled=false;submitBtn.style.opacity='1';}
    var m='エラー';
    if(err.code==='auth/email-already-in-use')m='このメールアドレスは既に登録されています';
    else if(err.code==='auth/invalid-email')m='メールアドレスの形式が正しくありません';
    else if(err.code==='auth/weak-password')m='パスワードが弱すぎます';
    else m='エラー: '+(err.message||'不明');
    setMsg(m,'error');
  });
}

// 社員の有効化/無効化を切り替え
function toggleStaffActive(uid,activate){
  // 自分自身は操作不可
  if(currentStaffUser&&currentStaffUser.uid===uid){
    showToast('自分自身は操作できません');return;
  }
  // 社員情報取得して確認
  db.ref('staff/'+uid).once('value').then(function(snap){
    var s=snap.val();
    if(!s)return;
    var name=s.name||s.email||'この社員';
    var msg=activate
      ? name+' を有効化しますか？\n\n有効化後、この社員はシステムにログインできるようになります。'
      : name+' を無効化しますか？\n\n無効化後、この社員はシステムにログインできなくなります。\n（アカウント自体は残り、後から有効化できます）';
    if(!confirm(msg))return;
    var updates={isActive:activate};
    if(!activate){updates.deactivatedAt=Date.now();}
    else{updates.reactivatedAt=Date.now();}
    db.ref('staff/'+uid).update(updates).then(function(){
      showToast(activate?'有効化しました':'無効化しました');
      renderStaffView();
    }).catch(function(err){
      showToast('エラー: '+(err.message||''));
    });
  });
}

// ひらがな⇄カタカナ⇄半角カナ を統一して検索しやすくする
// 「すち」「スチ」「ｽﾁ」のいずれで打っても同じ結果が出るように
function normalizeKanaForSearch(s){
  if(!s)return '';
  s=String(s);
  // 半角カナ → 全角カナ
  var halfToFull={'ｱ':'ア','ｲ':'イ','ｳ':'ウ','ｴ':'エ','ｵ':'オ','ｶ':'カ','ｷ':'キ','ｸ':'ク','ｹ':'ケ','ｺ':'コ','ｻ':'サ','ｼ':'シ','ｽ':'ス','ｾ':'セ','ｿ':'ソ','ﾀ':'タ','ﾁ':'チ','ﾂ':'ツ','ﾃ':'テ','ﾄ':'ト','ﾅ':'ナ','ﾆ':'ニ','ﾇ':'ヌ','ﾈ':'ネ','ﾉ':'ノ','ﾊ':'ハ','ﾋ':'ヒ','ﾌ':'フ','ﾍ':'ヘ','ﾎ':'ホ','ﾏ':'マ','ﾐ':'ミ','ﾑ':'ム','ﾒ':'メ','ﾓ':'モ','ﾔ':'ヤ','ﾕ':'ユ','ﾖ':'ヨ','ﾗ':'ラ','ﾘ':'リ','ﾙ':'ル','ﾚ':'レ','ﾛ':'ロ','ﾜ':'ワ','ｦ':'ヲ','ﾝ':'ン','ｧ':'ァ','ｨ':'ィ','ｩ':'ゥ','ｪ':'ェ','ｫ':'ォ','ｬ':'ャ','ｭ':'ュ','ｮ':'ョ','ｯ':'ッ','ｰ':'ー'};
  // 半角濁点・半濁点を含む2文字を先に処理
  s=s.replace(/(.)ﾞ/g,function(_,c){var m={'ｶ':'ガ','ｷ':'ギ','ｸ':'グ','ｹ':'ゲ','ｺ':'ゴ','ｻ':'ザ','ｼ':'ジ','ｽ':'ズ','ｾ':'ゼ','ｿ':'ゾ','ﾀ':'ダ','ﾁ':'ヂ','ﾂ':'ヅ','ﾃ':'デ','ﾄ':'ド','ﾊ':'バ','ﾋ':'ビ','ﾌ':'ブ','ﾍ':'ベ','ﾎ':'ボ','ｳ':'ヴ'};return m[c]||c+'゛';});
  s=s.replace(/(.)ﾟ/g,function(_,c){var m={'ﾊ':'パ','ﾋ':'ピ','ﾌ':'プ','ﾍ':'ペ','ﾎ':'ポ'};return m[c]||c+'゜';});
  s=s.replace(/[ｱ-ﾝｧ-ｮｯｰ]/g,function(c){return halfToFull[c]||c;});
  // ひらがな → カタカナ（コードポイント+96）
  s=s.replace(/[\u3041-\u3096]/g,function(c){return String.fromCharCode(c.charCodeAt(0)+0x60);});
  return s.toLowerCase();
}

function _getCompanyCalendar(){
  try{return JSON.parse(localStorage.getItem('dex_company_calendar')||'{}');}
  catch(e){return {};}
}
function _saveCompanyCalendar(cal){
  localStorage.setItem('dex_company_calendar',JSON.stringify(cal));
}
// 指定日が休日か判定（土日・祝日・手動休日）
function _isCompanyHoliday(y,m,d){
  var dateStr=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  var cal=_getCompanyCalendar();
  if(cal[dateStr])return true;
  if(JP_HOLIDAYS[dateStr])return true;
  var dow=new Date(y,m,d).getDay();
  return dow===0||dow===6;
}
function _getHolidayLabel(y,m,d){
  var dateStr=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  var cal=_getCompanyCalendar();
  if(cal[dateStr]&&cal[dateStr].label)return cal[dateStr].label;
  if(JP_HOLIDAYS[dateStr])return JP_HOLIDAYS[dateStr];
  return '';
}
function _countWorkdaysInMonth(year,month){
  var daysInMonth=new Date(year,month+1,0).getDate();
  var count=0;
  for(var d=1;d<=daysInMonth;d++){
    if(!_isCompanyHoliday(year,month,d))count++;
  }
  return count;
}

function _getAllStaffList(){

  // 1. まず社員管理キャッシュから（既にロード済みの場合）
  if(typeof _staffCache!=='undefined'&&Array.isArray(_staffCache)&&_staffCache.length>0){
    _staffCache.forEach(function(entry){
      var uid=entry[0],s=entry[1]||{};
      // 退職者は除外
      if(s.status==='retired')return;
      list.push({id:uid,name:s.name||s.email||uid});
    });
    return list;
  }
  // 2. staffs グローバルがあれば利用
  if(typeof staffs!=='undefined'&&staffs&&typeof staffs==='object'){
    Object.keys(staffs).forEach(function(uid){
      var s=staffs[uid];if(!s)return;
      if(s.status==='retired')return;
      list.push({id:uid,name:s.name||s.email||uid});
    });
    return list;
  }
  return list;
}

// 売上推移チャート本体（ダッシュボード）
function _dashChartBody(){
  var W=680,H=300;
  var pad={l:55,r:30,t:30,b:36};
  var iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  var periodN=(typeof _dashChartPeriod!=='undefined'&&_dashChartPeriod)?_dashChartPeriod:3;
  // 期間に応じてデータ点数とラベル形式を決める
  var dataPoints, labelFn, xLabelStep;
  if(periodN===1){
    dataPoints=30; // 日次30点
    labelFn=function(i){return (i+1)+'日';};
    xLabelStep=5;
  }else if(periodN===3){
    dataPoints=12; // 週ごと12点（3ヶ月）
    labelFn=function(i){var d=new Date();d.setDate(d.getDate()-(11-i)*7);return (d.getMonth()+1)+'/'+d.getDate();};
    xLabelStep=2;
  }else{
    // 6/12/24ヶ月：月ごと
    dataPoints=periodN;
    labelFn=function(i){var d=new Date();d.setMonth(d.getMonth()-(periodN-1-i));return (d.getMonth()+1)+'月';};
    xLabelStep=periodN>=18?3:(periodN>=12?2:1);
  }
  // 営業×指標でダミーデータの規模を変える
  var personFactor={all:1,nagoya:0.18,shiga:0.14,fujioka:0.12,matsuyama:0.10,takenaka:0.09,yamanaka:0.08,sawakichi:0.07,tsujii:0.06,kamomebin:0.10,higashimoto:0.06}[_dashSalesperson]||1;
  var baseScale={sales:4700,orders:520,customers:65}[_dashMetric]||4700;
  var unit={sales:'（万円）',orders:'（件）',customers:'（件）'}[_dashMetric]||'';
  var data=[];
  for(var d=0;d<dataPoints;d++){
    var prog=(d+1)/dataPoints;
    var base=prog*baseScale*(0.85+0.3*prog)*personFactor;
    var jitter=Math.sin(d*1.7)*(baseScale*0.025)*personFactor+Math.cos(d*0.9)*(baseScale*0.017)*personFactor;
    data.push(Math.max(_dashMetric==='customers'?1:5,base+jitter));
  }
  var maxData=Math.max.apply(null,data);
  var roundUnit=_dashMetric==='sales'?1000:(_dashMetric==='orders'?100:10);
  var yMax=Math.max(roundUnit,Math.ceil(maxData*1.15/roundUnit)*roundUnit);
  var sx=function(i){return pad.l+(dataPoints>1?i/(dataPoints-1)*iW:0);};
  var sy=function(v){return pad.t+iH-(v/yMax)*iH;};

  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block;max-height:300px" preserveAspectRatio="xMidYMid meet">';
  svg+='<defs><linearGradient id="dashAreaGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#079C95" stop-opacity="0.18"/><stop offset="100%" stop-color="#079C95" stop-opacity="0"/></linearGradient></defs>';
  // Y軸グリッド
  var ySteps=5;
  for(var s=0;s<=ySteps;s++){
    var val=yMax/ySteps*s;
    var y=sy(val);
    svg+='<line x1="'+pad.l+'" y1="'+y+'" x2="'+(W-pad.r)+'" y2="'+y+'" stroke="#f1f3f5" stroke-width="1"/>';
    svg+='<text x="'+(pad.l-10)+'" y="'+(y+4)+'" font-size="11" fill="#9ca3af" text-anchor="end">'+Math.round(val).toLocaleString()+'</text>';
  }
  svg+='<text x="'+pad.l+'" y="'+(pad.t-10)+'" font-size="10" fill="#9ca3af">'+unit+'</text>';
  // X軸ラベル
  for(var i=0;i<dataPoints;i++){
    if(i===0||(i+1)%xLabelStep===0||i===dataPoints-1){
      svg+='<text x="'+sx(i)+'" y="'+(H-pad.b+20)+'" font-size="11" fill="#9ca3af" text-anchor="middle">'+labelFn(i)+'</text>';
    }
  }
  // エリア
  var areaPath='';
  data.forEach(function(v,i){areaPath+=(i===0?'M':'L')+sx(i)+' '+sy(v)+' ';});
  areaPath+='L'+sx(dataPoints-1)+' '+sy(0)+' L'+sx(0)+' '+sy(0)+' Z';
  svg+='<path d="'+areaPath+'" fill="url(#dashAreaGrad)"/>';
  // ライン
  var linePath='';
  data.forEach(function(v,i){linePath+=(i===0?'M':'L')+sx(i)+' '+sy(v)+' ';});
  svg+='<path d="'+linePath+'" fill="none" stroke="#079C95" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>';
  // ドット
  data.forEach(function(v,i){
    if(dataPoints<=12||i%2===0||i===dataPoints-1)svg+='<circle cx="'+sx(i)+'" cy="'+sy(v)+'" r="4" fill="#079C95" stroke="#fff" stroke-width="2"/>';
  });
  svg+='</svg>';
  return svg;
}

// KPIカード本体（営業担当ごとに数字が変わる）
function _dashKpiCardsBody(){
  var personFactor={all:1,nagoya:0.18,shiga:0.14,fujioka:0.12,matsuyama:0.10,takenaka:0.09,yamanaka:0.08,sawakichi:0.07,tsujii:0.06,kamomebin:0.10,higashimoto:0.06}[_dashSalesperson]||1;
  // 全社の基準値
  var baseSales=28420000;        // 今月の売上（円）
  var baseOrders=528;            // 今月のオーダー数
  var baseNewCust=12;            // 今月の新規お客様数
  // 営業別に按分
  var sales=Math.round(baseSales*personFactor/10000)*10000;
  var orders=Math.round(baseOrders*personFactor);
  var newCust=Math.max(0,Math.round(baseNewCust*personFactor));
  // 前月比（ダミー：担当者ごとに少し違う伸び率）
  var growthBy={all:12.4,nagoya:10.2,shiga:8.5,fujioka:15.6,matsuyama:9.8,takenaka:6.3,yamanaka:11.2,sawakichi:7.1,tsujii:4.5,kamomebin:13.8,higashimoto:5.2}[_dashSalesperson]||10;
  var ordersGrowth=Math.round(orders*growthBy/100);
  var newCustGrowth=Math.max(0,Math.round(newCust*0.3));
  var h='';
  h+=_dashKpiCard('yen','今月の売上','¥'+sales.toLocaleString(),'','+'+growthBy+'%',true,'前月比');
  h+=_dashKpiCard('clipboard','今月のオーダー数',orders.toLocaleString(),'件','+'+ordersGrowth+'件 (+'+growthBy+'%)',true,'前月比');
  h+=_dashKpiCard('userplus','今月の新規お客様数',newCust.toLocaleString(),'件','+'+newCustGrowth+'件',true,'前月比');
  // 4枚目（未返信チャット）は営業担当に依存しない全体値
  h+=_dashKpiCard('chat','未返信チャット','12','件','-3件',true,'前日比');
  return h;
}

// ===== 共有メモ機能 =====
var _sharedMemoCache=[]; // [{id,content,fromDate,toDate,authorName,authorUid,createdAt}]
var _sharedMemoListenerSet=false;

function _initSharedMemoListener(){
  if(_sharedMemoListenerSet)return;
  _sharedMemoListenerSet=true;
  try{
    db.ref('sharedMemos').on('value',function(snap){
      var v=snap.val()||{};
      _sharedMemoCache=Object.keys(v).map(function(k){
        var m=v[k]||{};
        return {id:k,content:m.content||'',fromDate:m.fromDate||'',toDate:m.toDate||'',authorName:m.authorName||'',authorUid:m.authorUid||'',createdAt:m.createdAt||0};
      });
      // 期限切れ自動削除
      _purgeExpiredMemos();
      // ダッシュボード表示中なら再描画
      var listEl=document.getElementById('dash-shared-memo-list');
      if(listEl)listEl.innerHTML=_renderSharedMemoList();
    });
  }catch(e){console.warn('shared memo listener error',e);}
}

function _purgeExpiredMemos(){
  var todayStr=(function(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');})();
  _sharedMemoCache.forEach(function(m){
    if(m.toDate&&m.toDate<todayStr){
      // 期限切れ → Firebase から削除
      try{db.ref('sharedMemos/'+m.id).remove();}catch(e){}
    }
  });
}

function _renderSharedMemoList(){
  _initSharedMemoListener();
  var todayStr=(function(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');})();
  // 期限切れを除外、表示中のもののみ
  var visible=_sharedMemoCache.filter(function(m){
    if(m.toDate&&m.toDate<todayStr)return false;
    if(m.fromDate&&m.fromDate>todayStr)return false;
    return true;
  }).sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0);});

  if(visible.length===0){
    return '<div style="text-align:center;padding:40px 0;color:#9ca3af;font-size:13px">メモはまだありません</div>';
  }
  var fmt=function(s){if(!s)return '';return s.replace(/-/g,'/');};
  var h='';

    var myUid=(currentStaffUser&&currentStaffUser.uid)||'';
    var isMine=(m.authorUid===myUid);
    h+='<div style="display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid #f6f7f8;position:relative">';
    h+='<span style="color:#079C95;font-weight:700;line-height:1.5;flex-shrink:0">・</span>';
    h+='<div style="flex:1;min-width:0">';
    h+='<div style="font-size:13px;color:#2F2C2C;line-height:1.5;word-break:break-word">'+esc(m.content)+'</div>';
    h+='</div>';
    h+='<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">';
    h+='<span style="font-size:11px;color:#6b7280;font-weight:500">'+esc(m.authorName||'-')+'</span>';
    if(isMine){
      h+='<button onclick="_toggleMemoMenu(event,\''+m.id+'\')" style="background:transparent;border:none;cursor:pointer;color:#9ca3af;padding:2px 4px;border-radius:4px;font-size:16px;line-height:1;font-weight:600" onmouseover="this.style.color=\'#079C95\';this.style.background=\'#f1f3f5\'" onmouseout="this.style.color=\'#9ca3af\';this.style.background=\'transparent\'">⋯</button>';
      h+='<div id="memo-menu-'+m.id+'" style="display:none;position:absolute;top:32px;right:0;background:#fff;border:1px solid #eef0f2;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.1);min-width:120px;z-index:100;overflow:hidden">';

function _saveSharedMemo(editId){
  var content=document.getElementById('memo-content').value.trim();
  var fromDate=document.getElementById('memo-from').value;
  var toDate=document.getElementById('memo-to').value;
  if(!content){showToast('メモ内容を入力してください');return;}
  if(!fromDate||!toDate){showToast('表示期間を必ず入力してください');return;}
  if(fromDate>toDate){showToast('開始日が終了日より後になっています');return;}
  if(editId){
    // 更新（authorは元のまま、updatedAtのみ追加）
    try{
      db.ref('sharedMemos/'+editId).update({
        content:content,fromDate:fromDate,toDate:toDate,updatedAt:Date.now()
      }).then(function(){
        document.getElementById('add-memo-modal').remove();
        showToast('共有メモを更新しました');
      }).catch(function(err){showToast('保存エラー: '+(err.message||err));});
    }catch(e){showToast('保存に失敗しました: '+e.message);}
  }else{
    var authorName=(currentStaffData&&currentStaffData.name)||(currentStaffUser&&currentStaffUser.email&&currentStaffUser.email.split('@')[0])||'';
    var authorUid=(currentStaffUser&&currentStaffUser.uid)||'';
    var data={content:content,fromDate:fromDate,toDate:toDate,authorName:authorName,authorUid:authorUid,createdAt:Date.now()};
    try{
      db.ref('sharedMemos').push(data).then(function(){
        document.getElementById('add-memo-modal').remove();
        showToast('共有メモを追加しました');
      }).catch(function(err){showToast('保存エラー: '+(err.message||err));});
    }catch(e){showToast('保存に失敗しました: '+e.message);}
  }
}

function _toggleMemoMenu(e,id){
  e.stopPropagation();
  // 他のメニューを全て閉じる
  document.querySelectorAll('[id^="memo-menu-"]').forEach(function(el){
    if(el.id!=='memo-menu-'+id)el.style.display='none';
  });
  var menu=document.getElementById('memo-menu-'+id);
  if(!menu)return;
  menu.style.display=(menu.style.display==='none'||!menu.style.display)?'block':'none';
  // 外側クリックで閉じる
  if(menu.style.display==='block'){
    setTimeout(function(){
      var handler=function(){
        menu.style.display='none';
        document.removeEventListener('click',handler);
      };
      document.addEventListener('click',handler);
    },10);
  }
}

function _buildCalendarGrid(year,month){
  var firstDay=new Date(year,month,1).getDay();

  var today=new Date();
  var isCurrentMonth=today.getFullYear()===year&&today.getMonth()===month;
  var todayDate=today.getDate();

function _saveSchedule(dateStr,schedId){
  // 日付入力欄から新しい日付を取得
  var newDateInput=document.getElementById('sched-date');
  var newDateStr=newDateInput?newDateInput.value:dateStr;
  if(!newDateStr){showToast('日付を入力してください');return;}
  var staffId=document.getElementById('sched-staff').value;
  var staffList=_getAllStaffList();
  var staffName=(staffList.find(function(s){return s.id===staffId;})||{}).name||'';
  var type=document.getElementById('sched-type').value;
  var start=type==='gaikin'?(document.getElementById('sched-start').value||''):'';
  var end=type==='gaikin'?(document.getElementById('sched-end').value||''):'';
  var memo=document.getElementById('sched-memo').value.trim();

  var data=_getScheduleData();
  // 編集時に日付が変わっていれば、元の日付から削除
  if(schedId&&dateStr!==newDateStr&&data[dateStr]){
    data[dateStr]=data[dateStr].filter(function(s){return s.id!==schedId;});
    if(data[dateStr].length===0)delete data[dateStr];
  }
  if(!data[newDateStr])data[newDateStr]=[];
  if(schedId&&dateStr===newDateStr){
    // 同じ日付内での更新
    var idx=data[newDateStr].findIndex(function(s){return s.id===schedId;});
    if(idx>=0){
      data[newDateStr][idx]={id:schedId,staffId:staffId,staffName:staffName,type:type,start:start,end:end,memo:memo};
    }else{
      data[newDateStr].push({id:schedId,staffId:staffId,staffName:staffName,type:type,start:start,end:end,memo:memo});
    }
  }else if(schedId){
    // 日付が変わった場合：同じIDで新しい日付に追加
    data[newDateStr].push({id:schedId,staffId:staffId,staffName:staffName,type:type,start:start,end:end,memo:memo});
  }else{
    var newId='sc_'+Date.now()+'_'+Math.floor(Math.random()*1000);
    data[newDateStr].push({id:newId,staffId:staffId,staffName:staffName,type:type,start:start,end:end,memo:memo});
  }
  _saveScheduleData(data);
  document.getElementById('sched-edit-modal').remove();
  _openDayScheduleModal(newDateStr); // 新しい日付の予定一覧を表示
  _renderCompanyCalendarModal(); // カレンダーも再描画（件数更新）
  // 本日の予定（ダッシュボード）も再描画
  if(document.getElementById('view-dashboard')&&document.getElementById('view-dashboard').classList.contains('active')){
    renderDashboardView();
  }
}

function _toggleScheduleMenu(e,dateStr,schedId){
  e.stopPropagation();
  // 他のメニューを全て閉じる
  document.querySelectorAll('[id^="sched-menu-"]').forEach(function(el){
    if(el.id!=='sched-menu-'+schedId)el.style.display='none';
  });
  var menu=document.getElementById('sched-menu-'+schedId);
  if(!menu)return;
  menu.style.display=(menu.style.display==='none'||!menu.style.display)?'block':'none';
  if(menu.style.display==='block'){
    setTimeout(function(){
      var handler=function(){menu.style.display='none';document.removeEventListener('click',handler);};
      document.addEventListener('click',handler);
    },10);
  }
}

function _deleteSchedule(dateStr,schedId){
  // メニューを閉じる
  var menu=document.getElementById('sched-menu-'+schedId);if(menu)menu.style.display='none';
  dexConfirm('この予定を削除しますか？',{
    title:'予定の削除',okText:'削除',cancelText:'キャンセル',type:'danger'
  }).then(function(ok){
    if(!ok)return;
    var data=_getScheduleData();
    if(data[dateStr]){
      data[dateStr]=data[dateStr].filter(function(s){return s.id!==schedId;});
      if(data[dateStr].length===0)delete data[dateStr];
      _saveScheduleData(data);
    }
    _openDayScheduleModal(dateStr);
    _renderCompanyCalendarModal();
    if(document.getElementById('view-dashboard')&&document.getElementById('view-dashboard').classList.contains('active')){
      renderDashboardView();
    }
  });
}

// カレンダー（当月・本日ハイライト）
function _dashCalendar(now){
  var year=now.getFullYear(),month=now.getMonth(),today=now.getDate();
  var firstDay=new Date(year,month,1).getDay(); // 0=日
  var daysInMonth=new Date(year,month+1,0).getDate();
  var prevDays=new Date(year,month,0).getDate();
  var wlabels=['日','月','火','水','木','金','土'];
  var h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">';
  h+='<button style="background:none;border:none;cursor:pointer;color:#9ca3af;padding:4px;display:inline-flex"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>';
  h+='<span style="font-size:15px;font-weight:600;color:#2F2C2C">'+year+'年'+(month+1)+'月</span>';
  h+='<button style="background:none;border:none;cursor:pointer;color:#9ca3af;padding:4px;display:inline-flex"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>';
  h+='</div>';
  // 曜日ヘッダー
  h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">';
  wlabels.forEach(function(w,i){
    var col=i===0?'#dc2626':(i===6?'#2563eb':'#9ca3af');
    h+='<div style="text-align:center;font-size:11px;font-weight:600;color:'+col+';padding:4px 0">'+w+'</div>';
  });
  h+='</div>';
  // 日付グリッド
  h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">';
  // 前月分
  for(var i=firstDay-1;i>=0;i--){
    h+='<div style="text-align:center;font-size:12px;color:#d1d5db;padding:6px 0">'+(prevDays-i)+'</div>';
  }
  // 当月
  for(var d=1;d<=daysInMonth;d++){
    var dow=new Date(year,month,d).getDay();
    var isToday=d===today;
    var col=dow===0?'#dc2626':(dow===6?'#2563eb':'#374151');
    if(isToday){
      h+='<div style="text-align:center;padding:6px 0"><span style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:#079C95;color:#fff;border-radius:50%;font-size:12px;font-weight:600">'+d+'</span></div>';
    }else{
      h+='<div style="text-align:center;font-size:12px;color:'+col+';padding:6px 0">'+d+'</div>';
    }
  }
  // 翌月分（グリッドを埋める）
  var totalCells=firstDay+daysInMonth;
  var trailing=(7-(totalCells%7))%7;
  for(var t=1;t<=trailing;t++){
    h+='<div style="text-align:center;font-size:12px;color:#d1d5db;padding:6px 0">'+t+'</div>';
  }
  h+='</div>';
  return h;
}

function renderCustomersView(){
  currentCustomerId=null;
  var allList=Object.entries(customers||{});
  // 拠点フィルタはお客様管理では適用しない（拠点に関係なく全件表示）
  var pending=[],approved=[];
  allList.forEach(function(x){
    if(x[1]&&x[1].status==='pending'){pending.push(x);return;}
    approved.push(x);
  });
  // 検索
  var qRaw=customerSearchQ.trim();
  var q=normalizeKanaForSearch(qRaw);
  var filtered=approved;
  if(q){
    filtered=approved.filter(function(x){
      var c=x[1]||{};
      var hay=normalizeKanaForSearch([x[0],c.companyName,c.shortName,c.kana,c.tel,c.pickupAddress,c.staffName].join(' '));
      return hay.includes(q);
    });
  }

  // ソート
  var sortKey=_custSortKey,sortDir=_custSortDir;
  filtered.sort(function(a,b){
    var ca=a[1]||{},cb=b[1]||{};
    var av,bv;
    if(sortKey==='id'){av=parseInt(a[0])||0;bv=parseInt(b[0])||0;}
    else if(sortKey==='updatedAt'){av=ca.updatedAt||0;bv=cb.updatedAt||0;}
    else if(sortKey==='branch'){av=ca.branch||'';bv=cb.branch||'';}
    else if(sortKey==='orderCount'){
      av=Object.values(orders).filter(function(o){return o.clientCustomerId===a[0]||(o.clientName||'')===(ca.companyName||'');}).length;
      bv=Object.values(orders).filter(function(o){return o.clientCustomerId===b[0]||(o.clientName||'')===(cb.companyName||'');}).length;
    }
    else{av=ca.companyName||'';bv=cb.companyName||'';}
    if(typeof av==='string')return sortDir==='asc'?av.localeCompare(bv):bv.localeCompare(av);
    return sortDir==='asc'?(av-bv):(bv-av);
  });

  // ===== 月次推移データ計算 =====
  var now=new Date();
  var months=[];
  var periodN=_custChartPeriod||12;
  for(var i=periodN-1;i>=0;i--){
    var d=new Date(now.getFullYear(),now.getMonth()-i,1);
    var key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    var label=(periodN<=12?String(d.getMonth()+1)+'月':d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0'));
    var endOfMonth=new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59).getTime();
    months.push({key:key,label:label,endOfMonth:endOfMonth,year:d.getFullYear(),month:d.getMonth()+1});
  }
  // 各月末時点の登録済み顧客数（累計）
  var custLine=months.map(function(m){
    return approved.filter(function(x){
      var c=x[1]||{};
      var ca=c.createdAt;
      if(!ca)return true;
      return ca<=m.endOfMonth;
    }).length;
  });
  // 各月のオーダー数 + 売上（pickupDateベース）
  var orderLine=months.map(function(m){return 0;});
  var salesLine=months.map(function(m){return 0;});
  // 前年同月（YoY）用キー算出
  var thisM=new Date(now.getFullYear(),now.getMonth(),1);
  var yoyDate=new Date(thisM.getFullYear()-1,thisM.getMonth(),1);
  var yoyKey=yoyDate.getFullYear()+'-'+String(yoyDate.getMonth()+1).padStart(2,'0');
  var ordersYoY=0, salesYoY=0;
  Object.values(orders||{}).forEach(function(o){
    if(!o||!o.pickupDate)return;
    var pkey=String(o.pickupDate).substring(0,7);
    var idx=months.findIndex(function(m){return m.key===pkey;});
    if(idx>=0){
      orderLine[idx]++;
      var fare=parseFloat(o.fare||0)||0;
      salesLine[idx]+=fare;
    }
    // 前年同月の集計（チャート範囲外でも計算）
    if(pkey===yoyKey){
      ordersYoY++;
      salesYoY+=parseFloat(o.fare||0)||0;
    }
  });

  // KPI集計
  var totalCount=approved.length;
  var lastIdx=months.length-1, prevIdx=Math.max(0,months.length-2);
  var thisMonthKey=months[lastIdx].key;
  var prevMonthKey=months[prevIdx].key;
  var newThisMonth=0,latestUpdate=0,prevUpdate=0;
  var newPrevMonth=0;
  approved.forEach(function(x){
    var c=x[1]||{};
    // 承認日時優先（無ければcreatedAtへフォールバック）
    var approvedTime=c.approvedAt||c.createdAt;
    if(approvedTime){
      var ck=new Date(approvedTime).getFullYear()+'-'+String(new Date(approvedTime).getMonth()+1).padStart(2,'0');
      if(ck===thisMonthKey)newThisMonth++;
      if(ck===prevMonthKey)newPrevMonth++;
    }
    if(c.updatedAt){
      if(c.updatedAt>latestUpdate){prevUpdate=latestUpdate;latestUpdate=c.updatedAt;}
      else if(c.updatedAt>prevUpdate)prevUpdate=c.updatedAt;
    }
  });
  var custPrevTotal=custLine[prevIdx]||0;
  var custDelta=totalCount-custPrevTotal;
  var ordersThisMonth=orderLine[lastIdx]||0;
  var ordersPrevMonth=orderLine[prevIdx]||0;
  var salesThisMonth=salesLine[lastIdx]||0;
  var salesPrevMonth=salesLine[prevIdx]||0;

  var fmtDate=function(t){if(!t)return '-';var d=new Date(t);return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');};
  var latestUpdateLabel=fmtDate(latestUpdate||Date.now());
  var prevUpdateLabel=fmtDate(prevUpdate);

  // 昨日の実績（ダミーデータ - 後でorders接続）
  var yesterday=new Date(now.getFullYear(),now.getMonth(),now.getDate()-1);

// ====== KPIカード（上段4枚） ======
function _custKpiCard(icon,label,value,suffix,delta,baseValue,format,cmpLabel,prevDateLabel){
  var iconSvg='';
  if(icon==='users')iconSvg='<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>';
  else if(icon==='clipboard')iconSvg='<path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M9 12h6M9 16h4"/>';
  else if(icon==='yen')iconSvg='<path d="M6 3l6 8 6-8M12 11v10M7 14h10M7 18h10"/>';
  else if(icon==='calendar')iconSvg='<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="12" y1="14" x2="12" y2="18"/><line x1="10" y1="16" x2="14" y2="16"/>';
  else if(icon==='userplus')iconSvg='<path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>';

  // delta テキスト（上昇/下降の矢印アイコン付き）
  var arrowUp='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><polyline points="7 17 17 7"/><polyline points="7 7 17 7 17 17"/></svg>';
  var arrowDown='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><polyline points="7 7 17 17"/><polyline points="17 7 17 17 7 17"/></svg>';
  var deltaHtml='';
  if(format==='date'){
    deltaHtml='<span style="color:#9ca3af;font-weight:500">'+cmpLabel+'</span> <span style="color:#6b7280;font-weight:500">'+(prevDateLabel||'-')+'</span>';
  }else if(format==='count_only'){
    var deltaColor='#9ca3af',txt='',arrow='';
    if(delta>0){deltaColor='#079C95';txt='+'+delta.toLocaleString()+suffix;arrow=arrowUp;}
    else if(delta<0){deltaColor='#dc2626';txt=delta.toLocaleString()+suffix;arrow=arrowDown;}
    else{txt='±0'+suffix;}
    deltaHtml='<span style="display:inline-flex;align-items:center;gap:4px;color:'+deltaColor+';font-weight:500">'+arrow+'<span style="color:#9ca3af;font-weight:500">'+cmpLabel+'</span> <span style="color:'+deltaColor+';font-weight:600">'+txt+'</span></span>';
  }else{
    var deltaColor='#9ca3af',txt='',arrow='';
    if(delta>0){
      deltaColor='#079C95';arrow=arrowUp;
      if(format==='yen'){var pct=baseValue>0?Math.round(delta/baseValue*1000)/10:0;txt='+'+pct+'%';}
      else{var pct=baseValue>0?Math.round(delta/baseValue*1000)/10:0;txt='+'+pct+'% (+'+delta.toLocaleString()+suffix+')';}
    }else if(delta<0){
      deltaColor='#dc2626';arrow=arrowDown;
      if(format==='yen'){var pct=baseValue>0?Math.round(delta/baseValue*1000)/10:0;txt=pct+'%';}
      else{var pct=baseValue>0?Math.round(delta/baseValue*1000)/10:0;txt=pct+'% ('+delta.toLocaleString()+suffix+')';}
    }else{
      txt=format==='yen'?'±0%':'±0% (±0'+suffix+')';
    }
    if(arrow){
      deltaHtml='<span style="display:inline-flex;align-items:center;gap:4px;color:'+deltaColor+'">'+arrow+'<span style="color:#9ca3af;font-weight:500">'+cmpLabel+'</span> <span style="color:'+deltaColor+';font-weight:600">'+txt+'</span></span>';
    }else{
      deltaHtml='<span style="color:#9ca3af;font-weight:500">'+cmpLabel+'</span> <span style="color:'+deltaColor+';font-weight:500">'+txt+'</span>';
    }
  }

  var h='<div class="cust-kpi-card" style="background:#fff;border-radius:20px;padding:14px 20px;box-shadow:0 1px 3px rgba(0,0,0,.04)">';
  h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">';
  h+='<div style="width:32px;height:32px;background:#eafaf5;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#079C95" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+iconSvg+'</svg></div>';
  h+='<span style="font-size:13px;color:#6b7280;font-weight:500">'+label+'</span>';
  h+='</div>';
  h+='<div style="display:flex;align-items:baseline;gap:4px;margin-bottom:5px"><span style="font-size:24px;font-weight:500;color:#2F2C2C;letter-spacing:-.3px">'+value+'</span>';
  if(suffix)h+='<span style="font-size:13px;color:#9ca3af;font-weight:500">'+suffix+'</span>';
  h+='</div>';
  h+='<div style="font-size:12px">'+deltaHtml+'</div>';
  h+='</div>';
  return h;
}

// ====== 日次売上推移チャート（今月 vs 前年同月） ======
function _custDailySalesChart(now,salesThisMonth){
  var W=680,H=300;
  var pad={l:50,r:30,t:24,b:36};
  var iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  var daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  var today=now.getDate();
  // ダミーデータ生成（実データ接続は後で）：累積っぽい右肩上がり
  var thisYear=[],lastYear=[];
  var peakThis=salesThisMonth>0?salesThisMonth:4700;
  var maxVal=5000; // 万円スケール
  for(var d=1;d<=daysInMonth;d++){
    var prog=d/daysInMonth;
    // 今年：右肩上がり＋小さな揺らぎ
    var baseThis=prog*4700*(0.85+0.3*prog);
    var jitter=Math.sin(d*1.7)*120+Math.cos(d*0.9)*80;
    thisYear.push(Math.max(300,baseThis+jitter));
    // 去年：今年よりやや低め
    var baseLast=prog*3850*(0.88+0.25*prog);
    var jitterL=Math.sin(d*1.3)*90;
    lastYear.push(Math.max(250,baseLast+jitterL));
  }
  var maxData=Math.max.apply(null,thisYear.concat(lastYear).concat([maxVal]));
  var yMax=Math.ceil(maxData/1000)*1000;
  var sx=function(i){return pad.l+(daysInMonth>1?i/(daysInMonth-1)*iW:0);};
  var sy=function(v){return pad.t+iH-(v/yMax)*iH;};

  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block" preserveAspectRatio="xMidYMid meet">';
  svg+='<defs><linearGradient id="custAreaGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#079C95" stop-opacity="0.18"/><stop offset="100%" stop-color="#079C95" stop-opacity="0"/></linearGradient></defs>';

  // Y軸グリッド＋ラベル（万円）
  var ySteps=5;
  for(var s=0;s<=ySteps;s++){
    var val=yMax/ySteps*s;
    var y=sy(val);
    svg+='<line x1="'+pad.l+'" y1="'+y+'" x2="'+(W-pad.r)+'" y2="'+y+'" stroke="#f1f3f5" stroke-width="1"/>';
    svg+='<text x="'+(pad.l-10)+'" y="'+(y+4)+'" font-size="11" fill="#9ca3af" text-anchor="end">'+Math.round(val).toLocaleString()+'</text>';
  }
  svg+='<text x="'+pad.l+'" y="'+(pad.t-10)+'" font-size="10" fill="#9ca3af">（万円）</text>';

  // X軸ラベル（5日刻み）
  for(var d=1;d<=daysInMonth;d++){
    if(d===1||d%5===0||d===daysInMonth){
      var x=sx(d-1);
      svg+='<text x="'+x+'" y="'+(H-pad.b+20)+'" font-size="11" fill="#9ca3af" text-anchor="middle">'+d+'日</text>';
    }
  }

  // 去年ライン（点線・グレー）
  var lastPath='';
  lastYear.forEach(function(v,i){lastPath+=(i===0?'M':'L')+sx(i)+' '+sy(v)+' ';});
  svg+='<path d="'+lastPath+'" fill="none" stroke="#cbd5e1" stroke-width="2.5" stroke-dasharray="2 4" stroke-linecap="round" stroke-linejoin="round"/>';

  // 今年エリア塗り
  var areaPath='';
  thisYear.forEach(function(v,i){areaPath+=(i===0?'M':'L')+sx(i)+' '+sy(v)+' ';});
  areaPath+='L'+sx(daysInMonth-1)+' '+sy(0)+' L'+sx(0)+' '+sy(0)+' Z';
  svg+='<path d="'+areaPath+'" fill="url(#custAreaGrad)"/>';

  // 今年ライン（緑）
  var thisPath='';
  thisYear.forEach(function(v,i){thisPath+=(i===0?'M':'L')+sx(i)+' '+sy(v)+' ';});
  svg+='<path d="'+thisPath+'" fill="none" stroke="#079C95" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>';

  // データポイント（5日刻み）
  thisYear.forEach(function(v,i){
    var d=i+1;
    if(d===1||d%2===0||d===daysInMonth){
      svg+='<circle cx="'+sx(i)+'" cy="'+sy(v)+'" r="4" fill="#079C95" stroke="#fff" stroke-width="2"/>';
    }
  });

  // 最新値ラベル（吹き出し）
  var lastV=thisYear[daysInMonth-1];
  var lx=sx(daysInMonth-1),ly=sy(lastV);
  var labelVal='¥'+Math.round(salesThisMonth>0?salesThisMonth:28420000).toLocaleString();
  var boxW=labelVal.length*9+20;
  svg+='<g><rect x="'+(lx-boxW-6)+'" y="'+(ly-32)+'" width="'+boxW+'" height="24" rx="7" fill="#079C95"/>';
  svg+='<text x="'+(lx-boxW/2-6)+'" y="'+(ly-15)+'" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">'+labelVal+'</text></g>';

  svg+='</svg>';
  return svg;
}

// ====== チャートSVG生成（3系列対応） ======
function _custTrendChart(months,custLine,orderLine,salesLine,viewMode){
  var W=640,H=270;
  var pad={l:55,r:55,t:30,b:46};
  var iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  var n=months.length,stepX=n>1?iW/(n-1):0;

  var showCust=viewMode==='all'||viewMode==='cust';
  var showOrder=viewMode==='all'||viewMode==='orders';
  var showSales=viewMode==='all'||viewMode==='sales';
  // 単一系列モードは全てメインカラー #079C95 で統一
  var single=(viewMode==='cust'||viewMode==='orders'||viewMode==='sales');
  var C=single?'#079C95':null;

  // 各系列のスケール
  var custMax=Math.max(1000,Math.ceil(Math.max.apply(null,custLine.concat([1]))/1000)*1000);
  if(Math.max.apply(null,custLine.concat([0]))<=500)custMax=Math.max(100,Math.ceil(Math.max.apply(null,custLine.concat([1]))/100)*100);
  var orderMax=Math.max(20,Math.ceil(Math.max.apply(null,orderLine.concat([10]))/20)*20);
  var salesMaxRaw=Math.max.apply(null,salesLine.concat([1]));
  var salesMag=salesMaxRaw>=10000000?1000000:salesMaxRaw>=1000000?100000:salesMaxRaw>=100000?10000:1000;
  var salesMax=Math.max(salesMag,Math.ceil(salesMaxRaw/salesMag)*salesMag);

  var custPts=custLine.map(function(v,i){return{x:pad.l+i*stepX,y:pad.t+iH-(v/custMax)*iH,v:v};});
  var ordPts=orderLine.map(function(v,i){return{x:pad.l+i*stepX,y:pad.t+iH-(v/orderMax)*iH,v:v};});
  var salesPts=salesLine.map(function(v,i){return{x:pad.l+i*stepX,y:pad.t+iH-(v/salesMax)*iH,v:v};});

  var fmtSales=function(v){
    if(v>=10000000)return '¥'+(Math.round(v/100000)/10)+'M';
    if(v>=10000)return '¥'+Math.round(v/1000)+'K';
    return '¥'+Math.round(v).toLocaleString();
  };

  var svg='<svg class="cust-chart-svg" viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block;max-height:300px" preserveAspectRatio="xMidYMid meet">';

  // 軸タイトル
  if(showCust)svg+='<text x="'+pad.l+'" y="'+(pad.t-12)+'" font-size="10" fill="'+(C||'#0e7490')+'" font-weight="700">お客様数（件）</text>';
  if(showSales&&showOrder)svg+='<text x="'+(W-pad.r)+'" y="'+(pad.t-12)+'" font-size="10" fill="#f59e0b" font-weight="700" text-anchor="end">売上 / オーダー</text>';
  else if(showOrder)svg+='<text x="'+(W-pad.r)+'" y="'+(pad.t-12)+'" font-size="10" fill="'+(C||'#0e7490')+'" font-weight="700" text-anchor="end">オーダー数（件）</text>';
  else if(showSales)svg+='<text x="'+(W-pad.r)+'" y="'+(pad.t-12)+'" font-size="10" fill="'+(C||'#f59e0b')+'" font-weight="700" text-anchor="end">売上（円）</text>';

  // 水平グリッド
  for(var i=0;i<=4;i++){
    var y=pad.t+(iH/4)*i;
    svg+='<line x1="'+pad.l+'" y1="'+y+'" x2="'+(W-pad.r)+'" y2="'+y+'" stroke="#f3f4f6" stroke-width="1"/>';
    // 左目盛り（お客様数）
    if(showCust){
      var cv=Math.round(custMax-(custMax/4)*i);
      svg+='<text x="'+(pad.l-8)+'" y="'+(y+3.5)+'" font-size="10" fill="'+(C||'#0e7490')+'" text-anchor="end">'+cv.toLocaleString()+'</text>';
    }
    // 右目盛り
    if(showSales&&!showOrder){
      var sv=Math.round(salesMax-(salesMax/4)*i);
      svg+='<text x="'+(W-pad.r+8)+'" y="'+(y+3.5)+'" font-size="10" fill="'+(C||'#f59e0b')+'" text-anchor="start">'+fmtSales(sv)+'</text>';
    }else if(showOrder&&!showSales){
      var ov=Math.round(orderMax-(orderMax/4)*i);
      svg+='<text x="'+(W-pad.r+8)+'" y="'+(y+3.5)+'" font-size="10" fill="'+(C||'#0e7490')+'" text-anchor="start">'+ov+'</text>';
    }else if(showSales&&showOrder){
      // 全部モード：右側に売上だけ表示（オーダー数はラベルで判別）
      var sv=Math.round(salesMax-(salesMax/4)*i);
      svg+='<text x="'+(W-pad.r+8)+'" y="'+(y+3.5)+'" font-size="10" fill="#f59e0b" text-anchor="start">'+fmtSales(sv)+'</text>';
    }
  }

  // お客様数: ライン+エリア+ドット+値
  if(showCust){
    var custColor=C||'#0e7490';
    var custPath=custPts.map(function(p,i){return(i===0?'M':'L')+p.x+' '+p.y;}).join(' ');
    var custArea=custPath+' L '+(pad.l+(n-1)*stepX)+' '+(pad.t+iH)+' L '+pad.l+' '+(pad.t+iH)+' Z';
    svg+='<path d="'+custArea+'" fill="'+(single?'rgba(7,156,149,.08)':'rgba(14,116,144,.06)')+'"/>';
    svg+='<path d="'+custPath+'" fill="none" stroke="'+custColor+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
  }
  // オーダー数
  if(showOrder){
    var ordColor=C||'#5eead4';
    var ordPath=ordPts.map(function(p,i){return(i===0?'M':'L')+p.x+' '+p.y;}).join(' ');
    if(single){var ordArea=ordPath+' L '+(pad.l+(n-1)*stepX)+' '+(pad.t+iH)+' L '+pad.l+' '+(pad.t+iH)+' Z';svg+='<path d="'+ordArea+'" fill="rgba(7,156,149,.08)"/>';}
    svg+='<path d="'+ordPath+'" fill="none" stroke="'+ordColor+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
  }
  // 売上
  if(showSales){
    var salesColor=C||'#f59e0b';
    var salesPath=salesPts.map(function(p,i){return(i===0?'M':'L')+p.x+' '+p.y;}).join(' ');
    if(single){var salesArea=salesPath+' L '+(pad.l+(n-1)*stepX)+' '+(pad.t+iH)+' L '+pad.l+' '+(pad.t+iH)+' Z';svg+='<path d="'+salesArea+'" fill="rgba(7,156,149,.08)"/>';}
    svg+='<path d="'+salesPath+'" fill="none" stroke="'+salesColor+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="'+(viewMode==='all'?'5 3':'0')+'"/>';
  }

  // X軸ラベル（密集する場合は間引き表示）
  var labelStep=1;
  if(months.length>=18)labelStep=3;       // 24ヶ月モード：3ヶ月ごと
  else if(months.length>=10)labelStep=2;  // 12ヶ月モード：2ヶ月ごと
  months.forEach(function(m,i){
    // 間引き：先頭・末尾は必ず表示、それ以外はlabelStep刻み
    if(labelStep>1&&i!==0&&i!==months.length-1&&i%labelStep!==0)return;
    var x=pad.l+i*stepX;
    svg+='<text x="'+x+'" y="'+(H-pad.b+16)+'" font-size="10" fill="#6b7280" text-anchor="middle">'+m.label+'</text>';
  });

  // ドットと値ラベル（モードに応じて）
  if(showCust){
    var custColor=C||'#0e7490';
    custPts.forEach(function(p){
      svg+='<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="'+custColor+'" stroke="#fff" stroke-width="1.5"/>';
      if(viewMode==='cust')svg+='<text x="'+p.x+'" y="'+(p.y-10)+'" font-size="10" font-weight="700" fill="'+custColor+'" text-anchor="middle">'+p.v.toLocaleString()+'</text>';
    });
  }
  if(showOrder){
    var ordColor=C||'#5eead4';
    var ordTxt=C||'#0e7490';
    ordPts.forEach(function(p){
      svg+='<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="'+ordColor+'" stroke="#fff" stroke-width="1.5"/>';
      if(viewMode==='orders')svg+='<text x="'+p.x+'" y="'+(p.y-10)+'" font-size="10" font-weight="700" fill="'+ordTxt+'" text-anchor="middle">'+p.v+'</text>';
    });
  }
  if(showSales){
    var salesColor=C||'#f59e0b';
    var salesTxt=C||'#b45309';
    salesPts.forEach(function(p){
      svg+='<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="'+salesColor+'" stroke="#fff" stroke-width="1.5"/>';
      if(viewMode==='sales')svg+='<text x="'+p.x+'" y="'+(p.y-10)+'" font-size="10" font-weight="700" fill="'+salesTxt+'" text-anchor="middle">'+fmtSales(p.v)+'</text>';
    });
  }

  svg+='</svg>';
  return svg;
}

function _custSummaryRow(icon,label,valueStr,delta,baseValue,suffix,format,cmpLabel){
  var iconSvg='';

  var compareLabel=cmpLabel||'前月比';

  };
  if(delta>0){

  }else if(delta<0){

    deltaColor='#dc2626';
    deltaArrow='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-left:2px"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>';
  }else{
    deltaTxt=format==='yen'?'±¥0 (±0%)':'±0'+suffix+' (±0%)';
  }
  var h='<div style="display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid #f3f4f6">';
  h+='<div style="width:30px;height:30px;background:#e0f2f1;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#079C95" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+iconSvg+'</svg></div>';

// 次の番号を採番
function _nextNumber(obj){
  if(!obj)return 1;
  var max=0;
  Object.keys(obj).forEach(function(k){var n=parseInt(k);if(!isNaN(n)&&n>max)max=n;});
  return max+1;
}

function saveBranch(cid,bk){
  var name=(document.getElementById('branch-name').value||'').trim();
  var address=(document.getElementById('branch-address').value||'').trim();
  var tel=(document.getElementById('branch-tel').value||'').trim();
  if(!name){showToast('支店名を入力してください');return;}
  var updates={name:name,address:address,tel:tel};
  db.ref('customers/'+cid+'/branches/'+bk).update(updates).then(function(){
    db.ref('customers/'+cid+'/updatedAt').set(Date.now());
    showToast('保存しました');
    document.getElementById('branch-modal').remove();
    if(customers[cid]){
      if(!customers[cid].branches)customers[cid].branches={};
      if(!customers[cid].branches[bk])customers[cid].branches[bk]={};
      Object.assign(customers[cid].branches[bk],updates);
    }
    renderCustomerDetail(cid);
  }).catch(function(err){showToast('エラー: '+(err.message||''));});
}
function deleteBranch(cid,bk){
  var cu=customers[cid]||{};
  var br=(cu.branches||{})[bk]||{};
  var contactCount=Object.keys(br.contacts||{}).length;
  var msg='支店「'+(br.name||bk)+'」を削除しますか？';
  if(contactCount>0)msg+='\n（'+contactCount+'人の担当者も一緒に削除されます）';
  if(!confirm(msg))return;
  db.ref('customers/'+cid+'/branches/'+bk).remove().then(function(){
    db.ref('customers/'+cid+'/updatedAt').set(Date.now());
    showToast('削除しました');
    if(customers[cid]&&customers[cid].branches)delete customers[cid].branches[bk];
    renderCustomerDetail(cid);
  }).catch(function(err){showToast('エラー: '+(err.message||''));});
}

function saveContact(cid,bk,ck){
  var name=(document.getElementById('contact-name').value||'').trim();
  var email=(document.getElementById('contact-email').value||'').trim();
  var tel=(document.getElementById('contact-tel').value||'').trim();
  if(!name){showToast('担当者名を入力してください');return;}
  var updates={name:name,email:email,tel:tel};
  db.ref('customers/'+cid+'/branches/'+bk+'/contacts/'+ck).update(updates).then(function(){
    db.ref('customers/'+cid+'/updatedAt').set(Date.now());
    showToast('保存しました');
    document.getElementById('contact-modal').remove();
    if(customers[cid]){
      if(!customers[cid].branches)customers[cid].branches={};
      if(!customers[cid].branches[bk])customers[cid].branches[bk]={};
      if(!customers[cid].branches[bk].contacts)customers[cid].branches[bk].contacts={};
      if(!customers[cid].branches[bk].contacts[ck])customers[cid].branches[bk].contacts[ck]={};
      Object.assign(customers[cid].branches[bk].contacts[ck],updates);
    }
    renderCustomerDetail(cid);
  }).catch(function(err){showToast('エラー: '+(err.message||''));});
}
function deleteContact(cid,bk,ck){
  var cu=customers[cid]||{};
  var c=((cu.branches||{})[bk]||{}).contacts||{};
  var name=(c[ck]||{}).name||ck;
  if(!confirm('担当者「'+name+'」を削除しますか？'))return;
  db.ref('customers/'+cid+'/branches/'+bk+'/contacts/'+ck).remove().then(function(){
    db.ref('customers/'+cid+'/updatedAt').set(Date.now());
    showToast('削除しました');
    if(customers[cid]&&customers[cid].branches&&customers[cid].branches[bk]&&customers[cid].branches[bk].contacts){
      delete customers[cid].branches[bk].contacts[ck];
    }
    renderCustomerDetail(cid);
  }).catch(function(err){showToast('エラー: '+(err.message||''));});
}
