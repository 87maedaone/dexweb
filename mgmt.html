let _rerenderOrdersTimer=null;
let _rerenderSlipsTimer=null;
function isInputFocusedIn(selector){
  var ae=document.activeElement;
  if(!ae||!ae.closest)return false;
  if(!ae.closest(selector))return false;
  var tag=ae.tagName;
  return tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA';
}
function scheduleOrdersRerender(){
  if(_rerenderOrdersTimer)clearTimeout(_rerenderOrdersTimer);
  _rerenderOrdersTimer=setTimeout(function(){
    _rerenderOrdersTimer=null;
    var ov=document.getElementById('view-orders');
    if(!ov||!ov.classList.contains('active'))return;
    // どの input/select にフォーカスがあれば再描画スキップ（ユーザー操作を邪魔しない）
    if(isInputFocusedIn('#view-orders'))return;
    if(typeof scheduleRenderOL==='function')scheduleRenderOL();
    else if(typeof renderOrdersList==='function')renderOrdersList();
  },350);
}

  if(_rerenderSlipsTimer)clearTimeout(_rerenderSlipsTimer);

    if(!sv||!sv.classList.contains('active'))return;

  },350);
}

// 共有PDF修復：同じファイルから取り込まれた案件群で、一部だけPDFが付いている場合、
// 他の案件にも同じPDFを紐付ける（メタル便浦安など複数案件を1PDFから取り込んだケース）
// 編集中の案件にPDFをアップロード（同じバッチの他案件にも自動共有）
function oepdfUploadPdf(ev){
  var oid=window._oepdfCurrentOid;
  if(!oid){showToast('案件IDが取得できません');return;}
  var file=ev.target.files&&ev.target.files[0];
  if(!file){return;}
  if(file.type!=='application/pdf'&&!/\.pdf$/i.test(file.name)){
    showToast('PDFファイルを選択してください');
    return;
  }
  if(!storage){showToast('Storage が利用できません');return;}
  showToast('PDFアップロード中...');
  var sharedId='manual-'+Date.now()+'-'+Math.random().toString(36).slice(2,10);
  uploadPdfShared(file,sharedId,function(url){
    if(!url){showToast('アップロード失敗');return;}
    var o=orders[oid]||{};
    var fixes={};
    fixes['orders/'+oid+'/pdfUrl']=url;
    orders[oid].pdfUrl=url;
    var sharedCount=1;
    // 同じバッチの他案件にも共有
    if(o.importBatchId){
      Object.entries(orders).forEach(function(e){
        var oid2=e[0],o2=e[1];
        if(oid2===oid||!o2)return;
        if(o2.importBatchId===o.importBatchId&&!o2.pdfUrl){
          fixes['orders/'+oid2+'/pdfUrl']=url;
          orders[oid2].pdfUrl=url;
          sharedCount++;
        }
      });
    }else if(o.clientName&&o.createdAt){
      // バッチID無し → clientName + 60秒バケットでグループ化
      var bucket=Math.floor(o.createdAt/60000);
      Object.entries(orders).forEach(function(e){
        var oid2=e[0],o2=e[1];
        if(oid2===oid||!o2||o2.pdfUrl)return;
        if(o2.clientName!==o.clientName)return;
        var b2=Math.floor((o2.createdAt||0)/60000);
        if(b2===bucket){
          fixes['orders/'+oid2+'/pdfUrl']=url;
          orders[oid2].pdfUrl=url;
          sharedCount++;
        }
      });
    }
    db.ref().update(fixes).then(function(){
      showToast('PDFを '+sharedCount+'件 に紐付けました');
      // 編集モーダルを再描画してPDFを表示
      openOrderEditWithPdf(oid);
    }).catch(function(err){showToast('保存エラー: '+(err.message||''));});
  });
}

function autoRepairSharedPdf(){
  if(!orders||!db)return;
  // 2つのグループ化方式を併用：
  //   A. importBatchId（あれば最優先）
  //   B. 内容ベース：clientName + deliveryDate + deliveryCompany + shape + weight
  //      → 再取込で同じ案件が増えても、PDFを引き継げる
  var nrm=function(s){return String(s||'').replace(/[\s　]/g,'').toLowerCase();};
  var groups={};
  Object.entries(orders).forEach(function(e){
    var oid=e[0],o=e[1];
    if(!o)return;
    // A. importBatchId
    if(o.importBatchId){
      var keyA='batch_'+o.importBatchId;
      if(!groups[keyA])groups[keyA]=[];
      groups[keyA].push({oid:oid,o:o});
    }
    // B. 内容ベース（必ず1つ以上の主要フィールドが入っていること）
    if(o.clientName&&(o.deliveryCompany||o.deliveryAddress||o.deliveryDate)){
      var keyB='cnt_'+nrm(o.clientName)+'|'+nrm(o.deliveryDate)+'|'+nrm(o.deliveryCompany)+'|'+nrm(o.deliveryAddress)+'|'+nrm(o.shape)+'|'+nrm(o.weight);
      if(!groups[keyB])groups[keyB]=[];
      groups[keyB].push({oid:oid,o:o});
    }
  });
  // 各グループでPDF共有
  var fixes={};
  var fixedOids={};
  Object.values(groups).forEach(function(group){
    if(group.length<2)return;
    // PDFを持っている案件を探す
    var pdfUrl=null;
    group.forEach(function(item){
      if(item.o.pdfUrl&&!pdfUrl)pdfUrl=item.o.pdfUrl;
    });
    if(!pdfUrl)return;
    // PDFが無い案件にコピー（既に修復済みの案件はスキップして二重書込み回避）
    group.forEach(function(item){
      if(!item.o.pdfUrl&&!fixedOids[item.oid]){
        fixes['orders/'+item.oid+'/pdfUrl']=pdfUrl;
        orders[item.oid].pdfUrl=pdfUrl;
        fixedOids[item.oid]=true;
      }
    });
  });
  var fixCount=Object.keys(fixedOids).length;
  if(fixCount){
    console.log('🔧 共有PDF修復:',fixCount,'件にPDFを紐付け');
    db.ref().update(fixes).catch(function(e){console.log('共有PDF修復エラー:',e);});
  }
}

// 壊れた日付（"58" や "5/8" 等の YYYY-MM-DD でない値）を自動修復
function autoRepairBrokenDatesMgmt(){
  if(!orders||!db)return;
  var fixes={};
  var pad=function(n){return String(n).padStart(2,'0');};
  var repair=function(v){
    if(!v)return null;
    var s=String(v).trim();
    // YYYY-MM-DD 形式でも、年が異常（西暦100や0415等）なら修復対象に
    var ymd=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(ymd){
      var yr=parseInt(ymd[1]);
      if(yr>=1990&&yr<=2099)return null; // 既に正常
      // 異常な年：MM-DDだけ救出して今年に置換
      var mm=parseInt(ymd[2]),dd=parseInt(ymd[3]);
      if(mm>=1&&mm<=12&&dd>=1&&dd<=31){
        return (new Date().getFullYear())+'-'+pad(mm)+'-'+pad(dd);
      }
      return null;
    }
    var slash=s.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
    if(slash){
      var mm2=parseInt(slash[1]),dd2=parseInt(slash[2]);
      if(mm2>=1&&mm2<=12&&dd2>=1&&dd2<=31){
        return (new Date().getFullYear())+'-'+pad(mm2)+'-'+pad(dd2);
      }
    }
    var d=s.replace(/[^0-9]/g,'');
    if(d.length===2){
      var mm3=parseInt(d.substring(0,1)),dd3=parseInt(d.substring(1,2));
      if(mm3>=1&&mm3<=9&&dd3>=1&&dd3<=9){
        return (new Date().getFullYear())+'-'+pad(mm3)+'-'+pad(dd3);
      }
    }
    if(d.length===3)d='0'+d;
    if(d.length===4){
      var mm4=parseInt(d.substring(0,2)),dd4=parseInt(d.substring(2,4));
      if(mm4>=1&&mm4<=12&&dd4>=1&&dd4<=31){
        return (new Date().getFullYear())+'-'+pad(mm4)+'-'+pad(dd4);
      }
    }
    return null;
  };
  Object.keys(orders).forEach(function(oid){
    var o=orders[oid];
    if(!o)return;
    var fp=repair(o.pickupDate);
    var fd=repair(o.deliveryDate);
    if(fp){fixes['orders/'+oid+'/pickupDate']=fp;orders[oid].pickupDate=fp;}
    if(fd){fixes['orders/'+oid+'/deliveryDate']=fd;orders[oid].deliveryDate=fd;}
  });
  if(Object.keys(fixes).length){
    console.log('🔧 mgmt: 日付を自動修復:',Object.keys(fixes).length,'件',fixes);
    db.ref().update(fixes).catch(function(e){console.log('修復エラー:',e);});
  }
}

});
});

function handleBatchFiles(input){

var fileIdx=0;
var totalPages=0;

function processNextFile(){

document.getElementById('batch-save-btn').style.display='';
return;
}

var reader=new FileReader();

var typedArray=new Uint8Array(e.target.result);
pdfjsLib.getDocument(typedArray).promise.then(function(pdf){
var numPages=pdf.numPages;
var pageIdx=1;

function processFilePage(pageNum){
if(pageNum>numPages){
fileIdx++;
processNextFile();
return;
}
pdf.getPage(pageNum).then(function(page){
var scale=2;

var canvas=document.createElement('canvas');
canvas.width=viewport.width;canvas.height=viewport.height;

totalPages++;
batchItems.push({img:dataUrl,file:file,pageNum:pageNum,client:'',pickupDate:currentDate,deliveryDate:'',pickupCo:'',pickupAddr:'',deliveryCo:'',deliveryAddr:'',weight:'',shape:'',barcode:'',memo:'',ocrDone:false});
var ci=batchItems.length-1;
status.textContent='ファイル '+(fileIdx+1)+'/'+files.length+' ページ '+pageNum+'/'+numPages+' OCR中... (計'+totalPages+'件)';
renderBatchList();

page.getTextContent().then(function(tc){
var pageText=tc.items.map(function(i){return i.str}).join(' ');
if(pageText.trim().length>20){
parseBatchOCR(ci,pageText);
batchItems[ci].ocrDone=true;
renderBatchList();
processFilePage(pageNum+1);
}else if(VISION_API_KEY){
var b64=dataUrl.split(',')[1];
fetch('https://vision.googleapis.com/v1/images:annotate?key='+VISION_API_KEY,{
method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({requests:[{image:{content:b64},features:[{type:'TEXT_DETECTION'}]}]})
}).then(function(r){return r.json()}).then(function(d){
var t=(d.responses&&d.responses[0]&&d.responses[0].fullTextAnnotation)?d.responses[0].fullTextAnnotation.text:'';
if(t)parseBatchOCR(ci,t);
batchItems[ci].ocrDone=true;
renderBatchList();
processFilePage(pageNum+1);
}).catch(function(){processFilePage(pageNum+1);});
}else{processFilePage(pageNum+1);}
});
});
});
}
processFilePage(1);
}).catch(function(){fileIdx++;processNextFile();});
};
reader.readAsArrayBuffer(file);
}
processNextFile();
}

function parseBatchOCR(ci,text){
var item=batchItems[ci];if(!item)return;
item.ocrDone=true;
var lines=text.split('\n').map(function(l){return l.trim()}).filter(Boolean);
for(var i=0;i<lines.length;i++){
var line=lines[i];
if(line.match(/依頼主|荷主|お客様/)&&line.match(/[：:]/)){var m=line.match(/[：:]\s*(.+)/);if(m)item.client=m[1].replace(/株式会社|有限会社/g,'').trim();}
if(line.match(/引取|集荷日/)){var d=extractDateFromLine(line);if(d)item.pickupDate=d;}
if(line.match(/配達日|納品日|配送日/)){var d=extractDateFromLine(line);if(d)item.deliveryDate=d;}
if(line.match(/集荷先|引取先/)&&line.match(/[：:]/)){var m=line.match(/[：:]\s*(.+)/);if(m)item.pickupCo=m[1].trim();}
if(line.match(/配達先|届け先|納品先/)&&line.match(/[：:]/)){var m=line.match(/[：:]\s*(.+)/);if(m)item.deliveryCo=m[1].trim();}
var addrM=line.match(/(大阪府|兵庫県|京都府|奈良県|和歌山県|滋賀県)(.+)/);
if(addrM)item.deliveryAddr=addrM[1]+addrM[2].trim();
var wM=line.match(/(\d[\d,.]*)\s*(kg|キロ|㎏|t|トン)/i);
if(wM){var w=wM[1].replace(/,/g,'');if(wM[2].match(/t|トン/i))w=String(parseFloat(w)*1000);item.weight=w;}
if(line.match(/品名|品目|形状/)&&line.match(/[：:]/)){var m=line.match(/[：:]\s*(.+)/);if(m)item.shape=m[1].trim();}
var bcM=line.match(/(\d{6,})/);if(bcM&&!item.barcode)item.barcode=bcM[1];
}
if(!item.client){for(var i=0;i<lines.length;i++){if(lines[i].match(/(株式会社|有限会社|.{2,6}(工業|製作所|商事|鋼|メタル))/)){item.client=lines[i].replace(/株式会社|有限会社/g,'').replace(/[：:].+/,'').trim();break;}}}
}

headers:{
'x-api-key':CLAUDE_API_KEY,

'anthropic-dangerous-direct-browser-access':'true'
},
body:JSON.stringify({

})
}).then(function(r){if(abortTo)clearTimeout(abortTo);return r.json();}).then(function(res){
console.log('Claude PDF response:',JSON.stringify(res).slice(0,500));

var txt=(res.content&&res.content[0]&&res.content[0].text)||'';
// Clean response: remove markdown fences and extra text
txt=txt.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
// Try parsing the whole text first
var parsed=null;
try{parsed=JSON.parse(txt);}catch(e){}
if(parsed){
callback(Array.isArray(parsed)?parsed:[parsed],null);
}else{
// Try extracting JSON array
var m=txt.match(/\[\s*\{[\s\S]*?\}\s*\]/);
if(m){
try{var arr=JSON.parse(m[0]);callback(arr,null);return;}catch(e){}
}
// Try single object
var m2=txt.match(/\{[\s\S]*?\}/);
if(m2){
try{var single=JSON.parse(m2[0]);callback([single],null);return;}catch(e){}
}
console.log('JSON parse failed, raw text:',txt.slice(0,500));
callback(null,'JSON解析失敗');

function autoSaveFromClaude(extracted,file,callback,sharedPdfUrl,importBatchId){
if(!extracted){callback({error:'データ抽出失敗'});return;}
// 左右逆判定：clientName と pickupCompany が違う名前で、clientName が deliveryCompany と一致 → Claudeが逆に取った
// → pickup と delivery を入れ替えて修正
(function autoSwapIfReversed(){
  var cn=String(extracted.clientName||'').trim();
  var pc=String(extracted.pickupCompany||'').trim();
  var dc=String(extracted.deliveryCompany||'').trim();
  if(!cn||!pc||!dc)return;
  // clientName が pickup と一致しない、かつ delivery と部分一致するなら逆と判定
  var nrm=function(s){return s.replace(/[\s　]/g,'').replace(/(株式会社|㈱|\(株\)|株\)|\(株|有限会社|㈲|合同会社)/g,'');};
  var cnN=nrm(cn),pcN=nrm(pc),dcN=nrm(dc);
  var matchPickup=cnN&&pcN&&(cnN.includes(pcN)||pcN.includes(cnN));
  var matchDelivery=cnN&&dcN&&(cnN.includes(dcN)||dcN.includes(cnN));
  if(!matchPickup&&matchDelivery){
    console.warn('[OCR自動補正] clientName とdelivery が一致 → pickup/delivery を入れ替え:',{cn:cn,pc:pc,dc:dc});
    var tmpCo=extracted.pickupCompany,tmpAd=extracted.pickupAddress;
    extracted.pickupCompany=extracted.deliveryCompany;
    extracted.pickupAddress=extracted.deliveryAddress;
    extracted.deliveryCompany=tmpCo;
    extracted.deliveryAddress=tmpAd;
  }
})();
// Normalize data
var data={
clientName:extracted.clientName||'',
pickupDate:importPickupDate||currentDate,
deliveryDate:normalizeDate(extracted.deliveryDate)||'',
pickupCompany:extracted.pickupCompany||'',
pickupAddress:autoCompletePrefecture(extracted.pickupAddress||''),
deliveryCompany:extracted.deliveryCompany||'',
deliveryPref:'',
deliveryAddress:autoCompletePrefecture(extracted.deliveryAddress||''),
weight:String(extracted.weight||'').replace(/kg|KG|ｋｇ/gi,'').trim(),
shape:extracted.shape||'',
barcode:extracted.barcode||'',
driverId:null,memo:'',isRoute:false,checked:false,createdAt:Date.now(),updatedAt:Date.now()
};
// 共有PDF URL があれば最初から data に含める（複数案件で同じPDFを参照）
if(sharedPdfUrl){data.pdfUrl=sharedPdfUrl;}
// importBatchId（同じ取込バッチを後から確実にグループ化）
if(importBatchId){data.importBatchId=importBatchId;}
// Validation
var hasData=data.clientName||data.deliveryCompany||data.pickupCompany||data.barcode||data.weight||data.deliveryAddress;
if(!hasData){callback({error:'抽出情報なし'});return;}
// Set prefecture
['大阪府','兵庫県','京都府','奈良県','和歌山県','滋賀県','三重県','岡山県','広島県','島根県','鳥取県','山口県','香川県','愛媛県','高知県','徳島県','東京都','神奈川県','千葉県','埼玉県','愛知県','静岡県','福岡県','群馬県'].forEach(function(p){if((data.deliveryAddress||'').includes(p))data.deliveryPref=p;});
// Set branch (拠点)
if(!data.branch){data.branch=currentBranch!=='all'?currentBranch:(currentStaffData?.branch||'osaka');}

var ref=db.ref('orders').push();
ref.set(data).then(function(){
savedCount++;
// file が渡されていて、共有PDFが無い場合のみ個別アップロード
if(file&&!sharedPdfUrl){try{uploadPdfToStorage(file,ref.key,function(){});}catch(e){}}
orders[ref.key]=data;
if(data.pickupDate===currentDate&&document.querySelector('tr[data-oid]')!==null){renderOrdersList();}
callback({
name:data.clientName||'（未読取）',
pickupDate:data.pickupDate||'—',
deliveryDate:data.deliveryDate||'—',
deliveryCompany:data.deliveryCompany||'—',
deliveryAddress:data.deliveryAddress||'—',
weight:data.weight||'—',
barcode:data.barcode||'—'
});
}).catch(function(err){callback({error:'保存エラー: '+(err.message||'')});});
}

function normalizeDate(s){
if(!s)return '';
s=String(s).trim();
// Already YYYY-MM-DD
if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
// YYYY/MM/DD
var m=s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
if(m)return m[1]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0');
// MM/DD (assume 2026)
m=s.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
if(m)return '2026-'+String(m[1]).padStart(2,'0')+'-'+String(m[2]).padStart(2,'0');
// 4月17日
m=s.match(/(\d{1,2})月(\d{1,2})日/);
if(m)return '2026-'+String(m[1]).padStart(2,'0')+'-'+String(m[2]).padStart(2,'0');
return '';
}

function handlePdfImport(filesOrInput){
var files;
if(filesOrInput&&filesOrInput.files)files=Array.from(filesOrInput.files);
else if(filesOrInput&&filesOrInput.length)files=Array.from(filesOrInput);
else return;
if(!files.length)return;

// モーダル即閉じる
closeModal();

// フローティングバッジ表示
var badge=document.getElementById('pdf-progress-badge');
var progressText=document.getElementById('pdf-progress-text');
if(badge){badge.style.display='flex';}
function updateBadge(txt){if(progressText)progressText.textContent=txt;}
updateBadge('読み込み中... (0/'+files.length+')');

var fileIdx=0;var totalPages=0;savedCount=0;

function showImportComplete(){
  // バッジ非表示
  if(badge)badge.style.display='none';
  // トースト表示
  if(savedCount>0){
    showToast('PDF '+savedCount+'件 取込完了 ✓');
  }else{
    showToast('PDF取込: 0件（エラーまたは抽出失敗）');
  }
  // 取込日と表示日付の不一致を確認
  var dateGroups={};
  var recentThreshold=Date.now()-300000;
  Object.values(orders).forEach(function(o){if(o.pickupDate&&(o.updatedAt||0)>recentThreshold){dateGroups[o.pickupDate]=(dateGroups[o.pickupDate]||0)+1;}});
  var maxDate='',maxCount=0;
  Object.keys(dateGroups).forEach(function(d){if(dateGroups[d]>maxCount){maxCount=dateGroups[d];maxDate=d;}});
  if(maxDate&&maxDate!==currentDate&&maxCount>0){
    setTimeout(function(){
      showToast(maxDate+' に '+maxCount+' 件あります（クリックで切替）',8000,function(){jumpToDate(maxDate);});
    },1500);
  }
  if(typeof renderOrdersList==='function')renderOrdersList();
}

function processNextFile(){
  if(fileIdx>=files.length){showImportComplete();return;}
  var file=files[fileIdx];
  console.log('[PDF取込] ('+(fileIdx+1)+'/'+files.length+') 処理開始:',file.name,'size=',file.size);

  // Claude API: send PDF directly
  if(CLAUDE_API_KEY){
    updateBadge('解析中... ('+(fileIdx+1)+'/'+files.length+')');
    // タイムアウト保険：90秒で次のファイルへ強制移行
    var timedOut=false;
    var timeoutHandle=setTimeout(function(){
      timedOut=true;
      console.warn('[PDF取込] タイムアウト → 次のファイルへ:',file.name);
      showToast('⚠️ '+file.name+' がタイムアウト、スキップします');
      fileIdx++;processNextFile();
    },90000);
    var reader2=new FileReader();
    reader2.onerror=function(){
      if(timedOut)return;
      clearTimeout(timeoutHandle);
      console.error('[PDF取込] FileReader失敗:',file.name);
      showToast('⚠️ '+file.name+' を読めませんでした');
      fileIdx++;processNextFile();
    };
    reader2.onload=function(ev){
      if(timedOut)return;
      claudeExtractFromPdf(ev.target.result,file.name,function(items,err){
        if(timedOut)return;
        clearTimeout(timeoutHandle);
        if(err){console.warn('[PDF取込] API エラー:',file.name,err);}
        if(err||!items||!items.length){
          fileIdx++;processNextFile();
          return;
        }
        // 共有PDF判定：複数案件が抽出された場合（メタル便浦安FAX一覧など）のみ
        // 1件の通常伝票は従来通り個別PDFアップロード
        var useShared=items.length>=2;
        var sharedPdfUrl=null;
        // 共通の importBatchId（同じFAXから取り込んだ案件群を後から確実にグループ化するため）
        var importBatchId=useShared?('imp-'+Date.now()+'-'+Math.random().toString(36).slice(2,10)):null;
        var doSaveLoop=function(){
          var itemIdx=0;
          function saveNextItem(){
            if(itemIdx>=items.length){fileIdx++;processNextFile();return;}
            var saveTimedOut=false;
            var saveTo=setTimeout(function(){
              saveTimedOut=true;
              console.warn('[PDF取込] save タイムアウト',file.name,'item',itemIdx);
              itemIdx++;saveNextItem();
            },30000);
            if(useShared){
              // 共有方式：fileは渡さず、共有URLとimportBatchIdを渡す
              autoSaveFromClaude(items[itemIdx],null,function(name){
                if(saveTimedOut)return;
                clearTimeout(saveTo);
                itemIdx++;saveNextItem();
              },sharedPdfUrl,importBatchId);
            }else{
              // 個別方式：従来通り file を渡して個別アップロード
              autoSaveFromClaude(items[itemIdx],file,function(name){
                if(saveTimedOut)return;
                clearTimeout(saveTo);
                itemIdx++;saveNextItem();
              });
            }
          }
          saveNextItem();
        };
        if(useShared&&file&&storage){
          // 複数案件 → 共有PDF を1回だけアップロード → 全件で共有
          var sharedId='shared-'+Date.now()+'-'+Math.random().toString(36).slice(2,10);
          console.log('[PDF取込] '+items.length+'件抽出 → 共有PDFアップロード開始');
          uploadPdfShared(file,sharedId,function(url){
            if(url){sharedPdfUrl=url;console.log('[PDF取込] 共有PDF URL取得 → '+items.length+'件で共有');}
            else console.warn('[PDF取込] 共有PDFアップロード失敗、PDFなしで保存');
            doSaveLoop();
          });
        }else{
          // 1件 → 通常の個別アップロード（従来通り）
          if(items.length===1)console.log('[PDF取込] 1件抽出 → 個別PDFアップロード');
          doSaveLoop();
        }
      });
    };
    try{reader2.readAsArrayBuffer(file);}catch(e){
      clearTimeout(timeoutHandle);
      console.error('[PDF取込] readAsArrayBuffer 例外:',e);
      fileIdx++;processNextFile();
    }
    return;
  }

  // Fallback: page-by-page image processing (Claude APIキーなしの場合のみ)
  var reader=new FileReader();
  reader.onload=function(e){
    var typedArray=new Uint8Array(e.target.result);
    pdfjsLib.getDocument(typedArray).promise.then(function(pdf){
      var numPages=pdf.numPages;
      function processPage(pn){
        if(pn>numPages){fileIdx++;processNextFile();return;}
        pdf.getPage(pn).then(function(page){
          var vp=page.getViewport({scale:2});
          var cv=document.createElement('canvas');cv.width=vp.width;cv.height=vp.height;
          page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise.then(function(){
            totalPages++;
            updateBadge('解析中... '+totalPages+'件目');
            // ClaudeAPIキー未設定エラー
            showToast('❌ Claude APIキーが未設定');
            fileIdx++;processNextFile();
          });
        });
      }
      processPage(1);
    });
  };
  reader.readAsArrayBuffer(file);
}

processNextFile();
}

function deleteEmptyOrders(){
var emptyOids=[];
Object.entries(orders).forEach(function(x){
var oid=x[0],o=x[1];
if(o.pickupDate!==currentDate)return;
var hasData=o.clientName||o.deliveryCompany||o.pickupCompany||o.barcode||o.weight||o.deliveryAddress||o.pickupAddress||o.shape;
if(!hasData)emptyOids.push(oid);
});
if(!emptyOids.length){showToast('削除対象なし');return;}
if(!confirm(emptyOids.length+'件の空の案件を削除しますか？'))return;
var updates={};
emptyOids.forEach(function(oid){updates['orders/'+oid]=null;});
db.ref().update(updates).then(function(){
emptyOids.forEach(function(oid){delete orders[oid];});
renderOrdersList();
showToast(emptyOids.length+'件削除');
});
}

function parseOCRText(text){
var lines=text.split('\n').map(function(l){return l.trim()}).filter(Boolean);
var allText=text;

// Client name - look for patterns
var clientPatterns=[/荷主[名\s：:]*(.+)/,/依頼主[：:]*(.+)/,/お客様[：:]*(.+)/];
for(var i=0;i<lines.length;i++){
for(var j=0;j<clientPatterns.length;j++){
var m=lines[i].match(clientPatterns[j]);
if(m){document.getElementById('sc-client').value=m[1].replace(/株式会社|有限会社|\s/g,'').trim();break;}
}
}
// Try company names in header area
if(!document.getElementById('sc-client').value){
for(var i=0;i<Math.min(5,lines.length);i++){
if(lines[i].match(/(通運|運輸|物流|倉庫|ロジ)/)){
document.getElementById('sc-client').value=lines[i].replace(/株式会社|有限会社|殿|\s/g,'').replace(/[　\s]+/g,'').trim().slice(0,12);
break;
}
}
}

// Pickup date
var pickM=allText.match(/PICK\s*(?:UP\s*)?DATE[：:\s]*(\d{1,2})[月\/](\d{1,2})/i);
if(pickM){var y=new Date().getFullYear();document.getElementById('sc-pickup-date').value=y+'-'+String(pickM[1]).padStart(2,'0')+'-'+String(pickM[2]).padStart(2,'0');}
else{
var pdM=allText.match(/引[取渡].*?(\d{1,2})[月\/](\d{1,2})[日]?/);
if(pdM){var y=new Date().getFullYear();document.getElementById('sc-pickup-date').value=y+'-'+String(pdM[1]).padStart(2,'0')+'-'+String(pdM[2]).padStart(2,'0');}
}

// Delivery date
var ddM=allText.match(/納品[日時]*[：:\s]*(\d{1,2})[月\/](\d{1,2})[日]?/);
if(ddM){var y=new Date().getFullYear();document.getElementById('sc-delivery-date').value=y+'-'+String(ddM[1]).padStart(2,'0')+'-'+String(ddM[2]).padStart(2,'0');}

// Pickup address
var paM=allText.match(/(大阪府[^\n]+?)(?:\n|TEL|電話)/);
if(paM)document.getElementById('sc-pickup-addr').value=paM[1].replace(/\s+/g,'').trim();
// Pickup company - 引取場所
var pcM=allText.match(/引取場所[：:\s\n]*(?:[㈱株].*?)?\n*([^\n]+)/);
if(pcM)document.getElementById('sc-pickup-co').value=pcM[1].replace(/[㈱株式会社有限]/g,'').replace(/\s+/g,'').trim().slice(0,12);

// Delivery company
var dcM=allText.match(/(?:行\s*先|卸\s*場\s*所|社\s*名)[：:\s]*(.+)/);
if(dcM)document.getElementById('sc-delivery-co').value=dcM[1].replace(/株式会社|有限会社/g,'').replace(/\s+/g,'').trim().slice(0,12);

// Delivery address
var daM=allText.match(/(?:住\s*所|配達先)[：:\s]*((?:北海道|東京都|(?:京都|大阪)府|.{2,3}県)[^\n]+)/);
if(daM)document.getElementById('sc-delivery-addr').value=daM[1].replace(/\s+/g,'').trim();
if(!document.getElementById('sc-delivery-addr').value){
var daM2=allText.match(/((?:兵庫県|岡山県|広島県|奈良県|和歌山県|滋賀県|三重県)[^\n]+)/);
if(daM2)document.getElementById('sc-delivery-addr').value=daM2[1].replace(/\s+/g,'').trim();
}

// Weight
var wM=allText.match(/(\d[\d,.]*)\s*(?:KGS?|kgs?|キロ|㎏)/i);
if(wM)document.getElementById('sc-weight').value=wM[1].replace(/,/g,'');
if(!document.getElementById('sc-weight').value){
var wM2=allText.match(/(\d[\d,.]*)\s*(?:TON|トン)/i);
if(wM2)document.getElementById('sc-weight').value=String(parseFloat(wM2[1].replace(/,/g,''))*1000);
}

// Shape / description
var shM=allText.match(/DESCRIPTION[：:\s]*(.+)/i);
if(shM)document.getElementById('sc-shape').value=shM[1].trim();
if(!document.getElementById('sc-shape').value){
var shM2=allText.match(/品[名目][：:\s]*(.+)/);
if(shM2)document.getElementById('sc-shape').value=shM2[1].trim();
}

// Barcode / 台帳NO

function compressImage(dataUrl){
try{
var canvas=document.createElement('canvas');
var img=new Image();
img.src=dataUrl;
var maxW=400;
var ratio=maxW/img.width;
canvas.width=maxW;
canvas.height=img.height*ratio;
canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
return canvas.toDataURL('image/jpeg',0.5);
}catch(e){return dataUrl.substring(0,5000);}
}

  return s;
}

  var ae=document.activeElement;

  setTimeout(function(){
    _olRenderScheduled=false;
    if(_olRendering)return;
    // 描画開始時点で、まだ検索欄が高速にタイプ中なら更にスキップ

      if(Date.now()-lastInputAt<400){

        _olRenderScheduled=true;
        setTimeout(function(){_olRenderScheduled=false;if(!_olRendering)renderOrdersList();},500);

  },delay);
}

function fmtDateShort(d){if(!d)return'';var p=d.split('-');if(p.length!==3)return d;return parseInt(p[1])+'/'+parseInt(p[2]);}

function parseDateShort(v){
  v=String(v||'').trim();
  if(!v)return '';
  // 既にYYYY-MM-DD形式
  if(/^\d{4}-\d{2}-\d{2}$/.test(v))return v;
  var y=new Date().getFullYear();
  var pad=function(n){return String(n).padStart(2,'0');};
  // M/D, MM/D, M/DD, MM/DD（'-' 区切りも許可）形式を最優先で処理
  var slashMatch=v.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
  if(slashMatch){
    var mm=parseInt(slashMatch[1]),dd=parseInt(slashMatch[2]);
    if(mm>=1&&mm<=12&&dd>=1&&dd<=31){return y+'-'+pad(mm)+'-'+pad(dd);}
  }
  // 数字のみ（425→0425, 0425 等）
  var digits=v.replace(/[^0-9]/g,'');
  if(digits.length===3)digits='0'+digits;
  if(digits.length===4){
    var m2=parseInt(digits.substring(0,2)),d2=parseInt(digits.substring(2,4));
    if(m2>=1&&m2<=12&&d2>=1&&d2<=31){return y+'-'+pad(m2)+'-'+pad(d2);}
  }
  return v;
}

function uploadPdfToStorage(file,orderId,callback){
if(!file||!orderId||!storage)return callback(null);
try{
var ref=storage.ref('scans/'+orderId+'/'+file.name);
ref.put(file).then(function(snap){
snap.ref.getDownloadURL().then(function(url){
db.ref('orders/'+orderId+'/pdfUrl').set(url).catch(function(){});
callback(url);
}).catch(function(){callback(null);});
}).catch(function(err){
console.log('Storage upload error:',err.message||err);
callback(null);
});
}catch(e){console.log('Storage error:',e);callback(null);}
}

// 共有PDF（複数案件で同じPDFを参照する用）。order紐付けなしで Storage にアップして URL を返す
function uploadPdfShared(file,sharedId,callback){
if(!file||!storage)return callback(null);
try{
var ref=storage.ref('shared-scans/'+sharedId+'/'+(file.name||'shared.pdf'));
ref.put(file).then(function(snap){
snap.ref.getDownloadURL().then(function(url){callback(url);}).catch(function(){callback(null);});
}).catch(function(err){
console.log('Shared PDF upload error:',err.message||err);
callback(null);
});
}catch(e){console.log('Shared PDF storage error:',e);callback(null);}
}

function saveFieldInline(el){
var oid=el.dataset.oid;
var field=el.dataset.field;
var val=el.value.trim();
if(field==='deliveryDate'){
var parsed=parseDateShort(val);
el.value=fmtDateShort(parsed);
val=parsed;
}
// 住所フィールドの都道府県自動補完（pickupAddress, deliveryAddress）
if(field==='pickupAddress'||field==='deliveryAddress'){
  var completed=autoCompletePrefecture(val);
  if(completed!==val){
    val=completed;
    el.value=completed;
    showToast('都道府県を追加: '+completed);
  }
}
if(orders[oid]&&orders[oid][field]!==val){
  // バーコード変更時：scanImagesの旧キー画像を新キーに移動（紐付け維持）
  if(field==='barcode'){
    var oldBc=orders[oid].barcode||'';
    if(oldBc&&oldBc!==val&&scanImages[oldBc]){
      if(val){scanImages[val]=scanImages[oldBc];}
      delete scanImages[oldBc];
      try{saveScanImages();}catch(e){}
    }
  }
  var u={};u[field]=val;u['updatedAt']=Date.now();
  db.ref('orders/'+oid).update(u).catch(function(){});
  orders[oid][field]=val;
}
}

function handleFieldTab(e,el){
if(e.key==='Enter'){e.preventDefault();el.blur();return;}
if(e.key==='Tab'){
e.preventDefault();
saveFieldInline(el);
var row=el.closest('tr');
if(!row)return;
var inputs=Array.from(row.querySelectorAll('.tbl-input'));
var idx=inputs.indexOf(el);
var next=e.shiftKey?idx-1:idx+1;
if(next>=0&&next<inputs.length){inputs[next].focus();inputs[next].select();}
else{
// Move to next/previous row - search ALL tables in order list
var allRows=Array.from(document.getElementById('orders-mgmt-body').querySelectorAll('tr[data-oid]'));
var ri=allRows.indexOf(row);
var nextRow=e.shiftKey?allRows[ri-1]:allRows[ri+1];
if(nextRow){
var ni=nextRow.querySelectorAll('.tbl-input');
if(ni.length){
var target=e.shiftKey?ni[ni.length-1]:ni[0];
target.focus();target.select();
}
}
}
}
}

// 編集ボタン：最初のPDF付き未処理案件を開く（表示中の絞り込みに従う）
function openFirstPdfEdit(){
  // PDF有無を問わず、現在の絞り込み（日付・タブ・拠点）に該当する全案件を対象にする
  var editOrders=Object.entries(orders)
    .filter(function(x){
      var ord=x[1];
      if(ord.isRegular)return false;
      var pd=normDsMgmt?normDsMgmt(ord.pickupDate):ord.pickupDate;
      if(pd!==currentDate)return false;
      if(currentBranch!=='all'&&ord.branch&&ord.branch!==currentBranch)return false;
      if(_olTab==='pending'&&ord.checked===true)return false;
      if(_olTab==='processed'&&ord.checked!==true)return false;
      if(_olTab==='web'&&!ord.isWebOrder)return false;
      if(_olTab!=='web'&&ord.isWebOrder)return false;
      return true;
    })
    .sort(function(a,b){
      // PDF付きを優先、その後 createdAt 順
      var aHasPdf=!!a[1].pdfUrl,bHasPdf=!!b[1].pdfUrl;
      if(aHasPdf!==bHasPdf)return aHasPdf?-1:1;
      return (a[1].createdAt||0)-(b[1].createdAt||0);
    });
  if(!editOrders.length){
    showToast('編集対象の案件がありません');
    return;
  }
  openOrderEditWithPdf(editOrders[0][0]);
}

        // 依頼主欄またはフォーカス無し → お客様マスタ検索
        openCustomerPicker('client');
      }
    }
    // F2: 引取先と配送先を入れ替え（OCRが左右逆に取った時の救済）
    else if(e.key==='F2'){e.preventDefault();e.stopPropagation();oepdfSwapPickupDelivery();}
    else if(e.key==='F8'){e.preventDefault();e.stopPropagation();oepdfMove(-1);}
    else if(e.key==='F9'){e.preventDefault();e.stopPropagation();oepdfSave();}
    else if(e.key==='Escape'){e.preventDefault();e.stopPropagation();closeOepdf();}
    // Tab：フォーム＋ナビボタン内でループ。「保存して次へ」を抜けて外（PDF iframe等）には飛ばない
    else if(e.key==='Tab'){
      var form=document.getElementById('oepdf-form');
      var prevBtn=document.getElementById('oepdf-prev-btn');
      var saveBtn=document.getElementById('oepdf-save-btn');
      if(!form)return;
      // フォーム内のフィールド + 末尾にナビボタン
      var fields=Array.from(form.querySelectorAll('input,textarea,select')).filter(function(el){
        return !el.disabled&&el.type!=='hidden'&&el.tabIndex!==-1;
      });
      if(prevBtn&&!prevBtn.disabled)fields.push(prevBtn);
      if(saveBtn&&!saveBtn.disabled)fields.push(saveBtn);
      if(!fields.length)return;
      var first=fields[0],last=fields[fields.length-1];
      var active=document.activeElement;
      if(!e.shiftKey&&active===last){e.preventDefault();first.focus();}
      else if(e.shiftKey&&active===first){e.preventDefault();last.focus();}
    }
  };
  document.addEventListener('keydown',window._oepdfKeyHandler,true);
}

// 滋賀／名古屋ボタンの切替（排他選択）。依頼主入力欄を無効化／有効化
function oepdfToggleClientMode(mode){
  var flag=document.getElementById('oepdf-clientBranch');
  var shBtn=document.getElementById('oepdf-btn-shiga');
  var ngBtn=document.getElementById('oepdf-btn-nagoya');
  var cnInp=document.getElementById('oepdf-clientName');
  if(!flag||!shBtn||!ngBtn||!cnInp)return;
  var cur=flag.value;
  var newVal=(cur===mode)?'':mode; // 同じボタン再押下で解除
  flag.value=newVal;
  var isShiga=newVal==='shiga';
  var isNagoya=newVal==='nagoya';
  shBtn.style.border='1.5px solid '+(isShiga?'#8b5cf6':'#e5e7eb');
  shBtn.style.background=isShiga?'#ede9fe':'#fff';
  shBtn.style.color=isShiga?'#5b21b6':'#6b7280';
  ngBtn.style.border='1.5px solid '+(isNagoya?'#06b6d4':'#e5e7eb');
  ngBtn.style.background=isNagoya?'#cffafe':'#fff';
  ngBtn.style.color=isNagoya?'#0e7490':'#6b7280';
  var disabled=isShiga||isNagoya;
  cnInp.disabled=disabled;
  cnInp.style.background=disabled?'#f3f4f6':'#fff';
  cnInp.style.color=disabled?'#9ca3af':'';
}

// 引取先 ↔ 配送先 を入れ替え（OCRが左右逆に取った時の救済）
function oepdfSwapPickupDelivery(){
  var pcInp=document.getElementById('oepdf-pickupCompany');
  var paInp=document.getElementById('oepdf-pickupAddress');
  var dcInp=document.getElementById('oepdf-deliveryCompany');
  var daInp=document.getElementById('oepdf-deliveryAddress');
  if(!pcInp||!paInp||!dcInp||!daInp)return;
  // 朝積み・持込が立っている時は pickup が空欄のはずなので、警告
  var azFlag=document.getElementById('oepdf-isAsazumi');
  var mcFlag=document.getElementById('oepdf-isMochikomi');
  if((azFlag&&azFlag.value==='1')||(mcFlag&&mcFlag.value==='1')){
    showToast('朝積み／持込モードでは入れ替えできません。先に解除してください');
    return;
  }
  var tmpCo=pcInp.value,tmpAd=paInp.value;
  pcInp.value=dcInp.value;
  paInp.value=daInp.value;
  dcInp.value=tmpCo;
  daInp.value=tmpAd;
  // 視覚フィードバック：4つの入力欄を一瞬黄色く点滅
  [pcInp,paInp,dcInp,daInp].forEach(function(el){
    el.style.transition='background .3s';
    el.style.background='#fef3c7';
    setTimeout(function(){el.style.background='#fff';},500);
  });
  showToast('引取先 ↔ 配送先 を入れ替えました');
}

// 朝積み/持込ボタンの切替（排他選択）。引取先入力欄を無効化／有効化する
function oepdfTogglePickupMode(mode){
  var azFlag=document.getElementById('oepdf-isAsazumi');
  var mcFlag=document.getElementById('oepdf-isMochikomi');
  var azBtn=document.getElementById('oepdf-btn-asazumi');
  var mcBtn=document.getElementById('oepdf-btn-mochikomi');
  var pcInp=document.getElementById('oepdf-pickupCompany');
  var paInp=document.getElementById('oepdf-pickupAddress');
  if(!azFlag||!mcFlag||!azBtn||!mcBtn||!pcInp||!paInp)return;
  var isAza=azFlag.value==='1';
  var isMochi=mcFlag.value==='1';
  if(mode==='asazumi'){isAza=!isAza;isMochi=false;}
  else if(mode==='mochikomi'){isMochi=!isMochi;isAza=false;}

  mcFlag.value=isMochi?'1':'0';

}

// MM/DD入力欄のblur時に正規化（0428→4/28、425→4/25、5/1→5/1）
function normalizeMDField(el){
  var v=el.value.trim();
  if(!v)return;
  // M/D, MM/D, M/DD, MM/DD（または '-' 区切り）形式を最優先で処理
  var slashMatch=v.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
  if(slashMatch){
    var mm=parseInt(slashMatch[1]);
    var dd=parseInt(slashMatch[2]);
    if(mm>=1&&mm<=12&&dd>=1&&dd<=31){el.value=mm+'/'+dd;return;}
  }
  // 数字のみ（425, 0425 等）
  var m=v.replace(/[^0-9]/g,'');
  if(m.length===3)m='0'+m;
  if(m.length===4){
    var mm2=parseInt(m.substr(0,2));
    var dd2=parseInt(m.substr(2,2));
    if(mm2>=1&&mm2<=12&&dd2>=1&&dd2<=31){
      el.value=mm2+'/'+dd2;
    }
  }else if(/^\d{4}-\d{2}-\d{2}$/.test(v)){
    var parts=v.split('-');
    el.value=parseInt(parts[1])+'/'+parseInt(parts[2]);
  }
}

function closeOepdf(){
  var ov=document.getElementById('oepdf-overlay');
  if(ov)ov.remove();
  window._oepdfCurrentOid=null;
  // キーボードハンドラも解除（モーダル外でF9等が誤動作しないように）
  if(window._oepdfKeyHandler){
    document.removeEventListener('keydown',window._oepdfKeyHandler,true);
    window._oepdfKeyHandler=null;
  }
}

function oepdfSave(){
  var oid=window._oepdfCurrentOid;
  if(!oid)return;
  // MM/DD → YYYY-MM-DD 変換
  var parseMD=function(inp){
    var el=document.getElementById(inp);
    if(!el)return '';
    var v=el.value.trim();
    if(!v)return '';
    // 既にYYYY-MM-DD形式
    if(/^\d{4}-\d{2}-\d{2}$/.test(v))return v;
    // 元の年を使う（妥当な4桁年でなければ今年にフォールバック。1990-2099のみ許可）
    var origYear=el.dataset.origYear;
    var oy=parseInt(origYear);
    if(!origYear||!/^\d{4}$/.test(origYear)||oy<1990||oy>2099){
      origYear=new Date().getFullYear()+'';
    }
    var pad=function(n){return n<10?'0'+n:''+n;};
    // M/D, MM/D, M/DD, MM/DD（または '-' 区切り）形式を最優先で処理
    var slashMatch=v.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
    if(slashMatch){
      var mm=parseInt(slashMatch[1]);
      var dd=parseInt(slashMatch[2]);
      if(mm>=1&&mm<=12&&dd>=1&&dd<=31){
        return origYear+'-'+pad(mm)+'-'+pad(dd);
      }
    }
    // 数字のみ（425→0425, 0425 等）
    var m=v.replace(/[^0-9]/g,'');
    if(m.length===3)m='0'+m; // 3桁 → 4桁（425→0425）
    if(m.length===4){
      var mm2=parseInt(m.substr(0,2)),dd2=parseInt(m.substr(2,2));
      if(mm2>=1&&mm2<=12&&dd2>=1&&dd2<=31){
        return origYear+'-'+pad(mm2)+'-'+pad(dd2);
      }
    }
    return v;
  };
  var isAza=document.getElementById('oepdf-isAsazumi')?.value==='1';
  var isMochi=document.getElementById('oepdf-isMochikomi')?.value==='1';
  var clientBranch=document.getElementById('oepdf-clientBranch')?.value||'';
  var clientCustomerId=document.getElementById('oepdf-clientCustomerId')?.value||'';
  var updates={
    clientName:document.getElementById('oepdf-clientName').value.trim(),
    clientBranch:clientBranch,
    clientCustomerId:clientCustomerId,
    pickupDate:parseMD('oepdf-pickupDate'),
    deliveryDate:parseMD('oepdf-deliveryDate'),
    pickupCompany:document.getElementById('oepdf-pickupCompany').value.trim(),
    pickupAddress:stripPostalCode(document.getElementById('oepdf-pickupAddress').value.trim()),
    deliveryCompany:document.getElementById('oepdf-deliveryCompany').value.trim(),
    deliveryAddress:stripPostalCode(document.getElementById('oepdf-deliveryAddress').value.trim()),
    weight:document.getElementById('oepdf-weight').value.trim(),
    shape:document.getElementById('oepdf-shape').value.trim(),
    barcode:document.getElementById('oepdf-barcode').value.trim(),
    memo:document.getElementById('oepdf-memo').value,
    isAsazumi:isAza,
    isMochikomi:isMochi,
    checked:true,
    slipConfirmed:true,
    updatedAt:Date.now()
  };
  db.ref('orders/'+oid).update(updates).then(function(){
    showToast('保存しました');
    // 次の案件へ自動移動
    var list=window._oepdfList||[];
    var idx=list.indexOf(oid);
    if(idx>=0&&idx<list.length-1){
      openOrderEditWithPdf(list[idx+1]);
    }else{
      closeOepdf();
      showToast('すべての案件を確認しました 🎉');
    }
  }).catch(function(err){showToast('エラー: '+(err.message||''));});
}

function oepdfMove(dir){
  var oid=window._oepdfCurrentOid;
  var list=window._oepdfList||[];
  var idx=list.indexOf(oid);
  if(idx<0)return;
  var newIdx=idx+dir;
  if(newIdx<0||newIdx>=list.length)return;
  openOrderEditWithPdf(list[newIdx]);
}

// 編集中の案件を削除（確認ダイアログあり）→ 削除後は次の案件へ自動移動
function oepdfDelete(){
  var oid=window._oepdfCurrentOid;
  if(!oid)return;
  var o=orders[oid]||{};
  var label=o.clientName||o.deliveryCompany||o.pickupCompany||'(空の案件)';
  dexConfirm('「'+label+'」を削除します。よろしいですか？',{title:'案件を削除',okText:'削除する',type:'danger'}).then(function(ok){
    if(!ok)return;
    var list=window._oepdfList||[];
    var idx=list.indexOf(oid);
    db.ref('orders/'+oid).remove().then(function(){
      delete orders[oid];
      showToast('削除しました');
      // 次の案件へ自動移動。なければ前、それも無ければ閉じる
      if(idx>=0&&idx<list.length-1){
        // 削除した案件をリストから除去して次へ
        list.splice(idx,1);
        window._oepdfList=list;
        openOrderEditWithPdf(list[idx]);
      }else if(idx>0){
        list.splice(idx,1);
        window._oepdfList=list;
        openOrderEditWithPdf(list[idx-1]);
      }else{
        closeOepdf();
        if(typeof renderOrdersList==='function')renderOrdersList();
      }
    }).catch(function(err){
      showToast('削除エラー: '+(err.message||''));
    });
  });
}

// 全選択トグル
// 選択状態（案件一覧：UIでの選択。ordersのcheckedとは別）
var _olRowSelected={};

function toggleRowSelect(oid){
  _olRowSelected[oid]=!_olRowSelected[oid];
  if(!_olRowSelected[oid])delete _olRowSelected[oid];
  // 軽量更新：対象行のみ色変更＋選択バー更新（テーブル全体の再描画を避ける）
  var row=document.querySelector('tr[data-oid="'+oid+'"]');
  if(row){
    var sel=_olRowSelected[oid];
    row.style.background=sel?'#ecfdf5':(row.dataset.idx%2===0?'#fff':'#fff');
  }
  updateSelectionBar();
}

function updateSelectionBar(){
  var cnt=0;
  Object.keys(_olRowSelected||{}).forEach(function(k){if(_olRowSelected[k])cnt++;});
  var bar=document.getElementById('ol-selection-bar');
  if(!bar)return;
  if(cnt>0){
    // 選択中の案件で「未処理」が含まれていれば「処理済にする」、「処理済」が含まれていれば「未処理に戻す」を出す
    var hasPending=false,hasProcessed=false;
    Object.keys(_olRowSelected).forEach(function(oid){
      if(!_olRowSelected[oid])return;
      var o=orders[oid];if(!o)return;
      if(o.checked===true)hasProcessed=true;
      else hasPending=true;
    });
    var actionBtns='';
    if(hasPending){
      actionBtns+='<button onclick="markSelectedAsProcessed()" style="display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:#03968F;color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>処理済にする</button>';
    }
    if(hasProcessed){
      actionBtns+='<button onclick="markSelectedAsPending()" style="display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:#fff;color:#374151;border:1px solid #d1d5db;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600">↺ 未処理に戻す</button>';
    }
    bar.innerHTML='<span style="display:inline-flex;align-items:center;gap:6px;color:#374151;font-weight:600;font-size:13px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#03968F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'+cnt+'件選択中</span>'+
    actionBtns+
    '<button onclick="deleteSelectedOrders()" style="display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:#fff;color:#dc2626;border:1px solid #fecaca;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg>削除</button>'+
    '<button onclick="clearOrderSelection()" style="padding:5px 8px;background:transparent;color:#6b7280;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500">選択を解除</button>';
  }else{
    bar.innerHTML='';
  }
}

// 選択した案件をまとめて処理済（checked:true）に
function markSelectedAsProcessed(){
  var oids=Object.keys(_olRowSelected).filter(function(k){return _olRowSelected[k];});
  if(!oids.length)return;
  var pending=oids.filter(function(oid){var o=orders[oid];return o&&o.checked!==true;});
  if(!pending.length){showToast('未処理の案件がありません');return;}
  dexConfirm(pending.length+'件を「処理済」にします。よろしいですか？',{title:'処理済にする',okText:'処理済にする',type:'success'}).then(function(ok){
    if(!ok)return;
    var u={};
    var now=Date.now();
    pending.forEach(function(oid){
      u['orders/'+oid+'/checked']=true;
      u['orders/'+oid+'/slipConfirmed']=true;
      u['orders/'+oid+'/updatedAt']=now;
    });
    db.ref().update(u).then(function(){
      pending.forEach(function(oid){
        if(orders[oid]){orders[oid].checked=true;orders[oid].slipConfirmed=true;}
      });
      _olRowSelected={};
      showToast(pending.length+'件を処理済にしました');
      scheduleRenderOL();
    }).catch(function(err){
      showToast('エラー: '+(err.message||''));
    });
  });
}

// 選択した案件をまとめて未処理（checked:false）に戻す
function markSelectedAsPending(){
  var oids=Object.keys(_olRowSelected).filter(function(k){return _olRowSelected[k];});
  if(!oids.length)return;
  var processed=oids.filter(function(oid){var o=orders[oid];return o&&o.checked===true;});
  if(!processed.length){showToast('処理済の案件がありません');return;}
  dexConfirm(processed.length+'件を「未処理」に戻します。よろしいですか？',{title:'未処理に戻す',okText:'戻す',type:'warning'}).then(function(ok){
    if(!ok)return;
    var u={};
    var now=Date.now();
    processed.forEach(function(oid){
      u['orders/'+oid+'/checked']=false;
      u['orders/'+oid+'/updatedAt']=now;
    });
    db.ref().update(u).then(function(){
      processed.forEach(function(oid){
        if(orders[oid]){orders[oid].checked=false;}
      });
      _olRowSelected={};
      showToast(processed.length+'件を未処理に戻しました');
      scheduleRenderOL();
    }).catch(function(err){
      showToast('エラー: '+(err.message||''));
    });
  });
}

function toggleAllOrderCheck(checked){
  var boxes=document.querySelectorAll('.ol-check-box');
  boxes.forEach(function(b){
    var row=b.closest('tr');
    if(!row)return;
    var oid=row.dataset.oid;if(!oid)return;
    if(checked)_olRowSelected[oid]=true;
    else delete _olRowSelected[oid];
    b.checked=!!_olRowSelected[oid];
    row.style.background=_olRowSelected[oid]?'#ecfdf5':'#fff';
  });
  updateSelectionBar();
}

function clearOrderSelection(){
  _olRowSelected={};
  document.querySelectorAll('.ol-check-box').forEach(function(b){
    b.checked=false;
    var row=b.closest('tr');
    if(row)row.style.background='#fff';
  });
  updateSelectionBar();
}

function deleteSelectedOrders(){
  var oids=Object.keys(_olRowSelected).filter(function(k){return _olRowSelected[k];});
  if(!oids.length)return;
  dexConfirm('選択した '+oids.length+' 件を削除しますか？',{title:'案件を削除',okText:'削除する',type:'danger'}).then(function(ok){
    if(!ok)return;
    var updates={};
    oids.forEach(function(oid){updates['orders/'+oid]=null;});
    db.ref().update(updates).then(function(){
      oids.forEach(function(oid){delete orders[oid];delete _olRowSelected[oid];});
      showToast(oids.length+' 件削除しました');
      scheduleRenderOL();
    }).catch(function(err){showToast('エラー: '+(err.message||''));});
  });
}

function toggleOrderCheck(oid){

function changeOLDate(delta){

var cur=localStorage.getItem('dex_current_date')||currentDate;

d.setDate(d.getDate()+delta);
currentDate=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');

// ============================================
// カスタムカレンダー（リッチ緑系・全date/month inputに自動適用）
// ============================================
(function(){
  let _dexCalPop=null;
  let _dexCalTargetInput=null;
  let _dexCalMode='day';  // 'day' | 'month' | 'year'
  let _dexCalView={year:new Date().getFullYear(),month:new Date().getMonth()};
  let _dexCalInputType='date';  // 'date' | 'month'

  const WEEKDAYS=['日','月','火','水','木','金','土'];
  const MONTH_NAMES_J=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  function getHolidays(year){
    var h={};
    h[year+'-01-01']='元日';
    h[year+'-02-11']='建国記念の日';
    h[year+'-02-23']='天皇誕生日';
    h[year+'-04-29']='昭和の日';
    h[year+'-05-03']='憲法記念日';
    h[year+'-05-04']='みどりの日';
    h[year+'-05-05']='こどもの日';
    h[year+'-08-11']='山の日';
    h[year+'-11-03']='文化の日';
    h[year+'-11-23']='勤労感謝の日';
    return h;
  }

  function pad2(n){return String(n).padStart(2,'0');}
  function ymdFn(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}

  function closeDexCal(){
    if(_dexCalPop){_dexCalPop.remove();_dexCalPop=null;}
    _dexCalTargetInput=null;
    document.removeEventListener('mousedown',onOutsideClick,true);
    window.removeEventListener('resize',closeDexCal);
    window.removeEventListener('scroll',closeDexCal,true);
  }
  function onOutsideClick(e){
    if(!_dexCalPop)return;
    if(_dexCalPop.contains(e.target))return;
    if(e.target===_dexCalTargetInput)return;
    closeDexCal();
  }

  function openDexCal(inputEl){
    if(_dexCalTargetInput===inputEl){closeDexCal();return;}
    closeDexCal();
    _dexCalTargetInput=inputEl;
    _dexCalInputType=inputEl.type==='month'?'month':'date';
    _dexCalMode=_dexCalInputType==='month'?'month':'day';

    var cur=inputEl.value;
    if(cur){
      var p=cur.split('-');
      if(p.length>=2){
        _dexCalView.year=parseInt(p[0])||new Date().getFullYear();
        _dexCalView.month=(parseInt(p[1])||1)-1;
      }
    }else{
      var now=new Date();
      _dexCalView.year=now.getFullYear();
      _dexCalView.month=now.getMonth();
    }

    _dexCalPop=document.createElement('div');
    _dexCalPop.className='dex-cal-pop';
    document.body.appendChild(_dexCalPop);
    renderDexCal();
    positionDexCal();

    setTimeout(function(){
      document.addEventListener('mousedown',onOutsideClick,true);
      window.addEventListener('resize',closeDexCal);
      window.addEventListener('scroll',closeDexCal,true);
    },50);
  }

  function positionDexCal(){
    if(!_dexCalPop||!_dexCalTargetInput)return;
    var rect=_dexCalTargetInput.getBoundingClientRect();
    var popRect=_dexCalPop.getBoundingClientRect();
    var top=rect.bottom+6;
    var left=rect.left;
    if(top+popRect.height>window.innerHeight-8){
      top=rect.top-popRect.height-6;
      if(top<8)top=8;
    }
    if(left+popRect.width>window.innerWidth-8){
      left=window.innerWidth-popRect.width-8;
    }
    if(left<8)left=8;
    _dexCalPop.style.top=top+'px';
    _dexCalPop.style.left=left+'px';
  }

  function renderDexCal(){
    if(!_dexCalPop)return;
    if(_dexCalMode==='year'){renderYearPicker();return;}
    if(_dexCalMode==='month'){renderMonthPicker();return;}
    renderDayPicker();
  }

  function renderDayPicker(){
    var y=_dexCalView.year;
    var m=_dexCalView.month;
    var today=new Date();
    var todayYMD=ymdFn(today);
    var selectedYMD=_dexCalTargetInput&&_dexCalTargetInput.value?_dexCalTargetInput.value:'';
    var holidays=getHolidays(y);

    var firstDay=new Date(y,m,1);
    var firstWd=firstDay.getDay();
    var daysInMonth=new Date(y,m+1,0).getDate();
    var prevMonthDays=new Date(y,m,0).getDate();

    var h='<div class="dex-cal-head">';
    h+='<button class="dex-cal-nav" onclick="window._dexCalNav(-1)" title="前月">◀</button>';
    h+='<div class="dex-cal-title" onclick="window._dexCalChangeMode(\'month\')" title="年月を選ぶ">'+y+'年 '+MONTH_NAMES_J[m]+'</div>';
    h+='<button class="dex-cal-nav" onclick="window._dexCalNav(1)" title="次月">▶</button>';
    h+='</div>';
    h+='<div class="dex-cal-weekdays">';
    WEEKDAYS.forEach(function(w,i){
      var cls='dex-cal-wd'+(i===0?' sun':i===6?' sat':'');
      h+='<div class="'+cls+'">'+w+'</div>';
    });
    h+='</div>';
    h+='<div class="dex-cal-grid">';
    for(var i=0;i<firstWd;i++){
      var dpd=prevMonthDays-firstWd+1+i;
      h+='<div class="dex-cal-day dex-cal-other-month">'+dpd+'</div>';
    }
    for(var d=1;d<=daysInMonth;d++){
      var dateStr=y+'-'+pad2(m+1)+'-'+pad2(d);
      var wd=new Date(y,m,d).getDay();
      var cls='dex-cal-day';
      if(wd===0)cls+=' dex-cal-sun';
      if(wd===6)cls+=' dex-cal-sat';
      if(holidays[dateStr])cls+=' dex-cal-holiday';
      if(dateStr===todayYMD)cls+=' dex-cal-today';
      if(dateStr===selectedYMD)cls+=' dex-cal-selected';
      h+='<div class="'+cls+'" onclick="window._dexCalPick(\''+dateStr+'\')" title="'+(holidays[dateStr]||'')+'">'+d+'</div>';
    }
    var totalCells=firstWd+daysInMonth;
    var fill=(7-totalCells%7)%7;
    for(var i=1;i<=fill;i++){
      h+='<div class="dex-cal-day dex-cal-other-month">'+i+'</div>';
    }
    h+='</div>';
    h+='<div class="dex-cal-footer">';
    h+='<button class="dex-cal-quick" onclick="window._dexCalPick(\''+todayYMD+'\')">今日</button>';
    h+='<button class="dex-cal-clear" onclick="window._dexCalClear()">クリア</button>';
    h+='</div>';
    _dexCalPop.innerHTML=h;
    positionDexCal();
  }

  function renderMonthPicker(){
    var y=_dexCalView.year;
    var today=new Date();
    var selectedYM=_dexCalTargetInput&&_dexCalTargetInput.value?_dexCalTargetInput.value.slice(0,7):'';

    var h='<div class="dex-cal-head">';
    h+='<button class="dex-cal-nav" onclick="window._dexCalNavYear(-1)" title="前年">◀</button>';
    h+='<div class="dex-cal-title" onclick="window._dexCalChangeMode(\'year\')" title="年を選ぶ">'+y+' 年</div>';
    h+='<button class="dex-cal-nav" onclick="window._dexCalNavYear(1)" title="翌年">▶</button>';
    h+='</div>';
    h+='<div class="dex-cal-months">';
    for(var mi=0;mi<12;mi++){
      var ymStr=y+'-'+pad2(mi+1);
      var cls='dex-cal-month-btn';
      if(ymStr===selectedYM)cls+=' dex-cal-month-selected';
      if(y===today.getFullYear()&&mi===today.getMonth())cls+=' dex-cal-month-current';
      h+='<button class="'+cls+'" onclick="window._dexCalPickMonth('+mi+')">'+MONTH_NAMES_J[mi]+'</button>';
    }
    h+='</div>';
    if(_dexCalInputType==='date'){
      h+='<div class="dex-cal-footer"><button class="dex-cal-clear" onclick="window._dexCalChangeMode(\'day\')">戻る</button></div>';
    }else{
      h+='<div class="dex-cal-footer">';
      h+='<button class="dex-cal-quick" onclick="window._dexCalPickMonth('+today.getMonth()+',true)">今月</button>';
      h+='<button class="dex-cal-clear" onclick="window._dexCalClear()">クリア</button>';
      h+='</div>';
    }
    _dexCalPop.innerHTML=h;
    positionDexCal();
  }

  function renderYearPicker(){
    var currentY=_dexCalView.year;
    var startY=currentY-currentY%12;

    var h='<div class="dex-cal-head">';
    h+='<button class="dex-cal-nav" onclick="window._dexCalNavYearBlock(-1)" title="前12年">◀</button>';
    h+='<div class="dex-cal-title">'+startY+' - '+(startY+11)+'</div>';
    h+='<button class="dex-cal-nav" onclick="window._dexCalNavYearBlock(1)" title="次12年">▶</button>';
    h+='</div>';
    h+='<div class="dex-cal-years">';
    for(var i=0;i<12;i++){
      var yy=startY+i;
      var cls='dex-cal-year-btn';
      if(yy===currentY)cls+=' dex-cal-year-selected';
      h+='<button class="'+cls+'" onclick="window._dexCalPickYear('+yy+')">'+yy+'</button>';
    }
    h+='</div>';
    h+='<div class="dex-cal-footer"><button class="dex-cal-clear" onclick="window._dexCalChangeMode(\''+(_dexCalInputType==='month'?'month':'day')+'\')">戻る</button></div>';
    _dexCalPop.innerHTML=h;
    positionDexCal();
  }

  window._dexCalNav=function(delta){
    _dexCalView.month+=delta;
    if(_dexCalView.month<0){_dexCalView.month=11;_dexCalView.year--;}
    if(_dexCalView.month>11){_dexCalView.month=0;_dexCalView.year++;}
    renderDexCal();
  };
  window._dexCalNavYear=function(delta){
    _dexCalView.year+=delta;
    renderDexCal();
  };
  window._dexCalNavYearBlock=function(delta){
    _dexCalView.year+=delta*12;
    renderDexCal();
  };
  window._dexCalChangeMode=function(mode){
    _dexCalMode=mode;
    renderDexCal();
  };
  window._dexCalPickYear=function(y){
    _dexCalView.year=y;
    _dexCalMode='month';
    renderDexCal();
  };
  window._dexCalPickMonth=function(m,andSelect){
    _dexCalView.month=m;
    if(_dexCalInputType==='month'||andSelect){
      var val=_dexCalView.year+'-'+pad2(m+1);
      setInputValue(val);
      closeDexCal();
    }else{
      _dexCalMode='day';
      renderDexCal();
    }
  };
  window._dexCalPick=function(dateStr){
    if(_dexCalInputType==='month'){
      setInputValue(dateStr.slice(0,7));
    }else{
      setInputValue(dateStr);
    }
    closeDexCal();
  };
  window._dexCalClear=function(){
    setInputValue('');
    closeDexCal();
  };

  function setInputValue(val){
    if(!_dexCalTargetInput)return;
    _dexCalTargetInput.value=val;
    try{_dexCalTargetInput.dispatchEvent(new Event('input',{bubbles:true}));}catch(e){}
    try{_dexCalTargetInput.dispatchEvent(new Event('change',{bubbles:true}));}catch(e){}
    try{_dexCalTargetInput.focus();_dexCalTargetInput.blur();}catch(e){}
  }

  // 全ての <input type="date"> / <input type="month"> にバインド（イベント委譲）
  document.addEventListener('mousedown',function(e){
    var t=e.target;
    if(!t||t.tagName!=='INPUT')return;
    if(t.type!=='date'&&t.type!=='month')return;
    if(t.classList.contains('no-dex-cal'))return;
    t.classList.add('dex-cal-active');
    e.preventDefault();
    openDexCal(t);
  },true);

  document.addEventListener('keydown',function(e){
    if(!_dexCalPop)return;
    if(e.key==='Escape'){e.preventDefault();closeDexCal();return;}
  },true);
})();

</script>

</body>
</html>
