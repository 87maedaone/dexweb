<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:"Noto Sans JP",sans-serif;font-size:15px;background:#f9fafb;color:#1a1a1a}
#app{height:100%;display:flex}

/* ========== SIDEBAR (mgmt.html完全互換) ========== */
.sidebar{width:240px;background:#fff;color:#374151;display:flex;flex-direction:column;flex-shrink:0;padding:24px 0;border-right:1px solid #e5e7eb}
.sb-logo{padding:0 20px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #f3f4f6;margin-bottom:16px}
.sb-logo-mark{width:48px;height:48px;flex-shrink:0;border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;transition:transform .15s}
.sb-logo-mark:hover{transform:scale(1.06)}
.sb-logo-mark img{width:48px;height:48px;object-fit:contain;display:block}
.sb-logo-text{display:flex;flex-direction:column;line-height:1.2}
.sb-logo-main{font-family:"Noto Sans JP",sans-serif;font-weight:800;font-size:16px;color:#2F2C2C;letter-spacing:.2px}
.sb-logo-sub-text{font-size:10px;color:#9ca3af;font-weight:700;letter-spacing:1px;margin-top:2px}
.sb-section{padding:14px 20px 6px;font-size:10px;font-weight:700;letter-spacing:1.5px;color:#9ca3af;text-transform:uppercase}
.sb-back-dispatch{display:flex;align-items:center;gap:8px;margin:8px 12px 4px;padding:8px 14px;background:linear-gradient(135deg,#03968F 0%,#0AB8AE 100%);color:#fff;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;transition:all .15s;box-shadow:0 2px 6px rgba(3,150,143,.2)}
.sb-back-dispatch:hover{transform:translateX(-2px);box-shadow:0 4px 10px rgba(3,150,143,.3)}
.sb-branch{display:flex;align-items:center;gap:8px;margin:8px 12px 0;padding:10px 14px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:12px;cursor:pointer;position:relative;transition:all .15s}
.sb-branch:hover{background:#fff;border-color:#a7f3d0}
.sb-branch-icon{color:#6b7280;display:flex;align-items:center}
.sb-branch-label{font-size:12px;color:#6b7280;font-weight:600}
.sb-branch-select{flex:1;border:none;background:transparent;font-size:13px;font-weight:700;color:#2F2C2C;outline:none;font-family:inherit;cursor:pointer;appearance:none;-webkit-appearance:none;padding-right:18px}
.sb-branch-arrow{color:#9ca3af;position:absolute;right:14px;pointer-events:none}
.sb-logout{margin:auto 12px 14px;padding:12px 14px;background:transparent;border:1px solid transparent;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:12px;font-size:14px;font-weight:600;color:#6b7280;transition:all .15s}
.sb-logout:hover{background:#fef2f2;color:#dc2626;border-color:#fecaca}
.sb-item{display:flex;align-items:center;gap:12px;padding:11px 20px;cursor:pointer;font-size:14px;font-weight:600;color:#4b5563;transition:all .15s;position:relative;margin:2px 10px;border-radius:10px}
.sb-item:hover{background:#f0fdf4;color:#03968F}
.sb-item.active{background:#ecfdf5;color:#03968F;font-weight:700}
.sb-item.active::before{content:"";position:absolute;left:-10px;top:50%;transform:translateY(-50%);width:3px;height:60%;background:#03968F;border-radius:0 3px 3px 0}
.sb-item .sb-icon{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:currentColor}
.sb-item .sb-icon svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.sb-item .sb-badge{margin-left:auto;background:#f59e0b;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}

/* ========== MAIN ========== */
.main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f9fafb}
.content-area{flex:1;overflow-y:auto;padding:32px 32px 60px}

/* Page header */
.page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.page-header .ph-left h1{font-size:26px;font-weight:800;color:#2F2C2C;letter-spacing:-.3px;display:flex;align-items:center;gap:12px}
.page-header .ph-left .ph-sub{font-size:13px;color:#6b7280;margin-top:4px;font-weight:500}
.page-header .ph-breadcrumb{font-size:12px;color:#9ca3af;margin-bottom:6px;font-weight:600}
.page-header .ph-breadcrumb a{color:#6b7280;cursor:pointer;text-decoration:none}
.page-header .ph-breadcrumb a:hover{color:#03968F}
.page-header .ph-right{display:flex;align-items:center;gap:8px}

.btn{font-family:inherit;font-size:13px;font-weight:700;padding:9px 16px;border-radius:10px;border:1px solid #e5e7eb;background:#fff;color:#374151;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn:hover{background:#f9fafb;border-color:#d1d5db}
.btn svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.btn-primary{background:linear-gradient(135deg,#03968F 0%,#0AB8AE 100%);color:#fff;border-color:transparent;box-shadow:0 2px 6px rgba(3,150,143,.25)}
.btn-primary:hover{opacity:.95;box-shadow:0 4px 10px rgba(3,150,143,.35)}
.btn-sm{padding:6px 10px;font-size:12px}
.btn-ghost{border-color:transparent;background:transparent;color:#6b7280}
.btn-ghost:hover{background:#f9fafb;color:#374151}

/* Views */
.view{display:none}
.view.active{display:block}

/* Cards */
.card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:20px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.card-title{font-size:13px;font-weight:700;color:#6b7280;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.card-title .link{color:#03968F;font-size:12px;cursor:pointer;font-weight:700}
.card-title .link:hover{text-decoration:underline}

/* Badges */
.badge{display:inline-flex;align-items:center;font-size:11px;padding:3px 9px;border-radius:10px;font-weight:700;white-space:nowrap}
.badge-success{background:#ecfdf5;color:#059669}
.badge-warning{background:#fef3c7;color:#b45309}
.badge-danger{background:#fee2e2;color:#b91c1c}
.badge-info{background:#eff6ff;color:#1d4ed8}
.badge-teal{background:#ecfdf5;color:#03968F}
.badge-gray{background:#f3f4f6;color:#4b5563}

/* Metric cards */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.metric-card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:18px 20px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.metric-label{font-size:12px;color:#6b7280;margin-bottom:8px;display:flex;gap:6px;align-items:center;font-weight:600}
.metric-value{font-size:28px;font-weight:800;color:#2F2C2C;line-height:1.1;letter-spacing:-.3px}
.metric-value .unit{font-size:13px;font-weight:600;color:#6b7280;margin-left:4px}
.metric-sub{font-size:11px;color:#9ca3af;margin-top:6px;font-weight:500}
.metric-value.text-warning{color:#b45309}
.metric-value.text-danger{color:#b91c1c}

/* Toolbar */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.search-input{flex:1;max-width:320px;padding:9px 14px;border:1px solid #e5e7eb;border-radius:10px;font-family:inherit;font-size:13px;outline:none;background:#fff;font-weight:500}
.search-input:focus{border-color:#03968F;box-shadow:0 0 0 3px rgba(3,150,143,.1)}
.filter-tag{font-size:12px;padding:6px 13px;background:#fff;border:1px solid #e5e7eb;border-radius:18px;cursor:pointer;color:#6b7280;font-weight:700;transition:all .15s}
.filter-tag:hover{border-color:#03968F;color:#03968F}
.filter-tag.active{background:linear-gradient(135deg,#03968F 0%,#0AB8AE 100%);color:#fff;border-color:transparent;box-shadow:0 2px 6px rgba(3,150,143,.25)}

/* Driver table */
.driver-table{width:100%;background:#fff;border:1px solid #e5e7eb;border-radius:16px;overflow:hidden;border-collapse:collapse;font-size:13px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.driver-table thead th{background:#f9fafb;padding:12px 16px;text-align:left;font-weight:700;color:#6b7280;font-size:11px;border-bottom:1px solid #e5e7eb;letter-spacing:.05em}
.driver-table tbody td{padding:14px 16px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.driver-table tbody tr{cursor:pointer;transition:background .12s}
.driver-table tbody tr:hover{background:#f0fdf4}
.driver-table tbody tr:last-child td{border-bottom:none}

.driver-cell{display:flex;align-items:center;gap:12px}
.avatar{width:38px;height:38px;border-radius:50%;background:#ecfdf5;color:#03968F;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.avatar.avatar-lg{width:96px;height:96px;border-radius:16px;font-size:30px}
.driver-name{font-weight:700;color:#2F2C2C}
.driver-kana{font-size:11px;color:#9ca3af;margin-top:1px}

/* Driver detail hero */
.hero-card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:24px;margin-bottom:16px;display:flex;gap:20px;align-items:flex-start;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.hero-info{flex:1;min-width:0}
.hero-name{font-size:24px;font-weight:800;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:4px;color:#2F2C2C;letter-spacing:-.3px}
.hero-name .kana{font-size:12px;font-weight:500;color:#9ca3af}
.hero-name .id{font-size:12px;font-weight:500;color:#9ca3af}
.hero-meta{font-size:13px;color:#6b7280;margin-bottom:14px;font-weight:500}
.hero-badges{display:flex;gap:6px;flex-wrap:wrap}

/* Alert strip */
.alert-strip{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:14px 18px;margin-bottom:20px;display:flex;gap:14px;align-items:flex-start}
.alert-strip .icon{color:#d97706;flex-shrink:0;margin-top:2px;display:flex}
.alert-strip .icon svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.alert-strip .title{font-size:13px;font-weight:700;color:#b45309;margin-bottom:3px}
.alert-strip .items{font-size:12px;color:#b45309;font-weight:500;line-height:1.6}

/* Status grid */
.status-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:20px}
.status-card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:16px 18px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.status-card-label{font-size:11px;color:#6b7280;margin-bottom:8px;letter-spacing:.03em;font-weight:700;display:flex;align-items:center;gap:6px}
.status-card-label svg{width:14px;height:14px;stroke:#03968F;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.status-card-main{font-size:15px;font-weight:700;margin-bottom:10px;color:#2F2C2C}
.status-card-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;color:#6b7280}
.status-card-row .val{color:#2F2C2C;font-weight:700}

/* Progress bar */
.bar{width:100%;height:6px;background:#f3f4f6;border-radius:3px;overflow:hidden;margin:6px 0 8px}
.bar-fill{height:100%;border-radius:3px}
.bar-fill.ok{background:linear-gradient(90deg,#10b981,#34d399)}
.bar-fill.warn{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.bar-fill.danger{background:linear-gradient(90deg,#ef4444,#f87171)}
.bar-fill.teal{background:linear-gradient(135deg,#03968F 0%,#0AB8AE 100%)}

.text-success{color:#059669}
.text-warning{color:#b45309}
.text-danger{color:#b91c1c}
.text-teal{color:#03968F}

/* Detail section */
.detail-section{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:18px 22px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.detail-section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.detail-section-title{font-size:14px;font-weight:700;color:#2F2C2C;display:flex;align-items:center;gap:8px}
.detail-section-title svg{width:16px;height:16px;stroke:#03968F;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.info-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px 24px;font-size:13px}
.info-row{display:flex;gap:12px}
.info-row .label{color:#9ca3af;min-width:90px;flex-shrink:0;font-weight:600}
.info-row .val{color:#2F2C2C;font-weight:500}
.info-row.full{grid-column:1 / -1}

/* Placeholder */
.placeholder-card{background:#fff;border:2px dashed #cbd5e1;border-radius:16px;padding:60px 30px;text-align:center;color:#64748b}
.placeholder-card .pc-icon{margin-bottom:16px;display:flex;justify-content:center;color:#03968F;opacity:.6}
.placeholder-card .pc-icon svg{width:48px;height:48px;stroke:currentColor;stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
.placeholder-card .pc-title{font-size:22px;font-weight:800;margin-bottom:8px;color:#334155;letter-spacing:-.3px}
.placeholder-card .pc-desc{font-size:14px;line-height:1.6;margin-bottom:14px}
.placeholder-card .pc-phase{display:inline-block;padding:5px 14px;background:#ecfdf5;color:#03968F;border-radius:12px;font-size:12px;font-weight:700}
.placeholder-feature-list{margin:24px auto 0;max-width:520px;text-align:left;background:#f9fafb;border-radius:12px;padding:20px 24px;border:1px solid #e5e7eb}
.placeholder-feature-list li{font-size:13px;color:#4b5563;margin-bottom:8px;list-style:none;padding-left:22px;position:relative;font-weight:500}
.placeholder-feature-list li::before{content:"";position:absolute;left:0;top:6px;width:8px;height:8px;border-radius:50%;background:#e5e7eb}
.placeholder-feature-list li.ready::before{background:#03968F;box-shadow:0 0 0 3px rgba(3,150,143,.15)}

/* Toast */
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#2F2C2C;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;display:none;box-shadow:0 4px 20px rgba(0,0,0,.3)}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;max-width:640px;width:90%;max-height:90vh;overflow-y:auto}

/* Top Overlay (メニュー) */
.top-overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:400;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.top-overlay.open{display:flex}
.top-overlay-content{background:#f9fafb;border-radius:24px;width:90%;max-width:860px;max-height:85vh;overflow-y:auto;padding:40px;box-shadow:0 24px 64px rgba(0,0,0,.2);animation:topSlideIn .3s ease;position:relative;border:1px solid #e5e7eb}
@keyframes topSlideIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.top-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;position:relative}
.top-title{font-family:"Noto Sans JP",sans-serif;font-weight:900;font-size:32px;letter-spacing:2px;color:#2F2C2C;margin:8px 0 28px}
.top-section{margin-bottom:28px;width:100%;max-width:800px}
.top-section-title{font-family:"Noto Sans JP",sans-serif;font-size:18px;font-weight:700;color:#2F2C2C;margin-bottom:12px;padding-left:4px}
.top-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.top-card{background:#fff;border:2px solid #e5e7eb;border-radius:16px;padding:20px 16px;text-align:center;cursor:pointer;transition:all .15s;font-family:"Noto Sans JP",sans-serif;position:relative}
.top-card:hover{border-color:#03968F;box-shadow:0 4px 12px rgba(3,150,143,.15)}
.top-card.current{background:linear-gradient(135deg,#03968F 0%,#0AB8AE 100%);border-color:#03968F}
.top-card.current .tc-name{color:#fff}
.top-card .tc-name{font-size:17px;font-weight:700;color:#2F2C2C;display:flex;align-items:center;justify-content:center;gap:8px}
.top-card .tc-name svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.top-card .tc-sub{font-size:11px;color:#6b7280;margin-top:4px;font-weight:500}
.top-card.current .tc-sub{color:rgba(255,255,255,.9)}
.top-card .tc-current-badge{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.25);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px}

@keyframes dxspin{to{transform:rotate(360deg)}}

@media (max-width:900px){
  .info-grid{grid-template-columns:1fr}
  .hero-card{flex-direction:column}
  .content-area{padding:20px 16px 60px}
  .top-grid{grid-template-columns:repeat(2,1fr)}
}

/* === iPad 11インチ対応 === */
@media(min-width:1025px) and (max-width:1300px){
.sidebar{width:200px}
.content-area{padding:24px 24px 14px}
}
@media(min-width:768px) and (max-width:1024px){
.sidebar{width:180px}
.content-area{padding:20px 20px 12px}
button{min-height:36px}
input,select,textarea{min-height:36px;font-size:14px}
}
</style>

/* ========== 拠点切替 ========== */
function changeBranch(b){
  currentBranch=b;

  showToast('拠点：'+getBranchLabel(b));
  state.selectedDriverId=null;
  renderActive();
}

/* ========== 認証 ========== */
function doAuthLogin(){
  var email=(document.getElementById('auth-email')?.value||'').trim();
  var pwd=document.getElementById('auth-password')?.value||'';
  var errEl=document.getElementById('auth-error');
  if(!email||!pwd){if(errEl){errEl.textContent='メールアドレスとパスワードを入力してください';errEl.style.display='block';}return;}
  if(errEl)errEl.style.display='none';
  firebase.auth().signInWithEmailAndPassword(email,pwd).catch(function(e){
    if(errEl){
      var msg='ログインに失敗しました';
      if(e.code==='auth/invalid-email')msg='メールアドレスの形式が正しくありません';
      else if(e.code==='auth/user-not-found'||e.code==='auth/wrong-password'||e.code==='auth/invalid-credential')msg='メールアドレスまたはパスワードが違います';
      else if(e.code==='auth/too-many-requests')msg='試行回数が多すぎます。しばらくしてからお試しください';
      errEl.textContent=msg;errEl.style.display='block';
    }
  });
}
function doLogout(){
  if(!confirm('ログアウトしますか？'))return;
  firebase.auth().signOut().then(function(){location.href='index.html';});
}

auth.onAuthStateChanged(function(user){
  var loader=document.getElementById('auth-loading');
  if(loader)loader.style.display='none';
  if(user){
    currentStaffUser=user;
    db.ref('staff/'+user.uid).once('value').then(function(snap){
      if(!snap.val()){
        // 開発中：staffレコードがなくてもアプリを起動（本番ではコメントアウト）
        console.warn('staff record not found, starting in dev mode');
        startApp();
        return;
      }
      currentStaffData=snap.val();
      if(currentStaffData.isActive===false){
        auth.signOut();alert('このアカウントは現在無効化されています。');return;
      }
      startApp();
    }).catch(function(err){
      console.warn('staff read failed, starting in dev mode:',err);
      startApp();
    });
  }else{
    document.getElementById('auth-view').style.display='flex';
  }
});

function startApp(){
  document.getElementById('app').style.display='flex';
  document.getElementById('auth-view').style.display='none';
  var logoEl=document.getElementById('sb-logo-img');
  if(logoEl)logoEl.src=DEX_LOGO;
  var sel=document.getElementById('branch-select');
  if(sel)sel.value=currentBranch;
  switchRView('drivers');
}

/* ========== ビュー切替 ========== */
function switchRView(v){
  document.querySelectorAll('.sb-item').forEach(function(el){el.classList.toggle('active',el.dataset.view===v);});
  document.querySelectorAll('.view').forEach(function(el){el.classList.remove('active');});
  var target=document.getElementById('view-'+v);
  if(target)target.classList.add('active');
  state.view=v;
  state.selectedDriverId=null;
  history.replaceState(null,'','#'+v);
  renderActive();
}
function renderActive(){
  switch(state.view){
    case 'dashboard':  renderDashboard();  break;
    case 'drivers':    renderDriversView(); break;
    case 'attendance': renderPlaceholder('attendance'); break;
    case 'kaizen':     renderPlaceholder('kaizen');     break;
    case 'shift':      renderPlaceholder('shift');      break;
    case 'payroll':    renderPlaceholder('payroll');    break;
    case 'leave':      renderPlaceholder('leave');      break;
    case 'employees':  renderPlaceholder('employees');  break;
    case 'reports':    renderPlaceholder('reports');    break;
  }
}

/* ========== 状態 ========== */
const state={view:'drivers',selectedDriverId:null,search:'',filter:'all'};

/* ========== ユーティリティ ========== */
function getInitial(name){return name.split(' ')[0].charAt(0);}
function getAge(birthStr){var b=new Date(birthStr.replace(/\//g,'-'));var now=new Date();var age=now.getFullYear()-b.getFullYear();var m=now.getMonth()-b.getMonth();if(m<0||(m===0&&now.getDate()<b.getDate()))age--;return age;}
function getYearsOfService(hireStr){var h=new Date(hireStr.replace(/\//g,'-'));return Math.floor((new Date()-h)/(1000*60*60*24*365.25));}
function filteredDrivers(){
  var list=DRIVERS.slice();
  if(currentBranch!=='all')list=list.filter(function(d){return d.branch===currentBranch;});
  if(state.search){
    var q=state.search.toLowerCase();
    list=list.filter(function(d){return d.name.toLowerCase().indexOf(q)>=0||d.kana.toLowerCase().indexOf(q)>=0||String(d.id).indexOf(q)>=0;});
  }
  if(state.filter==='alert')list=list.filter(hasAlert);
  else if(state.filter==='onduty')list=list.filter(function(d){return d.status==='就業中';});
  else if(state.filter==='rest')list=list.filter(function(d){return d.status==='休職中';});
  return list;
}
function hasAlert(d){return d.license.status!=='ok'||d.aptitude.status!=='ok'||d.health.stress==='pending'||d.education.done<d.education.total||d.kaizen.restViolation>0||d.kaizen.continuousViolation>0||(d.kaizen.month/d.kaizen.limit)>0.95;}
function countAlerts(d){var c=0;if(d.license.status!=='ok')c++;if(d.aptitude.status!=='ok')c++;if(d.health.stress==='pending')c++;if(d.education.done<d.education.total)c++;if(d.kaizen.restViolation>0)c++;if(d.kaizen.continuousViolation>0)c++;if((d.kaizen.month/d.kaizen.limit)>0.95)c++;return c;}
function filteredDriversCount(f){var orig=state.filter;state.filter=f;var c=filteredDrivers().length;state.filter=orig;return c;}

/* ========== 運転者台帳 ========== */
function renderDriversView(){
  var el=document.getElementById('drivers-body');
  if(state.selectedDriverId){el.innerHTML=renderDriverDetail();}
  else{el.innerHTML=renderDriverList();}
}
function selectDriver(id){state.selectedDriverId=id;renderDriversView();}
function backToList(){state.selectedDriverId=null;renderDriversView();}
function setFilter(f){state.filter=f;renderDriversView();}

function renderDriverList(){
  var list=filteredDrivers();
  var h='';

  h+='<div class="ph-sub">運転者の免許・適性診断・教育状況を一元管理</div></div>';

  h+='<span class="filter-tag '+(state.filter==='all'?'active':'')+'"    onclick="setFilter(\'all\')">すべて ('+filteredDriversCount('all')+')</span>';

  if(list.length===0)h+='<div style="padding:40px;text-align:center;color:#9ca3af;font-weight:500">該当するドライバーがいません</div>';
  return h;
}

function alertSummary(d){
  var items=[];
  if(d.license.status==='warn')   items.push('<span class="badge badge-warning">免許あと'+d.license.daysLeft+'日</span>');
  if(d.aptitude.status==='warn')  items.push('<span class="badge badge-warning">適性診断 '+d.aptitude.next+'</span>');
  if(d.education.done<d.education.total) items.push('<span class="badge badge-gray">教育 '+d.education.done+'/'+d.education.total+'</span>');
  if(d.health.stress==='pending') items.push('<span class="badge badge-gray">ストレス未</span>');
  if(d.kaizen.restViolation>0)    items.push('<span class="badge badge-danger">休息違反'+d.kaizen.restViolation+'</span>');
  if(d.kaizen.continuousViolation>0) items.push('<span class="badge badge-danger">連続運転違反</span>');
  if((d.kaizen.month/d.kaizen.limit)>0.95) items.push('<span class="badge badge-danger">拘束'+Math.round(d.kaizen.month/d.kaizen.limit*100)+'%</span>');
  return '<div style="display:flex;gap:4px;flex-wrap:wrap">'+items.join('')+'</div>';
}
